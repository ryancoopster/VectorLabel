<!doctype html>
<!-- LIVE preview of the REAL VectorLabel Template Designer (embeds/designer-app.html),
     bootstrapped with a current template on the canvas + the app's own sample
     records, forced to light mode. Embedded in the marketing pages via <iframe>.
     Query params:
       tpl     = 1_5x1_5 | 1_5x4  (which current template to open on the canvas)
       view    = full | canvas | db  (whole window, just the canvas, or the custom
                                      Database pane)
       printer = M611 | M610 | PT-E550W | …  (inject the printable-area geometry —
                 VL_DEMO.printerGeometry, mirroring PrinterGeometry.swift — and
                 target that model, so the hatched unprintable-margin overlay shows)
       modal   = supply           (open the real "Choose a label supply" picker)
       mode    = custom, doc = asset_tags  (boot the CUSTOM-designer front-end with
                 a VL_DEMO.customDocs demo document + its bound sample data)  -->
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VectorLabel Designer preview</title>
<style>
  html,body{margin:0;height:100%;background:#fff;overflow:hidden}
  #clip{position:relative;width:100%;height:100%;overflow:hidden;background:#fff}
  /* Look-only preview: clicks never reach the real app, so its Load/Open/Save buttons
     can't pop a macOS file dialog. The auto-animation is JS-driven, so it still runs. */
  #f{position:absolute;top:0;left:0;border:0;transform-origin:0 0;background:#fff;pointer-events:none}
</style>
</head>
<body>
<div id="clip"><iframe id="f" src="designer-app.html" scrolling="no" title="VectorLabel Template Designer"></iframe></div>
<script src="vl-demo.js"></script>
<script>
(function(){
  var P    = new URLSearchParams(location.search);
  var view = P.get('view') || 'full';        // full | canvas | db
  var key  = P.get('tpl')  || '1_5x4';
  var anim = P.get('anim') === '1';          // slowly cycle records so the canvas label updates
  var printer = P.get('printer') || '';      // target model for the printable-area overlay
  var modal   = P.get('modal')   || '';      // 'supply' opens the real supply picker
  var custom  = P.get('mode') === 'custom';  // boot the Custom-designer front-end
  var doc  = custom && window.VL_DEMO && VL_DEMO.customDocs[P.get('doc') || 'asset_tags'] || null;
  var tpl  = (window.VL_DEMO && VL_DEMO.templates[key]) || null;
  if (tpl && printer) {                      // target the model so the margins overlay shows
    tpl = JSON.parse(JSON.stringify(tpl));
    tpl.targetPrinterModel = printer;
  }

  var APPW = 1060, APPH = 940;
  var f = document.getElementById('f'), clip = document.getElementById('clip');
  f.style.width = APPW + 'px';
  f.style.height = APPH + 'px';

  f.addEventListener('load', function(){
    var w = f.contentWindow;
    // The overlay geometry Swift normally injects; needed for the "printer" target
    // and for the custom print header. Harmless otherwise.
    try { if (window.VL_DEMO && VL_DEMO.printerGeometry) w.__VL_PRINTER_GEOMETRY__ = VL_DEMO.printerGeometry; } catch(e){}
    try {
      if (custom && doc) { w._designerMode = 'custom'; w.initCustomDocument(doc); }
      else if (tpl) w.initOpenTemplate(tpl);
    } catch(e){}
    try { if (modal === 'supply') w.openSupplyPicker(); } catch(e){}
    try { w.setTheme('light'); } catch(e){}
    try { if (w.centerCanvasWhenReady) w.centerCanvasWhenReady(0); else w.centerCanvas && w.centerCanvas(); } catch(e){}
    requestAnimationFrame(function(){ requestAnimationFrame(frame); });
    if (anim) startAnim(w);
  });

  // Slowly step through the bound records so the canvas label updates — the real
  // designer showing your data drive the label. Paused while off-screen / tab hidden.
  function startAnim(w){
    var visible = true;
    if ('IntersectionObserver' in window && window.frameElement) {
      new IntersectionObserver(function(es){ visible = es[0].isIntersecting; }, {threshold:0.05})
        .observe(window.frameElement);
    }
    setInterval(function(){
      if (!visible || document.hidden) return;
      try { w.eval('if(typeof S!=="undefined"&&typeof RX!=="undefined"&&RX.length){S.recIdx=(S.recIdx+1)%RX.length;R();}'); } catch(e){}
    }, 2800);
  }

  var tries = 0;
  function frame(){
    var w = f.contentWindow, d = w && w.document;
    if (!d) return;
    if (view === 'canvas') {
      var t = d.getElementById('canvas-host');
      var r = t && t.getBoundingClientRect();
      if (!r || r.width < 4) { if (tries++ < 25) return void setTimeout(frame,120); fitFull(); return; }
      var cw = clip.clientWidth, ch = clip.clientHeight;
      var s = Math.min(cw / r.width, ch / r.height);
      var ox = (cw - r.width * s) / 2;
      f.style.transform = 'translate(' + ox + 'px,0) scale(' + s + ') translate(' + (-r.left) + 'px,' + (-r.top) + 'px)';
      return;
    }
    if (view === 'db') {
      // Crop to the custom Database pane and size the outer frame to its exact
      // aspect (same approach as print.html's view=table).
      var t2 = d.getElementById('db-panel');
      var r2 = t2 && t2.getBoundingClientRect();
      if (!r2 || r2.width < 4 || r2.height < 4) { if (tries++ < 25) return void setTimeout(frame,120); fitFull(); return; }
      var cw2 = clip.clientWidth;
      var s2  = cw2 / r2.width;
      var fh  = Math.round(r2.height * s2);
      clip.style.height = fh + 'px';
      if (window.frameElement) window.frameElement.style.height = fh + 'px';
      f.style.transform = 'scale(' + s2 + ') translate(' + (-r2.left) + 'px,' + (-r2.top) + 'px)';
      return;
    }
    fitFull();
  }

  function fitFull(){
    var s = clip.clientWidth / APPW;
    f.style.transform = 'scale(' + s + ')';
    clip.style.height = (APPH * s) + 'px';
    if (window.frameElement) window.frameElement.style.height = (APPH * s) + 'px';
  }

  var rt;
  addEventListener('resize', function(){ clearTimeout(rt); rt = setTimeout(frame, 150); });
})();
</script>
</body>
</html>
