<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VectorLabel Template Designer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#13131a;color:#e8e8f0;font-family:system-ui,sans-serif;font-size:13px}
input,select,button,textarea{font-family:system-ui,sans-serif;font-size:12px}
.inp{background:#2a2a42;border:1px solid rgba(255,255,255,0.13);color:#e8e8f0;border-radius:4px;padding:4px 8px;outline:none;width:100%}
.inp:focus{border-color:#6C8EF5}
.btn{background:#2a2a42;border:1px solid rgba(255,255,255,0.13);color:#8888a8;border-radius:4px;padding:4px 9px;cursor:pointer;font-size:11px;white-space:nowrap}
.btn:hover{background:#333350}
.btn.on{background:#6C8EF5;border-color:#6C8EF5;color:#fff}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:#2a2a42;border:1px solid rgba(255,255,255,0.13);color:#8888a8;border-radius:5px;padding:6px 0;cursor:pointer;font-size:10px;width:56px}
.tbtn:hover{background:#333350}
.fbtn{background:#1a1a28;border:1px solid rgba(255,255,255,0.07);color:#8888a8;border-radius:3px;padding:2px 7px;font-size:11px;cursor:pointer}
.fbtn:hover{background:#2a2a42;color:#e8e8f0}
.recrow{cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.05)}
.recrow:hover td{background:rgba(108,142,245,0.06)}
.recrow.selrow td{background:rgba(108,142,245,0.14)}
label.lbl{font-size:10px;color:#8888a8;display:block;margin-bottom:3px}
.sec{color:#8888a8;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:2px}
.fmt-btn{background:#2a2a42;border:1px solid rgba(255,255,255,0.13);color:#8888a8;border-radius:3px;padding:3px 7px;cursor:pointer;font-size:12px;font-weight:700;min-width:26px}
.fmt-btn:hover{background:#333350}
.fmt-btn.on{background:#6C8EF5;border-color:#6C8EF5;color:#fff}
.divider{border:none;border-top:1px solid rgba(255,255,255,0.07);margin:10px 0}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#1a1a28;border:1px solid rgba(255,255,255,0.13);border-radius:8px;padding:24px;min-width:420px;max-width:560px;box-shadow:0 8px 40px rgba(0,0,0,0.6)}
.modal-title{font-size:15px;font-weight:600;color:#e8e8f0;margin-bottom:16px;letter-spacing:-.2px}
.modal-row{margin-bottom:14px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;border-top:1px solid rgba(255,255,255,0.07);padding-top:16px}
.tpl-card{background:#252538;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.tpl-card:hover{background:#2d2d48;border-color:#6C8EF5}
.tpl-card.active{border-color:#6C8EF5;background:#2a2a42}
.tpl-preview{width:60px;height:20px;background:#fff;border:1px solid #ccc;border-radius:2px;flex-shrink:0;position:relative;overflow:hidden}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag.src{background:rgba(108,142,245,0.2);color:#6C8EF5}
.tag.dst{background:rgba(108,200,150,0.2);color:#5cc896}
</style>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;height:100vh"></div>
<script>
const FONTS=["Helvetica Neue","Arial","Arial Narrow","Verdana","Tahoma","Courier New","Georgia","Impact"];
const BL=[
  {n:"BM-31-427",tw:1,th:1.5,pw:1,ph:.5,lb:'BM-31-427 — 1"×1.5"'},
  {n:"BM-32-427",tw:1.5,th:1.5,pw:1.5,ph:.5,lb:'BM-32-427 — 1.5"×1.5"'},
  {n:"BM-33-427",tw:4,th:1.5,pw:1.5,ph:1.5,lb:'BM-33-427 — 4"×1.5" (1.5" printable)'}
];
const FD=[
  {f:"Number",c:"Number"},{f:"Cable Name",c:"Cable"},{f:"Signal",c:"Signal"},
  {f:"Connector",c:"Connector"},{f:"Device Name",c:"Device_Name"},{f:"Device Tag",c:"Device_Tag"},
  {f:"Socket Name",c:"Socket_Name"},{f:"Socket Tag",c:"Socket_Tag"},
  {f:"Other Device",c:"Other_Device"},{f:"Other Socket",c:"Other_Socket"},
  {f:"Other Connector",c:"Other_Connector"},{f:"Rack",c:"Rack"},{f:"Room",c:"Room"},
  {f:"Rack U",c:"RackU"},{f:"Side",c:"_Side"},{f:"Cable Type",c:"Cable_Type"},{f:"Cable Length",c:"CableLength"}
];
let RX=[
  {_Side:"Source",Number:"N044",Cable:"RIO 1 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"SWITCH 6.01",Device_Tag:"SWITCH 6.01",Socket_Name:"LAN 1",Socket_Tag:"LAN 1",Other_Device:"IO 1.01",Other_Socket:"DANTE PRI",Other_Connector:"EC-6A",Rack:"",Room:"",RackU:"",Cable_Type:"---",CableLength:"Auto"},
  {_Side:"Destination",Number:"N044",Cable:"RIO 1 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"IO 1.01",Device_Tag:"IO 1.01",Socket_Name:"DANTE PRI",Socket_Tag:"DANTE PRI",Other_Device:"SWITCH 6.01",Other_Socket:"LAN 1",Other_Connector:"EC-6A",Rack:"RIO RACK",Room:"PORTABLE",RackU:"22",Cable_Type:"---",CableLength:"Auto"},
  {_Side:"Source",Number:"N045",Cable:"RIO 2 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"SWITCH 6.01",Device_Tag:"SWITCH 6.01",Socket_Name:"LAN 2",Socket_Tag:"LAN 2",Other_Device:"IO 1.02",Other_Socket:"DANTE PRI",Other_Connector:"EC-6A",Rack:"",Room:"",RackU:"",Cable_Type:"---",CableLength:"Auto"},
  {_Side:"Destination",Number:"N045",Cable:"RIO 2 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"IO 1.02",Device_Tag:"IO 1.02",Socket_Name:"DANTE PRI",Socket_Tag:"DANTE PRI",Other_Device:"SWITCH 6.01",Other_Socket:"LAN 2",Other_Connector:"EC-6A",Rack:"RIO RACK",Room:"PORTABLE",RackU:"16",Cable_Type:"---",CableLength:"Auto"}
];

// ── Formula engine ────────────────────────────────────────────────────────────
function tokenize(expr){
  const t=[];let i=0;
  while(i<expr.length){
    if(/\s/.test(expr[i])){i++;continue;}
    if(expr[i]==='"'){let j=i+1,s="";while(j<expr.length&&expr[j]!=='"')s+=expr[j++];t.push({k:"s",v:s});i=j+1;continue;}
    if(/\d/.test(expr[i])){let j=i;while(j<expr.length&&/[\d.]/.test(expr[j]))j++;t.push({k:"n",v:parseFloat(expr.slice(i,j))});i=j;continue;}
    if(expr[i]==='&'){t.push({k:"a"});i++;continue;}
    if(expr[i]==='<'&&expr[i+1]==='>'){t.push({k:"ne"});i+=2;continue;}
    if(expr[i]==='='){t.push({k:"eq"});i++;continue;}
    if(expr[i]===','){t.push({k:"cm"});i++;continue;}
    if(expr[i]==='('){t.push({k:"lp"});i++;continue;}
    if(expr[i]===')'){ t.push({k:"rp"});i++;continue;}
    if(/[A-Za-z_]/.test(expr[i])){let j=i;while(j<expr.length&&/[A-Za-z0-9_ ]/.test(expr[j]))j++;t.push({k:"id",v:expr.slice(i,j).trimEnd()});i=j;continue;}
    i++;
  }
  return t;
}
function evalToks(toks,vars){
  let p=0;const pk=()=>toks[p],cs=()=>toks[p++];
  function rv(n){if(n in vars)return vars[n];const f=FD.find(x=>x.f.toLowerCase()===n.toLowerCase()||x.c.toLowerCase()===n.toLowerCase());return f?(vars[f.c]??""):n;}
  function pp(){
    const t=pk();if(!t)return"";
    if(t.k==="s"){cs();return t.v;}
    if(t.k==="n"){cs();return t.v;}
    if(t.k==="id"){
      const name=t.v;cs();
      if(pk()?.k==="lp"){
        cs();const args=[];
        while(pk()&&pk().k!=="rp"){args.push(pe());if(pk()?.k==="cm")cs();}cs();
        const fn=name.toUpperCase();
        if(fn==="IF")return args[0]?(args[1]??""):(args[2]??"");
        if(fn==="LEFT")return String(args[0]??"").slice(0,args[1]??1);
        if(fn==="RIGHT"){const s=String(args[0]??"");return s.slice(s.length-(args[1]??1));}
        if(fn==="LEN")return String(args[0]??"").length;
        if(fn==="UPPER")return String(args[0]??"").toUpperCase();
        if(fn==="LOWER")return String(args[0]??"").toLowerCase();
        if(fn==="TRIM")return String(args[0]??"").trim();
        if(fn==="MID")return String(args[0]??"").slice((args[1]??1)-1,((args[1]??1)-1)+(args[2]??1));
        return"";}
      if(pk()?.k==="ne"||pk()?.k==="eq"){const op=cs().k;const r=pp();const l=rv(name);return op==="ne"?l!==String(r):l===String(r);}
      return rv(name);}
    if(t.k==="lp"){cs();const v=pe();if(pk()?.k==="rp")cs();return v;}
    cs();return"";
  }
  function pe(){let l=pp();while(pk()?.k==="a"){cs();l=String(l??"")+String(pp()??"");}return l;}
  return pe();
}
function evalF(formula,rec){
  if(!formula||!formula.trim())return{v:"",e:null};
  if(!formula.startsWith("="))return{v:formula,e:null};
  const m={};FD.forEach(f=>{m[f.f]=rec[f.c]??"";m[f.c]=rec[f.c]??""});
  try{return{v:String(evalToks(tokenize(formula.slice(1)),m)??""),e:null};}
  catch(err){return{v:"",e:err.message};}
}

// ── State ─────────────────────────────────────────────────────────────────────
let nid=1;const mid=()=>`o${nid++}`;
let S={
  spec:BL[1],selId:null,recIdx:0,wrap:true,showFields:false,zoom:1.0,
  snapGrid:true,snapObjects:true,gridSize:0.05,
  tplName:'Untitled Template',modal:null,
  // Start blank — the standalone designer opens the Open dialog on launch so the
  // user picks a template rather than landing on a default one.
  objs:[]
};
function gobj(id){return S.objs.find(o=>o.id===id);}
function uobj(id,p){S.objs=S.objs.map(o=>o.id===id?Object.assign({},o,p):o);}

// ── Canvas ────────────────────────────────────────────────────────────────────
const SC=185;
// Bleed: objects may be placed up to this many inches beyond the printable area
// on any side. Only the printable area actually prints (the Swift renderer
// clips to it); the bleed just lets you overhang the edges in the designer.
const BLEED_IN=2;

// ── Column widths — Live editor record table ───────────────────────────────────
// Matches print screen columns but saved separately so widths are independent.
const ED_COL_DEFAULTS={side:90,number:72,cable:150,signal:72,device:160,socket:150};
let ED_COLS=(()=>{
  try{const s=localStorage.getItem('vl-ed-col-widths');if(s)return Object.assign({},ED_COL_DEFAULTS,JSON.parse(s));}catch(e){}
  return Object.assign({},ED_COL_DEFAULTS);
})();
function saveEdCols(){try{localStorage.setItem('vl-ed-col-widths',JSON.stringify(ED_COLS));}catch(e){}}
function applyEdColVars(){
  const r=document.documentElement;
  r.style.setProperty('--edr-side',   ED_COLS.side+'px');
  r.style.setProperty('--edr-number', ED_COLS.number+'px');
  r.style.setProperty('--edr-cable',  ED_COLS.cable+'px');
  r.style.setProperty('--edr-signal', ED_COLS.signal+'px');
  r.style.setProperty('--edr-device', ED_COLS.device+'px');
  r.style.setProperty('--edr-socket', ED_COLS.socket+'px');
}
function startEdColResize(e,col){
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget;el.classList.add('dragging');
  const startX=e.clientX,startW=ED_COLS[col];
  function mv(e){ED_COLS[col]=Math.max(40,startW+(e.clientX-startX));applyEdColVars();}
  function mu(){el.classList.remove('dragging');saveEdCols();window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',mu);}
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',mu);
}

// ── Shared record-column system (order, visibility, widths) ────────────────────
// All three persisted bits (order/hidden/widths) are shared with the print
// window via Swift (AppSettings) and applied with applyColumnConfig().
function currentRecords(){ return window._editorRecords||RX; }
const DEFAULT_COL_W=120;
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Full column list (incl. hidden): saved order first, then friendly, then rest.
function recordColumns(records){
  const present=[];
  records.forEach(r=>Object.keys(r).forEach(k=>{ if(!present.includes(k)) present.push(k); }));
  const out=(window._columnOrder||[]).filter(k=>present.includes(k));
  ['_Side','Number','Cable','Signal','Device_Name','Socket_Name'].forEach(k=>{ if(present.includes(k)&&!out.includes(k)) out.push(k); });
  present.forEach(k=>{ if(!out.includes(k)) out.push(k); });
  return out;
}
function colLabel(k){ return k==='_Side'?'Side':k.replace(/_/g,' '); }
function visibleColumns(records){ const h=window._hiddenColumns||[]; return recordColumns(records).filter(c=>!h.includes(c)); }
function colWidth(c){ const w=window._colWidths&&window._colWidths[c]; return (typeof w==='number'&&w>0)?w:DEFAULT_COL_W; }
function colGridTemplate(cols){ return cols.map(c=>colWidth(c)+'px').join(' '); }

function applyColumnConfig(cfg){
  if(!cfg)return;
  if(Array.isArray(cfg.order)) window._columnOrder=cfg.order;
  if(Array.isArray(cfg.hidden)) window._hiddenColumns=cfg.hidden;
  if(cfg.widths&&typeof cfg.widths==='object') window._colWidths=cfg.widths;
  R();
}
function postColumnConfig(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"setColumnConfig",payload:{
      order:window._columnOrder||[], hidden:window._hiddenColumns||[], widths:window._colWidths||{} }});
}

// Reorder via header drag (operates on the full column list).
let _vlDragCol=null,_vlGhost=null,_vlDragTile=null,_vlOverEl=null;
function colDragStart(e,c){
  _vlDragCol=c;
  const tile=e.currentTarget;
  if(e.dataTransfer){
    e.dataTransfer.effectAllowed='move';
    try{e.dataTransfer.setData('text/plain',c);}catch(_){}
    // Drag the whole tile: clone it as the drag image so the full cell follows
    // the cursor, not just the text.
    if(tile&&tile.cloneNode){
      const cs=getComputedStyle(tile);
      const g=tile.cloneNode(true);
      g.style.cssText='position:fixed;top:-2000px;left:-2000px;box-sizing:border-box;width:'+tile.offsetWidth+'px;height:'+tile.offsetHeight+'px;background:#2a2a42;border:1px solid #6C8EF5;border-radius:4px;color:#e8e8f0;opacity:0.97;display:flex;align-items:center;overflow:hidden;padding:'+cs.padding+';font:'+cs.font;
      document.body.appendChild(g); _vlGhost=g;
      try{e.dataTransfer.setDragImage(g,16,Math.max(8,tile.offsetHeight/2));}catch(_){}
    }
  }
  _vlDragTile=tile; if(tile)tile.style.opacity='0.35';
}
function colDragOver(e,el){
  e.preventDefault();
  if(e.dataTransfer)e.dataTransfer.dropEffect='move';
  if(_vlOverEl&&_vlOverEl!==el)_vlOverEl.style.boxShadow='';
  _vlOverEl=el; if(el)el.style.boxShadow='inset 3px 0 0 #6C8EF5';
}
function colClearDrag(){
  if(_vlGhost){_vlGhost.remove();_vlGhost=null;}
  if(_vlDragTile){_vlDragTile.style.opacity='';_vlDragTile=null;}
  if(_vlOverEl){_vlOverEl.style.boxShadow='';_vlOverEl=null;}
}
function colDragEnd(){ colClearDrag(); }
function colDrop(e,target){
  e.preventDefault(); const drag=_vlDragCol; _vlDragCol=null; colClearDrag();
  if(!drag||drag===target)return;
  let cols=recordColumns(currentRecords());
  const from=cols.indexOf(drag), to=cols.indexOf(target);
  if(from<0||to<0)return;
  cols.splice(to,0,cols.splice(from,1)[0]);
  window._columnOrder=cols; postColumnConfig(); R();
}

// Resize via a right-edge handle on the header cell.
function colResizeStart(e,c){
  e.preventDefault(); e.stopPropagation();
  const startX=e.clientX, startW=colWidth(c);
  const hdr=e.target.closest('[data-colhdr]'); if(hdr)hdr.setAttribute('draggable','false');
  function mv(ev){ window._colWidths=window._colWidths||{}; window._colWidths[c]=Math.max(48,Math.round(startW+(ev.clientX-startX))); R(); }
  function up(){ window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); postColumnConfig(); }
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
}

// Show/hide.
function hideColumn(c){ window._hiddenColumns=Array.from(new Set([...(window._hiddenColumns||[]),c])); postColumnConfig(); R(); }
function showColumn(c){ window._hiddenColumns=(window._hiddenColumns||[]).filter(x=>x!==c); postColumnConfig(); R(); }
function toggleColumn(c){ (window._hiddenColumns||[]).includes(c)?showColumn(c):hideColumn(c); }
function colHeaderContextMenu(e,c){ e.preventDefault(); hideColumn(c); }

// One header cell: drag to reorder, right-edge to resize, right-click to hide.
function colHeaderCell(c){
  return `<div data-colhdr draggable="true" ondragstart="colDragStart(event,'${c}')" ondragover="colDragOver(event,this)" ondragend="colDragEnd(event)" ondrop="colDrop(event,'${c}')" oncontextmenu="colHeaderContextMenu(event,'${c}')" title="Drag to reorder · right-click to hide" style="position:relative;padding:5px 8px;font-size:10px;color:#44445a;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:hidden;cursor:grab;box-sizing:border-box">${esc(colLabel(c))}<div onmousedown="colResizeStart(event,'${c}')" style="position:absolute;top:0;right:0;width:6px;height:100%;cursor:col-resize"></div></div>`;
}

// Columns dropdown: checkboxes to show/hide + grab handle to reorder.
function toggleColumnsMenu(){ window._colMenuOpen=!window._colMenuOpen; R(); }
function buildColumnsMenu(){
  if(!window._colMenuOpen)return '';
  const cols=recordColumns(currentRecords());
  const hidden=new Set(window._hiddenColumns||[]);
  return `<div onclick="event.stopPropagation()" style="position:absolute;right:8px;top:26px;z-index:30;background:#1e1e2e;border:1px solid rgba(255,255,255,0.15);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.5);padding:5px;max-height:280px;overflow-y:auto;min-width:190px">
    <div style="font-size:9px;color:#44445a;text-transform:uppercase;letter-spacing:1px;padding:3px 6px 5px">Columns</div>
    ${cols.map(c=>`<div draggable="true" ondragstart="colDragStart(event,'${c}')" ondragover="colDragOver(event,this)" ondragend="colDragEnd(event)" ondrop="colDrop(event,'${c}')" style="display:flex;align-items:center;gap:7px;padding:3px 6px;border-radius:4px">
      <span title="Drag to reorder" style="cursor:grab;color:#6b6f7d;font-size:12px;user-select:none">⋮⋮</span>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;flex:1;font-size:12px;color:#e8e8f0">
        <input type="checkbox" ${hidden.has(c)?'':'checked'} onchange="toggleColumn('${c}')"> ${esc(colLabel(c))}
      </label>
    </div>`).join('')}
  </div>`;
}

// One wrapping data cell. Text wraps and the grid row grows to fit.
function colDataCell(c,r){
  const v=r[c]; const has=v!==undefined&&v!=='';
  const val=has?String(v):'—';
  if(c==='_Side'){const side=v==='Source'?'src':'dst';return`<div style="padding:5px 8px;font-size:11px;display:flex;align-items:center"><span class="tag ${side}">${esc(val)}</span></div>`;}
  return`<div style="padding:5px 8px;font-size:11px;white-space:normal;overflow-wrap:anywhere;word-break:break-word;color:${has?'#e8e8f0':'#44445a'};${(c==='Number'&&has)?'font-weight:600;':''}">${esc(val)}</div>`;
}

function buildEditorRecordTable(){
  const records=window._editorRecords||RX;
  if(!records.length)return`<div style="padding:12px;color:#44445a;font-size:11px">No records loaded</div>`;
  const cols=visibleColumns(records);
  if(!cols.length)return`<div style="padding:12px;color:#44445a;font-size:11px">All columns hidden — use the Columns menu to show some.</div>`;
  const gt=colGridTemplate(cols);

  const hdr=`<div style="display:grid;grid-template-columns:${gt};width:max-content;min-width:100%;background:#1a1a28;border-bottom:1px solid rgba(255,255,255,0.1);position:sticky;top:0;z-index:2">
    ${cols.map(colHeaderCell).join('')}
  </div>`;

  const rows=records.map((r,i)=>{
    const isActive=S.recIdx===i;
    return`<div onclick="S.recIdx=${i};R()"
      style="display:grid;grid-template-columns:${gt};width:max-content;min-width:100%;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;align-items:stretch;
             background:${isActive?'rgba(108,142,245,0.18)':'transparent'}">
      ${cols.map(c=>colDataCell(c,r)).join('')}
    </div>`;
  }).join('');

  return`<div style="overflow:auto">${hdr}${rows}</div>`;
}

// ── Snap helpers ──────────────────────────────────────────────────────────────
const SNAP_PX=4; // screen pixels threshold for smart snap
S._snapLines=[];

function snapToGrid(val){
  if(!S.snapGrid)return val;
  return Math.round(val/S.gridSize)*S.gridSize;
}

function snapX(x,w,excludeId){
  if(!S.snapObjects)return{v:x,lines:[]};
  const others=S.objs.filter(o=>o.id!==excludeId);
  const pw=S.spec.pw;
  const thr=SNAP_PX/(SC*S.zoom);
  let best=x,bestD=thr,lines=[];
  [[x,0],[x+w,1]].forEach(([ce,ci])=>{
    others.forEach(o=>{
      [o.x,o.x+o.w].forEach(oe=>{
        const d=Math.abs(ce-oe);
        if(d<bestD){bestD=d;best=ci===0?oe:oe-w;lines=[{axis:'x',pos:oe}];}
      });
    });
    [0,pw].forEach(le=>{
      const d=Math.abs(ce-le);
      if(d<bestD){bestD=d;best=ci===0?le:le-w;lines=[{axis:'x',pos:le}];}
    });
  });
  return{v:best,lines};
}

function snapY(y,h,excludeId){
  if(!S.snapObjects)return{v:y,lines:[]};
  const others=S.objs.filter(o=>o.id!==excludeId);
  const ph=S.spec.ph;
  const thr=SNAP_PX/(SC*S.zoom);
  let best=y,bestD=thr,lines=[];
  [[y,0],[y+h,1]].forEach(([ce,ci])=>{
    others.forEach(o=>{
      [o.y,o.y+(o.h||0)].forEach(oe=>{
        const d=Math.abs(ce-oe);
        if(d<bestD){bestD=d;best=ci===0?oe:oe-h;lines=[{axis:'y',pos:oe}];}
      });
    });
    [0,ph].forEach(le=>{
      const d=Math.abs(ce-le);
      if(d<bestD){bestD=d;best=ci===0?le:le-h;lines=[{axis:'y',pos:le}];}
    });
  });
  return{v:best,lines};
}

function applySnap(x,y,w,h,id){
  let nx=snapToGrid(x);
  let ny=snapToGrid(y);
  const rx=snapX(nx,w,id);
  const ry=snapY(ny,h,id);
  S._snapLines=[...rx.lines,...ry.lines];
  return{x:Math.max(-BLEED_IN,rx.v),y:Math.max(-BLEED_IN,ry.v)};
}
function buildCanvas(spec,objs,selId,rec,wrap,readOnly){
  const sc=SC;
  const pw=spec.pw*sc,ph=spec.ph*sc;
  const cw=(spec.tw-spec.pw)*sc,ch=(spec.th-spec.ph)*sc;
  const tw=pw,th=wrap?spec.th*sc:ph;
  // Bleed margin around the printable area (objects can overhang into it).
  const B=BLEED_IN*sc;
  const bw=pw+2*B, bh=ph+2*B;

  // Clear wrap zone shown directly under the printable area (not in the bleed).
  const wrapZone=wrap&&(cw>0||ch>0)?`
    <div style="position:absolute;left:${B}px;top:${B+ph}px;width:${pw}px;height:${ch>0?ch:ph}px;background:rgba(140,140,180,0.12);border:1px dashed #44445a;display:flex;align-items:center;justify-content:center;pointer-events:none">
      <span style="color:#8888a8;font-size:9px;white-space:nowrap">clear wrap zone</span>
    </div>`:"";

  const objsHtml=objs.map(o=>{
    const x=o.x*SC+B,y=o.y*SC+B,w=(o.w||1)*SC,h=(o.h||0)*SC;
    const sel=o.id===selId;
    const ss=sel?"outline:1.5px solid #6C8EF5;outline-offset:1px;":"";
    const drag=readOnly?"":`onmousedown="startDrag(event,'${o.id}')"`;

    if(o.t==="tx"){
      const {v,e}=rec?evalF(o.f,rec):{v:(o.f||"").replace(/^=/,""),e:null};
      const va=o.valign==="top"?"flex-start":o.valign==="bottom"?"flex-end":"center";
      const fz=Math.max(7,(o.fs||14)*(sc/100));
      const fontStyle=o.italic?"italic":"normal";
      const fontWeight=o.bold?700:400;
      const textDecoration=o.underline?"underline":"none";
      const wordBreak=o.wrapText?"break-word":"normal";
      const whiteSpace=o.wrapText?"normal":"nowrap";
      const letterSpacing=o.tracking?`${o.tracking}px`:"normal";
      const scaleX=(o.stretch||100)/100;
      const txtColor=e?"#f56c6c":"#000";
      const textAlign=o.al||"left";
      const dispVal=e?`⚠ ${e.substring(0,40)}`:v.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const rb=sel&&!readOnly?`<div onmousedown="startResize(event,'${o.id}')" style="position:absolute;right:-4px;bottom:-4px;width:8px;height:8px;background:#6C8EF5;border-radius:1px;cursor:nwse-resize;z-index:10"></div>`:"";
      return `<div ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${Math.max(h,12)}px;${ss}border-radius:2px;cursor:${readOnly?"default":"move"};overflow:hidden;display:flex;align-items:${va};padding:0 2px;box-sizing:border-box">
        <div style="width:100%;font-family:'${o.font||"Helvetica Neue"}',Arial,sans-serif;font-size:${fz}px;font-weight:${fontWeight};font-style:${fontStyle};text-decoration:${textDecoration};color:${txtColor};white-space:${whiteSpace};word-break:${wordBreak};overflow:hidden;text-overflow:${o.wrapText?"clip":"ellipsis"};line-height:1.15;letter-spacing:${letterSpacing};text-align:${textAlign};transform:scaleX(${scaleX});transform-origin:left center;pointer-events:none">${dispVal}</div>
        ${rb}</div>`;
    }
    if(o.t==="ln") return `<div ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${(o.w||1)*sc}px;height:${Math.max(1,o.lw||1)}px;background:#000;cursor:${readOnly?"default":"move"};${ss}"></div>`;
    if(o.t==="rc"){
      const rb=sel&&!readOnly?`<div onmousedown="startResize(event,'${o.id}')" style="position:absolute;right:-4px;bottom:-4px;width:8px;height:8px;background:#6C8EF5;border-radius:1px;cursor:nwse-resize;z-index:10"></div>`:"";
      return `<div ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;border:${o.lw||1}px solid #000;background:transparent;cursor:${readOnly?"default":"move"};${ss}">${rb}</div>`;
    }
    return"";
  }).join("");

  // Grid overlay — spans the whole canvas (printable + bleed), aligned so a
  // grid line falls on the printable origin.
  const gridLines=[];
  if(S.snapGrid){
    const gs=S.gridSize*sc;
    for(let gx=B%gs;gx<bw;gx+=gs) gridLines.push(`<line x1="${gx.toFixed(1)}" y1="0" x2="${gx.toFixed(1)}" y2="${bh}" stroke="rgba(108,142,245,0.18)" stroke-width="0.5"/>`);
    for(let gy=B%gs;gy<bh;gy+=gs) gridLines.push(`<line x1="0" y1="${gy.toFixed(1)}" x2="${bw}" y2="${gy.toFixed(1)}" stroke="rgba(108,142,245,0.18)" stroke-width="0.5"/>`);
  }
  const gridSvg=gridLines.length?`<svg style="position:absolute;top:0;left:0;width:${bw}px;height:${bh}px;pointer-events:none;z-index:0" width="${bw}" height="${bh}">${gridLines.join("")}</svg>`:"";

  // Snap indicator lines — drawn during drag only (offset into the bleed canvas).
  const snapSvgLines=(S._snapLines||[]).map(l=>{
    if(l.axis==='x'){
      const px=(l.pos*sc+B).toFixed(1);
      return '<line x1="'+px+'" y1="0" x2="'+px+'" y2="'+bh+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+px+'" cy="'+(bh/2)+'" r="3.5" fill="#FF4D6A"/>';
    }else{
      const py=(l.pos*sc+B).toFixed(1);
      return '<line x1="0" y1="'+py+'" x2="'+bw+'" y2="'+py+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+(bw/2)+'" cy="'+py+'" r="3.5" fill="#FF4D6A"/>';
    }
  }).join("");
  const snapSvg=snapSvgLines?'<svg style="position:absolute;top:0;left:0;width:'+bw+'px;height:'+bh+'px;pointer-events:none;z-index:5" width="'+bw+'" height="'+bh+'">'+snapSvgLines+'</svg>':"";


  // Canvas holds the printable area plus an invisible 2" positioning margin on
  // every side. Objects can overhang the printable edges into that margin; only
  // the printable area prints. The margin is not visually called out.
  return `<div style="display:flex;flex-direction:column;align-items:flex-start;flex-shrink:0">
    <div onmousedown="${readOnly?'':`if(event.target===this)deselect()`}" style="width:${bw}px;height:${bh}px;background:transparent;position:relative;overflow:hidden;flex-shrink:0">
      <!-- Printable area (only this prints) -->
      <div style="position:absolute;left:${B}px;top:${B}px;width:${pw}px;height:${ph}px;background:#fff;box-shadow:0 0 0 1.5px #6C8EF5;pointer-events:none"></div>
      ${wrapZone}
      ${gridSvg}${snapSvg}${objsHtml}
    </div>
  </div>`;
}

// ── Object positioning (snap the whole object to a label edge/center) ──────────
// Distinct from text justification: this moves the selected object's box within
// the label's printable area.
function posObj(id,axis,where){
  const o=gobj(id); if(!o)return;
  snapshot();
  const W=S.spec.pw, H=S.spec.ph, w=o.w||0, h=o.h||0;
  const r=v=>Math.max(-BLEED_IN,Math.round(v*1000)/1000);
  if(axis==='h'){
    uobj(id,{x:r(where==='left'?0:where==='center'?(W-w)/2:W-w)});
  }else{
    uobj(id,{y:r(where==='top'?0:where==='middle'?(H-h)/2:H-h)});
  }
  R();
}

// ── Actions ───────────────────────────────────────────────────────────────────
function deselect(){S.selId=null;S.showFields=false;S._ef=undefined;R();}

function commitF(){if(S.selId&&S._ef!==undefined){uobj(S.selId,{f:S._ef});S._ef=undefined;R();}}
function insertField(name){
  const fx=document.getElementById("fxbar");
  if(fx&&S.selId){const nv=(fx.value||"")+name;fx.value=nv;S._ef=nv;}
}


function startRecResize(e){
  e.preventDefault();
  const startY=e.clientY;
  const startH=S.recH||160;
  function mv(e){
    const delta=startY-e.clientY;
    S.recH=Math.max(60,Math.min(400,startH+delta));
    const panel=document.getElementById("rec-panel");
    if(panel)panel.style.height=S.recH+"px";
  }
  function mu(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",mu);}
  window.addEventListener("mousemove",mv);
  window.addEventListener("mouseup",mu);
}
// ── Undo history ─────────────────────────────────────────────────────────────
const HISTORY=[];
const MAX_HISTORY=50;

function snapshot(){
  // Deep-clone just the parts that change: objs and selId
  HISTORY.push(JSON.parse(JSON.stringify({objs:S.objs,selId:S.selId})));
  if(HISTORY.length>MAX_HISTORY)HISTORY.shift();
}

function undo(){
  if(!HISTORY.length)return;
  const prev=HISTORY.pop();
  S.objs=prev.objs;
  S.selId=prev.selId;
  S._ef=undefined;
  R();
}

// Snapshot before any destructive/positional action
const _origDelObj=delObj;
const _origAddObj=addObj;
const _origUobj=uobj;

// Wrap uobj to snapshot before each property change
function uobjWithHistory(id,p){
  snapshot();
  uobj(id,p);
}

// Wrap startDrag to snapshot on mousedown (before move)
const _origStartDrag=startDrag;
function startDrag(e,id){
  e.stopPropagation();
  const o=gobj(id);if(!o)return;
  if(S.selId!==id){S.selId=id;S._ef=o.f;R();}
  snapshot();
  const sx=e.clientX,sy=e.clientY,ox=o.x,oy=o.y;
  function mv(e){
    const rawX=ox+(e.clientX-sx)/(SC*S.zoom);
    const rawY=oy+(e.clientY-sy)/(SC*S.zoom);
    const o2=gobj(id);
    const snapped=applySnap(rawX,rawY,o2?o2.w:0.1,o2?o2.h:0.1,id);
    uobj(id,snapped);R();
  }
  function mu(){S._snapLines=[];window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",mu);R();}
  window.addEventListener("mousemove",mv);window.addEventListener("mouseup",mu);
}

// Wrap startResize to snapshot on mousedown
function startResize(e,id){
  e.stopPropagation();
  const o=gobj(id);if(!o)return;
  snapshot();
  const sx=e.clientX,sy=e.clientY,ow=o.w,oh=o.h;
  function mv(e){
    const dw=(e.clientX-sx)/(SC*S.zoom);
    const dh=(e.clientY-sy)/(SC*S.zoom);
    const nw=snapToGrid(Math.max(.05,ow+dw));
    const nh=snapToGrid(Math.max(.02,oh+dh));
    uobj(id,{w:nw,h:nh});R();
  }
  function mu(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",mu);}
  window.addEventListener("mousemove",mv);window.addEventListener("mouseup",mu);
}

function delObj(){
  if(!S.selId)return;
  snapshot();
  S.objs=S.objs.filter(o=>o.id!==S.selId);
  S.selId=null;
  R();
}

// Short label for an object in the object list.
function objListLabel(o){
  if(o.t==='tx'){
    const f=(o.f||'').replace(/^=/,'').trim();
    return f && f!=='""' ? f : 'Text';
  }
  return o.t==='ln'?'Line':'Rectangle';
}

// Select an object from the object list (mirrors clicking it on the canvas).
function selectObj(id){
  const o=gobj(id); if(!o)return;
  S.selId=id;
  S._ef=o.t==='tx'?o.f:undefined;
  R();
}

function addObj(type){
  snapshot();
  const id=mid();
  const base={id,x:.05,y:.05};
  if(type==="tx")S.objs.push({...base,t:"tx",w:.5,h:.2,f:'=""',al:"left",valign:"middle",fs:15,bold:false,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100});
  if(type==="ln")S.objs.push({...base,t:"ln",y:.25,w:1,h:0,lw:1});
  if(type==="rc")S.objs.push({...base,t:"rc",w:.4,h:.2,lw:1});
  S.selId=id;S._ef=undefined;R();
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener("keydown",function(e){
  // Ignore if focus is inside an input, textarea, or select
  const tag=(document.activeElement||{}).tagName||"";
  const inInput=["INPUT","TEXTAREA","SELECT"].includes(tag);

  // Cmd/Ctrl+Z — undo (works even in inputs to avoid blocking browser undo,
  // but we only intercept if NOT in an input)
  if((e.metaKey||e.ctrlKey)&&e.key==="z"&&!inInput){
    e.preventDefault();
    undo();
    return;
  }

  // Delete / Backspace — delete selected object, only when NOT in an input
  if((e.key==="Delete"||e.key==="Backspace")&&!inInput&&S.selId){
    e.preventDefault();
    delObj();
    return;
  }

  // Arrow keys — nudge selected object by 1px (0.5px with shift)
  if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)&&!inInput&&S.selId){
    e.preventDefault();
    const o=gobj(S.selId);if(!o)return;
    const step=S.snapGrid?S.gridSize:(e.shiftKey?0.5:1)/SC;
    if(e.key==="ArrowLeft")uobj(S.selId,{x:Math.max(-BLEED_IN,o.x-step)});
    if(e.key==="ArrowRight")uobj(S.selId,{x:o.x+step});
    if(e.key==="ArrowUp")uobj(S.selId,{y:Math.max(-BLEED_IN,o.y-step)});
    if(e.key==="ArrowDown")uobj(S.selId,{y:o.y+step});
    R();
    return;
  }

  // Escape — deselect
  if(e.key==="Escape"&&!inInput){
    deselect();
  }
});

// ── Template management ───────────────────────────────────────────────────────

function showModal(name){S.modal=name;renderModal();}
function closeModal(){S.modal=null;renderModal();}

function templateData(){
  const name=S.tplName||"Untitled Template";
  return{
    version:1,
    name,
    specN:S.spec.n,
    objs:JSON.parse(JSON.stringify(S.objs))
  };
}

async function saveTemplate(){
  const nameEl=document.getElementById("tpl-name-inp");
  if(nameEl)S.tplName=nameEl.value.trim()||"Untitled Template";
  const data=templateData();
  const json=JSON.stringify(data,null,2);
  const filename=(S.tplName.replace(/[^a-z0-9_\- ]/gi,"_")||"template")+".vlt.json";

  // Native app: persist via the Swift bridge to ~/Documents/VectorLabel/Templates/.
  // (WKWebView has no File System Access API, so the browser path below can't run.)
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    const payload={name:S.tplName,specN:data.specN,objs:data.objs};
    if(S._loadedId)payload.id=S._loadedId;
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"saveTemplate",payload});
    S.modal=null;
    showToast("Saved: "+S.tplName);
    R();
    return;
  }

  // Use File System Access API if available (Chrome/Edge on Mac)
  if(window.showSaveFilePicker){
    try{
      const fh=await window.showSaveFilePicker({
        suggestedName:filename,
        startIn:"documents",
        types:[{description:"VectorLabel Template",accept:{"application/json":[".json",".vlt.json"]}}]
      });
      const writable=await fh.createWritable();
      await writable.write(json);
      await writable.close();
      S.modal=null;
      showToast("Saved: "+S.tplName);
      R();
      return;
    }catch(e){
      if(e.name==="AbortError"){S.modal=null;renderModal();return;}
    }
  }

  // Fallback: trigger download
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  S.modal=null;
  showToast("Downloaded: "+filename+" — move to ~/Documents/VectorLabel/Templates/");
  R();
}

function newTemplate(){
  const nameEl=document.getElementById("new-tpl-name");
  const specEl=document.getElementById("new-tpl-spec");
  const name=nameEl?nameEl.value.trim()||"Untitled Template":"Untitled Template";
  const specN=specEl?specEl.value:BL[1].n;
  snapshot();
  S.tplName=name;
  S._loadedId=null;   // new template → new file on save
  S.spec=BL.find(l=>l.n===specN)||BL[1];
  S.objs=[];
  S.selId=null;
  S._ef=undefined;
  S.modal=null;
  R();
  showToast("New template created");
}

async function openTemplate(){
  S._openSel=undefined;
  // Seed the picker with the templates folder (injected by Swift) and request a
  // fresh list so newly-saved templates appear.
  S._loadedTemplates=(window._folderTemplates||[]).slice();
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"listTemplates"});
  }
  S.modal="open";
  renderModal();
}

// Called by Swift with the contents of ~/Documents/VectorLabel/Templates/.
function initDesignerTemplates(templates){
  window._folderTemplates=(templates||[]).map(t=>({
    id:t.id, name:t.name||"Unnamed", specN:t.specN||"BM-32-427", objs:t.objs||[]
  }));
  if(S.modal==="open"){
    S._loadedTemplates=window._folderTemplates.slice();
    renderModal();
  }
}

// Called by Swift after the user picks a file via the Finder browse panel.
function addBrowsedTemplate(t){
  if(!t||!t.objs)return;
  S._loadedTemplates=S._loadedTemplates||[];
  const existing=S._loadedTemplates.findIndex(x=>x.name===t.name);
  if(existing>=0)S._loadedTemplates[existing]=t; else S._loadedTemplates.push(t);
  S._openSel=S._loadedTemplates.length-1;
  if(S.modal!=="open")S.modal="open";
  renderModal();
}

async function pickTemplateFile(){
  // Native app: open Finder via Swift to discover templates in other folders.
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"browseTemplate"});
    return;
  }
  if(window.showOpenFilePicker){
    try{
      const [fh]=await window.showOpenFilePicker({
        startIn:"documents",
        types:[{description:"VectorLabel Template",accept:{"application/json":[".json",".vlt.json"]}}],
        multiple:false
      });
      const file=await fh.getFile();
      const text=await file.text();
      const data=JSON.parse(text);
      if(!data.objs)throw new Error("Not a VectorLabel template");
      S._loadedTemplates=S._loadedTemplates||[];
      // Avoid duplicates by name
      const existing=S._loadedTemplates.findIndex(t=>t.name===data.name);
      if(existing>=0)S._loadedTemplates[existing]=data;
      else S._loadedTemplates.push(data);
      S._openSel=S._loadedTemplates.length-1;
      renderModal();
    }catch(e){
      if(e.name!=="AbortError")showToast("Error: "+e.message);
    }
  }else{
    // Fallback file input
    const inp=document.createElement("input");
    inp.type="file";inp.accept=".json,.vlt.json";
    inp.onchange=async()=>{
      const file=inp.files[0];if(!file)return;
      const text=await file.text();
      try{
        const data=JSON.parse(text);
        if(!data.objs)throw new Error("Not a VectorLabel template");
        S._loadedTemplates=S._loadedTemplates||[];
        S._loadedTemplates.push(data);
        S._openSel=S._loadedTemplates.length-1;
        renderModal();
      }catch(e){showToast("Error: "+e.message);}
    };
    inp.click();
  }
}

function loadSelectedTemplate(){
  const templates=S._loadedTemplates||[];
  const t=templates[S._openSel];
  if(!t)return;
  snapshot();
  S.tplName=t.name||"Untitled Template";
  S._loadedId=t.id||null;   // preserve id so a later Save overwrites in place
  S.spec=BL.find(l=>l.n===t.specN)||BL[1];
  S.objs=JSON.parse(JSON.stringify(t.objs));
  S.selId=null;S._ef=undefined;
  S.modal=null;
  R();
  showToast("Opened: "+S.tplName);
}

// ── CSV loading for standalone designer ───────────────────────────────────────

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  const headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(const c of line){
      if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){vals.push(cur);cur="";}else cur+=c;
    }
    vals.push(cur);
    const row={};
    headers.forEach((h,i)=>row[h]=(vals[i]||"").replace(/^"|"$/g,""));
    return row;
  }).filter(r=>Object.values(r).some(v=>v));
}

    return;
  }
  if(window.showOpenFilePicker){
    try{
      const [fh]=await window.showOpenFilePicker({
        startIn:"documents",
        types:[{description:"VectorLabel CSV Export",accept:{"text/csv":[".csv"]}}]
      });
      const file=await fh.getFile();
      const rows=parseCSV(await file.text());
      if(rows.length>0){
        RX=rows;
        S.recIdx=0;
        S._csvName=file.name;
        R();
        showToast("Loaded: "+file.name+" ("+rows.length+" records)");
      }
    }catch(e){if(e.name!=="AbortError")showToast("Error: "+e.message);}
  }else{
    const inp=document.createElement("input");inp.type="file";inp.accept=".csv";
    inp.onchange=async()=>{
      const file=inp.files[0];if(!file)return;
      const rows=parseCSV(await file.text());
      if(rows.length>0){RX=rows;S.recIdx=0;S._csvName=file.name;R();showToast("Loaded: "+file.name);}
    };
    inp.click();
  }
}

// Auto-load most recent CSV from ~/Documents/VectorLabel/Exports/ with 10+ records.
// In the browser this isn't possible without a file picker; in the Swift WKWebView
// the app calls initDesignerRecords(records, filename) before the page renders.
// We expose this function so Swift can call it.
function initDesignerRecords(records, filename){
  if(!records||!records.length)return;
  RX=records;
  S.recIdx=0;
  S._csvName=filename||"";
  R();
}

R();
</script>
</body>
</html>
