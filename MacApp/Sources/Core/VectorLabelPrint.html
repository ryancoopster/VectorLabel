// Fallback CSV parser for the standalone (no-Swift-bridge) case. In the shipping
// app the native bridge supplies parsed records, so this isn't used — but it must
// not diverge from the Swift RFC-4180 parser: a newline inside a quoted field is
// data, "" is an escaped quote, short rows are padded (never dropped).
function parseCSV(text){
  const rows=[]; let rec=[], field="", inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQ=false; }
      else field+=c;
    } else if(c==='"'){ inQ=true; }
    else if(c===','){ rec.push(field); field=""; }
    else if(c==='\n'||c==='\r'){
      if(c==='\r'&&text[i+1]==='\n') i++;
      rec.push(field); field="";
      if(!(rec.length===1&&rec[0]==="")) rows.push(rec);
      rec=[];
    } else field+=c;
  }
  if(field!==""||rec.length){ rec.push(field); if(!(rec.length===1&&rec[0]==="")) rows.push(rec); }
  if(rows.length<2) return [];
  const headers=rows[0];
  return rows.slice(1).map(vals=>{ const row={}; headers.forEach((h,i)=>row[h]=vals[i]!=null?vals[i]:""); return row; });
}

// ── Main render ───────────────────────────────────────────────────────────────
// Wheel acceleration for the record list. Normal and small scrolls stay fully
// native (smooth); only sustained, continuous scrolling on a genuinely large
// list ramps up speed, so 1500-record files don't take forever to traverse.
let _wg={dir:0, t:0, count:0};
function onRecWheel(e){
  const el=document.getElementById("recScroll");
  if(!el||!el.contains(e.target))return;
  if(Math.abs(e.deltaX)>Math.abs(e.deltaY))return;          // leave horizontal alone
  if(el.scrollHeight-el.clientHeight<1800)return;           // only big lists accelerate
  const now=Date.now(), dir=Math.sign(e.deltaY);
  if(dir===_wg.dir && now-_wg.t<130) _wg.count++;           // same gesture, continuing
  else { _wg.dir=dir; _wg.count=1; }                        // new gesture / direction / pause
  _wg.t=now;
  // Stay native for the first stretch of a gesture — small/normal scrolls are
  // never boosted. Only deep into a sustained scroll do we ramp (gently).
  if(_wg.count<=8) return;
  const mult=Math.min(1+(_wg.count-8)*0.25, 3.5);
  let delta=e.deltaY;
  if(e.deltaMode===1) delta*=16;                            // lines → px
  else if(e.deltaMode===2) delta*=el.clientHeight;          // pages → px
  e.preventDefault();
  el.scrollTop+=delta*mult;
}

// ── Record-list windowing (H12) ──────────────────────────────────────────────
// The list can hold thousands of rows, and R() rebuilds all of #app on every
// click / search keystroke / printer poll. content-visibility already skips
// off-screen layout+paint, but each row node is still created. So we keep only
// the visible slice (plus a buffer) in the DOM and use top/bottom spacer <div>s
// to preserve the scroll height. Rows wrap to variable heights, so per-record
// heights are measured after each paint and cached in P._rowH (keyed by absolute
// index); unmeasured rows use ROW_EST. The cache self-corrects as rows scroll
// through the viewport, so it never needs explicit invalidation on width changes.
const ROW_EST=36, WIN_BUFFER=8;
function rowH(i){ const h=P._rowH&&P._rowH[i]; return (h>0)?h:ROW_EST; }
function listMetrics(vis){
  const offs=new Array(vis.length+1); offs[0]=0;
  for(let k=0;k<vis.length;k++) offs[k+1]=offs[k]+rowH(vis[k]);
  return {offs,total:offs[vis.length]};
}
function windowRange(vis,scrollTop,clientH){
  const m=listMetrics(vis);
  if(vis.length===0) return {lo:0,hi:-1,offs:m.offs,total:m.total};
  const ch=clientH>0?clientH:600, st=scrollTop>0?scrollTop:0;
  let lo=0; while(lo<vis.length-1 && m.offs[lo+1]<=st) lo++;
  let hi=lo;  while(hi<vis.length-1 && m.offs[hi+1]<st+ch) hi++;
  lo=Math.max(0,lo-WIN_BUFFER); hi=Math.min(vis.length-1,hi+WIN_BUFFER);
  // Keep the edited row and the previewed row in the DOM so inline editing and
  // arrow-key navigation never lose their element.
  if(P.editCell){ const e=vis.indexOf(P.editCell.i); if(e>=0){ if(e<lo)lo=e; if(e>hi)hi=e; } }
  const pv=vis.indexOf(P.previewIdx); if(pv>=0){ if(pv<lo)lo=pv; if(pv>hi)hi=pv; }
  // Free-edit: keep the active cell's row in the DOM so its floating editor survives scroll.
  if(window._fe&&window._fe.on&&window._fe.active){ const a=window._fe.active.r; if(a>=0&&a<vis.length){ if(a<lo)lo=a; if(a>hi)hi=a; } }
  return {lo,hi,offs:m.offs,total:m.total};
}
// True if the active template has a barcode that can't encode this record's value
// (it would print blank) — flagged in the record list. Fast no-op without barcodes.
function recBarcodeBad(rec){
  const t=tpl(); if(!t||!t.objs)return false;
  for(const o of t.objs){ if(o.t==="bc" && !barcodeEncodes(o,rec)) return true; }
  return false;
}
function buildRow(i,vpos,cols,gridT){
  const r=P.records[i];
  const isSel=P.selected.has(i);
  const isPrev=P.previewIdx===i;
  const ps2=pairChkState(i);
  return`<div class="rec-row${isSel?" selected":""}${isPrev&&!feOn()?" active-preview":""}" data-i="${i}" style="grid-template-columns:${gridT};align-items:stretch" ${feOn()?'':`onclick="P.previewIdx=${i};P.lastClickIdx=null;R()"`}>
    <div class="rec-cell" style="display:flex;align-items:center;justify-content:center" onclick="event.stopPropagation();rowCheckClick(${i},event)" title="Print this label — Shift+click to range select">
      <div class="cb ${isSel?"chk":""}"><span class="check-tick">${isSel?"✓":""}</span></div>
    </div>
    <div class="rec-cell" style="display:flex;align-items:center;justify-content:center" onclick="event.stopPropagation();pairCheckClick(${i},event)" title="Toggle Source + Destination pair — Shift+click to range select">

function recordListHeader(vis,cols,gridT){
  const allSel=vis.length>0&&vis.every(i=>P.selected.has(i));
  const someSel=vis.some(i=>P.selected.has(i));
  return`<div class="rec-row" style="grid-template-columns:${gridT};position:sticky;top:0;z-index:3;background:var(--surface);border-bottom:1px solid var(--bd3)">

    <div class="rec-hdr-cell">#</div>
    ${cols.map(colHeaderCell).join('')}
  </div>`;

function buildRecordListInner(vis,cols,gridT,scrollTop,clientH){
  const header=recordListHeader(vis,cols,gridT);
  if(vis.length===0)
    return`${header}<div style="padding:30px 16px;text-align:center;color:var(--text2);font-size:12px">No records match the current filter.</div>`;
  const {lo,hi,offs,total}=windowRange(vis,scrollTop,clientH);
  let rows="";
  for(let k=lo;k<=hi;k++) rows+=buildRow(vis[k],k,cols,gridT);
  P._win={lo,hi};
  return`${header}<div style="height:${offs[lo]}px"></div>${rows}<div style="height:${Math.max(0,total-offs[hi+1])}px"></div>`;
}
function measureRecordRows(){
  if(!P._rowH) P._rowH={};
  const sc=document.getElementById("recScroll"); if(!sc) return;
  sc.querySelectorAll('.rec-row[data-i]').forEach(el=>{
    const i=+el.getAttribute('data-i'), h=el.offsetHeight;
    if(i>=0&&h>0) P._rowH[i]=h;
  });
}
function onRecScroll(){
  if(P.editCell) return;            // don't disturb an open inline editor
  if(P._scrollRAF) return;
  P._scrollRAF=requestAnimationFrame(()=>{
    P._scrollRAF=null;
    const sc=document.getElementById("recScroll"); if(!sc) return;
    const vis=visibleIndices();
    const w=windowRange(vis,sc.scrollTop,sc.clientHeight);
    if(P._win&&P._win.lo===w.lo&&P._win.hi===w.hi) return;   // window unchanged
    const cols=P.records.length?visibleColumns(P.records):[];
    const gridT="var(--col-cb) var(--col-pair) var(--col-num) "+colGridTemplate(cols);
    const inner=sc.firstElementChild;
    if(inner){ inner.innerHTML=buildRecordListInner(vis,cols,gridT,sc.scrollTop,sc.clientHeight); measureRecordRows(); }
  });
}

// ── Editor open/close ────────────────────────────────────────────────────────
// Editing is handled by the single Template Designer window (opened by Swift).
// We keep the print window open so the print task is preserved; the designer
// returns here via refreshTemplates() after Save/Cancel.
function openEditor(){
  const t=P.templates[P.activeTpl];
  if(!t)return;
  // Pass the list index (not id) — ids can be duplicated across templates, the
  // index uniquely identifies which one the user is editing.
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"editTemplate",payload:{index:P.activeTpl,name:t.name}});
  }
}

// Templates are loaded from arbitrary .vlt.json files in the Templates folder, so
// treat them as untrusted: give each object a fresh id, strip anything but
// alphanumerics from the font (it's spliced into a CSS font-family), and allow
// only an embedded data:image src (so a crafted src can't inject via <img onerror>).
function sanitizeObjs(objs){
  return (objs||[]).map(function(o){
    const c=Object.assign({},o);
    c.id='t'+Math.random().toString(36).slice(2,8);
    if(typeof c.font==='string') c.font=c.font.replace(/[^A-Za-z0-9 \-]/g,'');
    if(c.src!=null && !/^data:image\//i.test(String(c.src))) c.src='';
    return c;
  });
}

// Called by Swift after the user saves/cancels in the designer: refresh the
// template list without disturbing the current selection or print task.
function refreshTemplates(templates){
  if(!Array.isArray(templates))return;
  const prevName=P.templates[P.activeTpl]&&P.templates[P.activeTpl].name;
  P.templates=templates.map(t=>({
    id:t.id||t.name, name:t.name||"Unnamed", specN:t.specN||"BM-32-427",
    objs:sanitizeObjs(t.objs)
  }));
  const idx=P.templates.findIndex(t=>t.name===prevName);
  P.activeTpl=idx>=0?idx:Math.max(0,Math.min(P.activeTpl,P.templates.length-1));
  R();
}

// ── Toast notifications ───────────────────────────────────────────────────────
function showToast(msg){
  let t=document.getElementById("vl-toast");
  if(!t){t=document.createElement("div");t.id="vl-toast";
    Object.assign(t.style,{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",
      background:"var(--surface3)",border:"1px solid rgba(108,142,245,0.4)",color:"var(--text)",
      borderRadius:"6px",padding:"8px 18px",fontSize:"12px",zIndex:"2000",
      boxShadow:"0 4px 20px rgba(0,0,0,0.5)",transition:"opacity 0.3s",pointerEvents:"none"});
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity="0";},2800);
}


// ── Swift bridge ──────────────────────────────────────────────────────────────

/// Called by Swift (via WKWebView evaluateJavaScript) after the page loads,
/// to inject real records, templates, printers, and optional reprint settings.
function initPrintWindow(opts){
  if(!opts)return;

  // Records from the CSV
  if(opts.records&&opts.records.length>0){
    P.records=opts.records;
    P.selected=new Set(opts.records.map((_,i)=>i));
    P.rangeFrom=1;
    P.rangeTo=opts.records.length;
  }

  // Templates from ~/Documents/VectorLabel/Templates/
  if(opts.templates&&opts.templates.length>0){
    // Convert VLTemplate format (specN, objs) to the format P.templates expects
    P.templates=opts.templates.map(t=>({
      id: t.id||t.name,
      name: t.name||"Unnamed",
      specN: t.specN||"BM-32-427",
      objs: sanitizeObjs(t.objs)
    }));
    P.activeTpl=0;
  }

  // Saved filter/sort presets (persisted in AppSettings).
  if(Array.isArray(opts.filterSortPresets)) window._presets=opts.filterSortPresets;
  if(!window._presets) window._presets=[];

  // "Feed to clear" — per-printer map + legacy default (persisted in AppSettings).
  if(opts.feedToClearByPrinter&&typeof opts.feedToClearByPrinter==='object') P.feedToClearByPrinter=opts.feedToClearByPrinter;
  if(opts.feedToClearDefault!==undefined) P.feedToClearDefault=!!opts.feedToClearDefault;

  // Real data has arrived from Swift — safe to render now.
  P._ready=true;

  // Loaded cassette info (printerID -> SmartCell), for the supply display.
  if(opts.cassettes) window._cassettes=opts.cassettes;

  // Shared record-column config (order/hidden/widths) — shared with the designer.
  if(opts.columnConfig){
    const cc=opts.columnConfig;
    if(Array.isArray(cc.order)) window._columnOrder=cc.order;
    if(Array.isArray(cc.hidden)) window._hiddenColumns=cc.hidden;
    if(cc.widths&&typeof cc.widths==='object') window._colWidths=cc.widths;
  }

  // Pre-select the persisted default template, if set and present. The
  // "Make default" checkbox always starts unchecked on open (the default
  // itself persists in AppSettings, not the checkbox state).
  P._makeDefaultChecked=false;
  if(opts.defaultTemplateID){
    const di=P.templates.findIndex(t=>t.id===opts.defaultTemplateID);
    if(di>=0) P.activeTpl=di;
  }

  // Printers from USB scan
  if(opts.printers&&opts.printers.length>0){
    // Replace the simulated PRINTERS array
    // Spread the Swift-supplied dict so new capability fields (hasAutoCutter,
    // ribbonLengthInches, …) aren't silently dropped; normalize the typed ones.
    window._swiftPrinters=opts.printers.map(p=>({
      ...p,
      model: p.model||"M6xx",
      status: p.status||"ready",
      serial: p.serial||"",
      supportsTelemetry: !!p.supportsTelemetry,
      hasAutoCutter: !!p.hasAutoCutter,
      ribbonLengthInches: +p.ribbonLengthInches||0,
      supportsFeedToClear: !!p.supportsFeedToClear
    }));
    P.activePrinter=window._swiftPrinters.find(p=>p.status==="ready")?.id
                   ||window._swiftPrinters[0]?.id
                   ||P.activePrinter;
  }

  // Source file name for display
  if(opts.sourceFile) P.sourceFile=opts.sourceFile;

  // Reprint: restore the previous selection AND filter/sort state. A fresh
  // export (no reprint) always starts with filter & sort cleared, even if the
  // print window was already open from a prior export.
  if(opts.reprint){
    const rp=opts.reprint;
    // The restored indices/range are absolute positions from the PRIOR job; the CSV may
    // have been re-exported since. Clamp/drop anything out of range so we never select
    // phantom rows (row identity can't be recovered if rows were reordered).
    const nRec=(P.records||[]).length;
    if(rp.printRange) P.printRange=rp.printRange;
    if(rp.rangeFrom)  P.rangeFrom=Math.max(1,Math.min(rp.rangeFrom,Math.max(1,nRec)));
    if(rp.rangeTo)    P.rangeTo=Math.max(P.rangeFrom,Math.min(rp.rangeTo,Math.max(1,nRec)));
    if(rp.selectedIndices&&rp.selectedIndices.length>0){
      const sel=rp.selectedIndices.filter(i=>Number.isInteger(i)&&i>=0&&i<nRec);
      P.selected=new Set(sel);
      if(P.printRange==="all"&&sel.length>0) P.printRange="selected";
    }
    // Try to match template by name
    if(rp.templateName){
      const idx=P.templates.findIndex(t=>t.name===rp.templateName);
      if(idx>=0) P.activeTpl=idx;
    }
    try{ P.filter = rp.filterJSON ? JSON.parse(rp.filterJSON) : null; }catch(_){ P.filter=null; }
    try{ P.sort   = rp.sortJSON   ? JSON.parse(rp.sortJSON)   : null; }catch(_){ P.sort=null; }
  }else{
    // New export → clear any leftover filter/sort.
    P.filter=null; P.sort=null;
  }

  // Baseline for "did the user actually configure this?" — so ✕ Cancel on an
  // opened-then-dismissed window doesn't manufacture a cancelled Recent Print.
  P._initialSig = printConfigSig();
  R();
}

// printer() already uses window._swiftPrinters — see definition above

// Called by Swift whenever the USB printer list changes, so the dropdown stays
// in sync with the live scan without resetting the user's record selection.
function updatePrinters(printers){
  // Spread so new capability fields (hasAutoCutter, ribbonLengthInches, …) survive the
  // rebuild instead of being dropped by a hand-picked allowlist; normalize the typed ones.
  window._swiftPrinters=(printers||[]).map(p=>({
    ...p,
    model: p.model||"M6xx",
    status: p.status||"ready",
    serial: p.serial||"",
    supportsTelemetry: !!p.supportsTelemetry,
    hasAutoCutter: !!p.hasAutoCutter,
    ribbonLengthInches: +p.ribbonLengthInches||0,
    supportsFeedToClear: !!p.supportsFeedToClear
  }));
  // Keep the current selection if that printer is still present; otherwise pick
  // a ready printer (or the first available one).
  if(!window._swiftPrinters.find(p=>p.id===P.activePrinter)){
    P.activePrinter=window._swiftPrinters.find(p=>p.status==="ready")?.id
                   ||window._swiftPrinters[0]?.id
                   ||P.activePrinter;
  }
  R();
}

// Tell Swift the page is ready to receive data
function notifyReady(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"ready",payload:null});
  }
}

// In the macOS app, don't render until Swift injects the real data via
// initPrintWindow() — otherwise the default SAMPLE_CSV (or prior file) flashes
// for a moment. In the standalone browser demo there's no Swift, so render the
// sample immediately.
P._ready = !(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.vectorlabel);
R();
// Notify Swift that the page has rendered and is ready for initPrintWindow()
window.addEventListener("load",notifyReady);
function setTheme(m){document.documentElement.dataset.theme=(m==="light"?"light":"");}
</script>
