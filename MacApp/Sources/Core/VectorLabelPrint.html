*{box-sizing:border-box;margin:0;padding:0}
:root{--bg2:#13131a;--canvas:#0d0d14;--surface:#1a1a28;--surface2:#252538;--surface3:#2a2a42;--surface4:#333350;--text:#e8e8f0;--text-soft:#cfcfe0;--text2:#8888a8;--text3:#44445a;--accent:#6C8EF5;--accent2:#4a6cd4;--accent-soft:#aab4e8;--green:#5cc896;--warn:#f5c96c;--red:#f56c6c;--bd1:rgba(255,255,255,0.05);--bd2:rgba(255,255,255,0.08);--bd3:rgba(255,255,255,0.1);--bd4:rgba(255,255,255,0.14);--bd5:rgba(255,255,255,0.2)}
html[data-theme="light"]{--bg2:#e6e8ee;--canvas:#c9ccd4;--surface:#ffffff;--surface2:#eceef3;--surface3:#e1e4ec;--surface4:#d2d6e0;--text:#1b1c24;--text-soft:#2c2d36;--text2:#5d6070;--text3:#9499a8;--accent:#4a6cd4;--accent2:#3a5ec4;--accent-soft:#3550b0;--green:#1f9d63;--warn:#b5790a;--red:#d63b3b;--bd1:rgba(0,0,0,0.06);--bd2:rgba(0,0,0,0.10);--bd3:rgba(0,0,0,0.13);--bd4:rgba(0,0,0,0.17);--bd5:rgba(0,0,0,0.24)}
html,body{height:100%;overflow:hidden;background:var(--bg2);color:var(--text);font-family:system-ui,sans-serif;font-size:13px}
input,select,button{font-family:system-ui,sans-serif;font-size:12px}
.inp{background:var(--surface3);border:1px solid var(--bd4);color:var(--text);border-radius:4px;padding:4px 8px;outline:none;width:100%}
.inp:focus{border-color:var(--accent)}
.btn{background:var(--surface3);border:1px solid var(--bd4);color:var(--text2);border-radius:4px;padding:5px 12px;cursor:pointer;font-size:12px;white-space:nowrap}
.btn:hover{background:var(--surface4)}
.btn.primary{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600}

.tag.src{background:rgba(108,142,245,0.2);color:var(--accent)}

.rec-row{display:grid;grid-template-columns:var(--col-cb) var(--col-pair) var(--col-num) var(--col-side) var(--col-number) var(--col-cable) var(--col-signal) var(--col-device) var(--col-socket);align-items:center;gap:0;border-bottom:1px solid var(--bd1);cursor:pointer;min-height:36px}

.fe-cell.fe-sel{background:rgba(108,142,245,0.16)}

.ed-rec-row{display:grid;grid-template-columns:var(--ed-col-field) var(--ed-col-key) var(--ed-col-value);align-items:center;border-bottom:1px solid var(--bd1);cursor:pointer;min-height:32px}

<body>
<div id="app" style="display:flex;flex-direction:column;height:100vh"></div>
<!-- Barcode engine (bwip-js, MIT). CommonJS module → shimmed to a window global. -->
<script>var module={exports:{}};</script>
<script src="bwip-js.js"></script>
<script>try{window.bwipjs=module.exports;}catch(e){window.bwipjs=null;}</script>
<script>
// ── Barcode symbologies (shared with VectorLabelDesigner.html; rendered by bwip-js) ─
const BARCODE_TYPES=[
  {id:"qrcode",label:"QR Code",d2:true,ecc:["L","M","Q","H"]},
  {id:"datamatrix",label:"Data Matrix",d2:true,ecc:[]},
  {id:"azteccode",label:"Aztec Code",d2:true,ecc:[]},
  {id:"pdf417",label:"PDF417",d2:true,ecc:["0","1","2","3","4","5","6","7","8"]},
  {id:"microqrcode",label:"Micro QR",d2:true,ecc:["L","M","Q"]},
  {id:"code128",label:"Code 128",d2:false,ecc:[]},
  {id:"gs1-128",label:"GS1-128",d2:false,ecc:[]},
  {id:"code39",label:"Code 39",d2:false,ecc:[]},
  {id:"code93",label:"Code 93",d2:false,ecc:[]},
  {id:"ean13",label:"EAN-13",d2:false,ecc:[]},
  {id:"ean8",label:"EAN-8",d2:false,ecc:[]},
  {id:"upca",label:"UPC-A",d2:false,ecc:[]},
  {id:"upce",label:"UPC-E",d2:false,ecc:[]},
  {id:"interleaved2of5",label:"Interleaved 2 of 5",d2:false,ecc:[]},
  {id:"codabar",label:"Codabar",d2:false,ecc:[]},
];
function bcDef(id){ return BARCODE_TYPES.find(t=>t.id===id)||BARCODE_TYPES[0]; }
function bcIs2D(id){ return bcDef(id).d2; }
function bcECC(id){ return bcDef(id).ecc; }
// Matrix codes that MUST keep a square aspect (QR/DataMatrix/Aztec/MicroQR); everything
// else (linear + PDF417) may stretch freely.
function bcSquare(id){ return id==="qrcode"||id==="datamatrix"||id==="azteccode"||id==="microqrcode"; }
function barcodeEngineReady(){ return !(typeof bwipjs==="undefined"||!bwipjs); }
function renderBarcodeSVG(bcid,text,eclevel){
  if(!barcodeEngineReady()||!bcid||text==null||text==="") return null;
  try{
    const is2D=bcIs2D(bcid);
    const opts={bcid:String(bcid),text:String(text),scale:3,includetext:false,
                paddingwidth:is2D?2:10, paddingheight:is2D?2:0};
    const ecc=bcECC(bcid);
    if(ecc.length&&eclevel)opts.eclevel=String(eclevel);
    let svg=bwipjs.toSVG(opts);
    if(svg && !bcSquare(bcid) && !/preserveAspectRatio/.test(svg)) svg=svg.replace('<svg ','<svg preserveAspectRatio="none" ');
    return svg;
  }catch(e){ return null; }
}
// True when this barcode object encodes the given record's data (else flag the row).
// Cached per (type|ecc|value) so the per-row check doesn't re-encode every render.
const _bcEncCache=new Map();
function barcodeEncodes(o,rec){
  const r=textValue(o,rec);
  if(r.e||r.v===""||r.v==null) return false;
  const key=o.bcType+'|'+(o.eclevel||'')+'|'+r.v;
  if(_bcEncCache.has(key)) return _bcEncCache.get(key);
  const ok=renderBarcodeSVG(o.bcType,r.v,o.eclevel)!=null;
  if(_bcEncCache.size>5000)_bcEncCache.clear();
  _bcEncCache.set(key,ok);
  return ok;
}
// ── Field definitions ─────────────────────────────────────────────────────────
// MUST stay identical to VectorLabelDesigner.html FD and FormulaEngine.fieldMap
// (Swift) so a formula resolves the same in the designer, the print preview, and
// on the printed label.
const FD=[
  {f:"Number",c:"Number"},{f:"Cable Name",c:"Cable"},{f:"Signal",c:"Signal"},
  {f:"Connector",c:"Connector"},{f:"Device Name",c:"Device_Name"},{f:"Device Tag",c:"Device_Tag"},
  {f:"Socket Name",c:"Socket_Name"},{f:"Socket Tag",c:"Socket_Tag"},
  {f:"Other Device",c:"Other_Device"},{f:"Other Socket",c:"Other_Socket"},
  {f:"Other Connector",c:"Other_Connector"},{f:"Rack",c:"Rack"},{f:"Room",c:"Room"},
  {f:"Rack U",c:"RackU"},{f:"Side",c:"_Side"},{f:"Cable Type",c:"Cable_Type"},{f:"Cable Length",c:"CableLength"}
];

// ── Formula engine (same as designer) ────────────────────────────────────────
function tokenize(expr){
  const t=[];let i=0;
  while(i<expr.length){
    if(/\s/.test(expr[i])){i++;continue;}
    if(expr[i]==='"'){let j=i+1,s="";while(j<expr.length&&expr[j]!=='"')s+=expr[j++];t.push({k:"s",v:s});i=j+1;continue;}
    if(/\d/.test(expr[i])){let j=i;while(j<expr.length&&/[\d.]/.test(expr[j]))j++;t.push({k:"n",v:parseFloat(expr.slice(i,j))});i=j;continue;}
    if(expr[i]==='&'){t.push({k:"a"});i++;continue;}
    if(expr[i]==='<'&&expr[i+1]==='>'){t.push({k:"ne"});i+=2;continue;}
    if(expr[i]==='='){t.push({k:"eq"});i++;continue;}
    if(expr[i]===','){t.push({k:"cm"});i++;continue;}
    if(expr[i]==='('){t.push({k:"lp"});i++;continue;}
    if(expr[i]===')'){t.push({k:"rp"});i++;continue;}
    if(/[A-Za-z_]/.test(expr[i])){let j=i;while(j<expr.length&&/[A-Za-z0-9_ ]/.test(expr[j]))j++;t.push({k:"id",v:expr.slice(i,j).trimEnd()});i=j;continue;}
    i++;
  }
  return t;
}
function evalToks(toks,vars){
  let p=0;const pk=()=>toks[p],cs=()=>toks[p++];
  function rv(n){if(n in vars)return vars[n];const f=FD.find(x=>x.f.toLowerCase()===n.toLowerCase()||x.c.toLowerCase()===n.toLowerCase());return f?(vars[f.c]??""):n;}
  function pp(){
    const t=pk();if(!t)return"";
    if(t.k==="s"){cs();return t.v;}if(t.k==="n"){cs();return t.v;}
    if(t.k==="id"){
      const name=t.v;cs();
      if(pk()?.k==="lp"){cs();const args=[];while(pk()&&pk().k!=="rp"){args.push(pe());if(pk()?.k==="cm")cs();}cs();
        const fn=name.toUpperCase();
        if(fn==="IF")return args[0]?(args[1]??""):(args[2]??"");
        if(fn==="LEFT")return String(args[0]??"").slice(0,args[1]??1);
        if(fn==="RIGHT"){const s=String(args[0]??"");return s.slice(s.length-(args[1]??1));}
        if(fn==="LEN")return String(args[0]??"").length;
        if(fn==="UPPER")return String(args[0]??"").toUpperCase();
        if(fn==="LOWER")return String(args[0]??"").toLowerCase();
        if(fn==="TRIM")return String(args[0]??"").trim();
        if(fn==="MID")return String(args[0]??"").slice((args[1]??1)-1,((args[1]??1)-1)+(args[2]??1));
        return"";}
      if(pk()?.k==="ne"||pk()?.k==="eq"){const op=cs().k;const r=pp();const l=rv(name);return op==="ne"?l!==String(r):l===String(r);}
      return rv(name);}
    if(t.k==="lp"){cs();const v=pe();if(pk()?.k==="rp")cs();return v;}
    cs();return"";
  }
  function pe(){let l=pp();while(pk()?.k==="a"){cs();l=String(l??"")+String(pp()??"");}return l;}
  return pe();
}
function evalF(formula,rec){
  if(!formula?.trim())return{v:"",e:null};
  if(!formula.startsWith("="))return{v:formula,e:null};
  const m={};FD.forEach(f=>{m[f.f]=rec[f.c]??"";m[f.c]=rec[f.c]??""});
  try{return{v:String(evalToks(tokenize(formula.slice(1)),m)??""),e:null};}
  catch(err){return{v:"",e:err.message};}
}

// Text source mode + resolved value (mirrors the designer). Legacy objects with
// only `f` are formula-mode.
function txMode(o){ return o.mode || (o.field?"field":((o.text!==undefined&&!o.f)?"static":"formula")); }
function textValue(o,rec){
  const m=txMode(o);
  if(m==="static") return {v:(o.text!=null?o.text:""),e:null};
  if(m==="field"){ if(!o.field)return{v:"",e:null}; const v=rec?rec[o.field]:undefined; return {v:(v==null?"":String(v)),e:null}; }
  return rec?evalF(o.f,rec):{v:"",e:null};
}

// ── Label preview renderer ────────────────────────────────────────────────────
// Supply catalog — injected from Swift (window.__VL_CATALOG__) for the connected
// printer model; mirrors the designer. Used here for size lookups + the buy control.
// A small fallback keeps the print window usable standalone (dev).
const _VL_CAT=(typeof window!=='undefined'&&window.__VL_CATALOG__)?window.__VL_CATALOG__:null;
const _BL_FALLBACK=[
  {n:"M6-31-427",cat:"Wire & cable wraps (self-laminating)",ty:"dieCut",tw:1,th:1.5,pw:1,ph:.5,mt:"B-427",lm:true,parts:[{pn:"M6-31-427",qty:250,rot:false,mat:"",url:""},{pn:"BM-31-427",qty:250,rot:false,mat:"",url:""}]},
  {n:"M6-32-427",cat:"Wire & cable wraps (self-laminating)",ty:"dieCut",tw:1.5,th:1.5,pw:1.5,ph:.5,mt:"B-427",lm:true,parts:[{pn:"M6-32-427",qty:250,rot:false,mat:"",url:""},{pn:"BM-32-427",qty:250,rot:false,mat:"",url:""}]},
  {n:"M6-33-427",cat:"Wire & cable wraps (self-laminating)",ty:"dieCut",tw:1.5,th:4,pw:1.5,ph:1.5,mt:"B-427",lm:true,parts:[{pn:"M6-33-427",qty:100,rot:true,mat:"",url:""},{pn:"BM-33-427",qty:100,rot:true,mat:"",url:""}]},
  {n:"M6C-500-422",cat:"Continuous tapes",ty:"continuous",tw:.5,th:1,pw:.5,ph:1,mt:"B-422",lm:false,parts:[{pn:"M6C-500-422",lenFt:50,rot:false,mat:"Polyester",url:""},{pn:"M6C-500-595",lenFt:50,rot:false,mat:"Vinyl",url:""}]},
  {n:"M6C-2000-595",cat:"Continuous tapes",ty:"continuous",tw:2,th:1,pw:2,ph:1,mt:"B-595",lm:false,parts:[{pn:"M6C-2000-595",lenFt:50,rot:false,mat:"Vinyl",url:""}]}
];
// `let` so the live-sync poll can swap in the Engine's latest catalog.
let BL=(_VL_CAT&&Array.isArray(_VL_CAT.bl)&&_VL_CAT.bl.length)?_VL_CAT.bl:_BL_FALLBACK;
let VL_GROUPS=(_VL_CAT&&Array.isArray(_VL_CAT.groups)&&_VL_CAT.groups.length)?_VL_CAT.groups:[{name:(_VL_CAT&&_VL_CAT.activeGroup)||"Supplies",bl:BL}];
const VL_SAFE_SPEC={id:"",n:"",name:"(no supply)",cat:"",ty:"dieCut",tw:1,th:1,pw:1,ph:1,mt:"",lm:false,parts:[]};

function autoFitPx(text,o,basePx,boxW,pad){
  if(!text) return basePx;

function currentRecords(){ return window._editorRecords||(typeof P!=='undefined'&&P.records&&P.records.length?P.records:RX); }
const DEFAULT_COL_W=120;
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
// Escape for an HTML attribute VALUE (adds quote escaping on top of esc()).
function escAttr(s){ return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
// Escape a string interpolated as a single-quoted JS string literal sitting INSIDE
// an HTML attribute (e.g. onclick="f('${jsAttr(c)}')") — neutralises both the JS
// string context (backslash, quotes) and the HTML attribute context (&<>) so a
// crafted column name can't run arbitrary JS in the privileged WKWebView.
function jsAttr(s){
  return String(s)
    .replace(/\\/g,'\\\\')
    .replace(/'/g,'\\\'')

// Memoized by records-array identity + the column order, so the O(records×keys)

let _colsMemo = { recRef: null, ord: null, val: null };

  records.forEach(r=>Object.keys(r).forEach(k=>{ if(!present.includes(k)) present.push(k); }));
  const out=(window._columnOrder||[]).filter(k=>present.includes(k));
  ['_Side','Number','Cable','Signal','Device_Name','Socket_Name'].forEach(k=>{ if(present.includes(k)&&!out.includes(k)) out.push(k); });
  present.forEach(k=>{ if(!out.includes(k)) out.push(k); });

// The default cut mode for a given supply part number: continuous tape is cut
// after every label (so each printed length is separated); die-cut stock is
// cut once at end of job. Anything else cuts once at end of job.
function defaultCutMode(specN){
  // Prefer the printer-reported supply type (isContinuous, via M611 telemetry); else
  // the catalog type. Continuous → cut every label; die-cut → cut at end of job.
  const c=loadedCassette();
  if(c&&typeof c.isContinuous==='boolean')return c.isContinuous?"eachLabel":"afterJobLast";
  const s=blBy(specN);
  if(s&&s.ty==="continuous")return "eachLabel";
  if(s&&s.ty==="dieCut")return "afterJobLast";
  return "afterJobLast";
}
// The cut options the SELECTED printer advertises (relayed from the driver via the
// Engine status); falls back to the Brady standard set if none are present.
function cutOptions(){
  const p=printer();
  const o=p&&p.cutOptions&&p.cutOptions.length?p.cutOptions:null;
  return o||[{mode:"eachLabel",label:"Every Label"},{mode:"afterJobLast",label:"End of Job"},{mode:"never",label:"None"}];
}
// The effective cut mode right now: the user's explicit choice, else the per-stock
// default — but always clamped to one of the current printer's advertised options
// (falls back to the first if the chosen mode isn't offered by this printer).
function effCutMode(){
  const want=P.cutMode||defaultCutMode((tpl()||{}).specN||"");
  const opts=cutOptions();
  return opts.some(o=>o.mode===want)?want:(opts[0]?opts[0].mode:"afterJobLast");
}
// "Feed to clear" — the stable per-printer key (serial, falling back to model/id).
function ftcKey(p){ p=p||printer(); return p.serial||p.model||p.id||""; }
// Effective state for the SELECTED printer — only ever on for a printer whose driver
// supports it (Brady); a printer with no stored value uses the legacy global default.
function feedToClearOn(){
  const p=printer();
  if(!p||!p.supportsFeedToClear) return false;
  const k=ftcKey(p);
  return (k in P.feedToClearByPrinter)?!!P.feedToClearByPrinter[k]:!!P.feedToClearDefault;
}
// Toggle + persist PER PRINTER via the bridge.
function setFeedToClear(v){
  const k=ftcKey(printer());
  P.feedToClearByPrinter[k]=!!v;
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"setFeedToClear",payload:{key:k,value:!!v}});
  R();
}
function printer(){
  const pool=window._swiftPrinters||PRINTERS;
  return pool.find(p=>p.id===P.activePrinter)||pool[0]||{id:"",name:"No printer connected",model:"",status:"offline",serial:""};
}

function tpl(){return P.templates[P.activeTpl]||null;}

function cancelAndClose(){
  // Always record the configured job to recent prints so it can be reprinted
  // later, then close. Swift skips recording when nothing is printable.
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    const body=buildPrintPayloadBody(printIndices());
    // Only record a cancelled job if the user actually configured something —
    // a plain open-then-close of the auto-popped window records nothing.
    body.cancelled = (printConfigSig() !== (P._initialSig||""));
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"close",payload:body});
  }else{
    // Browser demo: just show a toast
    showToast("Window closed — return to Vectorworks");
  }
}
// Selection count among currently-visible (filtered) rows.
function selCount(){return visibleIndices().filter(i=>P.selected.has(i)).length;}

// Records come in Source/Destination pairs. pairIdx(i) returns the partner index.
function pairIdx(i){
  const r=P.records[i];
  if(!r)return null;
  if(r._Side==="Source"   && i+1<P.records.length && P.records[i+1]._Side==="Destination") return i+1;
  if(r._Side==="Destination" && i>0 && P.records[i-1]._Side==="Source") return i-1;
  return null;
}

// Toggle a single row
function toggleSel(i){
  if(P.selected.has(i))P.selected.delete(i);
  else P.selected.add(i);
  P.printRange="selected"; // count should always reflect what's checked
  R();
}

// Toggle a pair — if either is selected, deselect both; if both deselected, select both
function togglePair(i){
  const j=pairIdx(i);
  const hasI=P.selected.has(i);
  const hasJ=j!==null&&P.selected.has(j);
  if(hasI||hasJ){
    P.selected.delete(i);
    if(j!==null)P.selected.delete(j);
  }else{
    P.selected.add(i);
    if(j!==null)P.selected.add(j);
  }
  P.printRange="selected";
  R();
}

// Row print-enable checkbox click. Shift+click extends from the last clicked row
// across every VISIBLE row in between (not raw record indices, which break under
// sort/filter), applying the anchor row's resulting on/off state to the range.
function rowCheckClick(i,e){
  if(e.shiftKey && P.lastClickIdx!=null && P.lastClickIdx!==i){
    const vis=visibleIndices();
    const aPos=vis.indexOf(P.lastClickIdx), bPos=vis.indexOf(i);
    if(aPos>=0 && bPos>=0){
      const target=P.selected.has(P.lastClickIdx);   // match the anchor's state
      const lo=Math.min(aPos,bPos), hi=Math.max(aPos,bPos);
      for(let p=lo;p<=hi;p++){ const idx=vis[p]; if(target)P.selected.add(idx); else P.selected.delete(idx); }
      P.printRange="selected"; P.lastClickIdx=i; R(); return;
    }
  }
  if(P.selected.has(i))P.selected.delete(i); else P.selected.add(i);
  P.printRange="selected"; P.lastClickIdx=i; R();
}

// Pair toggle click. Shift+click extends across visible pairs in between, applying
// the anchor pair's resulting state.
function pairCheckClick(i,e){
  if(e.shiftKey && P.lastClickIdx!=null && P.lastClickIdx!==i){
    const vis=visibleIndices();
    const aPos=vis.indexOf(P.lastClickIdx), bPos=vis.indexOf(i);
    if(aPos>=0 && bPos>=0){
      const target=P.selected.has(P.lastClickIdx);
      const lo=Math.min(aPos,bPos), hi=Math.max(aPos,bPos);
      for(let p=lo;p<=hi;p++){ const idx=vis[p], jj=pairIdx(idx);
        if(target){ P.selected.add(idx); if(jj!=null)P.selected.add(jj); }
        else { P.selected.delete(idx); if(jj!=null)P.selected.delete(jj); }
      }
      P.printRange="selected"; P.lastClickIdx=i; R(); return;
    }
  }
  togglePair(i); P.lastClickIdx=i;
}

// Pair checkbox state: 'chk' both selected, 'partial' one selected, '' neither
function pairChkState(i){
  const j=pairIdx(i);
  const hasI=P.selected.has(i);
  const hasJ=j!==null?P.selected.has(j):hasI;
  if(hasI&&hasJ)return'chk';
  if(hasI||hasJ)return'partial';
  return'';
}

function toggleAll(){
  const vis=visibleIndices();
  const allSel=vis.length>0&&vis.every(i=>P.selected.has(i));
  if(allSel){
    vis.forEach(i=>P.selected.delete(i));
  }else{
    vis.forEach(i=>P.selected.add(i));
    P.printRange="all"; // selecting all switches back to "all" mode
  }
  R();
}

// Row click: preview this record. Shift-click: select range between last clicked and this.
// handleRowClick kept for compatibility but range-select is now in checkbox/pair cells
function handleRowClick(e,i){
  P.previewIdx=i;
  R();
}
function selectSide(side){
  // If all of this side are already selected, deselect them; otherwise select all of this side.
  // Restricted to visible (filtered) rows.
  const vis=new Set(visibleIndices());
  const sideIndices=P.records.map((r,i)=>(r._Side===side&&vis.has(i))?i:-1).filter(i=>i>=0);
  const allSelected=sideIndices.length>0&&sideIndices.every(i=>P.selected.has(i));
  sideIndices.forEach(i=>allSelected?P.selected.delete(i):P.selected.add(i));
  P.printRange="selected";
  R();
}
function selectRange(from,to){
  P.selected.clear();
  for(let i=from-1;i<to&&i<P.records.length;i++)P.selected.add(i);
  R();
}

// ── Filtering ───────────────────────────────────────────────────────────────
// Operators offered in the filter builder.
const FILTER_OPS=[
  {op:"contains",label:"Contains"},
  {op:"not_contains",label:"Does not contain"},
  {op:"is",label:"Is exactly"},
  {op:"is_not",label:"Is not"},
  {op:"eq",label:"="},
  {op:"ne",label:"≠"},
  {op:"gt",label:">"},
  {op:"gte",label:"≥"},
  {op:"lt",label:"<"},
  {op:"lte",label:"≤"},
  {op:"empty",label:"Is empty"},
  {op:"not_empty",label:"Is not empty"},
];
function opNeedsValue(op){ return op!=="empty"&&op!=="not_empty"; }

// Evaluate one rule against a record.
function ruleMatches(rec,rule){
  if(!rule||!rule.field)return true;
  const a=(rec[rule.field]==null?"":String(rec[rule.field]));
  const b=opNeedsValue(rule.op)
    ? (rule.valueType==="field" ? (rec[rule.value]==null?"":String(rec[rule.value])) : String(rule.value==null?"":rule.value))
    : "";
  const al=a.toLowerCase(), bl=b.toLowerCase();
  const an=parseFloat(a), bn=parseFloat(b), nums=isFinite(an)&&isFinite(bn);
  switch(rule.op){
    case "contains":     return al.includes(bl);
    case "not_contains": return !al.includes(bl);
    case "is":           return al===bl;
    case "is_not":       return al!==bl;
    case "eq":           return nums?an===bn:a===b;
    case "ne":           return nums?an!==bn:a!==b;
    case "gt":           return nums?an>bn:a>b;
    case "gte":          return nums?an>=bn:a>=b;
    case "lt":           return nums?an<bn:a<b;
    case "lte":          return nums?an<=bn:a<=b;
    case "empty":        return a==="";
    case "not_empty":    return a!=="";
  }
  return true;
}

// A rule is "ready" when it has a field, an op, and (if needed) a value.
function ruleReady(r){
  if(!r||!r.field||!r.op)return false;
  if(!opNeedsValue(r.op))return true;
  return r.value!==undefined&&r.value!=="";
}

function groupReady(g){ return !!(g&&(g.rules||[]).some(ruleReady)); }

// Evaluate one group: its ready rules combined left-to-right via the group's
// connectors (default AND).
function groupMatches(rec,g){
  const rules=(g.rules||[]).filter(ruleReady);
  if(!rules.length)return true;
  let res=ruleMatches(rec,rules[0]);
  for(let k=1;k<rules.length;k++){
    const c=(g.connectors&&g.connectors[k-1])||"and";
    res = c==="or" ? (res||ruleMatches(rec,rules[k])) : (res&&ruleMatches(rec,rules[k]));
  }
  return res;
}

// Normalise the old flat {rules,connectors} shape into {groups,groupConnectors}.
function filterGroups(f){
  if(!f)return [];
  if(Array.isArray(f.groups))return f.groups;
  if(Array.isArray(f.rules))return [{rules:f.rules,connectors:f.connectors||[]}];
  return [];
}

// Combine group results left-to-right via the group connectors (default OR).
function recordMatchesFilter(rec,f){
  const groups=filterGroups(f).filter(groupReady);
  if(!groups.length)return true;
  let res=groupMatches(rec,groups[0]);
  for(let k=1;k<groups.length;k++){
    const c=(f.groupConnectors&&f.groupConnectors[k-1])||"or";
    res = c==="and" ? (res&&groupMatches(rec,groups[k])) : (res||groupMatches(rec,groups[k]));
  }
  return res;
}

function filterActive(){ return filterGroups(P.filter).some(groupReady); }

// Does record i pass the active filter? With showBothSides, a row also passes
// when its Source/Destination partner matches.
function passesFilter(i){
  if(!filterActive())return true;
  if(recordMatchesFilter(P.records[i],P.filter))return true;
  if(P.filter.showBothSides){ const j=pairIdx(i); if(j!=null&&recordMatchesFilter(P.records[j],P.filter))return true; }
  return false;
}

// ── Sorting ───────────────────────────────────────────────────────────────────
function sortActive(){ return !!(P.sort && (P.sort.rules||[]).some(r=>r.field)); }

// When "inherit rack" is on, a record whose Rack is blank borrows its pair
// partner's Rack for sorting purposes. Built per sort from the full record list
// (so it works even if the partner is filtered out), keyed by record object.
let _effRack=null;
function buildEffRack(){
  _effRack=new Map();
  if(!(P.sort && P.sort.inheritRack))return;
  for(let i=0;i<P.records.length;i++){
    const r=P.records[i];
    let v=(r&&r.Rack!=null)?r.Rack:"";
    if(v===""){ const j=pairIdx(i); if(j!=null){ const p=P.records[j]; if(p&&p.Rack)v=p.Rack; } }
    _effRack.set(r,v);
  }
}
function sortVal(rec,field){
  if(field==="Rack" && P.sort && P.sort.inheritRack && _effRack && _effRack.has(rec)) return _effRack.get(rec);
  return rec?rec[field]:"";
}

// Natural, case-insensitive compare of two records by the active sort rules.
function cmpRecs(ra,rb){
  for(const r of (P.sort.rules||[])){
    if(!r.field)continue;
    const a=sortVal(ra,r.field), b=sortVal(rb,r.field);
    let c=String(a==null?"":a).localeCompare(String(b==null?"":b),undefined,{numeric:true,sensitivity:"base"});
    if(r.dir==="desc")c=-c;
    if(c)return c;
  }
  return 0;
}

// Order a list of filtered indices per the sort spec + pair mode:
//  break  → sort each row independently (pairs may separate)
//  source → keep each Source+Destination pair together, ordered by the Source
//  dest   → keep pairs together, ordered by the Destination
function applySort(idx){
  buildEffRack();
  const mode=(P.sort.pairMode)||"break";
  if(mode==="break") return idx.slice().sort((i,j)=>cmpRecs(P.records[i],P.records[j])||(i-j));
  const vis=new Set(idx), consumed=new Set(), units=[];
  for(const i of idx){
    if(consumed.has(i))continue;
    const r=P.records[i];
    if(r._Side==="Source"){ const j=pairIdx(i); if(j!=null&&vis.has(j)){ units.push([i,j]); consumed.add(i);consumed.add(j); continue; } }
    units.push([i]); consumed.add(i);
  }
  function keyRow(u){
    const want=mode==="source"?"Source":"Destination";
    for(const k of u){ if(P.records[k]._Side===want)return P.records[k]; }
    return P.records[u[0]];
  }
  units.sort((ua,ub)=>cmpRecs(keyRow(ua),keyRow(ub))||(ua[0]-ub[0]));
  const out=[]; for(const u of units) for(const k of u) out.push(k);
  return out;
}

// Absolute indices of records currently shown, in display order (filter + sort).
// Computed once per render and cached in P._visCache (set/cleared by R()), so the
// ~dozen calls a single render makes don't each re-run filter + sort. Calls
// outside a render (event handlers) compute fresh.
function computeVisibleIndices(){
  const all=P.records.map((_,i)=>i);
  let idx=filterActive()?all.filter(passesFilter):all;
  if(searchActive()) idx=idx.filter(i=>passesSearch(P.records[i]));
  if(sortActive()) idx=applySort(idx);
  return idx;
}
function visibleIndices(){ return P._visCache || computeVisibleIndices(); }

// ── Quick search (all fields) ───────────────────────────────────────────────────
function searchActive(){ return !!(P.search||"").trim(); }
// Every whitespace-separated term must appear somewhere in the record's fields
// (case-insensitive) — so "amp lan" matches a row containing both.
function passesSearch(rec){
  const q=(P.search||"").trim().toLowerCase();
  if(!q)return true;
  const hay=Object.keys(rec).map(k=>String(rec[k]==null?"":rec[k])).join(" ").toLowerCase();
  return q.split(/\s+/).every(t=>hay.indexOf(t)>=0);
}
// Re-render on input while preserving the search box's focus and caret.
function onRecSearchInput(v){
  const old=document.getElementById("rec-search");
  const pos=old?old.selectionStart:(v||"").length;
  P.search=v;
  R();
  const el=document.getElementById("rec-search");
  if(el){ el.focus(); try{ el.setSelectionRange(pos,pos); }catch(_){} }
}
function clearRecSearch(){ P.search=""; R(); const el=document.getElementById("rec-search"); if(el)el.focus(); }

function sortSummaryOf(s){
  if(!s||!(s.rules||[]).some(r=>r.field))return "";
  const parts=s.rules.filter(r=>r.field).map(r=>colLabel(r.field)+(r.dir==="desc"?" ↓":" ↑"));
  const modeTxt=s.pairMode==="source"?" · pairs follow source"
              :s.pairMode==="dest"?" · pairs follow destination"
              :" · pairs may split";
  return parts.join(", ")+modeTxt;
}
function sortSummary(){ return sortSummaryOf(P.sort); }

// Human-readable summary of a filter for the header / tooltips.
function ruleSummary(r){
  const opl=(FILTER_OPS.find(o=>o.op===r.op)||{}).label||r.op;
  const val=opNeedsValue(r.op)?(r.valueType==="field"?("["+colLabel(r.value)+"]"):('"'+r.value+'"')):"";
  return colLabel(r.field)+" "+opl+(val?" "+val:"");
}
function filterSummaryOf(f){
  const groups=filterGroups(f).filter(groupReady);
  if(!groups.length)return "";
  const groupStrs=groups.map(g=>{
    const rules=g.rules.filter(ruleReady);
    const parts=rules.map((r,k)=>(k>0?((g.connectors[k-1]||"and").toUpperCase()+" "):"")+ruleSummary(r));
    const inner=parts.join(" ");
    return groups.length>1?("("+inner+")"):inner;
  });
  let out=groupStrs[0]||"";
  for(let k=1;k<groupStrs.length;k++){
    out+=" "+((f.groupConnectors&&f.groupConnectors[k-1])||"or").toUpperCase()+" "+groupStrs[k];
  }
  return out + (f.showBothSides?" · incl. pairs":"");
}
function filterSummary(){ return filterActive()?filterSummaryOf(P.filter):""; }

// ── Filter/sort presets ────────────────────────────────────────────────────────
function presetGenId(){ return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function savePresets(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"setFilterSortPresets",payload:window._presets||[]});
}
function presetSummary(p){
  const f=filterSummaryOf(p.filter), s=sortSummaryOf(p.sort);
  const out=[]; if(f)out.push("Filter: "+f); if(s)out.push("Sort: "+s);
  return out.length?out.join("\n"):"(no filter or sort)";
}
// Canonical JSON: recursively sort object keys so comparison is independent of
// key order. Needed because reprint's filter/sort round-trips through Swift's
// JSONSerialization, which emits dictionary keys in arbitrary order.
function _canon(x){
  if(x===null||x===undefined) return null;
  if(Array.isArray(x)) return x.map(_canon);
  if(typeof x==='object'){ const o={}; Object.keys(x).sort().forEach(k=>{ const v=_canon(x[k]); if(v!==undefined)o[k]=v; }); return o; }
  return x;
}
function presetMatchesActive(p){
  return JSON.stringify(_canon(p.filter||null))===JSON.stringify(_canon(P.filter||null))
      && JSON.stringify(_canon(p.sort||null))===JSON.stringify(_canon(P.sort||null));
}
function applyPreset(id){
  const p=(window._presets||[]).find(x=>x.id===id); if(!p)return;
  P.filter=p.filter?JSON.parse(JSON.stringify(p.filter)):null;
  P.sort=p.sort?JSON.parse(JSON.stringify(p.sort)):null;
  const vis=visibleIndices(); if(vis.length&&!vis.includes(P.previewIdx))P.previewIdx=vis[0];
  R();
}
function deletePreset(id){ window._presets=(window._presets||[]).filter(x=>x.id!==id); savePresets(); R(); }
function renamePreset(id){
  const p=(window._presets||[]).find(x=>x.id===id); if(!p)return;
  vlPrompt("Rename preset",p.name,n=>{ if(n){ p.name=n; savePresets(); R(); } });
}
function editPreset(id){ openFilterModal(id); }

// Small right-click menu for a preset tile.
function closePresetMenu(){ const m=document.getElementById('vl-preset-menu'); if(m)m.remove(); }
function presetMenu(e,id){
  e.preventDefault(); e.stopPropagation(); closePresetMenu();
  const menu=document.createElement('div'); menu.id='vl-preset-menu';
  menu.style.cssText='position:fixed;z-index:2500;background:var(--surface);border:1px solid var(--bd4);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.5);padding:4px;min-width:160px;left:'+e.clientX+'px;top:'+e.clientY+'px';

    d.onmouseenter=()=>d.style.background='var(--bd2)'; d.onmouseleave=()=>d.style.background='';

// Reusable text-input overlay (WKWebView blocks window.prompt without a delegate).
// cb(value, viaExtra) — viaExtra is true when the optional extra button is used.
// A name is required: Save / the extra button stay disabled-feeling and show
// helper text until something is typed; only Cancel exits with an empty field.
function vlPrompt(title,def,cb,extraLabel){
  const o=document.createElement('div'); o.className='modal-overlay'; o.style.zIndex='2600';
  o.onclick=e=>{ if(e.target===o){ o.remove(); cb(null,false); } };
  o.innerHTML=`<div class="modal" style="min-width:360px">
    <div class="modal-title">${esc(title)}</div>
    <input id="vlpi" class="inp" value="${(def||'').replace(/"/g,'&quot;')}">
    <div id="vlperr" style="display:none;color:var(--red);font-size:11px;margin-top:6px">You must enter a name.</div>
    <div class="modal-footer"><button class="btn" id="vlpc">Cancel</button>
      <button class="btn" id="vlpo" style="background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600">Save</button>
      ${extraLabel?`<button class="btn" id="vlpx" style="background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600">${esc(extraLabel)}</button>`:''}
    </div>
  </div>`;
  document.body.appendChild(o);
  const inp=o.querySelector('#vlpi'), err=o.querySelector('#vlperr');
  inp.focus(); inp.select();
  function attempt(extra){
    const v=inp.value.trim();
    if(!v){ err.style.display='block'; inp.focus(); return; }   // require a name; stay open
    o.remove(); cb(v,!!extra);
  }
  inp.oninput=()=>{ if(inp.value.trim())err.style.display='none'; };
  o.querySelector('#vlpo').onclick=()=>attempt(false);
  o.querySelector('#vlpc').onclick=()=>{ o.remove(); cb(null,false); };
  const xb=o.querySelector('#vlpx'); if(xb)xb.onclick=()=>attempt(true);
  inp.onkeydown=e=>{ if(e.key==='Enter')attempt(false); if(e.key==='Escape'){ o.remove(); cb(null,false); } };
}

// ── Filter dialog ─────────────────────────────────────────────────────────────
// Rendered as a standalone overlay on <body> (not inside #app) so the live R()
// re-render doesn't destroy it while the user is editing rules. The draft model
// is {groups:[{rules,connectors}], groupConnectors:[], showBothSides}. Rules
// within a group combine with AND/OR; groups combine with AND/OR.
function newFilterRule(){
  const cols=recordColumns(currentRecords());
  return {field:cols[0]||"",op:"contains",valueType:"text",value:""};
}
function newFilterGroup(){ return {rules:[newFilterRule()],connectors:[]}; }
// Open the dialog seeded from the active filter/sort, or — when presetId is
// given — from that preset (edit mode: Apply becomes "Save preset" and the
// active filter/sort is left untouched).
function openFilterModal(presetId){
  P._editingPresetId = presetId || null;
  let baseFilter=P.filter, baseSort=P.sort;
  if(presetId){ const p=(window._presets||[]).find(x=>x.id===presetId); baseFilter=p?p.filter:null; baseSort=p?p.sort:null; }
  if(baseFilter){
    const d=JSON.parse(JSON.stringify(baseFilter));
    if(!Array.isArray(d.groups)) d.groups=[{rules:d.rules||[newFilterRule()],connectors:d.connectors||[]}];
    if(!Array.isArray(d.groupConnectors)) d.groupConnectors=[];
    delete d.rules; delete d.connectors;
    P._filterDraft=d;
  }else{
    P._filterDraft={groups:[newFilterGroup()],groupConnectors:[],showBothSides:false};
  }
  P._filterDraft.groups.forEach(g=>{ if(!g.rules||!g.rules.length)g.rules=[newFilterRule()]; if(!Array.isArray(g.connectors))g.connectors=[]; });
  P._sortDraft = baseSort ? JSON.parse(JSON.stringify(baseSort))
                          : {rules:[{field:"",dir:"asc"}], pairMode:"break"};
  if(!P._sortDraft.rules.length)P._sortDraft.rules.push({field:"",dir:"asc"});
  if(!P._sortDraft.pairMode)P._sortDraft.pairMode="break";
  renderFilterModal();
}
function closeFilterModal(){ P._filterDraft=null; P._sortDraft=null; P._editingPresetId=null; const m=document.getElementById('vl-filter-modal'); if(m)m.remove(); }
// Convert the open drafts to applied filter/sort objects (null when empty).
function draftToFilter(){ const d=P._filterDraft; return (d.groups||[]).some(groupReady)?{groups:d.groups,groupConnectors:d.groupConnectors,showBothSides:!!d.showBothSides}:null; }
function draftToSort(){ const s=P._sortDraft; return (s.rules||[]).some(r=>r.field)?{rules:s.rules.filter(r=>r.field),pairMode:s.pairMode||"break",inheritRack:!!s.inheritRack}:null; }
function saveCurrentAsPreset(){
  const f=draftToFilter(), s=draftToSort();
  if(!f&&!s){ showToast("Add a filter or sort first"); return; }
  vlPrompt("Name this preset","",(name,exit)=>{
    if(!name)return;
    window._presets=window._presets||[];
    window._presets.push({id:presetGenId(),name:name,filter:f,sort:s});
    savePresets();
    showToast("Preset saved: "+name);
    if(exit){ closeFilterModal(); R(); }   // Save & exit → back to the print window
    else { renderFilterModal(); }
  }, "Save & exit");
}
function savePresetEdits(){
  const p=(window._presets||[]).find(x=>x.id===P._editingPresetId); if(!p)return;
  p.filter=draftToFilter(); p.sort=draftToSort();
  savePresets(); closeFilterModal(); R();
}
// Save the edited preset AND make it the active filter/sort in one step.
function savePresetEditsAndApply(){
  const p=(window._presets||[]).find(x=>x.id===P._editingPresetId); if(!p)return;
  p.filter=draftToFilter(); p.sort=draftToSort();
  savePresets();
  P.filter=p.filter?JSON.parse(JSON.stringify(p.filter)):null;
  P.sort=p.sort?JSON.parse(JSON.stringify(p.sort)):null;
  closeFilterModal();
  const vis=visibleIndices(); if(vis.length&&!vis.includes(P.previewIdx))P.previewIdx=vis[0];
  R();
}
// Overwrite a preset's stored filter/sort with the currently active settings.
function updatePresetWithCurrent(id){
  const p=(window._presets||[]).find(x=>x.id===id); if(!p)return;
  p.filter=P.filter?JSON.parse(JSON.stringify(P.filter)):null;
  p.sort=P.sort?JSON.parse(JSON.stringify(P.sort)):null;
  savePresets(); R();
  showToast("Preset updated: "+p.name);
}
// Sort-draft mutators
function sdAddRule(){ P._sortDraft.rules.push({field:"",dir:"asc"}); renderFilterModal(); }
function sdRemoveRule(i){ P._sortDraft.rules.splice(i,1); if(!P._sortDraft.rules.length)P._sortDraft.rules.push({field:"",dir:"asc"}); renderFilterModal(); }
function sdSet(i,prop,val){ P._sortDraft.rules[i][prop]=val; renderFilterModal(); }
function sdSetPairMode(m){ P._sortDraft.pairMode=m; renderFilterModal(); }
function sdSetInheritRack(v){ P._sortDraft.inheritRack=v; renderFilterModal(); }
function fdAddRule(gi){
  const g=P._filterDraft.groups[gi];
  g.rules.push(newFilterRule());
  if(g.rules.length>1)g.connectors.push('and');
  renderFilterModal();
}
function fdRemoveRule(gi,ri){
  const g=P._filterDraft.groups[gi];
  g.rules.splice(ri,1);
  g.connectors.splice(Math.max(0,ri-1),1);
  if(!g.rules.length)g.rules.push(newFilterRule());
  renderFilterModal();
}
function fdAddGroup(){
  P._filterDraft.groups.push(newFilterGroup());
  if(P._filterDraft.groups.length>1)P._filterDraft.groupConnectors.push('or');
  renderFilterModal();
}
function fdRemoveGroup(gi){
  P._filterDraft.groups.splice(gi,1);
  P._filterDraft.groupConnectors.splice(Math.max(0,gi-1),1);
  if(!P._filterDraft.groups.length)P._filterDraft.groups.push(newFilterGroup());
  renderFilterModal();
}
function fdSet(gi,ri,prop,val){
  const r=P._filterDraft.groups[gi].rules[ri]; r[prop]=val;
  if(prop==='valueType') r.value = val==='field' ? (recordColumns(currentRecords())[0]||'') : '';
  if(prop==='op'||prop==='valueType') renderFilterModal();
}
function fdSetText(gi,ri,val){ P._filterDraft.groups[gi].rules[ri].value=val; }   // no re-render → keeps focus
function fdSetConn(gi,ci,val){ P._filterDraft.groups[gi].connectors[ci]=val; renderFilterModal(); }
function fdSetGroupConn(gci,val){ P._filterDraft.groupConnectors[gci]=val; renderFilterModal(); }
function fdSetBoth(v){ P._filterDraft.showBothSides=v; }
function applyFilterDraft(){
  P.filter = draftToFilter();
  P.sort = draftToSort();
  closeFilterModal();
  const vis=visibleIndices(); if(vis.length&&!vis.includes(P.previewIdx))P.previewIdx=vis[0];
  R();
}
function clearFilter(){ P.filter=null; closeFilterModal(); R(); }
function clearSort(){ P.sort=null; closeFilterModal(); R(); }

function connToggle(curr,onclickPrefix){
  return `<div style="display:flex;gap:4px">${['and','or'].map(c=>`<button onclick="${onclickPrefix}'${c}')" class="btn${(curr||'and')===c?' on':''}" style="padding:1px 14px;font-size:11px;text-transform:uppercase">${c}</button>`).join('')}</div>`;
}

function renderFilterGroup(g,gi,multi){
  const cols=recordColumns(currentRecords());
  const fieldOpts=sel=>cols.map(c=>`<option value="${escAttr(c)}" ${c===sel?'selected':''}>${esc(colLabel(c))}</option>`).join('');
  const opOpts=sel=>FILTER_OPS.map(o=>`<option value="${o.op}" ${o.op===sel?'selected':''}>${o.label}</option>`).join('');
  const rowsHtml=g.rules.map((r,ri)=>{
    const conn = ri>0 ? `<div style="margin:6px 0">${connToggle(g.connectors[ri-1],`fdSetConn(${gi},${ri-1},`)}</div>` : '';
    const valTypeToggle = !opNeedsValue(r.op) ? '' :
      `<select class="inp" style="width:auto;flex-shrink:0" onchange="fdSet(${gi},${ri},'valueType',this.value)" title="Compare against typed text or another column's value">
         <option value="text" ${r.valueType==='text'?'selected':''}>Text</option>
         <option value="field" ${r.valueType==='field'?'selected':''}>Field</option>
       </select>`;
    const valCell = !opNeedsValue(r.op) ? '<div style="flex:1"></div>' :
      r.valueType==='field'
        ? `<select class="inp" style="flex:1;min-width:0" onchange="fdSet(${gi},${ri},'value',this.value)">${cols.map(c=>`<option value="${escAttr(c)}" ${c===r.value?'selected':''}>${esc(colLabel(c))}</option>`).join('')}</select>`
        : `<input class="inp" style="flex:1;min-width:0" value="${esc(r.value||'')}" oninput="fdSetText(${gi},${ri},this.value)" placeholder="match value">`;
    return `<div style="margin-bottom:4px">
      ${conn}
      <div style="display:flex;gap:6px;align-items:center">
        <select class="inp" style="width:140px;flex-shrink:0" onchange="fdSet(${gi},${ri},'field',this.value)">${fieldOpts(r.field)}</select>
        <select class="inp" style="width:120px;flex-shrink:0" onchange="fdSet(${gi},${ri},'op',this.value)">${opOpts(r.op)}</select>
        ${valTypeToggle}
        ${valCell}
        <button onclick="fdRemoveRule(${gi},${ri})" title="Remove this condition" ${g.rules.length<=1?'disabled':''} style="flex-shrink:0;background:rgba(245,108,108,0.12);border:1px solid rgba(245,108,108,0.3);color:var(--red);border-radius:5px;padding:3px 9px;cursor:pointer;font-size:13px">×</button>
      </div>
    </div>`;
  }).join('');
  return `<div style="border:1px solid rgba(108,142,245,0.25);border-radius:7px;padding:10px 12px;background:rgba(108,142,245,0.04)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <span style="color:var(--accent);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Group ${gi+1}</span>
      ${multi?`<button onclick="fdRemoveGroup(${gi})" title="Remove this group" style="background:rgba(245,108,108,0.12);border:1px solid rgba(245,108,108,0.3);color:var(--red);border-radius:5px;padding:2px 8px;cursor:pointer;font-size:11px">Remove group</button>`:''}
    </div>
    ${rowsHtml}
    <button class="btn" onclick="fdAddRule(${gi})" title="Add a condition to this group" style="margin-top:4px;font-size:11px">+ Add condition</button>
  </div>`;
}

function renderFilterModal(){
  const d=P._filterDraft; if(!d)return;
  const multi=d.groups.length>1;
  const groupsHtml=d.groups.map((g,gi)=>{
    const between = gi>0 ? `<div style="display:flex;align-items:center;gap:8px;margin:8px 0">
        <div style="flex:1;height:1px;background:var(--bd2)"></div>
        ${connToggle(d.groupConnectors[gi-1]||'or',`fdSetGroupConn(${gi-1},`)}
        <div style="flex:1;height:1px;background:var(--bd2)"></div>
      </div>` : '';
    return between+renderFilterGroup(g,gi,multi);
  }).join('');

  const sd=P._sortDraft, cols=recordColumns(currentRecords());
  const editing=!!P._editingPresetId;
  const editName=editing?(((window._presets||[]).find(x=>x.id===P._editingPresetId)||{}).name||""):"";
  const pairModes=[
    ['break','Sort sources & destinations (breaks pairs)'],
    ['source','Sort by source — destinations stay with sources'],
    ['dest','Sort by destination — sources stay with destinations']
  ];
  const pairHtml=`<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px">
    ${pairModes.map(([mm,lbl])=>`<button class="btn${sd.pairMode===mm?' on':''}" onclick="sdSetPairMode('${mm}')" style="text-align:left;font-size:11px;padding:5px 10px">${lbl}</button>`).join('')}
  </div>`;
  const sortRows=sd.rules.map((r,i)=>`<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
      <span style="color:var(--text2);font-size:11px;width:42px;flex-shrink:0">${i===0?'Sort by':'then by'}</span>
      <select class="inp" style="flex:1;min-width:0" onchange="sdSet(${i},'field',this.value)">
        <option value="">— none —</option>
        ${cols.map(c=>`<option value="${escAttr(c)}" ${r.field===c?'selected':''}>${esc(colLabel(c))}</option>`).join('')}
      </select>
      <select class="inp" style="width:auto;flex-shrink:0" onchange="sdSet(${i},'dir',this.value)">
        <option value="asc" ${r.dir!=='desc'?'selected':''}>A→Z</option>
        <option value="desc" ${r.dir==='desc'?'selected':''}>Z→A</option>
      </select>
      <button onclick="sdRemoveRule(${i})" title="Remove" ${sd.rules.length<=1?'disabled':''} style="flex-shrink:0;background:rgba(245,108,108,0.12);border:1px solid rgba(245,108,108,0.3);color:var(--red);border-radius:5px;padding:3px 9px;cursor:pointer;font-size:13px">×</button>
    </div>`).join('');
  // Only relevant when sorting by Rack: treat a blank Rack on one end of a pair as
  // its partner's Rack, so the two stay together.
  const hasRackSort=sd.rules.some(r=>r.field==='Rack');
  const inheritRackHtml=hasRackSort?`<label style="display:flex;align-items:center;gap:8px;margin-top:8px;cursor:pointer;color:var(--text-soft);font-size:12px">
    <input type="checkbox" ${sd.inheritRack?'checked':''} onchange="sdSetInheritRack(this.checked)">
    Inherit rack name from other end label when not present
  </label>`:'';

  let m=document.getElementById('vl-filter-modal');
  if(!m){ m=document.createElement('div'); m.id='vl-filter-modal'; m.className='modal-overlay'; m.onclick=e=>{if(e.target===m)closeFilterModal();}; document.body.appendChild(m); }
  m.innerHTML=`<div class="modal" style="min-width:600px;max-width:720px">
    <div class="modal-title">${editing?("Edit preset — "+esc(editName)):"Filter &amp; sort"}</div>
    <div style="max-height:calc(100vh - 180px);overflow-y:auto;padding-right:2px">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Filter</div>
      <div style="display:flex;flex-direction:column;gap:2px">${groupsHtml}</div>
      <button class="btn" onclick="fdAddGroup()" title="Add another group of conditions" style="margin-top:8px;font-size:12px">+ Add group</button>
      <label style="display:flex;align-items:center;gap:8px;margin-top:14px;cursor:pointer;color:var(--text-soft);font-size:12px">
        <input type="checkbox" ${d.showBothSides?'checked':''} onchange="fdSetBoth(this.checked)">
        Show Source and Destination when only Source or Destination matches
      </label>
      <hr style="border:none;border-top:1px solid var(--bd2);margin:16px 0 12px">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Sort</div>
      ${pairHtml}
      ${sortRows}
      ${inheritRackHtml}
      <button class="btn" onclick="sdAddRule()" title="Add another sort level" style="margin-top:8px;font-size:12px">+ Add sort</button>
    </div>
    <div class="modal-footer" style="justify-content:space-between">
      <div style="display:flex;gap:8px">
        ${editing?'':`<button class="btn" onclick="saveCurrentAsPreset()" title="Save this filter + sort as a reusable preset">Save as preset…</button>`}
        ${(!editing&&(P.filter||P.sort))?`
          <button class="btn" ${P.filter?'':'disabled'} onclick="clearFilter()" style="color:var(--warn);border-color:rgba(245,201,108,0.4)${P.filter?'':';opacity:0.4;cursor:default'}">Clear filter</button>
          <button class="btn" ${P.sort?'':'disabled'} onclick="clearSort()" style="color:var(--warn);border-color:rgba(245,201,108,0.4)${P.sort?'':';opacity:0.4;cursor:default'}">Clear sort</button>
        `:''}
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="closeFilterModal()">Cancel</button>
        ${editing
          ? `<button class="btn" onclick="savePresetEdits()">Save preset</button>
             <button class="btn" onclick="savePresetEditsAndApply()" title="Save these changes and apply them as the active filter/sort" style="background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600">Save &amp; apply</button>`
          : `<button class="btn" onclick="applyFilterDraft()" style="background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600">Apply</button>`}
      </div>
    </div>
  </div>`;
}

// User-adjustable width of the preview sidebar (px), persisted across sessions.
let PREVIEW_W=(function(){ try{ const v=parseInt(localStorage.getItem("vl-preview-width"),10); if(v>=240&&v<=2400)return v; }catch(_){}; return 320; })();

// Scale the side preview label to fill the current sidebar width. Rendered at
// scale 1, then transform-scaled here so it grows/shrinks with the sidebar.
function fitPreviewLabel(){
  const wrap=document.getElementById("preview-label-wrap");
  const inner=document.getElementById("preview-label-inner");
  if(!wrap||!inner)return;
  const lw=parseFloat(wrap.dataset.lw)||1, lh=parseFloat(wrap.dataset.lh)||1;
  const avail=wrap.clientWidth;
  if(!(avail>0)||!(lw>0))return;
  let s=avail/lw;
  if(s>6)s=6; if(s<0.3)s=0.3;   // sensible bounds
  inner.style.transform="scale("+s+")";
  wrap.style.height=(lh*s)+"px";    // transform doesn't reflow — reserve the space
}

// Drag the splitter on the sidebar's left edge to resize it; persist on release.
function startPreviewResize(e){
  e.preventDefault();
  const startX=e.clientX, startW=PREVIEW_W;
  const pane=document.getElementById("preview-pane");
  function mv(ev){
    const maxW=Math.max(280, window.innerWidth-360);
    let w=Math.max(240, Math.min(startW+(startX-ev.clientX), maxW));   // drag left → wider
    PREVIEW_W=w;
    if(pane)pane.style.width=w+"px";
    fitPreviewLabel();
  }
  function mu(){
    window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",mu);
    try{ localStorage.setItem("vl-preview-width", String(Math.round(PREVIEW_W))); }catch(_){}
  }
  window.addEventListener("mousemove",mv); window.addEventListener("mouseup",mu);
}

  const t=tpl();

  const vis=visibleIndices();
  const vpos=vis.indexOf(P.previewIdx);

  const prevIdx=vpos>0?vis[vpos-1]:P.previewIdx;

  if(!t||!rec)return`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px">No template selected</div>`;
  const spec=blBy(t.specN)||blDefault();

  // fitPreviewLabel() (after render and while dragging the resize splitter), so

    </div>

    <div style="text-align:center">

      <div style="color:var(--text2);font-size:11px;margin-top:2px">${esc(rec._Side)} label</div>

        ${cassetteMatched()?`<span title="Loaded cassette matches the required supply" style="color:var(--green);font-size:22px;line-height:1;font-weight:800">✓</span>`
          :cassetteMismatch()?`<span title="Loaded ${escAttr(loadedCassette().partNumber)} doesn't match — the label may print misaligned or cropped" style="color:var(--red);font-size:13px;line-height:1;white-space:nowrap">⚠ mismatch</span>`:""}
      </div>
      <div style="display:flex;justify-content:space-between;gap:8px;margin-top:7px;font-size:11px">

// ── Loaded cassette (SmartCell) detection ──────────────────────────────────────
// window._cassettes maps printerID -> {partNumber, supplyRemainingPct, ...}.
function loadedCassette(){ return (window._cassettes||{})[P.activePrinter]||null; }

// The record to render on a label. With "inherit rack" on, a blank-Rack side of a
// pair shows its partner's rack in parentheses, e.g. "(RIO RACK)". Returns the
// original record unchanged otherwise.
function recForRender(i){
  const r=P.records[i];
  if(!r||!(P.sort&&P.sort.inheritRack))return r;
  if(r.Rack==null||r.Rack===""){
    const j=pairIdx(i);
    if(j!=null){ const p=P.records[j]; if(p&&p.Rack) return Object.assign({},r,{Rack:"("+p.Rack+")"}); }
  }
  return r;
}

// Strip the model prefix so "BM-32-427" (catalog) matches "M6-32-427" (SmartCell).
// BM-109-427 is the bulk box for M6-33-427, so treat them as the same supply.
function supplyCore(pn){ let c=(pn||"").replace(/^[A-Za-z0-9]+-/,"").toUpperCase(); if(c==="109-427")c="33-427"; return c; }

// Whether the loaded cassette's actual label dimensions equal the template's
// required label size. The SmartCell reports the real loaded label size, which is
// the ground truth — a part number can differ while the physical label is the
// same size (e.g. a 1.5"×1.5" supply that reports a 33-427 part number). Compares
// both orientations, since the printer may report W/H swapped vs the template.
function sameLabelSize(c,specN){
  if(!c||typeof c.labelWidthMils!=='number'||typeof c.labelHeightMils!=='number')return false;
  const spec=blBy(specN)||BL.find(l=>supplyCore(l.n)===supplyCore(specN));
  if(!spec)return false;
  const tol=100; // mils (~0.1")
  const close=(a,b)=>Math.abs(a-b)<=tol;
  const cw=c.labelWidthMils, ch=c.labelHeightMils;
  // Continuous tape has no fixed label height (length is set per job), so match on
  // WIDTH alone — any material of the same tape width counts as matched (#15).
  if(spec.ty==="continuous"){
    if(c.isDieCut===true)return false;
    const tw=spec.tw*1000;
    return close(cw,tw)||close(ch,tw);
  }
  const tw=spec.tw*1000, th=spec.th*1000;
  return (close(cw,tw)&&close(ch,th))||(close(cw,th)&&close(ch,tw));
}

// Matching is based purely on label SIZE — the loaded cassette's real dimensions
// vs the template's label size — not the part number. (When the cassette doesn't
// report its size, treat it as unknown: neither matched nor mismatched.)
function cassetteSizeKnown(c){ return !!(c && typeof c.labelWidthMils==='number' && typeof c.labelHeightMils==='number'); }

// Matching is by PART NUMBER membership: the loaded cassette matches the template's
// supply when its part number is one of that supply's part numbers (exact or by
// bulk-box↔cartridge core). Falls back to the size match only when the cassette
// reports no part number.
function partEq(a,b){ if(!a||!b)return false; return a.toUpperCase()===b.toUpperCase()||supplyCore(a)===supplyCore(b); }
function cassetteMatchesSupply(c,specN){
  const spec=blBy(specN); if(!spec||!c)return false;
  const cpn=c.partNumber||"";
  if(cpn){
    const parts=(spec.parts&&spec.parts.length)?spec.parts:[{pn:spec.n}];
    return parts.some(p=>partEq(p.pn,cpn));
  }
  return cassetteSizeKnown(c)&&sameLabelSize(c,specN);
}
function cassetteMatched(){
  const c=loadedCassette(), t=tpl();
  if(!c||!t)return false;
  return cassetteMatchesSupply(c,t.specN);
}

function cassetteMismatch(){
  const c=loadedCassette(), t=tpl();
  if(!c||!t)return false;
  const known=!!c.partNumber||cassetteSizeKnown(c);
  return known&&!cassetteMatchesSupply(c,t.specN);
}

// Estimated labels remaining on the loaded roll = labelsPerRoll × supply%/100.
// Returns null when we don't know the roll capacity or supply level.
function supplyEstimate(){
  const c=loadedCassette();
  if(!c||typeof c.supplyRemainingPct!=='number'||typeof c.labelsPerRoll!=='number')return null;
  return {remaining:Math.floor(c.labelsPerRoll*c.supplyRemainingPct/100),
          perRoll:c.labelsPerRoll, pct:c.supplyRemainingPct};
}

// Live telemetry (battery / labels / ribbon %) for the active printer. Only for
// drivers that report it (M611, not M610) and only the metrics with a reading.
function telemetryHTML(){
  const pr=printer(); if(!pr||!pr.supportsTelemetry) return "";
  const c=loadedCassette(); if(!c) return "";
  const f=supplyForecast();   // {labels,ribbon} | null — caution when the job may exhaust a supply
  const warn=(t)=>` <span title="${t}" style="color:var(--warn)">⚠</span>`;
  const parts=[];
  if(typeof c.batteryPct==='number')         parts.push(`Battery ${c.batteryPct}%${c.acConnected?" ⚡":""}`);
  if(typeof c.supplyRemainingPct==='number') parts.push(`Labels ${c.supplyRemainingPct}%${(f&&f.labels)?warn("This job may need more labels than remain"):""}`);
  if(typeof c.ribbonRemainingPct==='number') parts.push(`Ribbon ${c.ribbonRemainingPct}%${(f&&f.ribbon)?warn("This job may need more ribbon than remains"):""}`);
  if(!parts.length) return "";
  return `<div title="Live printer telemetry" style="font-size:11px;color:var(--text2);white-space:nowrap">${parts.join(" · ")}</div>`;
}

// Supply-exhaustion forecast for the active job (telemetry printers only). Returns
// {labels, ribbon} — true where the job is likely to run that supply out — or null when
// not applicable / not computable. A 2% safety buffer is applied to the remaining amount
// (warn when the job would consume more than 98% of what telemetry reports remaining).
// Die-cut: compares label COUNT vs remaining count. Continuous: compares total LENGTH vs
// remaining roll length. Ribbon: total feed length vs remaining ribbon length (ribbon % of
// the driver's known full-ribbon length).
function supplyForecast(){
  const pr=printer(); if(!pr||!pr.supportsTelemetry) return null;
  const c=loadedCassette(); if(!c) return null;
  const n=printCount(); if(n<=0) return null;
  const t=tpl(); const spec=t?blBy(t.specN):null;
  const BUF=0.98;
  const cont=(typeof c.isContinuous==='boolean')?c.isContinuous:(spec?spec.ty==="continuous":false);
  // Feed length consumed per label (inches): continuous = the user-set length; die-cut =
  // the physical label height (≈ the roll pitch). Drives both ribbon and continuous media.
  const contLen=(t&&t.labelLengthInches>0)?t.labelLengthInches:(spec?spec.ph:0);
  const perFeedIn=cont?contLen:((c.labelHeightMils>0)?c.labelHeightMils/1000:(spec?spec.th:0));
  let labels=false, ribbon=false;
  if(cont){
    const rollFt=+c.rollLengthFeet||0;
    if(contLen>0 && rollFt>0 && typeof c.supplyRemainingPct==='number'){
      const remainIn=(c.supplyRemainingPct/100)*rollFt*12;
      if(n*contLen > remainIn*BUF) labels=true;
    }
  } else {
    const per=+c.labelsPerRoll||0;
    if(per>0 && typeof c.supplyRemainingPct==='number'){
      const remain=(c.supplyRemainingPct/100)*per;
      if(n > remain*BUF) labels=true;
    }
  }
  const ribLenIn=+pr.ribbonLengthInches||0;
  if(ribLenIn>0 && perFeedIn>0 && typeof c.ribbonRemainingPct==='number'){
    const remainIn=(c.ribbonRemainingPct/100)*ribLenIn;
    if(n*perFeedIn > remainIn*BUF) ribbon=true;
  }
  return {labels, ribbon};
}

// Pre-flight: printer-reported errors that should block a print until fixed
// (printhead open / invalid supply / invalid ribbon). Returns a description or null.
function cassettePreflightError(){
  const c=loadedCassette(); if(!c) return null;
  const e=[];
  if(c.printheadOpen)    e.push("printhead open");
  if(c.substrateInvalid) e.push("invalid supply");
  if(c.ribbonInvalid)    e.push("invalid ribbon");
  return e.length ? e.join(" · ") : null;
}
function preflightHTML(){
  const e=cassettePreflightError();
  if(!e) return "";
  return `<div style="display:flex;align-items:center;gap:6px">`
       + `<span title="Fix this on the printer, then re-detect the supply" style="font-size:11px;color:var(--red);font-weight:600;white-space:nowrap">⚠ ${e}</span>`
       + `<button class="btn" onclick="detectCassette()" title="Re-read the loaded supply from the printer" style="padding:2px 8px;font-size:10px">Re-detect</button></div>`;
}

// BM (bulk box) and M6 (small roll) are the same label in different packaging,
// so show the required supply as "BM/M6-<core>" and treat either as a match.
function requiredSupplyDisplay(specN){
  const core=supplyCore(specN);
  return core ? "BM/M6-"+core : (specN||"");
}

// Format an inch value, e.g. 1.5 -> 1.5", 1 -> 1".
function fmtIn(v){ return (v==null?"—":(+v).toString())+'"'; }

// ── "Buy" — open the Brady page for the selected supply's part numbers ──────────
// Escape for a single-quoted JS literal inside a double-quoted HTML attribute.
function jesc(s){ return String(s==null?"":s).replace(/\\/g,"\\\\").replace(/&/g,"&amp;").replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
// Open a part number's purchase page: its override URL when set, else a Brady
// part-number search (their per-product URLs change; a search always resolves).
function buyPart(pn,url){
  const dest=(url&&(""+url).trim())?(""+url).trim():('https://www.bradyid.com/searchresults?Ntt='+encodeURIComponent(pn));
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"openURL",payload:{url:dest}});
}
// The label on a part's buy button: die-cut "PN/250", continuous "Vinyl PN/50'".
function partBuyLabel(l,p){
  if(l.ty==="continuous"){
    const mat=(p.mat||"").trim();
    const len=(p.lenFt!=null&&+p.lenFt>0)?("/"+(+p.lenFt)+"'"):"";
    return (mat?mat+" ":"")+p.pn+len;
  }
  const qty=(p.qty!=null&&+p.qty>0)?("/"+p.qty):"";
  return p.pn+qty;
}
// Buy buttons (one per part number) for the selected template's supply — matches the
// designer: roll + bulk box side by side, each combining the part number + quantity.
function buyMoreControl(specN){
  const s=blBy(specN); if(!s)return "";
  const parts=(s.parts&&s.parts.length)?s.parts:[{pn:s.n}];
  const bs='class="btn" style="padding:3px 9px;font-size:11px;white-space:nowrap"';
  const btns=parts.map(p=>`<button ${bs} onclick="buyPart('${jesc(p.pn)}','${jesc(p.url||"")}')" title="Buy ${escAttr(p.pn)} on Brady">${esc(partBuyLabel(s,p))} ↗</button>`).join("");
  return`<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:7px">${btns}</div>`;
}

// Called by Swift when detected cassette info changes (auto-detect or manual).
function updateCassettes(map){
  window._cassettes=map||{};
  if(P.view!=="editor")R();
}

function detectCassette(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"detectCassette",payload:{printerID:P.activePrinter}});
    showToast("Detecting cassette…");
  }
}

// Result of a user-initiated detect, pushed from Swift. On success the supply
// display updates via updateCassettes(); here we just surface failure/busy.
function cassetteDetectResult(ok,busy){
  if(busy) showToast("Printer busy — finish the print first");
  else if(!ok) showToast("Couldn't read the cassette — reseat the supply and try again");
  else showToast("Cassette detected");
}

// ── Print bar ─────────────────────────────────────────────────────────────────
function buildPrintBar(){

  // Two-row bar so the window needn't be as wide: LEFT = Labels (top) over Print range

    <!-- LEFT column: Labels selection (top) + Print range (bottom) -->

        <button class="btn" onclick="toggleAll()" style="padding:3px 8px;font-size:11px">${nSel===total?"Deselect all":"Select all"}</button>
        <div style="width:1px;height:14px;background:var(--bd2)"></div>
        <button class="btn" onclick="selectSide('Source')" style="padding:3px 8px;font-size:11px;color:var(--accent);border-color:rgba(108,142,245,0.3)">Sources</button>
        <button class="btn" onclick="selectSide('Destination')" style="padding:3px 8px;font-size:11px;color:var(--green);border-color:rgba(92,200,150,0.3)">Destinations</button>
        <span style="color:var(--text2);font-size:12px">${nSel} of ${total}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1px">Print</span>
        ${["selected","all","range"].map(v=>`
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid ${P.printRange===v?"var(--accent)":"var(--bd3)"};background:${P.printRange===v?"rgba(108,142,245,0.12)":"transparent"}">
            <input type="radio" name="prange" value="${v}" ${P.printRange===v?"checked":""} onchange="P.printRange='${v}';R()" style="display:none">
            <span style="color:${P.printRange===v?"var(--text)":"var(--text2)"};font-size:11px">${v==="selected"?"Selected ("+nSel+")":v==="all"?"All ("+total+")":"Range"}</span>
          </label>`).join("")}
        ${P.printRange==="range"?`
          <input type="number" class="inp" min="1" max="${total}" value="${Math.min(P.rangeFrom,total)}" style="width:54px;padding:3px 6px;font-size:11px" onchange="P.rangeFrom=Math.max(1,Math.min(parseInt(this.value)||1,Math.min(P.rangeTo,${total})));R()">
          <span style="color:var(--text3)">–</span>
          <input type="number" class="inp" min="1" max="${total}" value="${Math.min(P.rangeTo,total)}" style="width:54px;padding:3px 6px;font-size:11px" onchange="P.rangeTo=Math.max(P.rangeFrom,Math.min(parseInt(this.value)||${total},${total}));R()">
          <span style="color:var(--text3);font-size:11px">(${Math.max(0,Math.min(P.rangeTo,total)-P.rangeFrom+1)})</span>`:""}
      </div>
    </div>

    <div style="flex:1;min-width:8px"></div>

    <!-- RIGHT column: printer + cut + feed (top) / supplies level (bottom) -->
    <div style="display:flex;flex-direction:column;gap:8px;justify-content:center;align-items:flex-end">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:flex-end">
        <!-- Printer selector -->
        <div style="display:flex;align-items:center;gap:8px">
          <div style="position:relative">
            <select class="inp" style="width:220px;padding:5px 28px 5px 32px;appearance:none;-webkit-appearance:none;cursor:pointer"
              onchange="P.activePrinter=this.value;R()">
              ${(window._swiftPrinters||PRINTERS).length===0
                ? `<option value="">No printers connected</option>`
                : (window._swiftPrinters||PRINTERS).map(p=>`<option value="${escAttr(p.id)}" ${P.activePrinter===p.id?"selected":""}>${esc(p.name)}${p.serial?" — "+esc(p.serial):""}</option>`).join("")}
            </select>
            <div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;background:${pr.status==="ready"?"var(--green)":pr.status==="busy"?"var(--warn)":"var(--red)"};pointer-events:none"></div>

          <div style="font-size:11px;${pr.status==="ready"?"color:var(--green)":pr.status==="busy"?"color:var(--warn)":"color:var(--red)"}">

            <div style="position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:9px;pointer-events:none">▼</div>

        })()}

      <span>Print ${pCount} label${pCount!==1?"s":""}</span>
      <span style="font-size:9px;opacity:0.7;font-weight:400">⌘ Return</span>

}

function printCount(){ return printIndices().length; }
// Whether the Print button (and ⌘Return shortcut) is enabled right now.
function canPrintNow(){ const t=tpl(),pr=printer(); return !!(t&&printCount()>0&&pr.status==="ready"&&!cassettePreflightError()); }

// Move the previewed/highlighted record up or down through the visible (filtered)
// rows, then scroll it into view. Used by the up/down arrow keys.
function previewStep(delta){
  const vis=visibleIndices();
  if(!vis.length)return;
  const pos=vis.indexOf(P.previewIdx);
  P.previewIdx = pos<0 ? vis[0] : vis[Math.min(vis.length-1,Math.max(0,pos+delta))];
  P.lastClickIdx=null;
  R();
  const el=document.querySelector("#recScroll .rec-row.active-preview");
  if(el&&el.scrollIntoView) el.scrollIntoView({block:"nearest"});
}

// Global shortcuts for the print window.
window.addEventListener("keydown",function(e){
  const ae=document.activeElement, tag=ae&&ae.tagName;
  const inInput = tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT"||(ae&&ae.isContentEditable);
  const modalOpen = P.modal||document.querySelector(".modal-overlay")||document.getElementById("vl-filter-modal");
  // While editing a cell: Enter saves, Escape cancels, and no other shortcut fires.
  // (Other Enter/Escape behaviours below stay active when NOT editing a cell.)
  if(P.editCell){
    if(e.key==="Enter"||e.key==="Return"){ e.preventDefault(); saveCellEdit(); }
    else if(e.key==="Escape"){ e.preventDefault(); cancelCellEdit(); }
    return;
  }
  // Escape closes the expanded preview.
  if(e.key==="Escape"&&P.modal==="preview"){ e.preventDefault(); closeExpandedPreview(); return; }
  if(e.key==="Escape"&&(P.modal==="confirmMismatch"||P.modal==="confirmSupply")){ e.preventDefault(); P.modal=null; R(); return; }
  // ⌘Return (or Ctrl+Return) prints, mirroring the Print button.
  if((e.metaKey||e.ctrlKey)&&(e.key==="Enter"||e.key==="Return")){
    if(modalOpen||!canPrintNow())return;
    e.preventDefault();
    doPrint();
    return;
  }
  // Up/Down arrows advance the previewed record through the records list.
  if((e.key==="ArrowDown"||e.key==="ArrowUp")&&!inInput&&!modalOpen&&!e.metaKey&&!e.ctrlKey&&!e.altKey){
    e.preventDefault();
    previewStep(e.key==="ArrowDown"?1:-1);
  }
});

// Build the record indices to print, honoring the current print range AND the
// active filter (range is over the visible position, not absolute index).
function printIndices(){
  const vis=visibleIndices();
  if(P.printRange==="all") return vis;
  if(P.printRange==="selected") return vis.filter(i=>P.selected.has(i));
  if(P.printRange==="range"){
    const out=[];
    for(let p=P.rangeFrom-1;p<P.rangeTo&&p<vis.length;p++) out.push(vis[p]);
    return out;
  }
  return [];
}

// The payload body describing the configured job, shared by Print and Cancel.
function buildPrintPayloadBody(indices){
  const t=tpl();
  const pr=printer();
  return {
    printerID: pr.id,
    title: buildJobTitle(indices),
    templateName: t?t.name:"",
    templateID: t?t.id:"",
    recordIndices: indices,
    printRange: P.printRange,
    rangeFrom: P.rangeFrom,
    rangeTo: P.rangeTo,
    filter: P.filter,
    sort: P.sort,
    cutMode: effCutMode(),   // Phase 6 cut setting → PrintJobFile.cutMode
    feedToClear: feedToClearOn(),   // per-printer; false unless this printer supports it
  };
}

// A stable signature of the user-configurable job state (excludes printer/title),
// so ✕ Cancel can tell whether the user actually configured anything vs. just
// opened-then-dismissed the auto-popped window.
function printConfigSig(){
  const b=buildPrintPayloadBody(printIndices());
  return JSON.stringify({sel:(b.recordIndices||[]).slice().sort((a,c)=>a-c),
    pr:b.printRange, rf:b.rangeFrom, rt:b.rangeTo, t:b.templateID, f:b.filter, s:b.sort});
}

// Confirmation shown when Print is pressed and the job may exhaust the loaded supply.
// Cancel dismisses; "Print anyway" advances past the supply check (stage 1).
function buildSupplyConfirmModal(){
  const f=P._forecast||{};
  const what=(f.labels&&f.ribbon)?"labels and ribbon":(f.labels?"labels":"ribbon");
  return `<div class="modal-overlay" onclick="if(event.target===this){P.modal=null;R()}">
    <div class="modal" style="width:440px">
      <div class="modal-title" style="display:flex;align-items:center;gap:8px"><span style="color:var(--warn)">⚠</span> May run out of supply</div>
      <div style="color:var(--text2);font-size:13px;line-height:1.6;margin:6px 0 18px">
        This job may require more <b style="color:var(--text)">${what}</b> than the loaded supply has. Print anyway?
      </div>
      <div class="modal-footer" style="display:flex;justify-content:flex-end;gap:8px">
        <button class="btn" onclick="P.modal=null;R()">Cancel</button>
        <button class="btn primary" onclick="P.modal=null;doPrint(1)">Print anyway</button>
      </div>
    </div>
  </div>`;

function doPrint(stage){
  const n=printCount();
  if(n===0)return;
  // Staged confirmations so neither masks the other: 0 = supply forecast, 1 = size
  // mismatch, ≥2 = send. Each modal's "Print anyway" calls doPrint(nextStage).
  stage=(typeof stage==="number")?stage:0;

  // Stage 0: warn if the job may exhaust the loaded labels/ribbon (telemetry printers).
  if(stage<=0){
    const f=supplyForecast();
    if(f && (f.labels||f.ribbon)){ P._forecast=f; P.modal="confirmSupply"; R(); return; }
  }
  // Stage 1: confirm before printing when the loaded label size doesn't match the template.
  if(stage<=1 && cassetteMismatch()){ P.modal="confirmMismatch"; R(); return; }

  const indices=printIndices();
  const payload={ action:"print", payload:buildPrintPayloadBody(indices) };

  // If running inside the Swift app, post to native bridge
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage(payload);
    P.modal="printing";
    P._printProgress={done:0,total:n};
    R();
    // Swift will call updatePrintProgress() / completePrint() as labels send
  } else {
    // Browser demo: simulate progress
    P.modal="printing";R();
    let done=0;
    const iv=setInterval(()=>{
      done+=Math.ceil(Math.random()*3);
      if(done>=n){done=n;clearInterval(iv);P.modal="done";R();}
      else{P._printProgress={done,total:n};renderProgress();}
    },120);
  }
}

function buildJobTitle(indices){
  if(!indices.length)return"Print job";
  const nums=[...new Set(indices.map(i=>P.records[i]&&P.records[i].Number).filter(Boolean))];
  const file=P.sourceFile.replace(/_export_\d{8}_\d{6}\.csv$/i,"").replace(/_/g," ");
  if(nums.length===0)return file+" — "+indices.length+" labels";
  if(nums.length===1)return file+" — "+nums[0];
  return file+" — "+nums[0]+"–"+nums[nums.length-1];
}

// Called by Swift to update print progress
function updatePrintProgress(done,total){
  P._printProgress={done,total};
  renderProgress();
}

// Called by Swift when all labels are done
function completePrint(){
  P.modal="done";R();
}

// Called by Swift to cancel the job
function cancelPrint(){
  P.modal=null;P._printProgress=null;R();
}

function renderProgress(){
  const el=document.getElementById("print-progress");
  if(!el)return;
  const {done,total}=P._printProgress||{done:0,total:1};
  const pct=Math.round(done/total*100);
  el.querySelector(".prog-bar").style.width=pct+"%";
  el.querySelector(".prog-txt").textContent=`Printing label ${done} of ${total}…`;
}

// ── Load template file ────────────────────────────────────────────────────────
async function loadTemplateFile(){
  if(window.showOpenFilePicker){
    try{
      const [fh]=await window.showOpenFilePicker({
        startIn:"documents",
        types:[{description:"VectorLabel Template",accept:{"application/json":[".json",".vlt.json"]}}],
        multiple:false
      });
      const file=await fh.getFile();
      const text=await file.text();
      const data=JSON.parse(text);
      if(!data.objs)throw new Error("Not a VectorLabel template");
      const dup=P.templates.findIndex(t=>t.name===data.name);
      if(dup>=0)P.templates[dup]=data;
      else P.templates.push(data);
      P.activeTpl=P.templates.length-1;
      R();
    }catch(e){if(e.name!=="AbortError")alert("Error: "+e.message);}
  }else{
    const inp=document.createElement("input");inp.type="file";inp.accept=".json,.vlt.json";
    inp.onchange=async()=>{
      const file=inp.files[0];if(!file)return;
      try{
        const data=JSON.parse(await file.text());
        if(!data.objs)throw new Error("Not a VectorLabel template");
        P.templates.push(data);P.activeTpl=P.templates.length-1;R();
      }catch(e){alert("Error: "+e.message);}
    };
    inp.click();
  }
}
