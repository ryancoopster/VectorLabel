<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- Defense in depth: restrict images to local/data, block plugins, remote
     connections (exfil), and base-uri. (No script-src so the app's inline scripts
     keep working; untrusted template fields are sanitized on import.) -->
<meta http-equiv="Content-Security-Policy" content="img-src 'self' data:; object-src 'none'; connect-src 'none'; base-uri 'none'">
<title>VectorLabel Template Designer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg2:#13131a;--canvas:#0d0d14;--surface:#1a1a28;--surface2:#252538;--surface3:#2a2a42;--surface4:#333350;--text:#e8e8f0;--text-soft:#cfcfe0;--text2:#8888a8;--text3:#44445a;--accent:#6C8EF5;--accent2:#4a6cd4;--accent-soft:#aab4e8;--green:#5cc896;--warn:#f5c96c;--red:#f56c6c;--bd1:rgba(255,255,255,0.05);--bd2:rgba(255,255,255,0.08);--bd3:rgba(255,255,255,0.1);--bd4:rgba(255,255,255,0.14);--bd5:rgba(255,255,255,0.2)}
html[data-theme="light"]{--bg2:#e6e8ee;--canvas:#c9ccd4;--surface:#ffffff;--surface2:#eceef3;--surface3:#e1e4ec;--surface4:#d2d6e0;--text:#1b1c24;--text-soft:#2c2d36;--text2:#5d6070;--text3:#9499a8;--accent:#4a6cd4;--accent2:#3a5ec4;--accent-soft:#3550b0;--green:#1f9d63;--warn:#b5790a;--red:#d63b3b;--bd1:rgba(0,0,0,0.06);--bd2:rgba(0,0,0,0.10);--bd3:rgba(0,0,0,0.13);--bd4:rgba(0,0,0,0.17);--bd5:rgba(0,0,0,0.24)}
html,body{height:100%;overflow:hidden;background:var(--bg2);color:var(--text);font-family:system-ui,sans-serif;font-size:13px}
input,select,button,textarea{font-family:system-ui,sans-serif;font-size:12px}
.inp{background:var(--surface3);border:1px solid var(--bd4);color:var(--text);border-radius:4px;padding:4px 8px;outline:none;width:100%}
.inp:focus{border-color:var(--accent)}
.btn{background:var(--surface3);border:1px solid var(--bd4);color:var(--text2);border-radius:4px;padding:4px 9px;cursor:pointer;font-size:11px;white-space:nowrap}
.btn:hover{background:var(--surface4)}
.btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--surface3);border:1px solid var(--bd4);color:var(--text2);border-radius:5px;padding:6px 0;cursor:pointer;font-size:10px;width:56px}
.tbtn:hover{background:var(--surface4)}
.fbtn{background:var(--surface);border:1px solid var(--bd2);color:var(--text2);border-radius:3px;padding:2px 7px;font-size:11px;cursor:pointer}
.fbtn:hover{background:var(--surface3);color:var(--text)}
.recrow{cursor:pointer;border-bottom:1px solid var(--bd1)}
.recrow:hover td{background:rgba(108,142,245,0.06)}
.recrow.selrow td{background:rgba(108,142,245,0.14)}
label.lbl{font-size:10px;color:var(--text2);display:block;margin-bottom:3px}
.sec{color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:2px}
.fmt-btn{background:var(--surface3);border:1px solid var(--bd4);color:var(--text2);border-radius:3px;padding:3px 7px;cursor:pointer;font-size:12px;font-weight:700;min-width:26px}
.fmt-btn:hover{background:var(--surface4)}
.fmt-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.divider{border:none;border-top:1px solid var(--bd2);margin:10px 0}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--surface);border:1px solid var(--bd4);border-radius:8px;padding:24px;min-width:420px;max-width:560px;box-shadow:0 8px 40px rgba(0,0,0,0.6)}
.modal-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;letter-spacing:-.2px}
.modal-row{margin-bottom:14px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;border-top:1px solid var(--bd2);padding-top:16px}
.tpl-card{background:var(--surface2);border:1px solid var(--bd3);border-radius:6px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.tpl-card:hover{background:var(--surface3);border-color:var(--accent)}
.tpl-card.active{border-color:var(--accent);background:var(--surface3)}
.tpl-preview{width:60px;height:20px;background:#fff;border:1px solid #ccc;border-radius:2px;flex-shrink:0;position:relative;overflow:hidden}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag.src{background:rgba(108,142,245,0.2);color:var(--accent)}
.tag.dst{background:rgba(108,200,150,0.2);color:var(--green)}
/* Database-pane record browser (custom mode). Ported from the Print window so the
   per-row checkboxes + hover-to-edit ✎ behave identically. */
.rec-row:hover{background:rgba(108,142,245,0.06)}
.rec-cell{position:relative}
.cell-edit{position:absolute;top:50%;right:3px;transform:translateY(-50%);opacity:0;border:1px solid var(--bd3);background:var(--surface);color:var(--text2);border-radius:3px;font-size:9px;line-height:1;padding:2px 4px;cursor:pointer;z-index:5}
.rec-row:hover .cell-edit{opacity:.85}
.cell-edit:hover{opacity:1;color:var(--accent);border-color:var(--accent)}
.cb{width:14px;height:14px;border:1.5px solid var(--bd5);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:var(--bg2)}
.cb.chk{background:var(--accent);border-color:var(--accent)}
.cb.partial{background:var(--surface3);border-color:var(--accent)}
.check-tick{color:#fff;font-size:9px;line-height:1}
/* Draggable column headers/chips must not start a text selection on mousedown, so
   the native HTML5 drag (drag-to-map / reorder) wins wherever you grab them —
   otherwise grabbing on the label text highlights it instead of starting a drag. */
[draggable="true"]{-webkit-user-select:none;user-select:none}
</style>

const FD=[
  {f:"Number",c:"Number"},{f:"Cable Name",c:"Cable"},{f:"Signal",c:"Signal"},
  {f:"Connector",c:"Connector"},{f:"Device Name",c:"Device_Name"},{f:"Device Tag",c:"Device_Tag"},
  {f:"Socket Name",c:"Socket_Name"},{f:"Socket Tag",c:"Socket_Tag"},
  {f:"Other Device",c:"Other_Device"},{f:"Other Socket",c:"Other_Socket"},
  {f:"Other Connector",c:"Other_Connector"},{f:"Rack",c:"Rack"},{f:"Room",c:"Room"},

];

// ── Field/column source ─────────────────────────────────────────────────────────
// The list of {f:label, c:column} a text object's Field mode and the formula
// engine bind to. The classic Template Designer always uses the fixed wire-export
// FD list above. The Custom Designer, once a CSV/XLSX is bound, derives this list
// from that file's columns (label == column name) so field-mode dropdowns, the
// formula field buttons, and formula name resolution all speak the imported data's
// columns — reusing the exact same field/column mechanism as the print path.
function fieldDefs(){
  if(isCustomMode()&&window._boundData&&Array.isArray(window._boundData.columns)&&window._boundData.columns.length)
    return window._boundData.columns.map(c=>({f:c,c:c}));
  return FD;
}

// ── Formula engine ────────────────────────────────────────────────────────────
function tokenize(expr){
  const t=[];let i=0;
  while(i<expr.length){
    if(/\s/.test(expr[i])){i++;continue;}
    if(expr[i]==='"'){let j=i+1,s="";while(j<expr.length&&expr[j]!=='"')s+=expr[j++];t.push({k:"s",v:s});i=j+1;continue;}
    if(/\d/.test(expr[i])){let j=i;while(j<expr.length&&/[\d.]/.test(expr[j]))j++;t.push({k:"n",v:parseFloat(expr.slice(i,j))});i=j;continue;}
    if(expr[i]==='&'){t.push({k:"a"});i++;continue;}
    if(expr[i]==='<'&&expr[i+1]==='>'){t.push({k:"ne"});i+=2;continue;}
    if(expr[i]==='='){t.push({k:"eq"});i++;continue;}
    if(expr[i]===','){t.push({k:"cm"});i++;continue;}
    if(expr[i]==='('){t.push({k:"lp"});i++;continue;}
    if(expr[i]===')'){ t.push({k:"rp"});i++;continue;}
    if(/[A-Za-z_]/.test(expr[i])){let j=i;while(j<expr.length&&/[A-Za-z0-9_ ]/.test(expr[j]))j++;t.push({k:"id",v:expr.slice(i,j).trimEnd()});i=j;continue;}
    i++;
  }
  return t;
}
function evalToks(toks,vars){
  let p=0;const pk=()=>toks[p],cs=()=>toks[p++];
  function rv(n){if(n in vars)return vars[n];const f=fieldDefs().find(x=>x.f.toLowerCase()===n.toLowerCase()||x.c.toLowerCase()===n.toLowerCase());return f?(vars[f.c]??""):n;}
  function pp(){
    const t=pk();if(!t)return"";
    if(t.k==="s"){cs();return t.v;}
    if(t.k==="n"){cs();return t.v;}
    if(t.k==="id"){
      const name=t.v;cs();
      if(pk()?.k==="lp"){
        cs();const args=[];
        while(pk()&&pk().k!=="rp"){args.push(pe());if(pk()?.k==="cm")cs();}cs();
        const fn=name.toUpperCase();
        if(fn==="IF")return args[0]?(args[1]??""):(args[2]??"");
        if(fn==="LEFT")return String(args[0]??"").slice(0,args[1]??1);
        if(fn==="RIGHT"){const s=String(args[0]??"");return s.slice(s.length-(args[1]??1));}
        if(fn==="LEN")return String(args[0]??"").length;
        if(fn==="UPPER")return String(args[0]??"").toUpperCase();
        if(fn==="LOWER")return String(args[0]??"").toLowerCase();
        if(fn==="TRIM")return String(args[0]??"").trim();
        if(fn==="MID")return String(args[0]??"").slice((args[1]??1)-1,((args[1]??1)-1)+(args[2]??1));
        return"";}
      if(pk()?.k==="ne"||pk()?.k==="eq"){const op=cs().k;const r=pp();const l=rv(name);return op==="ne"?l!==String(r):l===String(r);}
      return rv(name);}
    if(t.k==="lp"){cs();const v=pe();if(pk()?.k==="rp")cs();return v;}
    cs();return"";
  }
  function pe(){let l=pp();while(pk()?.k==="a"){cs();l=String(l??"")+String(pp()??"");}return l;}
  return pe();
}
function evalF(formula,rec){
  if(!formula||!formula.trim())return{v:"",e:null};
  if(!formula.startsWith("="))return{v:formula,e:null};
  const m={};fieldDefs().forEach(f=>{m[f.f]=rec[f.c]??"";m[f.c]=rec[f.c]??""});
  try{return{v:String(evalToks(tokenize(formula.slice(1)),m)??""),e:null};}
  catch(err){return{v:"",e:err.message};}
}

// Text source mode for a tx object. Legacy objects (only `f`) → formula.
function txMode(o){ return o.mode || (o.field?"field":((o.text!==undefined&&!o.f)?"static":"formula")); }

// The string a text object displays for a given record, honoring its mode.
function textValue(o,rec){
  const m=txMode(o);
  if(m==="static") return {v:(o.text!=null?o.text:""),e:null};
  if(m==="field"){ if(!o.field)return{v:"",e:null}; const v=rec?rec[o.field]:undefined; return {v:(v==null?"":String(v)),e:null}; }
  return rec?evalF(o.f,rec):{v:(o.f||"").replace(/^=/,""),e:null};
}

// Auto-scale: return the largest font px ≤ basePx such that the single line fits
// the box width. Measures with a canvas 2d context (no DOM). `pad` is total
// horizontal padding in px.
function autoFitPx(text,o,basePx,boxW,pad){
  if(!text) return basePx;
  const cx=autoFitPx._c||(autoFitPx._c=document.createElement('canvas').getContext('2d'));
  cx.font=(o.italic?'italic ':'')+(o.bold?700:400)+' '+basePx+'px "'+(o.font||'Helvetica Neue')+'"';
  let w=cx.measureText(text).width;
  if(o.tracking) w+=o.tracking*Math.max(0,String(text).length-1);
  w*=((o.stretch||100)/100);
  const avail=boxW-(pad||0);
  if(w<=avail||w<=0) return basePx;
  return Math.max(3,basePx*(avail/w));
}

// True only in the Custom Designer (Swift injects window._designerMode='custom'
// at document start). Gates the print header + print path. The Template Designer
// never sets this, so it looks/behaves exactly as before.
function isCustomMode(){ return window._designerMode==='custom'; }
// The default/new-document title: a Custom Design in custom mode, a Template
// otherwise. Used by the default state, the New modal, and every place that
// previously hard-coded "Untitled Template".
function defaultDocName(){ return isCustomMode()?'Untitled Custom Design':'Untitled Template'; }
// Persisted snap/grid prefs — Swift injects on load, we post on change.
function initDesignerPrefs(p){
  if(!p)return;
  if(typeof p.snapGrid==='boolean')S.snapGrid=p.snapGrid;
  if(typeof p.snapObjects==='boolean')S.snapObjects=p.snapObjects;
  if(typeof p.gridSize==='number')S.gridSize=p.gridSize;
  if(typeof p.recH==='number'&&p.recH>0)S.recH=p.recH;
  if(typeof p.propW==='number'&&p.propW>0)S.propW=Math.max(PROP_MIN,Math.min(PROP_MAX,p.propW));
  R();
}
function saveDesignerPrefs(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"setDesignerPrefs",payload:{snapGrid:S.snapGrid,snapObjects:S.snapObjects,gridSize:S.gridSize,recH:S.recH||160,propW:S.propW||PROP_DEFAULT}});
}
function gobj(id){return S.objs.find(o=>o.id===id);}
function uobj(id,p){S.objs=S.objs.map(o=>o.id===id?Object.assign({},o,p):o);}

// ── Multi-selection ────────────────────────────────────────────────────────────
// S.selId is the "primary" (anchor / single-object props) selection; S.selIds is
// the full set (always includes selId when non-empty). Single-select code paths
// throughout just set S.selId directly — normSel() then collapses selIds to match,
// so only the explicit multi-select paths below produce a multi-selection.
function setSel(id){ S.selId=id; S.selIds=id?[id]:[]; }
function toggleSel(id){
  if(!gobj(id))return;
  S.selIds=(S.selIds||[]).slice();
  const i=S.selIds.indexOf(id);
  if(i>=0){ S.selIds.splice(i,1); if(S.selId===id) S.selId=S.selIds[S.selIds.length-1]||null; }
  else { S.selIds.push(id); S.selId=id; }
  S._ef=(S.selId?((gobj(S.selId)||{}).f):undefined);
  S.editingId=null;
}
function normSel(){
  if(!S.selIds)S.selIds=[];
  S.selIds=S.selIds.filter(id=>S.objs.some(o=>o.id===id));
  if(S.selId && !S.selIds.includes(S.selId)) S.selIds=[S.selId];
  if(!S.selId) S.selIds=[];
}

// ── Continuous-supply label length ──────────────────────────────────────────────
// Continuous (tape) supplies have no fixed height — the user sets the printed
// label LENGTH (inches) along the feed. We expose a length field for them and
// carry the value into rendering, printing and saving. Die-cut supplies ignore
// it (fixed catalog height).
function specIsContinuous(specN){ const s=BL.find(l=>l.n===specN); return !!(s&&s.ty==="continuous"); }
function dContinuous(){ return specIsContinuous(S.spec.n); }
// Default cut mode for a supply: continuous tape cuts after every label; die-cut
// stock is pre-cut so the cutter never fires (Phase 6).
function dDefaultCutMode(specN){
  const s=BL.find(l=>l.n===specN);
  if(s&&s.ty==="continuous")return "eachLabel";
  if(s&&s.ty==="dieCut")return "never";
  return "afterJobLast";
}
// Effective cut mode: explicit choice, else per-stock default for the current supply.
function dEffCutMode(){ return S.cutMode||dDefaultCutMode(S.spec&&S.spec.n); }
// Bounds for the chosen length (inches). Generous range; default to the catalog ph.
const LEN_MIN=0.25, LEN_MAX=24;
function dDefaultLen(specN){ const s=BL.find(l=>l.n===specN); return s?s.ph:1; }
// The effective chosen length for the current supply (inches). null/0 ⇒ default.
function dEffLen(){
  if(!dContinuous())return null;
  const v=parseFloat(S.labelLen);
  if(isFinite(v)&&v>0) return Math.min(LEN_MAX,Math.max(LEN_MIN,v));
  return dDefaultLen(S.spec.n);
}
// Rewrite S.spec to a working copy whose printable height (ph) and total height
// (th) reflect the chosen continuous length. Called at the top of R() so all the
// downstream geometry (canvas, rulers, snap) uses the live length. Die-cut
// supplies pass through unchanged. Idempotent — always re-derived from the BL
// base entry by part number.
function normSpec(){
  const base=BL.find(l=>l.n===(S.spec&&S.spec.n))||BL[1];
  if(base.ty==="continuous"){
    const len=dEffLen()||base.ph;
    if(S.canvasRot===90){
      // Landscape: the length runs horizontally, the tape width vertically.
      S.spec=Object.assign({},base,{pw:len,tw:len,ph:base.pw,th:base.pw});
    }else{
      S.spec=Object.assign({},base,{ph:len,th:len});
    }
  }else{
    S.spec=base;
  }
}
// Change the selected supply. Reset the continuous length to the new supply's
// default so a stale length never carries across supplies (die-cut clears it).
function pickSupply(specN){
  S.spec=BL.find(l=>l.n===specN)||BL[1];
  S.labelLen=specIsContinuous(specN)?dDefaultLen(specN):null;
  // Drop any explicit cut override so the new stock's sensible default applies.
  S.cutMode=null;
  S.canvasRot=0;   // reset orientation when switching supplies (#14)
  R();
}
function setLabelLen(v){
  const n=parseFloat(v);
  S.labelLen=(isFinite(n)&&n>0)?Math.min(LEN_MAX,Math.max(LEN_MIN,n)):null;
  R();
}
// Toggle the continuous-label canvas between portrait (0°) and landscape (90°).
// #14 — the Swift renderer rotates the printed raster to match (LabelRenderer).
function rotateCanvas(){
  if(!dContinuous())return;
  S.canvasRot=(S.canvasRot===90)?0:90;
  R();
}
// Apply a supply + (optional) continuous length when loading a saved template or
// document. Die-cut supplies clear the length; continuous supplies adopt the
// saved labelLengthInches (falling back to the catalog default).
function applyLoadedSpec(specN,lenInches,rot){
  S.spec=BL.find(l=>l.n===specN)||BL[1];
  if(specIsContinuous(specN)){
    const n=parseFloat(lenInches);
    S.labelLen=(isFinite(n)&&n>0)?Math.min(LEN_MAX,Math.max(LEN_MIN,n)):dDefaultLen(specN);
    S.canvasRot=(parseInt(rot)===90)?90:0;
  }else{
    S.labelLen=null;
    S.canvasRot=0;
  }
}
function selObjs(){ return (S.selIds||[]).map(id=>gobj(id)).filter(Boolean); }
function uobjAll(patch){ snapshot(); (S.selIds||[]).forEach(id=>uobj(id,patch)); R(); }

// ── Canvas ────────────────────────────────────────────────────────────────────
const SC=185;
// Bleed: objects may be placed up to this many inches beyond the printable area
// on any side. Only the printable area actually prints (the Swift renderer
// clips to it); the bleed just lets you overhang the edges in the designer.
const BLEED_IN=2;

// ── Column widths — Live editor record table ───────────────────────────────────
// Matches print screen columns but saved separately so widths are independent.
const ED_COL_DEFAULTS={side:90,number:72,cable:150,signal:72,device:160,socket:150};
let ED_COLS=(()=>{
  try{const s=localStorage.getItem('vl-ed-col-widths');if(s)return Object.assign({},ED_COL_DEFAULTS,JSON.parse(s));}catch(e){}
  return Object.assign({},ED_COL_DEFAULTS);
})();
function saveEdCols(){try{localStorage.setItem('vl-ed-col-widths',JSON.stringify(ED_COLS));}catch(e){}}
function applyEdColVars(){
  const r=document.documentElement;
  r.style.setProperty('--edr-side',   ED_COLS.side+'px');
  r.style.setProperty('--edr-number', ED_COLS.number+'px');
  r.style.setProperty('--edr-cable',  ED_COLS.cable+'px');
  r.style.setProperty('--edr-signal', ED_COLS.signal+'px');
  r.style.setProperty('--edr-device', ED_COLS.device+'px');
  r.style.setProperty('--edr-socket', ED_COLS.socket+'px');
}
function startEdColResize(e,col){
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget;el.classList.add('dragging');
  const startX=e.clientX,startW=ED_COLS[col];
  function mv(e){ED_COLS[col]=Math.max(40,startW+(e.clientX-startX));applyEdColVars();}
  function mu(){el.classList.remove('dragging');saveEdCols();window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',mu);}
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',mu);
}

// ── Shared record-column system (order, visibility, widths) ────────────────────
// All three persisted bits (order/hidden/widths) are shared with the print
// window via Swift (AppSettings) and applied with applyColumnConfig().
function currentRecords(){ return window._editorRecords||RX; }
const DEFAULT_COL_W=120;
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
// Escape for an HTML attribute VALUE (adds quote escaping on top of esc()).
function escAttr(s){ return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
// Escape a string that is interpolated as a single-quoted JS string literal sitting
// INSIDE an HTML attribute (e.g. onclick="f('${jsAttr(c)}')"). Must neutralise both
// the JS-string context (backslash, quotes) AND the HTML-attribute context (the
// &<> chars) so a crafted column name can't break out and run arbitrary JS in the
// privileged WKWebView. Order matters: backslash first.
function jsAttr(s){
  return String(s)
    .replace(/\\/g,'\\\\')
    .replace(/'/g,'\\\'')
    .replace(/"/g,'&quot;')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

// Full column list (incl. hidden): saved order first, then friendly, then rest.
function recordColumns(records){
  const present=[];
  records.forEach(r=>Object.keys(r).forEach(k=>{ if(!present.includes(k)) present.push(k); }));
  const out=(window._columnOrder||[]).filter(k=>present.includes(k));
  ['_Side','Number','Cable','Signal','Device_Name','Socket_Name'].forEach(k=>{ if(present.includes(k)&&!out.includes(k)) out.push(k); });
  present.forEach(k=>{ if(!out.includes(k)) out.push(k); });
  return out;
}
function colLabel(k){ return k==='_Side'?'Side':k.replace(/_/g,' '); }
function visibleColumns(records){ const h=window._hiddenColumns||[]; return recordColumns(records).filter(c=>!h.includes(c)); }
function colWidth(c){ const w=window._colWidths&&window._colWidths[c]; return (typeof w==='number'&&w>0)?w:DEFAULT_COL_W; }
function colGridTemplate(cols){ return cols.map(c=>colWidth(c)+'px').join(' '); }

function applyColumnConfig(cfg){
  if(!cfg)return;
  if(Array.isArray(cfg.order)) window._columnOrder=cfg.order;
  if(Array.isArray(cfg.hidden)) window._hiddenColumns=cfg.hidden;
  if(cfg.widths&&typeof cfg.widths==='object') window._colWidths=cfg.widths;
  R();
}
function postColumnConfig(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"setColumnConfig",payload:{
      order:window._columnOrder||[], hidden:window._hiddenColumns||[], widths:window._colWidths||{} }});
}

// Reorder via header drag (operates on the full column list).
let _vlDragCol=null,_vlGhost=null,_vlDragTile=null,_vlOverEl=null;
function colDragStart(e,c){
  _vlDragCol=c;
  const tile=e.currentTarget;
  if(e.dataTransfer){
    e.dataTransfer.effectAllowed='move';
    try{e.dataTransfer.setData('text/plain',c);}catch(_){}
    // Drag the whole tile: clone it as the drag image so the full cell follows
    // the cursor, not just the text.
    if(tile&&tile.cloneNode){
      const cs=getComputedStyle(tile);
      const g=tile.cloneNode(true);
      g.style.cssText='position:fixed;top:-2000px;left:-2000px;box-sizing:border-box;width:'+tile.offsetWidth+'px;height:'+tile.offsetHeight+'px;background:var(--surface3);border:1px solid var(--accent);border-radius:4px;color:var(--text);opacity:0.97;display:flex;align-items:center;overflow:hidden;padding:'+cs.padding+';font:'+cs.font;
      document.body.appendChild(g); _vlGhost=g;
      try{e.dataTransfer.setDragImage(g,16,Math.max(8,tile.offsetHeight/2));}catch(_){}
    }
  }
  _vlDragTile=tile; if(tile)tile.style.opacity='0.35';
}
function colDragOver(e,el){
  e.preventDefault();
  if(e.dataTransfer)e.dataTransfer.dropEffect='move';
  if(_vlOverEl&&_vlOverEl!==el)_vlOverEl.style.boxShadow='';
  _vlOverEl=el; if(el)el.style.boxShadow='inset 3px 0 0 var(--accent)';
}
function colClearDrag(){
  if(_vlGhost){_vlGhost.remove();_vlGhost=null;}
  if(_vlDragTile){_vlDragTile.style.opacity='';_vlDragTile=null;}
  if(_vlOverEl){_vlOverEl.style.boxShadow='';_vlOverEl=null;}
}
function colDragEnd(){ colClearDrag(); }
function colDrop(e,target){
  e.preventDefault(); const drag=_vlDragCol; _vlDragCol=null; colClearDrag();
  if(!drag||drag===target)return;
  let cols=recordColumns(currentRecords());
  const from=cols.indexOf(drag), to=cols.indexOf(target);
  if(from<0||to<0)return;
  cols.splice(to,0,cols.splice(from,1)[0]);
  window._columnOrder=cols; postColumnConfig(); R();
}

// Resize via a right-edge handle on the header cell.
function colResizeStart(e,c){
  e.preventDefault(); e.stopPropagation();
  const startX=e.clientX, startW=colWidth(c);
  const hdr=e.target.closest('[data-colhdr]'); if(hdr)hdr.setAttribute('draggable','false');
  function mv(ev){ window._colWidths=window._colWidths||{}; window._colWidths[c]=Math.max(48,Math.round(startW+(ev.clientX-startX))); R(); }
  function up(){ window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); postColumnConfig(); }
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
}

// Show/hide.
function hideColumn(c){ window._hiddenColumns=Array.from(new Set([...(window._hiddenColumns||[]),c])); postColumnConfig(); R(); }
function showColumn(c){ window._hiddenColumns=(window._hiddenColumns||[]).filter(x=>x!==c); postColumnConfig(); R(); }
function toggleColumn(c){ (window._hiddenColumns||[]).includes(c)?showColumn(c):hideColumn(c); }
function colHeaderContextMenu(e,c){ e.preventDefault(); hideColumn(c); }

// One header cell: drag to reorder, right-edge to resize, right-click to hide.
function colHeaderCell(c){
  const j=jsAttr(c);
  return `<div data-colhdr draggable="true" ondragstart="colDragStart(event,'${j}')" ondragover="colDragOver(event,this)" ondragend="colDragEnd(event)" ondrop="colDrop(event,'${j}')" oncontextmenu="colHeaderContextMenu(event,'${j}')" title="Drag to reorder · right-click to hide" style="position:relative;padding:5px 8px;font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:hidden;cursor:grab;box-sizing:border-box">${esc(colLabel(c))}<div onmousedown="colResizeStart(event,'${j}')" style="position:absolute;top:0;right:0;width:6px;height:100%;cursor:col-resize"></div></div>`;
}

// Columns dropdown: checkboxes to show/hide + grab handle to reorder.
function toggleColumnsMenu(){ window._colMenuOpen=!window._colMenuOpen; R(); }
function buildColumnsMenu(){
  if(!window._colMenuOpen)return '';
  const cols=recordColumns(currentRecords());
  const hidden=new Set(window._hiddenColumns||[]);
  return `<div onclick="event.stopPropagation()" style="position:absolute;right:8px;top:26px;z-index:30;background:var(--surface);border:1px solid var(--bd4);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.5);padding:5px;max-height:280px;overflow-y:auto;min-width:190px">
    <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:3px 6px 5px">Columns</div>
    ${cols.map(c=>`<div draggable="true" ondragstart="colDragStart(event,'${jsAttr(c)}')" ondragover="colDragOver(event,this)" ondragend="colDragEnd(event)" ondrop="colDrop(event,'${jsAttr(c)}')" style="display:flex;align-items:center;gap:7px;padding:3px 6px;border-radius:4px">
      <span title="Drag to reorder" style="cursor:grab;color:var(--text2);font-size:12px;user-select:none">⋮⋮</span>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;flex:1;font-size:12px;color:var(--text)">
        <input type="checkbox" ${hidden.has(c)?'':'checked'} onchange="toggleColumn('${jsAttr(c)}')"> ${esc(colLabel(c))}
      </label>
    </div>`).join('')}
  </div>`;
}

// One wrapping data cell. Text wraps and the grid row grows to fit.
function colDataCell(c,r){
  const v=r[c]; const has=v!==undefined&&v!=='';
  const val=has?String(v):'—';
  if(c==='_Side'){const side=v==='Source'?'src':'dst';return`<div style="padding:5px 8px;font-size:11px;display:flex;align-items:center"><span class="tag ${side}">${esc(val)}</span></div>`;}
  return`<div style="padding:5px 8px;font-size:11px;white-space:normal;overflow-wrap:anywhere;word-break:break-word;color:${has?'var(--text)':'var(--text3)'};${(c==='Number'&&has)?'font-weight:600;':''}">${esc(val)}</div>`;
}

function buildEditorRecordTable(){
  const records=window._editorRecords||RX;
  if(!records.length)return`<div style="padding:12px;color:var(--text3);font-size:11px">No records loaded</div>`;
  const cols=visibleColumns(records);
  if(!cols.length)return`<div style="padding:12px;color:var(--text3);font-size:11px">All columns hidden — use the Columns menu to show some.</div>`;
  const gt=colGridTemplate(cols);

  const hdr=`<div style="display:grid;grid-template-columns:${gt};width:max-content;min-width:100%;background:var(--surface);border-bottom:1px solid var(--bd3);position:sticky;top:0;z-index:2">
    ${cols.map(colHeaderCell).join('')}
  </div>`;

  const rows=records.map((r,i)=>{
    const isActive=S.recIdx===i;
    return`<div onclick="S.recIdx=${i};R()"
      style="display:grid;grid-template-columns:${gt};width:max-content;min-width:100%;border-bottom:1px solid var(--bd1);cursor:pointer;align-items:stretch;
             background:${isActive?'rgba(108,142,245,0.18)':'transparent'}">
      ${cols.map(c=>colDataCell(c,r)).join('')}
    </div>`;
  }).join('');

  return`<div style="overflow:auto">${hdr}${rows}</div>`;
}

// ── Snap helpers ──────────────────────────────────────────────────────────────
const SNAP_PX=4; // screen pixels threshold for smart snap
S._snapLines=[];

function snapToGrid(val){
  if(!S.snapGrid)return val;
  return Math.round(val/S.gridSize)*S.gridSize;
}

function snapX(x,w,excludeId){
  if(!S.snapObjects)return{v:x,lines:[]};
  const others=S.objs.filter(o=>o.id!==excludeId);
  const pw=S.spec.pw;
  const thr=SNAP_PX/(SC*S.zoom);
  let best=x,bestD=thr,lines=[];
  [[x,0],[x+w,1]].forEach(([ce,ci])=>{
    others.forEach(o=>{
      [o.x,o.x+o.w].forEach(oe=>{
        const d=Math.abs(ce-oe);
        if(d<bestD){bestD=d;best=ci===0?oe:oe-w;lines=[{axis:'x',pos:oe}];}
      });
    });
    [0,pw].forEach(le=>{
      const d=Math.abs(ce-le);
      if(d<bestD){bestD=d;best=ci===0?le:le-w;lines=[{axis:'x',pos:le}];}
    });
  });
  return{v:best,lines};
}

function snapY(y,h,excludeId){
  if(!S.snapObjects)return{v:y,lines:[]};
  const others=S.objs.filter(o=>o.id!==excludeId);
  const ph=S.spec.ph;
  const thr=SNAP_PX/(SC*S.zoom);
  let best=y,bestD=thr,lines=[];
  [[y,0],[y+h,1]].forEach(([ce,ci])=>{
    others.forEach(o=>{
      [o.y,o.y+(o.h||0)].forEach(oe=>{
        const d=Math.abs(ce-oe);
        if(d<bestD){bestD=d;best=ci===0?oe:oe-h;lines=[{axis:'y',pos:oe}];}
      });
    });
    [0,ph].forEach(le=>{
      const d=Math.abs(ce-le);
      if(d<bestD){bestD=d;best=ci===0?le:le-h;lines=[{axis:'y',pos:le}];}
    });
  });
  return{v:best,lines};
}

function applySnap(x,y,w,h,id){
  let nx=snapToGrid(x);
  let ny=snapToGrid(y);
  const rx=snapX(nx,w,id);
  const ry=snapY(ny,h,id);
  S._snapLines=[...rx.lines,...ry.lines];
  return{x:Math.max(-BLEED_IN,rx.v),y:Math.max(-BLEED_IN,ry.v)};
}

// Live-update the snap guide overlay during a drag (no full canvas rebuild).
function renderSnapGuides(){
  const layer=document.getElementById('snap-guide-layer'); if(!layer)return;
  const sc=SC, B=BLEED_IN*sc, pw=S.spec.pw*sc, ph=S.spec.ph*sc, bw=pw+2*B, bh=ph+2*B;
  const lines=(S._snapLines||[]).map(l=>{
    if(l.axis==='x'){ const px=(l.pos*sc+B).toFixed(1);
      return '<line x1="'+px+'" y1="0" x2="'+px+'" y2="'+bh+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+px+'" cy="'+(bh/2)+'" r="3.5" fill="#FF4D6A"/>'; }
    const py=(l.pos*sc+B).toFixed(1);
    return '<line x1="0" y1="'+py+'" x2="'+bw+'" y2="'+py+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+(bw/2)+'" cy="'+py+'" r="3.5" fill="#FF4D6A"/>';
  }).join('');
  layer.innerHTML=lines?'<svg style="position:absolute;top:0;left:0;width:'+bw+'px;height:'+bh+'px;pointer-events:none;z-index:5" width="'+bw+'" height="'+bh+'">'+lines+'</svg>':'';
}

// Resize handles on all four corners (drag any corner to resize, opposite
// corner stays put).
function resizeHandles(id){
  const H=(c,pos,cur)=>`<div onmousedown="startResize(event,'${id}','${c}')" style="position:absolute;${pos};width:9px;height:9px;background:var(--accent);border:1px solid #fff;border-radius:2px;z-index:10;cursor:${cur}"></div>`;
  return H('tl','left:-5px;top:-5px','nwse-resize')+H('tr','right:-5px;top:-5px','nesw-resize')
        +H('bl','left:-5px;bottom:-5px','nesw-resize')+H('br','right:-5px;bottom:-5px','nwse-resize');
}
// ── Rulers ─────────────────────────────────────────────────────────────────────
const RULER=26; // px thickness of the fixed edge rulers
// Fraction label for a quarter-inch position (whole inches show the integer).
function rulerLabel(v){
  const r=Math.round(v*16)/16, whole=Math.floor(r+1e-6), frac=r-whole;
  if(Math.abs(frac)<1e-6) return {t:String(whole), big:true};
  if(Math.abs(frac-0.25)<1e-6) return {t:'¼', big:false};
  if(Math.abs(frac-0.5)<1e-6)  return {t:'½', big:false};
  if(Math.abs(frac-0.75)<1e-6) return {t:'¾', big:false};
  return null;
}
// Draw the fixed top/left rulers, zeroed at the label's (printable) top-left,
// with 1/16" ticks and a label every 1/4". S._rulerObj (id) highlights the
// dragged object's extent.
function drawRulers(){
  const pa=document.getElementById('printable-area');
  const rh=document.getElementById('ruler-h'), rv=document.getElementById('ruler-v');
  if(!rh||!rv)return;
  if(!pa){ rh.innerHTML=''; rv.innerHTML=''; return; }
  const paR=pa.getBoundingClientRect(), rhR=rh.getBoundingClientRect(), rvR=rv.getBoundingClientRect();
  const ppiX=paR.width/S.spec.pw, ppiY=paR.height/S.spec.ph;   // screen px per inch (incl. zoom)
  // Highlight the extent of the dragged object, or — when nothing is being
  // dragged — of every currently selected object, so the band stays visible the
  // whole time an object is selected.
  const hls = S._rulerObj ? [gobj(S._rulerObj)].filter(Boolean)
            : (S.selIds&&S.selIds.length ? S.selIds.map(gobj).filter(Boolean)
            : (S.selId ? [gobj(S.selId)].filter(Boolean) : []));
  const HL_FILL='rgba(140,140,150,0.32)';
  const STEP=1/16;
  function axis(horiz){
    const ppi=horiz?ppiX:ppiY;
    const originScreen=horiz?paR.left:paR.top;       // label 0 in screen coords
    const rect=horiz?rhR:rvR, len=horiz?rhR.width:rvR.height, off=horiz?rhR.left:rvR.top;
    if(!(ppi>0))return '';
    let out='';
    hls.forEach(function(hl){
      const a=(horiz?(hl.x||0):(hl.y||0)), b=a+(horiz?(hl.w||0):(hl.h||0));
      const pa1=originScreen-off+Math.min(a,b)*ppi, pa2=originScreen-off+Math.max(a,b)*ppi;
      out += horiz
        ? '<rect x="'+pa1.toFixed(1)+'" y="0" width="'+Math.max(1,pa2-pa1).toFixed(1)+'" height="'+RULER+'" fill="'+HL_FILL+'"/>'
        : '<rect x="0" y="'+pa1.toFixed(1)+'" width="'+RULER+'" height="'+Math.max(1,pa2-pa1).toFixed(1)+'" fill="'+HL_FILL+'"/>';
    });
    const vMin=(off-originScreen)/ppi, vMax=(off+len-originScreen)/ppi;
    let v=Math.floor(vMin/STEP)*STEP;
    for(; v<=vMax+1e-6; v+=STEP){
      const p=originScreen-off+v*ppi;
      const sixteenth=Math.round(v/STEP);
      const major=sixteenth%16===0, quarter=sixteenth%4===0;
      const tlen=major?RULER:quarter?12:6;
      if(horiz){
        out+='<line x1="'+p.toFixed(1)+'" y1="'+(RULER-tlen)+'" x2="'+p.toFixed(1)+'" y2="'+RULER+'" style="stroke:var(--text2)" stroke-width="'+(major?1:0.6)+'"/>';
      }else{
        out+='<line x1="'+(RULER-tlen)+'" y1="'+p.toFixed(1)+'" x2="'+RULER+'" y2="'+p.toFixed(1)+'" style="stroke:var(--text2)" stroke-width="'+(major?1:0.6)+'"/>';
      }
      if(quarter){
        const lab=rulerLabel(v); if(lab){
          const fs=lab.big?11:9;
          if(horiz) out+='<text x="'+(p+2).toFixed(1)+'" y="11" font-size="'+fs+'" style="fill:var(--text)">'+lab.t+'</text>';
          else      out+='<text x="3" y="'+(p+(lab.big?10:9)).toFixed(1)+'" font-size="'+fs+'" style="fill:var(--text)">'+lab.t+'</text>';
        }
      }
    }
    return '<svg width="'+(horiz?len:RULER)+'" height="'+(horiz?RULER:len)+'" style="display:block">'+out+'</svg>';

let _rafRuler=false;

function buildCanvas(spec,objs,selId,rec,wrap,readOnly){
  const sc=SC;
  const pw=spec.pw*sc,ph=spec.ph*sc;
  const cw=(spec.tw-spec.pw)*sc,ch=(spec.th-spec.ph)*sc;
  const tw=pw,th=wrap?spec.th*sc:ph;
  // Bleed margin around the printable area (objects can overhang into it).
  const B=BLEED_IN*sc;
  const bw=pw+2*B, bh=ph+2*B;

  // Clear wrap zone shown directly under the printable area (not in the bleed).
  const wrapZone=wrap&&(cw>0||ch>0)?`
    <div style="position:absolute;left:${B}px;top:${B+ph}px;width:${pw}px;height:${ch>0?ch:ph}px;background:rgba(140,140,180,0.12);border:1px dashed var(--text3);display:flex;align-items:center;justify-content:center;pointer-events:none">
      <span style="color:var(--text2);font-size:9px;white-space:nowrap">clear wrap zone</span>
    </div>`:"";

  const objsHtml=objs.map(o=>{
    const x=o.x*SC+B,y=o.y*SC+B,w=(o.w||1)*SC,h=(o.h||0)*SC;
    const sel=!readOnly&&(S.selIds||[]).includes(o.id);
    // Resize/rotate handles only when exactly one object is selected; a multi-
    // selection shows just the outlines and supports drag/nudge as a group.
    const single=sel&&(S.selIds||[]).length===1;
    const ss=sel?"outline:1.5px solid var(--accent);outline-offset:1px;":"";
    const drag=readOnly?"":`onmousedown="startDrag(event,'${o.id}')"`;
    const rotDeg=o.rot||0;
    const rotCss=rotDeg?`transform:rotate(${rotDeg}deg);transform-origin:center center;`:"";
    const rotH=single&&!readOnly?`<div style="position:absolute;left:50%;top:-22px;width:1px;height:22px;background:var(--accent);transform:translateX(-50%);z-index:10;pointer-events:none"></div><div onmousedown="startRotate(event,'${o.id}')" title="Drag to rotate" style="position:absolute;left:50%;top:-26px;transform:translateX(-50%);width:11px;height:11px;background:var(--accent);border:1px solid #fff;border-radius:50%;cursor:grab;z-index:11"></div>`:"";

    if(o.t==="tx"){
      const {v,e}=textValue(o,rec);
      const va=o.valign==="top"?"flex-start":o.valign==="bottom"?"flex-end":"center";
      let fz=Math.max(7,(o.fs||14)*(sc/100));
      if(o.autoScale&&!o.wrapText) fz=autoFitPx(v,o,fz,(o.w||1)*sc,4);
      const fontStyle=o.italic?"italic":"normal";
      const fontWeight=o.bold?700:400;
      const textDecoration=o.underline?"underline":"none";
      const wordBreak=o.wrapText?"break-word":"normal";
      const whiteSpace=o.wrapText?"normal":"nowrap";
      const letterSpacing=o.tracking?`${o.tracking}px`:"normal";
      const scaleX=(o.stretch||100)/100;
      const txtColor=e?"var(--red)":"#000";
      const textAlign=o.al||"left";
      const dispVal=e?`⚠ ${e.substring(0,40)}`:v.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const rb=single&&!readOnly?resizeHandles(o.id):"";
      const dropAttr=readOnly?"":`ondragover="event.preventDefault()" ondrop="onColDropToText(event,'${o.id}')"`;
      const isStatic=txMode(o)==="static";
      const editing=!readOnly&&isStatic&&S.editingId===o.id;
      const editAttrs=editing?`contenteditable="true" onmousedown="event.stopPropagation()" oninput="setStaticText('${o.id}',this.innerText)" onblur="endTextEdit()" onkeydown="if(event.key==='Escape')this.blur()"`:"";
      const pe=editing?"pointer-events:auto;outline:none;cursor:text;":"pointer-events:none;";
      const curs=readOnly?"default":(editing?"text":"move");   // caret while editing; otherwise grab-to-move
      return `<div data-obj="${o.id}" ${drag} ${dropAttr} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${Math.max(h,12)}px;${rotCss}${ss}border-radius:2px;cursor:${curs};display:flex;align-items:${va};padding:0 2px;box-sizing:border-box">
        <div data-txt="${o.id}" ${editAttrs} style="width:100%;font-family:'${o.font||"Helvetica Neue"}',Arial,sans-serif;font-size:${fz}px;font-weight:${fontWeight};font-style:${fontStyle};text-decoration:${textDecoration};color:${txtColor};white-space:${whiteSpace};word-break:${wordBreak};overflow:hidden;text-overflow:${o.wrapText?"clip":"ellipsis"};line-height:1.15;letter-spacing:${letterSpacing};text-align:${textAlign};transform:scaleX(${scaleX});transform-origin:left center;${pe}">${dispVal}</div>
        ${rotH}${rb}</div>`;
    }
    if(o.t==="ln"){
      const lh=single&&!readOnly?`<div onmousedown="startLineResize(event,'${o.id}','l')" title="Drag to stretch" style="position:absolute;left:-5px;top:50%;transform:translateY(-50%);width:9px;height:9px;background:var(--accent);border:1px solid #fff;border-radius:50%;cursor:ew-resize;z-index:10"></div>`:"";
      const rh=single&&!readOnly?`<div onmousedown="startLineResize(event,'${o.id}','r')" title="Drag to stretch" style="position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:9px;height:9px;background:var(--accent);border:1px solid #fff;border-radius:50%;cursor:ew-resize;z-index:10"></div>`:"";
      return `<div data-obj="${o.id}" ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${(o.w||1)*sc}px;height:${Math.max(1,o.lw||1)}px;background:#000;cursor:${readOnly?"default":"move"};${rotCss}${ss}">${lh}${rh}${rotH}</div>`;
    }
    if(o.t==="rc"){
      const rb=single&&!readOnly?resizeHandles(o.id):"";
      return `<div data-obj="${o.id}" ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;border:${o.lw||1}px solid #000;background:transparent;cursor:${readOnly?"default":"move"};${rotCss}${ss}">${rotH}${rb}</div>`;
    }
    if(o.t==="ci"||o.t==="ov"){
      const rb=single&&!readOnly?resizeHandles(o.id):"";
      return `<div data-obj="${o.id}" ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;border:${o.lw||1}px solid #000;background:transparent;border-radius:50%;cursor:${readOnly?"default":"move"};${rotCss}${ss}">${rotH}${rb}</div>`;
    }
    if(o.t==="ar"){
      const aw=(o.w||1)*sc;
      const th=Math.max(1,o.lw||2);
      const as=Math.max(4,o.arrowSize||12);   // arrowhead length along shaft
      const hw=as*0.6;                          // arrowhead half-width
      const vh=Math.max(th/2,hw)+2;             // half visual height
      const x1=o.arrowStart?as:0, x2=aw-(o.arrowEnd?as:0);
      let svg=`<svg width="${aw}" height="${2*vh}" style="position:absolute;left:0;top:0;overflow:visible;pointer-events:none">`;
      svg+=`<line x1="${x1}" y1="${vh}" x2="${Math.max(x1,x2)}" y2="${vh}" stroke="#000" stroke-width="${th}"/>`;
      if(o.arrowStart) svg+=`<polygon points="0,${vh} ${as},${vh-hw} ${as},${vh+hw}" fill="#000"/>`;
      if(o.arrowEnd)   svg+=`<polygon points="${aw},${vh} ${aw-as},${vh-hw} ${aw-as},${vh+hw}" fill="#000"/>`;
      svg+=`</svg>`;
      const lh=single&&!readOnly?`<div onmousedown="startLineResize(event,'${o.id}','l')" title="Drag to stretch" style="position:absolute;left:-5px;top:50%;transform:translateY(-50%);width:9px;height:9px;background:var(--accent);border:1px solid #fff;border-radius:50%;cursor:ew-resize;z-index:10"></div>`:"";
      const rh=single&&!readOnly?`<div onmousedown="startLineResize(event,'${o.id}','r')" title="Drag to stretch" style="position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:9px;height:9px;background:var(--accent);border:1px solid #fff;border-radius:50%;cursor:ew-resize;z-index:10"></div>`:"";
      return `<div data-obj="${o.id}" ${drag} style="position:absolute;left:${x}px;top:${y-vh}px;width:${aw}px;height:${2*vh}px;cursor:${readOnly?"default":"move"};${rotCss}${ss}">${svg}${lh}${rh}${rotH}</div>`;
    }
    if(o.t==="im"||o.t==="sy"){
      const fit=o.t==="sy"?"contain":"fill";
      const rb=single&&!readOnly?resizeHandles(o.id):"";
      return `<div data-obj="${o.id}" ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;cursor:${readOnly?"default":"move"};${rotCss}${ss}"><img src="${o.src||''}" style="width:100%;height:100%;object-fit:${fit};pointer-events:none;display:block">${rotH}${rb}</div>`;
    }
    return"";
  }).join("");

  // Grid overlay — spans the whole canvas (printable + bleed), aligned so a
  // grid line falls on the printable origin.
  const gridLines=[];
  if(S.snapGrid){
    const gs=S.gridSize*sc;
    for(let gx=B%gs;gx<bw;gx+=gs) gridLines.push(`<line x1="${gx.toFixed(1)}" y1="0" x2="${gx.toFixed(1)}" y2="${bh}" stroke="rgba(108,142,245,0.18)" stroke-width="0.5"/>`);
    for(let gy=B%gs;gy<bh;gy+=gs) gridLines.push(`<line x1="0" y1="${gy.toFixed(1)}" x2="${bw}" y2="${gy.toFixed(1)}" stroke="rgba(108,142,245,0.18)" stroke-width="0.5"/>`);
  }
  const gridSvg=gridLines.length?`<svg style="position:absolute;top:0;left:0;width:${bw}px;height:${bh}px;pointer-events:none;z-index:0" width="${bw}" height="${bh}">${gridLines.join("")}</svg>`:"";

  // Snap indicator lines — drawn during drag only (offset into the bleed canvas).
  const snapSvgLines=(S._snapLines||[]).map(l=>{
    if(l.axis==='x'){
      const px=(l.pos*sc+B).toFixed(1);
      return '<line x1="'+px+'" y1="0" x2="'+px+'" y2="'+bh+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+px+'" cy="'+(bh/2)+'" r="3.5" fill="#FF4D6A"/>';
    }else{
      const py=(l.pos*sc+B).toFixed(1);
      return '<line x1="0" y1="'+py+'" x2="'+bw+'" y2="'+py+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+(bw/2)+'" cy="'+py+'" r="3.5" fill="#FF4D6A"/>';
    }
  }).join("");
  const snapSvg=snapSvgLines?'<svg style="position:absolute;top:0;left:0;width:'+bw+'px;height:'+bh+'px;pointer-events:none;z-index:5" width="'+bw+'" height="'+bh+'">'+snapSvgLines+'</svg>':"";


  // Canvas holds the printable area plus an invisible 2" positioning margin on
  // every side. Objects can overhang the printable edges into that margin; only
  // the printable area prints. The margin is not visually called out.
  const canvasDrop=readOnly?"":`ondragover="onCanvasDragOver(event)" ondragleave="onCanvasDragLeave(event)" ondrop="onColDropToCanvas(event)"`;
  return `<div style="display:flex;flex-direction:column;align-items:flex-start;flex-shrink:0">
    <div onmousedown="${readOnly?'':`if(event.target===this){if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();deselect()}`}" ${canvasDrop} style="width:${bw}px;height:${bh}px;background:transparent;position:relative;overflow:hidden;flex-shrink:0">
      <!-- Printable area (only this prints) -->
      <div id="printable-area" style="position:absolute;left:${B}px;top:${B}px;width:${pw}px;height:${ph}px;background:#fff;box-shadow:0 0 0 1.5px var(--accent);pointer-events:none"></div>
      ${wrapZone}
      ${gridSvg}<div id="snap-guide-layer">${snapSvg}</div>${objsHtml}
    </div>
  </div>`;
}

// ── Object positioning (snap the whole object to a label edge/center) ──────────
// Distinct from text justification: this moves the selected object's box within
// the label's printable area.
function posObj(id,axis,where){
  const o=gobj(id); if(!o)return;
  snapshot();
  const W=S.spec.pw, H=S.spec.ph, w=o.w||0, h=o.h||0;
  const r=v=>Math.max(-BLEED_IN,Math.round(v*1000)/1000);
  if(axis==='h'){
    uobj(id,{x:r(where==='left'?0:where==='center'?(W-w)/2:W-w)});
  }else{
    uobj(id,{y:r(where==='top'?0:where==='middle'?(H-h)/2:H-h)});
  }
  R();
}

// ── Anchor point (which corner/edge/center the X/Y refer to and that stays
// fixed when resizing) ─────────────────────────────────────────────────────────
function objAnchor(o){ return o.anchor||'tl'; }
function anchorFrac(a){
  const fx = a[1]==='l'?0 : a[1]==='c'?0.5 : 1;   // horizontal: l/c/r
  const fy = a[0]==='t'?0 : a[0]==='m'?0.5 : 1;   // vertical:   t/m/b
  return [fx,fy];
}
function setAnchor(id,a){ const o=gobj(id); if(!o)return; uobj(id,{anchor:a}); R(); }
// Set the anchor point's X or Y → reposition the top-left accordingly.
function setAnchorPos(id,axis,val){
  const o=gobj(id); if(!o||isNaN(val))return;
  const [fx,fy]=anchorFrac(objAnchor(o)); snapshot();
  if(axis==='x') uobj(id,{x:val-fx*(o.w||0)}); else uobj(id,{y:val-fy*(o.h||0)});
  R();
}
// Resize keeping the anchor point fixed (square types resize both; aspect-locked
// images keep ratio).
function setSizeAnchored(id,dim,val){
  const o=gobj(id); if(!o||isNaN(val)||val<=0)return;
  const [fx,fy]=anchorFrac(objAnchor(o)); snapshot();
  let nw=o.w, nh=o.h;
  if(dim==='w'){ nw=val; if(o.t==='ci'||o.t==='sy')nh=val; else if(o.t==='im'&&o.lockAspect!==false)nh=+(nw*((o.h/o.w)||1)).toFixed(4); }
  else { nh=val; if(o.t==='ci'||o.t==='sy')nw=val; else if(o.t==='im'&&o.lockAspect!==false)nw=+(nh/(((o.h/o.w))||1)).toFixed(4); }
  uobj(id,{x:o.x+fx*((o.w||0)-nw), y:o.y+fy*((o.h||0)-nh), w:nw, h:nh});
  R();
}
function anchorGrid(o){
  const cur=objAnchor(o);
  const codes=['tl','tc','tr','ml','mc','mr','bl','bc','br'];
  const dots=codes.map(c=>`<div onclick="setAnchor('${o.id}','${c}')" title="Anchor: ${c}" style="width:11px;height:11px;border-radius:50%;border:1.5px solid ${cur===c?'var(--accent)':'var(--text2)'};background:${cur===c?'var(--accent)':'transparent'};cursor:pointer"></div>`).join('');
  return `<div title="Anchor point — X/Y refer to this point, and it stays fixed when you resize" style="display:grid;grid-template-columns:repeat(3,11px);gap:6px;flex-shrink:0">${dots}</div>`;
}
// Position & size block with the anchor selector. Pass showWH:false for objects
// without an editable height (handled separately).
function posSizeBlock(o,showWH){
  const [fx,fy]=anchorFrac(objAnchor(o));
  const ax=((o.x||0)+fx*(o.w||0)).toFixed(3), ay=((o.y||0)+fy*(o.h||0)).toFixed(3);
  const xy=`<div style="flex:1;display:flex;flex-direction:column;gap:6px">
      <div><label class="lbl">X</label><input type="number" class="inp" step="0.01" value="${ax}" onchange="setAnchorPos('${o.id}','x',parseFloat(this.value))"></div>
      <div><label class="lbl">Y</label><input type="number" class="inp" step="0.005" value="${ay}" onchange="setAnchorPos('${o.id}','y',parseFloat(this.value))"></div>
    </div>`;
  const wh=showWH?`<div style="display:flex;gap:8px">
      <div style="flex:1"><label class="lbl">Width</label><input type="number" class="inp" step="0.01" value="${(+o.w||0).toFixed(3)}" onchange="setSizeAnchored('${o.id}','w',parseFloat(this.value))"></div>
      <div style="flex:1"><label class="lbl">Height</label><input type="number" class="inp" step="0.01" value="${(+o.h||0).toFixed(3)}" onchange="setSizeAnchored('${o.id}','h',parseFloat(this.value))"></div>
    </div>`:'';
  return `<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:8px">${anchorGrid(o)}${xy}</div>${wh}`;
}

// ── Properties panel ──────────────────────────────────────────────────────────
// Properties panel when 2+ objects are selected. Same-type selections expose the
// shared formatting controls; a field whose values differ across the selection
// shows "Multiple" and, once edited, applies the new value to every object.
function buildMultiProps(sels){
  const n=sels.length;
  const types=Array.from(new Set(sels.map(o=>o.t)));
  const head=`<div style="display:flex;flex-direction:column;gap:0">
    <div class="sec">${n} objects selected</div>
    <div style="color:var(--text3);font-size:10px;line-height:1.5;margin-bottom:8px">Drag or use the arrow keys to move them together.</div>`;
  const delBtn=`<hr class="divider"><button class="btn" onclick="delObj()" style="background:rgba(245,108,108,0.15);border-color:rgba(245,108,108,0.3);color:var(--red);padding:6px 0;font-size:11px">Delete ${n} objects</button></div>`;
  if(types.length>1){
    return head+`<div style="color:var(--text2);font-size:11px;line-height:1.5;margin-bottom:8px">Mixed object types — select objects of the same type to edit their formatting together.</div>`+delBtn;
  }
  const t=types[0];
  // Shared value across the selection: {multi:true} if values differ, else {v}.
  function sh(key,def){ let v=(sels[0][key]!=null?sels[0][key]:def); for(const o of sels){ const ov=(o[key]!=null?o[key]:def); if(ov!==v) return {multi:true}; } return {multi:false,v:v}; }
  function num(lbl,key,step,def,parse){ const s=sh(key,def); const pf=parse==='int'?'parseInt':'parseFloat'; return `<div style="margin-bottom:8px"><label class="lbl">${lbl}</label><input type="number" class="inp" step="${step}" ${s.multi?'value="" placeholder="Multiple"':'value="'+s.v+'"'} onchange="uobjAll({${key}:${pf}(this.value)})"></div>`; }
  function tog(key,lbl,inner){ const s=sh(key,false); const on=!s.multi&&s.v===true; return `<button class="fmt-btn${on?' on':''}" title="${lbl}${s.multi?' (mixed)':''}"${s.multi?' style="opacity:.6"':''} onclick="uobjAll({${key}:${on?'false':'true'}})">${inner}</button>`; }
  function btnset(key,def,opts){ const s=sh(key,def); return opts.map(([v,l,ti])=>`<button class="fmt-btn${!s.multi&&s.v===v?' on':''}" title="${ti||l}" onclick="uobjAll({${key}:'${v}'})">${l}</button>`).join(''); }
  function check(key,lbl,def){ const s=sh(key,def); return `<div style="margin-bottom:8px"><label class="lbl" style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${(!s.multi&&s.v===true)?'checked':''} onchange="uobjAll({${key}:this.checked})"> ${lbl}${s.multi?' <span style=\"color:var(--text3)\">(mixed)</span>':''}</label></div>`; }
  function fontsel(){ const s=sh('font','Helvetica Neue'); const ho=s.multi?'<option value="__m__" selected>Multiple</option>':''; const body=FONTS.map(f=>`<option value="${f}"${!s.multi&&s.v===f?' selected':''}>${f}</option>`).join(''); return `<div style="margin-bottom:8px"><label class="lbl">Font</label><select class="inp" onchange="if(this.value!=='__m__')uobjAll({font:this.value})">${ho}${body}</select></div>`; }

  let body='';
  if(t==='tx'){
    const alOpts=[["left","⬅"],["center","☰"],["right","➡"],["justify","⬌"]];
    const vaOpts=[["top","⬆"],["middle","↕"],["bottom","⬇"]];
    body=`<div class="sec">Text formatting</div>
      ${fontsel()}
      ${num('Size (pt)','fs',1,16,'int')}
      <div style="margin-bottom:8px"><label class="lbl">Style</label><div style="display:flex;gap:3px">${tog('bold','Bold','<b>B</b>')}${tog('italic','Italic','<i>I</i>')}${tog('underline','Underline','<u>U</u>')}</div></div>
      <div style="margin-bottom:8px"><label class="lbl">Horizontal align</label><div style="display:flex;gap:3px">${btnset('al','left',alOpts)}</div></div>
      <div style="margin-bottom:8px"><label class="lbl">Vertical align</label><div style="display:flex;gap:3px">${btnset('valign','middle',vaOpts)}</div></div>
      ${check('wrapText','Wrap text',false)}
      ${check('autoScale','Auto-scale to fit (max size)',false)}
      ${num('Tracking (px)','tracking',0.5,0,'float')}
      ${num('Width stretch (%)','stretch',1,100,'float')}`;
  } else if(t==='ln'){
    body=`<div class="sec">Line</div>${num('Weight (px)','lw',1,1,'int')}`;
  } else if(t==='rc'){
    body=`<div class="sec">Rectangle</div>${num('Border (px)','lw',1,1,'int')}`;
  } else if(t==='ov'){
    body=`<div class="sec">Oval</div>${num('Border (px)','lw',1,1,'int')}`;
  } else if(t==='ci'){
    body=`<div class="sec">Circle</div>${num('Border (px)','lw',1,1,'int')}`;
  } else if(t==='ar'){
    body=`<div class="sec">Arrow</div>${num('Thickness (px)','lw',1,2,'int')}${num('Arrowhead size (px)','arrowSize',1,12,'float')}
      <div style="margin-bottom:8px"><label class="lbl">Heads</label><div style="display:flex;gap:3px">${tog('arrowStart','Arrowhead at start','◄ Start')}${tog('arrowEnd','Arrowhead at end','End ►')}</div></div>`;
  } else if(t==='im'){
    body=`<div class="sec">Image</div>${check('lockAspect','Lock aspect ratio',true)}`;
  } else if(t==='sy'){
    body=`<div class="sec">Symbol</div><div style="color:var(--text2);font-size:11px;margin-bottom:8px">Position the symbols together; size each individually.</div>`;
  }
  return head+body+delBtn;
}

function buildProps(){
  const sels=selObjs();
  if(sels.length>1) return buildMultiProps(sels);
  const o=S.selId?gobj(S.selId):null;
  if(!o)return`<div style="color:var(--text3);font-size:11px;text-align:center;margin-top:40px;line-height:1.8">Click an object on the canvas to edit it.<br><br>Shift-click to select several at once.</div>`;

  function ni(lbl,key,step,val,extra){
    return `<div style="margin-bottom:6px"><label class="lbl">${lbl}</label><input type="number" class="inp" step="${step}" value="${(+val||0).toFixed(3)}" onchange="uobj('${o.id}',{${key}:parseFloat(this.value)});R()" ${extra||""}></div>`;
  }

  if(o.t==="tx"){
    const alBtns=["left","center","right","justify"].map(a=>`<button class="fmt-btn${o.al===a?" on":""}" onclick="uobj('${o.id}',{al:'${a}'});R()" title="${a}">${a==="left"?"⬅":a==="center"?"☰":a==="right"?"➡":"⬌"}</button>`).join("");
    const vaBtns=["top","middle","bottom"].map(a=>`<button class="fmt-btn${(o.valign||"middle")===a?" on":""}" onclick="uobj('${o.id}',{valign:'${a}'});R()" title="${a}">${a==="top"?"⬆":a==="middle"?"↕":"⬇"}</button>`).join("");
    const fontOpts=FONTS.map(f=>`<option value="${f}"${o.font===f?" selected":""}>${f}</option>`).join("");
    const tmode=txMode(o);
    const modeBtns=[["static","Static"],["field","Field"],["formula","Formula"]].map(([m,lbl])=>
      `<button class="fmt-btn${tmode===m?" on":""}" style="flex:1" onclick="setTextMode('${o.id}','${m}')">${lbl}</button>`).join("");
    const srcEditor =

        ? `<textarea class="inp" rows="2" style="resize:vertical;font-family:inherit" placeholder="Type label text…" oninput="setStaticText('${o.id}',this.value)" onblur="R()">${(o.text||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</textarea>
           <div style="color:var(--text3);font-size:10px;margin-top:5px;line-height:1.4">…or double-click the text box on the canvas to type directly.</div>`
      : tmode==="field"
        ? `<select class="inp" onchange="uobj('${o.id}',{field:this.value});R()">

      : `<input id="fxbar" class="inp" value="${(o.f||"").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}" style="font-family:monospace;font-size:12px" oninput="S._ef=this.value" onblur="commitF()" onkeydown="if(event.key==='Enter')commitF()" placeholder='=IF(Number&lt;&gt;&quot;&quot;,Number,&quot;&quot;)'>
         <div style="display:flex;gap:5px;margin-top:5px">
           <button class="btn${S.showFields?" on":""}" onclick="S.showFields=!S.showFields;R()" style="font-size:11px">Fields ▾</button>

         </div>
         ${S.showFields?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;max-height:120px;overflow-y:auto">${fieldDefs().map(f=>`<button class="fbtn" onclick="insertField('${jsAttr(f.f)}')">${esc(f.f)}</button>`).join("")}</div>`:""}`;
    return `<div style="display:flex;flex-direction:column;gap:0">

        <select class="inp" onchange="uobj('${o.id}',{font:this.value});R()">${fontOpts}</select>
      </div>
      <div style="margin-bottom:8px">
        <label class="lbl">${o.autoScale?"Size (pt) — max":"Size (pt)"}</label>
        <input type="number" class="inp" value="${o.fs||16}" min="6" max="144" onchange="uobj('${o.id}',{fs:parseInt(this.value)});R()">

        <label class="lbl">Tracking (px)</label>
        <input type="number" class="inp" step="0.5" value="${o.tracking||0}" onchange="uobj('${o.id}',{tracking:parseFloat(this.value)});R()">
      </div>
      <div style="margin-bottom:8px">
        <label class="lbl">Width stretch (%)</label>
        <input type="number" class="inp" step="1" min="10" max="300" value="${o.stretch||100}" onchange="uobj('${o.id}',{stretch:parseFloat(this.value)});R()">
      </div>
      <hr class="divider">
      <div class="sec">Position & size</div>

      ${ni("X","x",.01,o.x)}
      ${ni("Y","y",.005,o.y)}
      ${ni("Width","w",.01,o.w)}
    </div>`;
  }
  if(o.t==="rc"){
    return `<div style="display:flex;flex-direction:column;gap:0">
      ${posButtons(o)}
      <div class="sec">Rectangle</div>
      <div style="margin-bottom:6px"><label class="lbl">Border (px)</label><input type="number" class="inp" value="${o.lw||1}" min="1" max="10" onchange="uobj('${o.id}',{lw:parseInt(this.value)});R()"></div>
      ${posSizeBlock(o,true)}
    </div>`;
  }
  if(o.t==="ar"){
    return `<div style="display:flex;flex-direction:column;gap:0">
      ${posButtons(o)}
      <div class="sec">Arrow</div>
      <div style="margin-bottom:6px"><label class="lbl">Thickness (px)</label><input type="number" class="inp" value="${o.lw||2}" min="1" max="20" onchange="uobj('${o.id}',{lw:parseInt(this.value)});R()"></div>
      <div style="margin-bottom:6px"><label class="lbl">Arrowhead size (px)</label><input type="number" class="inp" value="${o.arrowSize||12}" min="4" max="60" onchange="uobj('${o.id}',{arrowSize:parseFloat(this.value)});R()"></div>
      <div style="margin-bottom:8px">
        <label class="lbl">Heads</label>
        <div style="display:flex;gap:3px">
          <button class="fmt-btn${o.arrowStart?" on":""}" title="Arrowhead at start" onclick="uobj('${o.id}',{arrowStart:!${!!o.arrowStart}});R()">◄ Start</button>
          <button class="fmt-btn${o.arrowEnd?" on":""}" title="Arrowhead at end" onclick="uobj('${o.id}',{arrowEnd:!${!!o.arrowEnd}});R()">End ►</button>
        </div>
      </div>
      ${ni("X","x",.01,o.x)}
      ${ni("Y","y",.005,o.y)}
      ${ni("Length","w",.01,o.w)}
    </div>`;
  }
  if(o.t==="ci"){
    return `<div style="display:flex;flex-direction:column;gap:0">
      ${posButtons(o)}
      <div class="sec">Circle</div>
      <div style="margin-bottom:6px"><label class="lbl">Border (px)</label><input type="number" class="inp" value="${o.lw||1}" min="1" max="10" onchange="uobj('${o.id}',{lw:parseInt(this.value)});R()"></div>
      <div style="margin-bottom:6px"><label class="lbl">Diameter (in)</label><input type="number" class="inp" step="0.01" value="${(+o.w||0).toFixed(3)}" onchange="setSizeAnchored('${o.id}','w',parseFloat(this.value))"></div>
      <div style="margin-bottom:6px"><label class="lbl">Radius (in)</label><input type="number" class="inp" step="0.005" value="${((+o.w||0)/2).toFixed(3)}" onchange="setSizeAnchored('${o.id}','w',parseFloat(this.value)*2)"></div>
      ${posSizeBlock(o,false)}

  }
  if(o.t==="ov"){
    return `<div style="display:flex;flex-direction:column;gap:0">
      ${posButtons(o)}
      <div class="sec">Oval</div>
      <div style="margin-bottom:6px"><label class="lbl">Border (px)</label><input type="number" class="inp" value="${o.lw||1}" min="1" max="10" onchange="uobj('${o.id}',{lw:parseInt(this.value)});R()"></div>
      ${posSizeBlock(o,true)}
    </div>`;
  }
  if(o.t==="im"){
    const locked=o.lockAspect!==false;   // default locked
    return `<div style="display:flex;flex-direction:column;gap:0">
      ${posButtons(o)}

      </label></div>
      ${posSizeBlock(o,true)}

  }
  if(o.t==="sy"){
    return `<div style="display:flex;flex-direction:column;gap:0">
      ${posButtons(o)}
      <div class="sec">Symbol</div>
      <div style="margin-bottom:8px;color:var(--text2);font-size:11px">${(SYMBOLS[o.sym]||{}).label||o.sym||''}</div>

      ${posSizeBlock(o,false)}
    </div>`;
  }
  return"";
}

function buildRecordTable(){
  const cols=FD.slice(0,9);
  const rows=RX.map((r,i)=>`<tr class="recrow${S.recIdx===i?" selrow":""}" onclick="S.recIdx=${i};R()">
    ${cols.map(f=>`<td style="color:${r[f.c]?"var(--text)":"var(--text3)"}">${esc((r[f.c]||"—").substring(0,22))}</td>`).join("")}
  </tr>`).join("");
  const heads=cols.map(f=>`<th style="padding:5px 8px;text-align:left;border-bottom:1px solid var(--bd2);background:var(--surface);white-space:nowrap;position:sticky;top:0">
    <div style="color:var(--text);font-size:11px;font-weight:600">${esc(f.f)}</div>
    <div style="color:var(--text3);font-size:10px">${esc(f.c)}</div>
  </th>`).join("");
  return `<div style="overflow-x:auto;border-top:1px solid var(--bd2)">
    <table style="width:100%;border-collapse:collapse;font-size:11px">
      <thead><tr>${heads}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
// Coalesce rapid re-renders (e.g. drag/resize mousemove on a high-refresh
// trackpad fires faster than the display) into at most one R() per frame.
let _rafPending=false;
function scheduleR(){
  if(_rafPending)return;
  _rafPending=true;
  requestAnimationFrame(function(){ _rafPending=false; R(); });
}

// Rebuild ONLY the label canvas (objects + snap guides), not the whole window
// (record table / properties / toolbar). Used during resize/rotate gestures so
// they stay light; falls back to a full R() if the canvas host isn't present.
function renderCanvasOnly(){
  const host=document.getElementById("canvas-host");
  if(!host){ R(); return; }
  const rec=(window._editorRecords||RX)[S.recIdx];
  host.innerHTML=buildCanvas(S.spec,S.objs,S.selId,rec,S.wrap,false);
  scheduleRulers();
}
let _rafCanvas=false;
function scheduleCanvas(){
  if(_rafCanvas)return;
  _rafCanvas=true;
  requestAnimationFrame(function(){ _rafCanvas=false; renderCanvasOnly(); });
}

// ── Actions ───────────────────────────────────────────────────────────────────
function deselect(){S.selId=null;S.showFields=false;S._ef=undefined;S.editingId=null;R();}

function commitF(){if(S.selId&&S._ef!==undefined){uobj(S.selId,{f:S._ef});S._ef=undefined;R();}}

// Switch a text object's source mode, seeding a sensible default for the new mode.
function setTextMode(id,m){
  const o=gobj(id); if(!o)return;
  snapshot();
  const patch={mode:m};
  if(m==="formula" && (o.f===undefined||o.f==="")) patch.f='=""';
  if(m==="static" && o.text===undefined) patch.text="";
  uobj(id,patch); S._ef=(m==="formula"?(o.f||patch.f):undefined); S.showFields=false; R();
}

// The column/field name carried by an in-flight header drag. Prefer the
// dataTransfer payload (set in colDragStart) and fall back to the module var
// (set even when setData is unavailable). Used by both drop targets.
function dragColName(e){
  let key="";
  try{ if(e.dataTransfer) key=e.dataTransfer.getData("text/plain")||""; }catch(_){}
  return key||_vlDragCol||"";
}

// Drop a record-column header onto a text box → field mode bound to that column
// (Target A). stopPropagation so the canvas-container drop handler (Target B,
// create-new) does not also fire as the event bubbles.
function onColDropToText(e,id){
  e.preventDefault(); e.stopPropagation();
  const key=dragColName(e);
  if(typeof colClearDrag==="function")colClearDrag();
  if(!key)return;
  snapshot();
  uobj(id,{mode:"field",field:key}); S.selId=id; S._ef=undefined; R();
}

// Drop a record-column header onto the empty canvas workspace (Target B) →
// CREATE a new field-mode text object at the drop point. Mirrors addObj("tx")
// but bound to the field. The drop point is converted from screen px to label
// inches via the printable-area rect and the SC*zoom scale (same model startDrag
// uses), then offset so the new box's top-left lands roughly under the cursor.
function onColDropToCanvas(e){
  e.preventDefault();
  const key=dragColName(e);
  if(typeof colClearDrag==="function")colClearDrag();
  if(!key)return;
  const pa=document.getElementById("printable-area");
  let x=0.05, y=0.05;
  if(pa){
    const r=pa.getBoundingClientRect();              // printable origin (screen px, post-zoom)
    const sc=SC*S.zoom;
    x=(e.clientX-r.left)/sc;                          // → inches from printable origin
    y=(e.clientY-r.top)/sc;
    const w=0.5, h=0.2;
    x=Math.max(-BLEED_IN, Math.min(x-w/2, S.spec.pw)); // center the box on the cursor, clamp into bounds
    y=Math.max(-BLEED_IN, Math.min(y-h/2, S.spec.ph));
    x=snapToGrid(x); y=snapToGrid(y);
  }
  snapshot();
  const id=mid();
  S.objs.push({id,x:x,y:y,t:"tx",w:.5,h:.2,mode:"field",field:key,al:"left",valign:"middle",fs:15,bold:false,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100});
  S.selId=id; S.selIds=[id]; S._ef=undefined; R();
}

// Drag-over feedback on the canvas workspace: allow the drop and show a subtle
// accent ring on the printable area.
function onCanvasDragOver(e){
  e.preventDefault();
  if(e.dataTransfer)e.dataTransfer.dropEffect='copy';
  const pa=document.getElementById("printable-area");
  if(pa)pa.style.boxShadow='0 0 0 1.5px var(--accent),0 0 0 4px rgba(108,142,245,0.35)';
}
function onCanvasDragLeave(e){
  const pa=document.getElementById("printable-area");
  if(pa)pa.style.boxShadow='0 0 0 1.5px var(--accent)';
}

// Static-text editing. Updates the model live without a full re-render (which
// would steal focus); also mirrors into the canvas element when edited from the
// inspector (skipped for the element currently being typed into, to keep caret).
function setStaticText(id,val){
  const o=gobj(id); if(!o)return;
  o.text=val;
  const t=document.querySelector('[data-txt="'+id+'"]');
  if(t && t!==document.activeElement) t.textContent=val;
}
function startTextEdit(id){ const o=gobj(id); if(!o||txMode(o)!=="static")return; snapshot(); S.selId=id; S.editingId=id; S._ef=undefined; R(); }
function endTextEdit(){ S.editingId=null; R(); }

function fxRecords(){ return window._editorRecords||RX; }
function openFormulaEditor(id){
  const o=gobj(id); if(!o)return;
  _fxState={id:id, f:(o.f||'=""'), recIdx:Math.max(0,Math.min(S.recIdx,fxRecords().length-1))};
  renderFormulaModal();
}
function closeFormulaModal(){ _fxState=null; const m=document.getElementById('fx-modal'); if(m)m.remove(); }
function fxStep(d){ const recs=fxRecords(); _fxState.recIdx=Math.max(0,Math.min(recs.length-1,_fxState.recIdx+d)); fxRefresh(); }
function fxInsert(name){
  const ta=document.getElementById('fxText'); if(!ta)return;
  const s=ta.selectionStart??ta.value.length, e=ta.selectionEnd??ta.value.length;
  ta.value=ta.value.slice(0,s)+name+ta.value.slice(e);
  ta.selectionStart=ta.selectionEnd=s+name.length;
  _fxState.f=ta.value; ta.focus(); fxRefresh();
}
function fxRefresh(){
  const recs=fxRecords(), rec=recs[_fxState.recIdx]||{};
  const {v,e}=evalF(_fxState.f,rec);
  const pv=document.getElementById('fxPreview');
  if(pv){ pv.textContent=e?('⚠ '+e):(v===''?'(empty)':v); pv.style.color=e?'var(--red)':'var(--text)'; }
  const nav=document.getElementById('fxNav'); if(nav)nav.textContent=(_fxState.recIdx+1)+' / '+recs.length;
  const ctx=document.getElementById('fxCtx');
  if(ctx){
    const ctxCols=(isCustomMode()&&window._boundData&&window._boundData.columns&&window._boundData.columns.length)
      ? window._boundData.columns.slice(0,3) : ['Number','Cable','Connector'];
    const bits=ctxCols.map(k=>rec[k]?k+': '+rec[k]:'').filter(Boolean); ctx.textContent=bits.join('  ·  ');
  }
}
function fxApply(){ const id=_fxState.id; snapshot(); uobj(id,{mode:'formula',f:_fxState.f}); S._ef=undefined; closeFormulaModal(); R(); }
function renderFormulaModal(){
  let m=document.getElementById('fx-modal');

    <div style="background:var(--bg2);border:1px solid var(--bd3);border-radius:6px;padding:10px 12px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">

        <div style="flex:1"></div>
        <button class="btn" onclick="fxStep(-1)" title="Previous record" style="padding:2px 8px;font-size:12px">‹</button>
        <span id="fxNav" style="color:var(--text2);font-size:11px;min-width:54px;text-align:center"></span>

function insertField(name){
