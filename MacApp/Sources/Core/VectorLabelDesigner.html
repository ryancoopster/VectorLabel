// ── Actions ───────────────────────────────────────────────────────────────────
function deselect(){S.selId=null;S.selIds=[];S.showFields=false;S._ef=undefined;S.editingId=null;S._selAnchor=null;S._tblSel=null;S._tblEdit=null;R();}

// Marquee (rubber-band) selection: mousedown on empty canvas, drag a box, and every
// object whose bounding box the box touches is selected. A plain click (no drag) just
// deselects. Holding ⇧/⌘ while marquee-ing ADDS to the current selection.
function startMarquee(e){
  if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();
  const canvas=e.currentTarget;
  const rect=canvas.getBoundingClientRect();
  const B=BLEED_IN*SC, z=S.zoom||1;
  const additive=e.shiftKey||e.metaKey||e.ctrlKey;
  const toInch=(cx,cy)=>({x:(((cx-rect.left)/z)-B)/SC, y:(((cy-rect.top)/z)-B)/SC});
  const start=toInch(e.clientX,e.clientY); let cur=start, moved=false;
  const box=document.createElement('div');
  box.style.cssText='position:absolute;border:1px solid var(--accent);background:rgba(108,142,245,0.14);z-index:8;pointer-events:none';
  canvas.appendChild(box);
  const draw=()=>{
    const x0=Math.min(start.x,cur.x),y0=Math.min(start.y,cur.y),x1=Math.max(start.x,cur.x),y1=Math.max(start.y,cur.y);
    box.style.left=(x0*SC+B)+'px'; box.style.top=(y0*SC+B)+'px';
    box.style.width=Math.max(0,(x1-x0)*SC)+'px'; box.style.height=Math.max(0,(y1-y0)*SC)+'px';
  };
  const mv=ev=>{ cur=toInch(ev.clientX,ev.clientY); if(!moved&&(Math.abs(ev.clientX-e.clientX)>3||Math.abs(ev.clientY-e.clientY)>3))moved=true; if(moved)draw(); };
  const up=()=>{
    window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up);
    if(box.parentNode)box.parentNode.removeChild(box);
    if(!moved){ deselect(); return; }   // plain click on empty canvas → deselect
    const x0=Math.min(start.x,cur.x),y0=Math.min(start.y,cur.y),x1=Math.max(start.x,cur.x),y1=Math.max(start.y,cur.y);
    const hit=(S.objs||[]).filter(o=>{
      const ow=(o.w||0.04), oh=((o.h!=null?o.h:0)||0.04);
      return o.x<x1 && o.x+ow>x0 && o.y<y1 && o.y+oh>y0;   // bbox intersects the marquee
    }).map(o=>o.id);
    if(additive){ const set=new Set(S.selIds||[]); hit.forEach(id=>set.add(id)); S.selIds=[...set]; }
    else { S.selIds=hit.slice(); }
    S.selId=S.selIds[S.selIds.length-1]||null; S._selAnchor=S.selId;
    S.editingId=null; S._ef=undefined; R();
  };
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
  e.preventDefault();
}

function commitF(){if(S.selId&&S._ef!==undefined){uobj(S.selId,{f:S._ef});S._ef=undefined;R();}}

// Switch a text object's source mode, seeding a sensible default for the new mode.
function setTextMode(id,m){
  const o=gobj(id); if(!o)return;
  snapshot();
  const patch={mode:m};
  if(m==="formula" && (o.f===undefined||o.f==="")) patch.f='=""';
  if(m==="static" && o.text===undefined) patch.text="";
  uobj(id,patch); S._ef=(m==="formula"?(o.f||patch.f):undefined); S.showFields=false; R();
}

// The column/field name carried by an in-flight header drag. Prefer the
// dataTransfer payload (set in colDragStart) and fall back to the module var
// (set even when setData is unavailable). Used by both drop targets.
function dragColName(e){
  let key="";
  try{ if(e.dataTransfer) key=e.dataTransfer.getData("text/plain")||""; }catch(_){}
  return key||_vlDragCol||"";
}

// Drop a record-column header onto a text box → field mode bound to that column
// (Target A). stopPropagation so the canvas-container drop handler (Target B,
// create-new) does not also fire as the event bubbles.
// Blue-highlight a text object while a database column header is dragged over it,
// to show the drop will map (overwrite) that object to the field. Applies in both
// the Custom Designer and Template Designer (shared canvas).
function onColTextEnter(e,el){
  if(!_vlDragCol)return;
  e.preventDefault();
  el.style.outline='2px solid var(--accent)';
  el.style.outlineOffset='1px';
  el.style.background='rgba(108,142,245,0.22)';
  el.style.borderRadius='3px';
}
function onColTextLeave(el){ if(el){ el.style.outline=''; el.style.background=''; } }
function onColDropToText(e,id){
  e.preventDefault(); e.stopPropagation();
  const key=dragColName(e);
  if(typeof colClearDrag==="function")colClearDrag();
  if(!key)return;
  snapshot();
  uobj(id,{mode:"field",field:key}); S.selId=id; S._ef=undefined; R();
}

// Drop a record-column header onto the empty canvas workspace (Target B) →
// CREATE a new field-mode text object at the drop point. Mirrors addObj("tx")
// but bound to the field. The drop point is converted from screen px to label
// inches via the printable-area rect and the SC*zoom scale (same model startDrag
// uses), then offset so the new box's top-left lands roughly under the cursor.
function onColDropToCanvas(e){
  e.preventDefault();
  const key=dragColName(e);
  if(typeof colClearDrag==="function")colClearDrag();
  if(!key)return;
  const pa=document.getElementById("printable-area");
  let x=0.05, y=0.05;
  if(pa){
    const r=pa.getBoundingClientRect();              // printable origin (screen px, post-zoom)
    const sc=SC*S.zoom;
    x=(e.clientX-r.left)/sc;                          // → inches from printable origin
    y=(e.clientY-r.top)/sc;
    const w=0.5, h=0.2;
    x=Math.max(-BLEED_IN, Math.min(x-w/2, S.spec.pw)); // center the box on the cursor, clamp into bounds
    y=Math.max(-BLEED_IN, Math.min(y-h/2, S.spec.ph));
    x=snapToGrid(x); y=snapToGrid(y);
  }
  snapshot();
  const id=mid();
  S.objs.push({id,x:x,y:y,t:"tx",w:.5,h:.2,mode:"field",field:key,al:"left",valign:"middle",fs:15,bold:false,italic:false,underline:false,font:"Arial",wrapText:false,tracking:0,stretch:100});
  S.selId=id; S.selIds=[id]; S._ef=undefined; R();
}

// Drag-over feedback on the canvas workspace: allow the drop and show a subtle
// accent ring on the printable area.
function onCanvasDragOver(e){
  e.preventDefault();
  if(e.dataTransfer)e.dataTransfer.dropEffect='copy';
  const pa=document.getElementById("printable-area");
  if(pa)pa.style.boxShadow='0 0 0 1.5px var(--accent),0 0 0 4px rgba(108,142,245,0.35)';
}
function onCanvasDragLeave(e){
  const pa=document.getElementById("printable-area");
  if(pa)pa.style.boxShadow='0 0 0 1.5px var(--accent)';
}

// Static-text editing. Updates the model live without a full re-render (which
// would steal focus); also mirrors into the canvas element when edited from the
// inspector (skipped for the element currently being typed into, to keep caret).
function setStaticText(id,val){
  const o=gobj(id); if(!o)return;
  o.text=val;
  markDirty();   // so the close prompt fires + the edit isn't silently lost (undo point set on focus)
  const t=document.querySelector('[data-txt="'+id+'"]');
  if(t && t!==document.activeElement) t.textContent=val;
}
function startTextEdit(id){ const o=gobj(id); if(!o||txMode(o)!=="static")return; snapshot(); S.selId=id; S.editingId=id; S._ef=undefined; R(); }
function endTextEdit(){ S.editingId=null; R(); }

// ── Formula editor popup (larger editor + live preview + record stepper) ────────
let _fxState=null; // {id, f, recIdx}
function fxRecords(){ return window._editorRecords||RX; }
function openFormulaEditor(id){
  const o=gobj(id); if(!o)return;
  _fxState={id:id, f:(o.f||'=""'), recIdx:Math.max(0,Math.min(S.recIdx,fxRecords().length-1))};

function closeFormulaModal(){ _fxState=null; const m=document.getElementById('fx-modal'); if(m)m.remove(); }
function fxStep(d){ const recs=fxRecords(); _fxState.recIdx=Math.max(0,Math.min(recs.length-1,_fxState.recIdx+d)); fxRefresh(); }
function fxInsert(name){
  const ta=document.getElementById('fxText'); if(!ta)return;
  const s=ta.selectionStart??ta.value.length, e=ta.selectionEnd??ta.value.length;
  ta.value=ta.value.slice(0,s)+name+ta.value.slice(e);
  ta.selectionStart=ta.selectionEnd=s+name.length;
  _fxState.f=ta.value; ta.focus(); fxRefresh();
}
function fxRefresh(){
  const recs=fxRecords(), rec=recs[_fxState.recIdx]||{};
  const {v,e}=evalF(_fxState.f,rec);
  const pv=document.getElementById('fxPreview');
  if(pv){ pv.textContent=e?('⚠ '+e):(v===''?'(empty)':v); pv.style.color=e?'var(--red)':'var(--text)'; }

    const ctxCols=(isCustomMode()&&window._boundData&&window._boundData.columns&&window._boundData.columns.length)

    const bits=ctxCols.map(k=>rec[k]?k+': '+rec[k]:'').filter(Boolean); ctx.textContent=bits.join('  ·  ');
  }
}
function fxApply(){

function startRecResize(e){

// ── Undo history ─────────────────────────────────────────────────────────────
const HISTORY=[];
const MAX_HISTORY=50;

// Unsaved-changes tracking. markDirty() on any edit, markClean() on save/load;
// both notify Swift (setDirty) so the window-close handler can prompt to save.
let _dirty=false;
// Include the current document name so the native tab title always mirrors it (covers the
// template picker + New, which set S.tplName purely in JS with no other Swift round-trip).
function markDirty(){ if(!_dirty){ _dirty=true; _vlPost('setDirty',{dirty:true,name:S.tplName||''}); } }
function markClean(){ _dirty=false; _vlPost('setDirty',{dirty:false,name:S.tplName||''}); }
function snapshot(){
  markDirty();
  // Deep-clone just the parts that change: objs and selId
  HISTORY.push(JSON.parse(JSON.stringify({objs:S.objs,selId:S.selId})));
  if(HISTORY.length>MAX_HISTORY)HISTORY.shift();
}

function undo(){
  if(!HISTORY.length)return;
  const prev=HISTORY.pop();
  S.objs=prev.objs;
  S.selId=prev.selId;
  S._ef=undefined;
  R();
}

// Snapshot before any destructive/positional action
const _origDelObj=delObj;
const _origAddObj=addObj;
const _origUobj=uobj;

// Wrap uobj to snapshot before each property change
function uobjWithHistory(id,p){
  snapshot();
  uobj(id,p);
}

// Wrap startDrag to snapshot on mousedown (before move)
const _origStartDrag=startDrag;
// Move just the dragged element's left/top from the model — avoids a full R()
// (which rebuilds the whole designer, re-decoding images etc.) on every frame.
function positionEl(id){
  const o=gobj(id); if(!o)return;
  const el=document.querySelector('[data-obj="'+id+'"]'); if(!el)return;
  const B=BLEED_IN*SC, x=o.x*SC+B, y=o.y*SC+B;
  el.style.left=x+"px";
  if(o.t==="ar"){ const th=Math.max(1,o.lw||2),as=Math.max(4,o.arrowSize||12),hw=as*0.6,vh=Math.max(th/2,hw)+2; el.style.top=(y-vh)+"px"; }
  else { el.style.top=y+"px"; }
}

let _txEditClickId=null,_txEditClickT=0; const DBLCLICK_MS=350;
function startDrag(e,id){
  e.stopPropagation();
  const o=gobj(id);if(!o)return;
  if(S.editingId&&S.editingId!==id)S.editingId=null;
  // Shift / ⌘-click toggles this object in/out of the multi-selection (no drag).
  if(e.shiftKey||e.metaKey||e.ctrlKey){ toggleSel(id); S._selAnchor=id; R(); return; }
  // Double-click a lone static text box → edit inline. A single click only selects
  // and arms a move, so static text stays draggable (previously a single click
  // entered edit mode, after which the box could no longer be moved).
  if(o.t==="tx" && txMode(o)==="static" && (S.selIds||[]).length<=1){
    const now=Date.now();
    if(_txEditClickId===id && (now-_txEditClickT)<DBLCLICK_MS){
      _txEditClickId=null; _txEditClickT=0;
      e.preventDefault();   // or the mousedown's default focus action blurs the editor
      startTextEdit(id); return;
    }
    _txEditClickId=id; _txEditClickT=now;
  }
  // First click on an UNSELECTED table selects the table AND the cell under the
  // pointer in one gesture. Clicking that already-selected cell again then starts
  // editing (see tblCellDown) — so a physical double-click is mechanically
  // select+edit, with NO click-pair timing anywhere. (Timing-based approaches fail
  // in WKWebView: the first click's R() rebuild replaces the node under the cursor,
  // so the OS never composes a dblclick and per-element timers race the rebuild.)
  if(o.t==="tb" && (S.selIds||[]).length<=1 && Array.isArray(o.cols) && Array.isArray(o.rows)){
    const rc=tblCellAt(o,e);
    // A covered cell selects its merged-region ANCHOR.
    const rk=(tblRegions(o).reg[rc[0]]||[])[rc[1]]||(rc[0]+','+rc[1]);
    const rp=rk.split(',');
    S._tblSel={id:id,anchor:[+rp[0],+rp[1]],cells:[rk]};
  }
  // Grabbing an object already part of a multi-selection drags the whole group;
  // grabbing anything else selects just it first.
  const inMulti=(S.selIds||[]).length>1 && S.selIds.includes(id);
  if(!inMulti && (S.selId!==id||(S.selIds||[]).length>1)){ setSel(id); S._selAnchor=id; S._ef=o.f; R(); }
  snapshot();
  S._rulerObj=id;   // highlight this object's extent on the rulers while dragging
  const ids=((S.selIds||[]).length?S.selIds:[id]).slice();
  const origs={}; ids.forEach(i=>{const oo=gobj(i); if(oo)origs[i]={x:oo.x,y:oo.y};});
  const sx=e.clientX,sy=e.clientY,ox=o.x,oy=o.y;
  let moved=false;
  function mv(e){
    if(!moved && (Math.abs(e.clientX-sx)>3||Math.abs(e.clientY-sy)>3)) moved=true;
    const rawX=ox+(e.clientX-sx)/(SC*S.zoom);
    const rawY=oy+(e.clientY-sy)/(SC*S.zoom);
    const o2=gobj(id);
    const snapped=applySnap(rawX,rawY,o2?o2.w:0.1,o2?o2.h:0.1,id);
    // Apply the grabbed object's (snapped) delta to every selected object so the
    // whole group moves rigidly together.
    const dx=snapped.x-ox, dy=snapped.y-oy;
    ids.forEach(i=>{ const og=origs[i]; if(!og)return; uobj(i,{x:og.x+dx,y:og.y+dy}); positionEl(i); });
    renderSnapGuides();   // show the alignment guides live
    drawRulers();         // highlight the object's extent on the rulers
  }
  function mu(){
    S._snapLines=[]; renderSnapGuides(); S._rulerObj=null;
    window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",mu);
    // Single click no longer enters edit mode (double-click does, handled above),
    // so a lone static text box can be selected and dragged.
    R();
  }
  window.addEventListener("mousemove",mv);window.addEventListener("mouseup",mu);
}

// Wrap startResize to snapshot on mousedown
// Drag a line's end handle to stretch it. 'r' = move right end (width),
// 'l' = move left end (x + width, keeping the right end fixed).
function startLineResize(e,id,end){
  e.stopPropagation();
  const o=gobj(id);if(!o)return;
  if(S.selId!==id){S.selId=id;S._ef=o.f;}
  snapshot();
  const sx=e.clientX, ox=o.x, ow=o.w;
  function mv(ev){
    const dx=(ev.clientX-sx)/(SC*S.zoom);
    if(end==='r'){
      uobj(id,{w:snapToGrid(Math.max(.02,ow+dx))});
    }else{
      let nx=snapToGrid(ox+dx);
      nx=Math.max(-BLEED_IN,Math.min(nx,ox+ow-.02));
      uobj(id,{x:nx,w:(ox+ow)-nx});
    }
    scheduleCanvas();
  }
  function mu(){window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',mu);}
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',mu);
}

// Drag the rotate handle: angle = direction from the object's on-screen
// center to the cursor. Handle points "up" at 0°. Hold Shift to snap to 15°.
function startRotate(e,id){
  e.stopPropagation();e.preventDefault();
  const o=gobj(id);if(!o)return;
  if(S.selId!==id){S.selId=id;S._ef=o.f;}
  snapshot();
  const el=e.currentTarget.closest('[data-obj]');
  if(!el)return;
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  function mv(ev){
    let deg=Math.atan2(ev.clientY-cy,ev.clientX-cx)*180/Math.PI+90;
    deg=((deg%360)+360)%360;
    if(ev.shiftKey) deg=Math.round(deg/15)*15;
    uobj(id,{rot:Math.round(deg)%360});scheduleCanvas();
  }
  function mu(){window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',mu);}
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',mu);
}

// Resize from any corner; the opposite corner stays anchored. `corner` is
// one of tl/tr/bl/br (defaults to br for back-compat).
function startResize(e,id,corner){
  e.stopPropagation();
  const o=gobj(id);if(!o)return;
  snapshot();
  corner=corner||'br';
  const isLeft=(corner==='tl'||corner==='bl'), isTop=(corner==='tl'||corner==='tr');
  const sx=e.clientX,sy=e.clientY,ox=o.x,oy=o.y,ow=o.w,oh=o.h;
  const right=ox+ow, bottom=oy+oh;
  const ratio=(ow>0&&oh>0)?oh/ow:1;
  const square=(o.t==="ci"||o.t==="sy");
  const lockAR=(o.t==="im"&&o.lockAspect!==false);
  function mv(e){
    const dx=(e.clientX-sx)/(SC*S.zoom);
    const dy=(e.clientY-sy)/(SC*S.zoom);
    let nx=ox, ny=oy, nw=ow, nh=oh;
    if(isLeft){ nx=snapToGrid(Math.min(ox+dx,right-0.05)); nw=right-nx; } else { nw=snapToGrid(Math.max(0.05,ow+dx)); }
    if(isTop){  ny=snapToGrid(Math.min(oy+dy,bottom-0.02)); nh=bottom-ny; } else { nh=snapToGrid(Math.max(0.02,oh+dy)); }
    nw=Math.max(0.05,nw); nh=Math.max(0.02,nh);
    if(square){ const s=Math.max(nw,nh); nw=s; nh=s; if(isLeft)nx=right-s; if(isTop)ny=bottom-s; }
    else if(lockAR){ nh=+(nw*ratio).toFixed(4); if(isTop)ny=bottom-nh; }
    if(o.t==="tb"){
      // Tables: route the new size through tblApplySize so cols/rows redistribute
      // proportionally (equally when locked-uniform) and w/h stay == the sums.
      uobj(id,{x:Math.max(-BLEED_IN,nx),y:Math.max(-BLEED_IN,ny)});
      tblApplySize(id,nw,nh);
    }else{
      uobj(id,{x:Math.max(-BLEED_IN,nx),y:Math.max(-BLEED_IN,ny),w:nw,h:nh});
    }
    scheduleCanvas();
  }
  function mu(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",mu);}
  window.addEventListener("mousemove",mv);window.addEventListener("mouseup",mu);
}

function delObj(){
  const ids=(S.selIds||[]).length?S.selIds.slice():(S.selId?[S.selId]:[]);
  if(!ids.length)return;
  snapshot();
  S.objs=S.objs.filter(o=>!ids.includes(o.id));
  S.selId=null; S.selIds=[];
  R();
}

// ── Duplicate / copy / paste ────────────────────────────────────────────────
let _objClipboard=null;
const PASTE_OFFSET=0.1;   // inches

function _selectNew(c){ S.objs.push(c); setSel(c.id); S._ef=(c.t==='tx'?c.f:undefined); S.editingId=null; R(); }
// Select a freshly created batch of objects (used by multi duplicate/paste).
function _selectNewBatch(ids){ S.selIds=ids.slice(); S.selId=ids[ids.length-1]||null; S.editingId=null; const p=S.selId&&gobj(S.selId); S._ef=(p&&p.t==='tx')?p.f:undefined; R(); }

// Cmd+D — duplicate in place (same position, new ids); duplicates all selected.
function duplicateObj(){
  const sels=selObjs(); if(!sels.length)return;
  snapshot();
  const ids=sels.map(o=>{ const c=JSON.parse(JSON.stringify(o)); c.id=mid(); S.objs.push(c); return c.id; });
  _selectNewBatch(ids);
}
function copyObj(){
  const sels=selObjs(); if(!sels.length)return;
  _objClipboard=JSON.parse(JSON.stringify(sels));
  if(typeof showToast==='function')showToast(sels.length>1?('Copied '+sels.length+' objects'):'Copied');
}
// Cmd+V — paste offset from the originals; repeated pastes cascade.
function pasteObj(){
  if(!_objClipboard)return;
  const arr=Array.isArray(_objClipboard)?_objClipboard:[_objClipboard];
  if(!arr.length)return;
  snapshot();
  const ids=arr.map(src=>{
    const c=JSON.parse(JSON.stringify(src)); c.id=mid();
    c.x=Math.max(-BLEED_IN,(c.x||0)+PASTE_OFFSET);
    c.y=Math.max(-BLEED_IN,(c.y||0)+PASTE_OFFSET);
    src.x=c.x; src.y=c.y;   // cascade next paste
    S.objs.push(c); return c.id;
  });
  _selectNewBatch(ids);
}

// Short label for an object in the object list.
function objListLabel(o){
  if(o.t==='tx'){
    const m=txMode(o);
    if(m==='static') return (o.text||'').trim() || 'Text';
    if(m==='field')  return o.field ? ('['+o.field+']') : 'Field';
    const f=(o.f||'').replace(/^=/,'').trim();
    return f && f!=='""' ? f : 'Text';
  }
  if(o.t==='tb') return 'Table '+((o.rows||[]).length||1)+'×'+((o.cols||[]).length||1);
  return o.t==='ln'?'Line':o.t==='ar'?'Arrow':o.t==='ci'?'Circle':o.t==='ov'?'Oval':o.t==='im'?'Image':o.t==='sy'?((SYMBOLS[o.sym]||{}).label||'Symbol'):'Rectangle';
}

// Select an object from the object list. Modifiers (macOS list convention):
//   ⇧ Shift  → RANGE: select every object between the anchor and this one (in list order).
//   ⌘/Ctrl   → FREE: toggle just this object in/out of the selection; it becomes the anchor.
//   (plain)  → select only this object; it becomes the anchor.
function selectObj(id,e){
  const o=gobj(id); if(!o)return;
  const ids=S.objs.map(x=>x.id), idx=ids.indexOf(id);
  if(e&&e.shiftKey){
    const aIdx=(S._selAnchor!=null && ids.indexOf(S._selAnchor)>=0) ? ids.indexOf(S._selAnchor) : idx;
    const lo=Math.min(aIdx,idx), hi=Math.max(aIdx,idx);
    S.selIds=ids.slice(lo,hi+1); S.selId=id;   // anchor stays put for further range extends
    S.editingId=null; S._ef=o.t==='tx'?o.f:undefined; R(); return;
  }
  if(e&&(e.metaKey||e.ctrlKey)){
    toggleSel(id); S._selAnchor=id;
    const p=S.selId&&gobj(S.selId); S.editingId=null; S._ef=(p&&p.t==='tx')?p.f:undefined; R(); return;
  }
  setSel(id); S._selAnchor=id;
  S.editingId=null;
  S._ef=o.t==='tx'?o.f:undefined;
  R();
}

// ── Image objects (pick → monochrome convert → embed) ──────────────────────────
// The processed (monochrome, alpha-preserving) PNG is stored as a data URL in
// `src`; the original + slider params are kept too so it can be re-adjusted.
let _imgState=null; // {origURL, img, b, c, t, editId}

function pickImage(){ const inp=document.getElementById('imgFilePicker'); if(inp){ inp.value=''; inp.click(); } }

function onImagePicked(ev){
  const file=ev.target.files&&ev.target.files[0]; if(!file)return;
  const fr=new FileReader();
  fr.onload=function(){ loadImageForEdit(fr.result, null); };
  fr.readAsDataURL(file);
}

function loadImageForEdit(origURL, editId){
  const img=new Image();
  img.onload=function(){
    _imgState={origURL:origURL, img:img, b:0, c:0, t:128, editId:editId};
    if(editId){ const o=gobj(editId); if(o){ _imgState.b=o.imgB||0; _imgState.c=o.imgC||0; _imgState.t=(o.imgT!=null?o.imgT:128); } }
    renderImageModal();
  };
  img.onerror=function(){ if(typeof showToast==='function')showToast('Could not load that image'); };
  img.src=origURL;
}

function reprocessImage(id){ const o=gobj(id); if(o)loadImageForEdit(o.imgOrig||o.src, id); }

// Set an image's width or height; when aspect is locked, scale the other to
// preserve the current ratio.
function imgSetDim(id,key,val){
  const o=gobj(id); if(!o||!(val>0))return;
  if(o.lockAspect!==false && o.w>0 && o.h>0){
    const ar=o.h/o.w;
    if(key==='w') uobj(id,{w:val,h:+(val*ar).toFixed(4)});
    else          uobj(id,{h:val,w:+(val/ar).toFixed(4)});
  }else{
    uobj(id,{[key]:val});
  }
  R();
}

// Render the source image into `canvas` applying brightness/contrast and a
// black/white threshold, preserving transparency. Caps the long side at 600px.
function processToCanvas(canvas){
  const st=_imgState, img=st.img, max=600;
  let w=img.naturalWidth||img.width||1, h=img.naturalHeight||img.height||1;
  const scale=Math.min(1, max/Math.max(w,h));
  w=Math.max(1,Math.round(w*scale)); h=Math.max(1,Math.round(h*scale));
  canvas.width=w; canvas.height=h;
  const cx=canvas.getContext('2d');
  cx.clearRect(0,0,w,h); cx.drawImage(img,0,0,w,h);
  const id=cx.getImageData(0,0,w,h), d=id.data;
  const c=st.c, cf=(259*(c+255))/(255*(259-c));
  for(let i=0;i<d.length;i+=4){
    if(d[i+3]<8){ d[i+3]=0; continue; }      // transparent stays transparent
    let lum=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    lum+=st.b;                                // brightness
    lum=cf*(lum-128)+128;                     // contrast
    const v=lum<st.t?0:255;                   // threshold → black / white
    d[i]=d[i+1]=d[i+2]=v;
  }
  cx.putImageData(id,0,0);
}

function drawImgPreview(){ const cv=document.getElementById('imgPreview'); if(cv&&_imgState)processToCanvas(cv); }
function imgSet(prop,val){ if(!_imgState)return; _imgState[prop]=parseFloat(val); drawImgPreview(); const el=document.getElementById('imgval_'+prop); if(el)el.textContent=Math.round(_imgState[prop]); }
function closeImageModal(){ _imgState=null; const m=document.getElementById('img-modal'); if(m)m.remove(); }

function applyImg(){
  const st=_imgState; if(!st)return;
  const cv=document.createElement('canvas'); processToCanvas(cv);
  const procURL=cv.toDataURL('image/png');
  snapshot();
  if(st.editId){
    uobj(st.editId,{src:procURL,imgOrig:st.origURL,imgB:st.b,imgC:st.c,imgT:st.t});
  }else{
    const id=mid();
    const ar=(st.img.naturalHeight||1)/(st.img.naturalWidth||1);
    const w=1.0, h=+(Math.max(.05,w*ar)).toFixed(3);
    S.objs.push({id,x:.1,y:.1,t:"im",w:w,h:h,src:procURL,imgOrig:st.origURL,imgB:st.b,imgC:st.c,imgT:st.t,lockAspect:true});
    S.selId=id; S._ef=undefined;
  }
  closeImageModal(); R();
}

function imgSlider(lbl,key,val,min,max){

    <span id="imgval_${key}" style="width:38px;text-align:right;color:var(--text2);font-size:11px;font-family:monospace">${Math.round(val)}</span>

// ── Table objects (t:"tb") ────────────────────────────────────────────────────
// A grid of text cells. Geometry lives in cols[]/rows[] (inches; w==sum(cols),
// h==sum(rows) always); each cell carries the tx text fields only (no x/y/w/h/id).
// All mutations follow the undo contract: snapshot() → recompute a clone →
// uobj() → R(). Transient cell selection/edit state lives in S._tblSel/S._tblEdit.
const TBL_MIN=0.05;   // minimum column width / row height (inches)

// The tx text defaults addObj uses, minus geometry (empty text — cells start blank).
function tblDefaultCell(){
  return {mode:"static",text:"",al:"left",valign:"middle",fs:15,bold:false,italic:false,underline:false,font:"Arial",wrapText:false,tracking:0,stretch:100};
}
// ── Merged-cell coverage (derived each pass; rs/cs live only on anchor cells) ──
// reg[r][c] = the "ar,ac" anchor key of the region containing (r,c) — its own key
// when unmerged. Spans coerce to integers ≥1 and clamp to the table bounds;
// overlaps resolve row-major FIRST-WINS: a later anchor whose span would land on
// an already-claimed cell contributes no span at all. Pure — safe in buildCanvas.
// covered(r,c) = (r,c) lies inside ANOTHER anchor's span.
function tblRegions(o){
  const nr=(o.rows||[]).length, nc=(o.cols||[]).length, reg=[];
  for(let r=0;r<nr;r++){ const row=[]; for(let c=0;c<nc;c++)row.push(null); reg.push(row); }
  for(let r=0;r<nr;r++)for(let c=0;c<nc;c++){
    if(reg[r][c])continue;   // claimed by an earlier region — this cell's span is ignored
    const cl=((o.cells||[])[r]||[])[c]||{};
    let rs=Math.min(Math.max(1,Math.floor(+cl.rs)||1),nr-r);
    let cs=Math.min(Math.max(1,Math.floor(+cl.cs)||1),nc-c);
    let clash=false;
    for(let rr=r;rr<r+rs&&!clash;rr++)for(let cc=c;cc<c+cs;cc++)if(reg[rr][cc]){clash=true;break;}
    if(clash){rs=1;cs=1;}   // first-wins: an overlapping later anchor loses its span
    const key=r+','+c;
    for(let rr=r;rr<r+rs;rr++)for(let cc=c;cc<c+cs;cc++)reg[rr][cc]=key;
  }
  return {reg:reg, covered:function(r,c){ return !!(reg[r]&&reg[r][c]&&reg[r][c]!==r+','+c); }};
}
// The rectangular extent [rs,cs] of the region ANCHORED at (r,c) — [1,1] when
// unmerged. Reads a tblRegions() map (regions are always rectangles).
function tblRegionSpan(reg,r,c){
  const key=r+','+c; let rs=1,cs=1;
  while(reg[r+rs]&&reg[r+rs][c]===key)rs++;
  while(reg[r][c+cs]===key)cs++;
  return [rs,cs];
}
// Resolve which [row,col] of table `o` a mouse event is over. `el` is the table's
// rendered object div ([data-obj]). Object-relative px → inches → cumulative sums.
function tblCellAtEl(o,el,e){
  const rect=el.getBoundingClientRect();
  const z=SC*S.zoom;
  const xi=(e.clientX-rect.left)/z, yi=(e.clientY-rect.top)/z;
  let c=o.cols.length-1, acc=0;
  for(let i=0;i<o.cols.length;i++){ acc+=o.cols[i]; if(xi<acc){c=i;break;} }
  let r=o.rows.length-1; acc=0;
  for(let i=0;i<o.rows.length;i++){ acc+=o.rows[i]; if(yi<acc){r=i;break;} }
  return [r,c];
}
function tblCellAt(o,e){ return tblCellAtEl(o,e.currentTarget||e.target,e); }
// (Cell editing is engaged by clicking the already-selected cell — see tblCellDown.
// A browser-composed dblclick can't be relied on here: the first click's R() rebuild
// replaces the node under the cursor, so WebKit never composes the event.)
// Right-clicking a line-drag strip opens the CELL menu for the cell under the pointer
// (the strips sit above the cell hit divs; without this the native WebView menu leaks).
function tblStripCtx(e,id){
  const o=gobj(id); if(!o||o.t!=="tb")return;
  e.preventDefault(); e.stopPropagation();
  const host=(e.currentTarget&&e.currentTarget.closest)?e.currentTarget.closest('[data-obj]'):null;
  if(!host)return;
  const rc=tblCellAtEl(o,host,e);
  const rk=(tblRegions(o).reg[rc[0]]||[])[rc[1]]||(rc[0]+','+rc[1]);
  const rp=rk.split(',');
  tblCtxMenu(e,id,+rp[0],+rp[1]);
}
// The designer never wants WKWebView's own context menu ("Reload") anywhere on the
// canvas — the app's menus preventDefault on their own elements; this kills the
// native fallback for everything else (strips, gaps, the label background).
document.addEventListener('contextmenu',function(ev){
  const host=document.getElementById('canvas-host');
  if(host&&ev.target&&host.contains(ev.target))ev.preventDefault();
});
// Arrow ↑/↓ in a numeric panel input steps the value AND commits it like clicking the
// stepper buttons. Native arrow-stepping only fires 'change' on blur, so we dispatch it
// ourselves — debounced, because the commit re-renders the panel (dropping focus), and
// rapid stepping should stay in the input until the user pauses.
let _numArrowT=null;
document.addEventListener('keydown',function(ev){
  if(ev.key!=='ArrowUp'&&ev.key!=='ArrowDown')return;
  const el=document.activeElement;
  if(!el||el.tagName!=='INPUT'||el.type!=='number')return;
  if(!el.closest('#props-pane'))return;
  clearTimeout(_numArrowT);
  _numArrowT=setTimeout(function(){ el.dispatchEvent(new Event('change')); },400);
});
// Does this cell currently hold a value? (static text, a bound field, or a
// non-trivial formula — the seeded '=""' doesn't count.)
function tblCellHasValue(cl){
  if(!cl)return false;
  const m=txMode(cl);
  if(m==="static")return (cl.text||"")!=="";
  if(m==="field")return !!cl.field;
  return (cl.f||"")!==""&&cl.f!=='=""';
}
// One-time first-value font sizing: the largest font size at which ~10 average
// characters fit the cell's width (and one line fits its height). Applied ONCE,
// the first time a value lands in a cell (typed or bound); cl.sized then pins it
// forever — deleting the value and entering another must NOT re-size.
const TBL_AUTOSIZE_CHARS=10;
function tblAutoSizeFs(o,r,c){
  const cl=(o.cells[r]||[])[c]||{};
  const cw=Math.max(0.02,(o.cols[c]||0.1))*SC-4;   // px at zoom 1, minus cell padding
  const ch=Math.max(0.02,(o.rows[r]||0.1))*SC-2;
  const cv=document.createElement('canvas').getContext('2d');
  cv.font=(cl.italic?"italic ":"")+(cl.bold?"700 ":"400 ")+"100px '"+(cl.font||"Arial")+"',Arial,sans-serif";
  let w=cv.measureText("0".repeat(TBL_AUTOSIZE_CHARS)).width||600;
  w*=(cl.stretch||100)/100;
  let px=100*cw/w;                 // 10 chars fit the width…
  px=Math.min(px,ch/1.15);         // …and one line fits the row height
  return Math.max(4,Math.min(96,Math.round(px/(SC/100))));
}
// Apply the one-time auto-size to a cell that just gained its FIRST value.
// `prevEmpty` is tblCellHasValue() measured BEFORE the mutation.
function tblMaybeAutoSize(t,r,c,prevEmpty){
  const cl=(t.cells[r]||[])[c];
  if(!cl||cl.sized===true||!prevEmpty||!tblCellHasValue(cl))return;
  cl.fs=tblAutoSizeFs(t,r,c);
  cl.sized=true;
}
// The cell objects currently selected in a table (empty when no cell selection).
function tblSelCells(){
  if(!S._tblSel)return[];
  const o=gobj(S._tblSel.id); if(!o||o.t!=="tb")return[];
  return (S._tblSel.cells||[]).map(function(k){const p=k.split(',');return (o.cells[+p[0]]||[])[+p[1]];}).filter(Boolean);
}

// ── Insert modal (Rows × Columns) ───────────────────────────────────────────
function openTableInsert(){
  let m=document.getElementById('tbl-ins-modal');
  if(!m){ m=document.createElement('div'); m.id='tbl-ins-modal'; m.className='modal-overlay'; m.onclick=e=>{if(e.target===m)closeTableInsert();}; document.body.appendChild(m); }
  m.innerHTML=`<div class="modal" style="min-width:300px">
    <div class="modal-title">Insert table</div>
    <div style="display:flex;gap:10px">
      <div style="flex:1"><label class="lbl">Rows</label><input id="tbl-ins-rows" type="number" class="inp" min="1" max="20" value="3"></div>
      <div style="flex:1"><label class="lbl">Columns</label><input id="tbl-ins-cols" type="number" class="inp" min="1" max="20" value="3"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeTableInsert()">Cancel</button>
      <button class="btn" onclick="confirmTableInsert()" style="background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600">Add</button>
    </div>
  </div>`;
  // Self-handled Enter/Escape (imperative overlay — not S.modal, so the global
  // capture Escape at the modal handler ignores it).
  m.querySelectorAll('input').forEach(inp=>{ inp.onkeydown=e=>{ if(e.key==='Enter')confirmTableInsert(); if(e.key==='Escape'){ e.stopPropagation(); closeTableInsert(); } }; });
  document.addEventListener('keydown',_tblInsKey,true);
  const fi=m.querySelector('#tbl-ins-rows'); if(fi){ fi.focus(); fi.select(); }
}
function _tblInsKey(e){ if(e.key==='Escape'&&document.getElementById('tbl-ins-modal')){ e.preventDefault(); e.stopPropagation(); closeTableInsert(); } }
function closeTableInsert(){ const m=document.getElementById('tbl-ins-modal'); if(m)m.remove(); document.removeEventListener('keydown',_tblInsKey,true); }
function confirmTableInsert(){
  const r=Math.max(1,Math.min(20,parseInt((document.getElementById('tbl-ins-rows')||{}).value)||3));
  const c=Math.max(1,Math.min(20,parseInt((document.getElementById('tbl-ins-cols')||{}).value)||3));
  closeTableInsert();
  addTable(r,c);
}
function addTable(nr,nc){
  snapshot();
  nr=Math.max(1,Math.min(20,nr||3)); nc=Math.max(1,Math.min(20,nc||3));
  const id=mid();
  // Default footprint ≈60% of the printable area, uniform cells (min 0.05in each).
  const w=Math.max(TBL_MIN*nc,+(S.spec.pw*0.6).toFixed(3));
  const h=Math.max(TBL_MIN*nr,+(S.spec.ph*0.6).toFixed(3));
  const cw=+(w/nc).toFixed(4), rh=+(h/nr).toFixed(4);
  const cols=[],rows=[]; for(let i=0;i<nc;i++)cols.push(cw); for(let i=0;i<nr;i++)rows.push(rh);
  const cells=[]; for(let r=0;r<nr;r++){ const row=[]; for(let c=0;c<nc;c++)row.push(tblDefaultCell()); cells.push(row); }
  S.objs.push({id,x:.05,y:.05,t:"tb",
    w:+cols.reduce((a,b)=>a+b,0).toFixed(4),h:+rows.reduce((a,b)=>a+b,0).toFixed(4),
    cols:cols,rows:rows,lockCols:false,lockRows:false,lockSize:false,lw:1,cells:cells});
  setSel(id); S._ef=undefined; S._tblSel=null; S._tblEdit=null; R();
}

// ── Geometry helpers ───────────────────────────────────────────────────────────
// Scale a cols/rows array to a new total (inches) proportionally, clamping each
// entry at TBL_MIN (a few passes converge the clamp overshoot).
function tblFit(arr,total){
  total=Math.max(total,TBL_MIN*arr.length);
  let out=arr.map(v=>Math.max(TBL_MIN,v));
  for(let pass=0;pass<4;pass++){
    const sum=out.reduce((a,b)=>a+b,0);
    if(Math.abs(sum-total)<1e-6)break;
    const flex=out.reduce((a,v)=>a+(v>TBL_MIN+1e-9?v:0),0);
    if(!flex){ out=out.map(()=>total/arr.length); break; }
    const k=(total-(sum-flex))/flex;
    out=out.map(v=>v>TBL_MIN+1e-9?Math.max(TBL_MIN,v*k):v);
  }
  return out;
}
// Enforce the invariants on a (cloned) table: ≥1 col/row each ≥TBL_MIN, uniform
// when lockCols/lockRows (sum preserved), cells reshaped rows×cols preserving
// content, and w/h == the sums.
function tblNorm(t){
  if(!Array.isArray(t.cols)||!t.cols.length)t.cols=[Math.max(TBL_MIN,+t.w||1)];
  if(!Array.isArray(t.rows)||!t.rows.length)t.rows=[Math.max(TBL_MIN,+t.h||0.25)];
  t.cols=t.cols.map(v=>Math.max(TBL_MIN,+v||TBL_MIN));
  t.rows=t.rows.map(v=>Math.max(TBL_MIN,+v||TBL_MIN));
  if(t.lockCols){ const u=t.cols.reduce((a,b)=>a+b,0)/t.cols.length; t.cols=t.cols.map(()=>u); }
  if(t.lockRows){ const u=t.rows.reduce((a,b)=>a+b,0)/t.rows.length; t.rows=t.rows.map(()=>u); }
  t.cols=t.cols.map(v=>+v.toFixed(4)); t.rows=t.rows.map(v=>+v.toFixed(4));
  const cells=[];
  for(let r=0;r<t.rows.length;r++){
    const src=(t.cells&&t.cells[r])||[], row=[];
    for(let c=0;c<t.cols.length;c++)row.push(src[c]||tblDefaultCell());
    cells.push(row);
  }
  t.cells=cells;
  // Merged-cell spans: integers ≥1 clamped to the grid; a span that would overlap
  // an earlier region is stripped (row-major first-wins). tblRegions applies those
  // rules when READING — rewrite each cell's rs/cs to that derived truth.
  const reg=tblRegions(t).reg;
  for(let r=0;r<t.rows.length;r++)for(let c=0;c<t.cols.length;c++){
    const cl=t.cells[r][c];
    if(reg[r][c]!==r+','+c){ delete cl.rs; delete cl.cs; continue; }   // covered cell
    const sp=tblRegionSpan(reg,r,c);
    if(sp[0]>1)cl.rs=sp[0]; else delete cl.rs;
    if(sp[1]>1)cl.cs=sp[1]; else delete cl.cs;
  }
  t.w=+t.cols.reduce((a,b)=>a+b,0).toFixed(4);
  t.h=+t.rows.reduce((a,b)=>a+b,0).toFixed(4);
  return t;
}
// Commit normalizes first, so EVERY mutation path (row/col splices, paste,
// merge/split) lands with the invariants — incl. span clamping — enforced.
function tblCommit(id,t){ tblNorm(t); uobj(id,{cols:t.cols,rows:t.rows,cells:t.cells,w:t.w,h:t.h,lockCols:!!t.lockCols,lockRows:!!t.lockRows,lockSize:!!t.lockSize}); }
// Keep the cell selection meaningful across row/col inserts/deletes (indices
// shift). fn(r,c) → [r,c] remapped, or null to drop the cell from the selection.
function tblSelRemap(id,fn){
  if(!S._tblSel||S._tblSel.id!==id)return;
  const cells=[];
  S._tblSel.cells.forEach(function(k){
    const p=k.split(','), m=fn(+p[0],+p[1]);
    if(m)cells.push(m[0]+','+m[1]);
  });
  if(!cells.length){ S._tblSel=null; return; }
  const a=fn(S._tblSel.anchor[0],S._tblSel.anchor[1]);
  S._tblSel={id:id,anchor:a||cells[0].split(',').map(Number),cells:cells};
}

// ── Whole-table sizing ─────────────────────────────────────────────────────────
// Set the overall width/height (null = leave one alone). Redistributes across
// cols/rows proportionally — equally when locked-uniform. No snapshot()/R():
// startResize calls this mid-gesture; tblResizeTable wraps it for the panel.
function tblApplySize(id,nw,nh){
  const o=gobj(id); if(!o||o.t!=="tb")return;
  const p={};
  if(nw!=null&&isFinite(nw)){
    nw=Math.max(TBL_MIN*o.cols.length,nw);
    const cols=o.lockCols?o.cols.map(()=>nw/o.cols.length):tblFit(o.cols,nw);
    p.cols=cols.map(v=>+v.toFixed(4));
    p.w=+p.cols.reduce((a,b)=>a+b,0).toFixed(4);
  }
  if(nh!=null&&isFinite(nh)){
    nh=Math.max(TBL_MIN*o.rows.length,nh);
    const rows=o.lockRows?o.rows.map(()=>nh/o.rows.length):tblFit(o.rows,nh);
    p.rows=rows.map(v=>+v.toFixed(4));
    p.h=+p.rows.reduce((a,b)=>a+b,0).toFixed(4);
  }
  if(p.cols||p.rows)uobj(id,p);
}
function tblResizeTable(id,nw,nh){
  const o=gobj(id); if(!o||o.t!=="tb")return;
  if(!(nw>0)&&!(nh>0))return;   // NaN / empty input → no-op (no stray undo entry)
  if(o.lockSize){ showToast("Table size is locked"); R(); return; }
  snapshot(); tblApplySize(id,nw,nh); R();
}

// ── Row/column mutations ───────────────────────────────────────────────────────
function tblAddRow(id,at){
  const o=gobj(id); if(!o||o.t!=="tb")return;
  snapshot();
  const t=JSON.parse(JSON.stringify(o));
  const oldH=t.rows.reduce((a,b)=>a+b,0);
  at=Math.max(0,Math.min(at==null?t.rows.length:at,t.rows.length));
  const ref=t.rows[Math.max(0,Math.min(at>0?at-1:0,t.rows.length-1))]||0.25;
  t.rows.splice(at,0,Math.max(TBL_MIN,ref));
  t.cells.splice(at,0,t.cols.map(function(){return tblDefaultCell();}));
  if(t.lockSize)t.rows=tblFit(t.rows,oldH);   // fixed height → the rows share it
  tblNorm(t); tblCommit(id,t);
  tblSelRemap(id,function(r,c){return [r>=at?r+1:r,c];});
  R();
}
function tblAddCol(id,at){
  const o=gobj(id); if(!o||o.t!=="tb")return;
  snapshot();
  const t=JSON.parse(JSON.stringify(o));
  const oldW=t.cols.reduce((a,b)=>a+b,0);
  at=Math.max(0,Math.min(at==null?t.cols.length:at,t.cols.length));
  const ref=t.cols[Math.max(0,Math.min(at>0?at-1:0,t.cols.length-1))]||0.4;
  t.cols.splice(at,0,Math.max(TBL_MIN,ref));
  t.cells.forEach(function(row){ row.splice(at,0,tblDefaultCell()); });
  if(t.lockSize)t.cols=tblFit(t.cols,oldW);
  tblNorm(t); tblCommit(id,t);
  tblSelRemap(id,function(r,c){return [r,c>=at?c+1:c];});
  R();
}
function tblDeleteRows(id,idxs){
  const o=gobj(id); if(!o||o.t!=="tb")return;
  idxs=Array.from(new Set((idxs||[]).filter(i=>i>=0&&i<o.rows.length)));
  if(!idxs.length)return;
  if(idxs.length>=o.rows.length){ showToast("A table needs at least one row"); return; }
  snapshot();
  const t=JSON.parse(JSON.stringify(o));
  const oldH=t.rows.reduce((a,b)=>a+b,0);
  idxs.slice().sort((a,b)=>b-a).forEach(function(i){ t.rows.splice(i,1); t.cells.splice(i,1); });
  if(t.lockSize)t.rows=tblFit(t.rows,oldH);
  tblNorm(t); tblCommit(id,t);
  tblSelRemap(id,function(r,c){ if(idxs.includes(r))return null; return [r-idxs.filter(i=>i<r).length,c]; });
  R();
}
function tblDeleteCols(id,idxs){
  const o=gobj(id); if(!o||o.t!=="tb")return;
  idxs=Array.from(new Set((idxs||[]).filter(i=>i>=0&&i<o.cols.length)));
  if(!idxs.length)return;
  if(idxs.length>=o.cols.length){ showToast("A table needs at least one column"); return; }
  snapshot();
  const t=JSON.parse(JSON.stringify(o));
  const oldW=t.cols.reduce((a,b)=>a+b,0);
  idxs.slice().sort((a,b)=>b-a).forEach(function(i){ t.cols.splice(i,1); t.cells.forEach(function(row){ row.splice(i,1); }); });
  if(t.lockSize)t.cols=tblFit(t.cols,oldW);
  tblNorm(t); tblCommit(id,t);
  tblSelRemap(id,function(r,c){ if(idxs.includes(c))return null; return [r,c-idxs.filter(i=>i<c).length]; });
  R();
}
// Set the given col widths / row heights (inches), honouring the locks:
// lockCols/lockRows → the value becomes the uniform size for ALL cols/rows;
// lockSize → the others rescale so the table's total is preserved.
function tblSetSizes(id,axis,idxs,v){
  const o=gobj(id); if(!o||o.t!=="tb"||!(v>0)||!(idxs||[]).length)return;
  const locked=axis==='col'?o.lockCols:o.lockRows;
  if(locked&&o.lockSize){ showToast(axis==='col'?"Columns are locked equal and the table size is locked":"Rows are locked equal and the table size is locked"); R(); return; }
  v=Math.max(TBL_MIN,v);
  snapshot();
  const t=JSON.parse(JSON.stringify(o));
  const ta=axis==='col'?t.cols:t.rows;
  idxs=idxs.filter(i=>i>=0&&i<ta.length);
  if(locked){ for(let i=0;i<ta.length;i++)ta[i]=v; }
  else if(t.lockSize){
    const total=ta.reduce((a,b)=>a+b,0);
    const k=idxs.length, restMin=(ta.length-k)*TBL_MIN;
    v=Math.max(TBL_MIN,Math.min(v,(total-restMin)/k));   // leave the others their minimum
    idxs.forEach(i=>{ ta[i]=v; });
    const others=[]; for(let i=0;i<ta.length;i++)if(!idxs.includes(i))others.push(i);
    const osum=others.reduce((a,i)=>a+ta[i],0)||1;
    const target=total-v*k;
    others.forEach(i=>{ ta[i]=Math.max(TBL_MIN,ta[i]*target/osum); });
  }
  else{ idxs.forEach(i=>{ ta[i]=v; }); }
  tblNorm(t); tblCommit(id,t); R();
}
function tblSetColWidth(id,index,v){ tblSetSizes(id,'col',[index],v); }
function tblSetRowHeight(id,index,v){ tblSetSizes(id,'row',[index],v); }
// Panel variants: apply to the columns/rows covered by the cell selection.
function tblSetColWidthSel(id,v){ if(S._tblSel&&S._tblSel.id===id)tblSetSizes(id,'col',[...new Set(S._tblSel.cells.map(k=>+k.split(',')[1]))],v); }
function tblSetRowHeightSel(id,v){ if(S._tblSel&&S._tblSel.id===id)tblSetSizes(id,'row',[...new Set(S._tblSel.cells.map(k=>+k.split(',')[0]))],v); }
// Uniform size for a locked-equal axis (the reveal inputs under the checkboxes).
function tblSetUniform(id,axis,inches){
  const o=gobj(id); if(!o||o.t!=="tb"||!(inches>0))return;
  if(o.lockSize){ showToast("Table size is locked — unlock it to change the uniform size"); R(); return; }
  snapshot();
  const t=JSON.parse(JSON.stringify(o));
  const v=Math.max(TBL_MIN,inches);
  if(axis==='col')t.cols=t.cols.map(()=>v); else t.rows=t.rows.map(()=>v);
  tblNorm(t); tblCommit(id,t); R();
}
function tblSetLock(id,key,on){
  const o=gobj(id); if(!o||o.t!=="tb")return;
  snapshot();
  const t=JSON.parse(JSON.stringify(o)); t[key]=!!on;
  tblNorm(t);   // equalizes cols/rows (sum preserved) when a lock switches on
  tblCommit(id,t); R();
}
function tblSetLW(id,v){ const o=gobj(id); if(!o||o.t!=="tb")return; snapshot(); uobj(id,{lw:Math.max(1,Math.min(10,parseInt(v)||1))}); R(); }

// ── Inner grid-line drag (col-resize / row-resize strips) ──────────────────────
// index = the boundary between col/row index-1 and index (1..n-1).
function startTblLineDrag(e,id,axis,index){
  e.stopPropagation(); e.preventDefault();
  const o=gobj(id); if(!o||o.t!=="tb")return;
  const lockedUni=(axis==='col')?o.lockCols:o.lockRows;
  // Equal sizes + a fixed table size leaves nothing for a line drag to change.
  if(lockedUni&&o.lockSize){ showToast(axis==='col'?"Columns are locked equal and the table size is locked":"Rows are locked equal and the table size is locked"); return; }
  snapshot();   // one undo step for the whole gesture
  const sizes0=(axis==='col'?o.cols:o.rows).slice();
  const lockSize=!!o.lockSize;
  const sx=e.clientX, sy=e.clientY;
  function mv(ev){
    const d=((axis==='col'?ev.clientX-sx:ev.clientY-sy))/(SC*S.zoom);
    let sizes=sizes0.slice();
    if(lockedUni){
      // Uniform: the boundary sits at index×u — dragging it rescales EVERY col/row.
      const u=Math.max(TBL_MIN,sizes0[0]+d/index);
      sizes=sizes0.map(function(){return u;});
    }else if(lockSize){
      // Boundary moves WITHIN the table: leading grows, trailing shrinks (sum kept).
      const nd=Math.max(TBL_MIN-sizes0[index-1],Math.min(d,sizes0[index]-TBL_MIN));
      sizes[index-1]=sizes0[index-1]+nd;
      sizes[index]=sizes0[index]-nd;
    }else{
      // The leading col/row resizes; the table grows/shrinks with it.
      sizes[index-1]=Math.max(TBL_MIN,sizes0[index-1]+d);
    }
    sizes=sizes.map(function(v){return +v.toFixed(4);});
    const sum=+sizes.reduce(function(a,b){return a+b;},0).toFixed(4);
    uobj(id,axis==='col'?{cols:sizes,w:sum}:{rows:sizes,h:sum});
    renderCanvasOnly();
  }
  function mu(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',mu); R(); }
  document.addEventListener('mousemove',mv); document.addEventListener('mouseup',mu);
}

// ── Cell selection / inline editing ────────────────────────────────────────────
// Cell mousedown on the SELECTED table: plain = select the cell (clicking the
// already-selected cell starts editing — no click timing involved), ⇧ = rectangular
// range from the anchor, ⌘/Ctrl = toggle. stopPropagation so the table doesn't drag.
function tblCellDown(e,id,r,c){
  e.stopPropagation();
  // preventDefault is LOAD-BEARING: a trusted mousedown's default action moves focus
  // AFTER this handler runs — which would blur the contenteditable we just focused
  // when entering edit mode (its blur handler then exits editing instantly). Hit divs
  // have no useful default behavior, so suppress it unconditionally.
  if(e.preventDefault)e.preventDefault();
  if(e.button===2)return;   // right-click → tblCtxMenu handles selection
  const o=gobj(id); if(!o||o.t!=="tb")return;
  if(S._tblEdit&&!(S._tblEdit.id===id&&S._tblEdit.r===r&&S._tblEdit.c===c))S._tblEdit=null;
  const key=r+','+c;
  if(e.shiftKey&&S._tblSel&&S._tblSel.id===id){
    const ar=S._tblSel.anchor[0], ac=S._tblSel.anchor[1];
    const cells=[];
    for(let rr=Math.min(ar,r);rr<=Math.max(ar,r);rr++)
      for(let cc=Math.min(ac,c);cc<=Math.max(ac,c);cc++)cells.push(rr+','+cc);
    S._tblSel={id:id,anchor:[ar,ac],cells:cells};
  }else if((e.metaKey||e.ctrlKey)&&S._tblSel&&S._tblSel.id===id){
    const cells=S._tblSel.cells.slice(), i=cells.indexOf(key);
    if(i>=0)cells.splice(i,1); else cells.push(key);
    S._tblSel=cells.length?{id:id,anchor:[r,c],cells:cells}:null;
  }else{
    // Clicking the ALREADY-selected (sole) cell starts editing — no click-pair
    // timing anywhere, so a physical double-click is simply select+edit and works
    // regardless of how long the in-between re-render takes (see startDrag's tb
    // block for why timing-based approaches fail in WKWebView). Slow click-click
    // also edits, like renaming in Finder.
    const already=!S._tblEdit && S._tblSel && S._tblSel.id===id &&
                  (S._tblSel.cells||[]).length===1 && S._tblSel.cells[0]===key;
    if(already){
      const cl=(o.cells[r]||[])[c];
      const m=cl?txMode(cl):null;
      if(m==="static"){ startTblCellEdit(id,r,c); return; }
      if(m==="formula"){ setSel(id); R(); openTblCellFormulaEditor(id); return; }
      if(m==="field"){ setSel(id); R(); const s=document.getElementById('tbl-cell-field'); if(s)s.focus(); return; }
    }
    S._tblSel={id:id,anchor:[r,c],cells:[key]};
  }
  setSel(id); S.editingId=null; S._ef=undefined;
  R();
}
// Inline cell editing — mirrors startTextEdit/setStaticText for tx objects.
function startTblCellEdit(id,r,c){
  const o=gobj(id); if(!o||o.t!=="tb")return;
  const cl=(o.cells[r]||[])[c]; if(!cl||txMode(cl)!=="static")return;
  snapshot();
  setSel(id);
  S._tblSel={id:id,anchor:[r,c],cells:[r+','+c]};
  S._tblEdit={id:id,r:r,c:c};
  S.editingId=null; S._ef=undefined;
  R();
  // Re-assert focus a tick later: if this was entered from a trusted mousedown, any
  // remaining default processing after the handler can steal focus from the
  // contenteditable R() just focused (which would blur → exit editing immediately).
  setTimeout(function(){
    if(!S._tblEdit||S._tblEdit.id!==id||S._tblEdit.r!==r||S._tblEdit.c!==c)return;
    const te=document.querySelector('[data-tbltxt="'+id+':'+r+','+c+'"]');
    if(te&&document.activeElement!==te){
      te.focus();
      try{ const sel=window.getSelection(), rg=document.createRange();
           rg.selectNodeContents(te); rg.collapse(false); sel.removeAllRanges(); sel.addRange(rg); }catch(_){}
    }
  },0);
}
function endTblCellEdit(){ S._tblEdit=null; R(); }
// Live update while typing in a cell — no R() (would steal focus); undo point
// was set by startTblCellEdit.
function setTblCellText(id,r,c,val){
  const o=gobj(id); if(!o||!o.cells||!o.cells[r]||!o.cells[r][c])return;
  const cl=o.cells[r][c];
  const prevEmpty=!tblCellHasValue(cl);
  cl.text=val;
  // One-time first-value font sizing, applied live so the size is visible while
  // typing (same text node → caret survives the font-size change).
  if(prevEmpty&&val!==""&&cl.sized!==true){
    tblMaybeAutoSize(o,r,c,true);
    const t=document.querySelector('[data-tbltxt="'+id+':'+r+','+c+'"]');
    if(t)t.style.fontSize=Math.max(7,(cl.fs||14)*(SC/100))+'px';
  }
  markDirty();
}
// Drop a record-column header onto a CELL of the selected table → that cell
// becomes field-mode bound to the column (mirrors onColDropToText).
function onColDropToCell(e,id,r,c){
  e.preventDefault(); e.stopPropagation();
  const key=dragColName(e);
  if(typeof colClearDrag==="function")colClearDrag();
  if(!key)return;
  const o=gobj(id); if(!o||o.t!=="tb"||!o.cells[r]||!o.cells[r][c])return;
  snapshot();
  const t=JSON.parse(JSON.stringify(o));
  const prevEmpty=!tblCellHasValue(t.cells[r][c]);
  Object.assign(t.cells[r][c],{mode:"field",field:key});
  tblMaybeAutoSize(t,r,c,prevEmpty);   // one-time first-value font sizing
  uobj(id,{cells:t.cells});
  setSel(id); S._tblSel={id:id,anchor:[r,c],cells:[r+','+c]}; S._ef=undefined; R();
}

// ── Cell content edits (selection-wide) ────────────────────────────────────────
// Apply `patch` (object merge, or a mutator fn) to the given cells of a table.
function tblPatchCellsAt(id,keys,patch){
  const o=gobj(id); if(!o||o.t!=="tb"||!(keys||[]).length)return;
  snapshot();
  const t=JSON.parse(JSON.stringify(o));
  keys.forEach(function(k){
    const p=k.split(','), cl=(t.cells[+p[0]]||[])[+p[1]];
    if(!cl)return;
    const prevEmpty=!tblCellHasValue(cl);
    if(typeof patch==='function')patch(cl); else Object.assign(cl,patch);
    tblMaybeAutoSize(t,+p[0],+p[1],prevEmpty);   // one-time first-value font sizing
  });
  tblNorm(t);   // keep the span/shape invariants through cell patches too
  uobj(id,{cells:t.cells}); R();
}
function tblPatchCells(patch){ if(S._tblSel)tblPatchCellsAt(S._tblSel.id,S._tblSel.cells,patch); }
// Switch the selected cells' source mode, seeding defaults like setTextMode.
function setTblCellsMode(id,m){
  if(!S._tblSel||S._tblSel.id!==id)return;
  tblPatchCellsAt(id,S._tblSel.cells,function(cl){
    cl.mode=m;
    if(m==="formula"&&(cl.f===undefined||cl.f===""))cl.f='=""';
    if(m==="static"&&cl.text===undefined)cl.text="";
  });
}
// Live static-text typing from the panel textarea — updates the model + mirrors
// into the canvas without a full R() (undo point set on focus, like tx).
function setTblCellsStatic(id,val){
  const o=gobj(id); if(!o||o.t!=="tb"||!S._tblSel||S._tblSel.id!==id)return;
  S._tblSel.cells.forEach(function(k){
    const p=k.split(','), cl=(o.cells[+p[0]]||[])[+p[1]]; if(!cl)return;
    const prevEmpty=!tblCellHasValue(cl);
    cl.text=val;
    tblMaybeAutoSize(o,+p[0],+p[1],prevEmpty);   // one-time first-value font sizing
    const t=document.querySelector('[data-tbltxt="'+id+':'+p[0]+','+p[1]+'"]');
    if(t&&t!==document.activeElement){
      t.textContent=val;
      t.style.fontSize=Math.max(7,(cl.fs||14)*(SC/100))+'px';   // reflect sizing live
    }
  });
  markDirty();
}
// Delete/Backspace with cells selected: clear their CONTENT — the same semantics
// as the context menu's "Clear text" — never the table itself.
function tblClearCells(){
  if(!S._tblSel||!(S._tblSel.cells||[]).length)return;
  tblClearText(S._tblSel.id);
}
// Formula editor for table CELLS — reuses the fx modal; fxApply routes tblCells
// back through tblPatchCellsAt.
function openTblCellFormulaEditor(id){
  const o=gobj(id); if(!o||o.t!=="tb"||!S._tblSel||S._tblSel.id!==id||!(S._tblSel.cells||[]).length)return;
  const a=S._tblSel.anchor, cl=(o.cells[a[0]]||[])[a[1]]||{};
  _fxState={id:id, tblCells:S._tblSel.cells.slice(), f:(cl.f||'=""'), recIdx:Math.max(0,Math.min(S.recIdx,fxRecords().length-1))};
  renderFormulaModal();
}

// ── Cell clipboard (window._vlCellClip) ────────────────────────────────────────
// ⌘C copies the selection's rectangular bounding block; ⌘V pastes it anchored at
// the current selection's anchor (same or another table), clipped to its bounds.
function tblCopyCells(){
  const ts=S._tblSel; if(!ts||!(ts.cells||[]).length)return;
  const o=gobj(ts.id); if(!o||o.t!=="tb")return;
  const rr=ts.cells.map(k=>+k.split(',')[0]), cc=ts.cells.map(k=>+k.split(',')[1]);
  const r0=Math.min(...rr),r1=Math.max(...rr),c0=Math.min(...cc),c1=Math.max(...cc);
  const block=[];
  for(let r=r0;r<=r1;r++){
    const row=[];
    for(let c=c0;c<=c1;c++)row.push(JSON.parse(JSON.stringify((o.cells[r]||[])[c]||tblDefaultCell())));
    block.push(row);
  }
  window._vlCellClip={rows:block.length,cols:block[0].length,cells:block};
  // Best-effort TSV to the system clipboard so the block pastes into a spreadsheet.
  try{
    const rec=(window._editorRecords||RX)[S.recIdx];
    navigator.clipboard.writeText(block.map(row=>row.map(cl=>textValue(cl,rec).v).join('\t')).join('\n'));
  }catch(_){}
  const n=block.length*block[0].length;
  showToast('Copied '+n+' cell'+(n>1?'s':''));
}
function tblPasteCells(){
  const clip=window._vlCellClip, ts=S._tblSel;
  if(!clip||!ts)return;
  const o=gobj(ts.id); if(!o||o.t!=="tb")return;
  snapshot();
  const t=JSON.parse(JSON.stringify(o));
  const ar=ts.anchor[0], ac=ts.anchor[1];
  const pasted=[];
  for(let r=0;r<clip.rows;r++)for(let c=0;c<clip.cols;c++){
    const tr=ar+r, tc=ac+c;
    if(tr>=t.rows.length||tc>=t.cols.length)continue;   // clips at the target bounds
    t.cells[tr][tc]=JSON.parse(JSON.stringify(clip.cells[r][c]));
    pasted.push(tr+','+tc);
  }
  tblNorm(t);   // pasted rs/cs spans clamp/drop through the standard normalization
  uobj(ts.id,{cells:t.cells});
  if(pasted.length)S._tblSel={id:ts.id,anchor:[ar,ac],cells:pasted};
  R();
}

// ── Merge / split (anchor-based spans, Excel-style) ────────────────────────────
// Merge: bounding rect of the cell selection, expanded iteratively until it fully
// contains every merged region it intersects; the rect's top-left cell becomes the
// anchor (rs/cs = rect size). Content stays put — covered cells just stop rendering.
function tblMergeCells(id){
  const o=gobj(id); if(!o||o.t!=="tb"||!S._tblSel||S._tblSel.id!==id)return;
  const keys=S._tblSel.cells||[];
  if(keys.length<2){ showToast("Select two or more cells to merge"); return; }
  const reg=tblRegions(o).reg;
  let r0=Infinity,r1=-1,c0=Infinity,c1=-1;
  keys.forEach(function(k){
    const p=k.split(',');
    r0=Math.min(r0,+p[0]); r1=Math.max(r1,+p[0]);
    c0=Math.min(c0,+p[1]); c1=Math.max(c1,+p[1]);
  });
  for(let grew=true;grew;){
    grew=false;
    for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){
      const p=reg[r][c].split(','), ar=+p[0], ac=+p[1];
      const sp=tblRegionSpan(reg,ar,ac);
      if(ar<r0){r0=ar;grew=true;} if(ac<c0){c0=ac;grew=true;}
      if(ar+sp[0]-1>r1){r1=ar+sp[0]-1;grew=true;} if(ac+sp[1]-1>c1){c1=ac+sp[1]-1;grew=true;}
    }
  }
  if(r0===r1&&c0===c1){ showToast("Select two or more cells to merge"); return; }
  snapshot();
  const t=JSON.parse(JSON.stringify(o));
  for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){ delete t.cells[r][c].rs; delete t.cells[r][c].cs; }
  t.cells[r0][c0].rs=r1-r0+1; t.cells[r0][c0].cs=c1-c0+1;
  tblNorm(t); tblCommit(id,t);
  S._tblSel={id:id,anchor:[r0,c0],cells:[r0+','+c0]};   // selection becomes the anchor
  R();
}
// Formatting fields a split copies from the merged anchor onto the region's cells.
const TBL_FMT_KEYS=['font','fs','bold','italic','underline','al','valign','wrapText','tracking','stretch','autoScale'];
// Split: (r,c) may be the anchor OR a covered cell — resolve to the region, drop
// its span, and stamp the anchor's formatting (plus sized:true, so the one-time
// first-value sizing doesn't refire) onto every cell. The anchor keeps its
// content; the rest become empty static cells. Selects the region's cells.
function tblSplitCell(id,r,c){
  const o=gobj(id); if(!o||o.t!=="tb")return;
  const reg=tblRegions(o).reg;
  if(!reg[r]||!reg[r][c])return;
  const p=reg[r][c].split(','), ar=+p[0], ac=+p[1];
  const sp=tblRegionSpan(reg,ar,ac);
  if(sp[0]===1&&sp[1]===1)return;   // not merged — nothing to split
  snapshot();
  const t=JSON.parse(JSON.stringify(o));
  const anchor=t.cells[ar][ac];
  delete anchor.rs; delete anchor.cs;
  const fmt={sized:true};
  TBL_FMT_KEYS.forEach(function(k){ if(anchor[k]!==undefined)fmt[k]=anchor[k]; });
  const keys=[];
  for(let rr=ar;rr<ar+sp[0];rr++)for(let cc=ac;cc<ac+sp[1];cc++){
    keys.push(rr+','+cc);
    if(rr===ar&&cc===ac){ Object.assign(anchor,fmt); continue; }   // keeps its content
    t.cells[rr][cc]=Object.assign({mode:"static",text:""},fmt);
  }
  tblNorm(t); tblCommit(id,t);
  S._tblSel={id:id,anchor:[ar,ac],cells:keys};
  R();
}

// ── Clear commands (context menu; single or multi selection) ───────────────────
// Clear text: content only — mode→static, text emptied, field/formula dropped.
// Formatting AND the pinned font size (sized) survive.
function tblClearText(id){
  if(!S._tblSel||S._tblSel.id!==id||!(S._tblSel.cells||[]).length)return;
  tblPatchCellsAt(id,S._tblSel.cells,function(cl){
    cl.mode="static"; cl.text=""; delete cl.field; delete cl.f;
  });
}
// Clear text & formatting: full reset to tblDefaultCell() — drops sized (the next
// first value auto-sizes again) but never touches the merge spans (rs/cs).
function tblClearAll(id){
  if(!S._tblSel||S._tblSel.id!==id||!(S._tblSel.cells||[]).length)return;
  tblPatchCellsAt(id,S._tblSel.cells,function(cl){
    const rs=cl.rs, cs=cl.cs;
    Object.keys(cl).forEach(function(k){ delete cl[k]; });
    Object.assign(cl,tblDefaultCell());
    if(rs!=null)cl.rs=rs;
    if(cs!=null)cl.cs=cs;
  });
}

// ── Cell context menu (right-click a cell of the selected table) ───────────────
function tblCloseMenu(){ const m=document.getElementById('tbl-ctx'); if(m)m.remove(); document.removeEventListener('mousedown',_tblMenuOutside,true); document.removeEventListener('keydown',_tblMenuEsc,true); }
function _tblMenuOutside(e){ const m=document.getElementById('tbl-ctx'); if(m&&!m.contains(e.target))tblCloseMenu(); }
function _tblMenuEsc(e){ if(e.key==='Escape'){ e.stopPropagation(); tblCloseMenu(); } }
function tblCtxMenu(e,id,r,c){
  e.preventDefault(); e.stopPropagation();
  tblCloseMenu();
  const o=gobj(id); if(!o||o.t!=="tb")return;
  // Right-click selects the cell unless it's already part of the selection.
  const key=r+','+c;
  if(!(S._tblSel&&S._tblSel.id===id&&S._tblSel.cells.includes(key))){
    S._tblSel={id:id,anchor:[r,c],cells:[key]};
    setSel(id); S._ef=undefined; S.editingId=null; S._tblEdit=null; R();
  }
  const menu=document.createElement('div'); menu.id='tbl-ctx';
  menu.style.cssText='position:fixed;z-index:2550;background:var(--surface);border:1px solid var(--bd3);border-radius:7px;box-shadow:0 8px 28px rgba(0,0,0,0.45);padding:4px;min-width:172px;font-size:12px;color:var(--text);user-select:none';
  function item(label,fn,disabled){
    const b=document.createElement('div'); b.textContent=label;
    b.style.cssText='padding:6px 12px;border-radius:4px;white-space:nowrap;'+(disabled?'opacity:.4;cursor:default':'cursor:pointer');
    if(!disabled){
      b.onmouseenter=function(){b.style.background='var(--bd2)';};
      b.onmouseleave=function(){b.style.background='';};
      b.onclick=function(){ tblCloseMenu(); fn(); };
    }
    b.onmousedown=function(ev){ev.preventDefault();ev.stopPropagation();};
    menu.appendChild(b);
  }
  function sep(){ const s=document.createElement('div'); s.style.cssText='height:1px;background:var(--bd2);margin:4px 6px'; menu.appendChild(s); }
  item('Add row above',function(){ tblAddRow(id,r); });
  item('Add row below',function(){ tblAddRow(id,r+1); });
  item('Add column left',function(){ tblAddCol(id,c); });
  item('Add column right',function(){ tblAddCol(id,c+1); });
  sep();
  item('Delete row',function(){ tblDeleteRows(id,[r]); },o.rows.length<=1);
  item('Delete column',function(){ tblDeleteCols(id,[c]); },o.cols.length<=1);
  sep();
  item('Set row height…',function(){
    vlPrompt('Row height (inches)'+(o.lockRows?' — rows are locked equal':''),String(+(+o.rows[r]).toFixed(3)),function(v){
      if(v==null)return; const n=parseFloat(v);
      if(!(n>0)){ showToast('Enter a height in inches'); return; }
      tblSetRowHeight(id,r,n);
    });
  });
  item('Set column width…',function(){
    vlPrompt('Column width (inches)'+(o.lockCols?' — columns are locked equal':''),String(+(+o.cols[c]).toFixed(3)),function(v){
      if(v==null)return; const n=parseFloat(v);
      if(!(n>0)){ showToast('Enter a width in inches'); return; }
      tblSetColWidth(id,c,n);
    });
  });
  sep();
  // Merge/split — merge needs ≥2 selected cells; split needs the clicked cell to
  // sit inside a merged region (hit divs pass the anchor, but covered coords from
  // other entry points resolve the same way).
  const selN=(S._tblSel&&S._tblSel.id===id)?(S._tblSel.cells||[]).length:0;
  const reg=tblRegions(o).reg;
  const rp=((reg[r]||[])[c]||key).split(','), rsp=tblRegionSpan(reg,+rp[0],+rp[1]);
  const inMerged=rsp[0]>1||rsp[1]>1;
  if(selN>=2)item('Merge cells',function(){ tblMergeCells(id); });
  if(inMerged)item('Split cell',function(){ tblSplitCell(id,r,c); });
  if(selN>=2||inMerged)sep();
  item('Clear text',function(){ tblClearText(id); });
  item('Clear text & formatting',function(){ tblClearAll(id); });
  sep();
  item('Copy cells',function(){ tblCopyCells(); });
  item('Paste cells',function(){ tblPasteCells(); },!window._vlCellClip);
  document.body.appendChild(menu);
  const mr=menu.getBoundingClientRect(); let px=e.clientX,py=e.clientY;
  if(px+mr.width>window.innerWidth)px=Math.max(4,window.innerWidth-mr.width-6);
  if(py+mr.height>window.innerHeight)py=Math.max(4,window.innerHeight-mr.height-6);
  menu.style.left=px+'px'; menu.style.top=py+'px';
  setTimeout(function(){ document.addEventListener('mousedown',_tblMenuOutside,true); document.addEventListener('keydown',_tblMenuEsc,true); },0);
}
