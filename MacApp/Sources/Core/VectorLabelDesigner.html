// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener("keydown",function(e){
  // Ignore if focus is inside an input, textarea, or select
  const tag=(document.activeElement||{}).tagName||"";
  const inInput=["INPUT","TEXTAREA","SELECT"].includes(tag);

  // ⌘Return (Custom Designer only) — print the current canvas, mirroring the
  // Print button. Works even from an input field (matching the print window).
  if(isCustomMode()&&(e.metaKey||e.ctrlKey)&&(e.key==="Enter"||e.key==="Return")){
    if(S.modal||!dCanPrint())return;
    e.preventDefault();
    doCustomPrint();
    return;
  }

  // Cmd/Ctrl+Z — undo (works even in inputs to avoid blocking browser undo,
  // but we only intercept if NOT in an input)
  if((e.metaKey||e.ctrlKey)&&e.key==="z"&&!inInput){
    e.preventDefault();
    undo();
    return;
  }

  // Delete / Backspace — with table CELLS selected clear their content; else
  // delete the selected object. Never while inline-editing a cell.
  if((e.key==="Delete"||e.key==="Backspace")&&!inInput&&!S._tblEdit&&S._tblSel&&(S._tblSel.cells||[]).length){
    e.preventDefault();
    tblClearCells();
    return;
  }
  if((e.key==="Delete"||e.key==="Backspace")&&!inInput&&!S._tblEdit&&S.selId){
    e.preventDefault();
    delObj();
    return;
  }

  // Cmd/Ctrl+D — duplicate in place; Cmd/Ctrl+C/V — copy/paste object.
  if((e.metaKey||e.ctrlKey)&&!inInput){
    const k=e.key.toLowerCase();
    if(k==="d"&&S.selId){ e.preventDefault(); duplicateObj(); return; }
    // Cell clipboard first: with table cells selected, ⌘C/⌘V copy/paste the CELL
    // block (window._vlCellClip); the object clipboard still handles whole tables.
    if(k==="c"&&!S._tblEdit&&S._tblSel&&(S._tblSel.cells||[]).length){ e.preventDefault(); tblCopyCells(); return; }
    if(k==="v"&&!S._tblEdit&&S._tblSel&&window._vlCellClip){ e.preventDefault(); tblPasteCells(); return; }
    if(k==="c"&&S.selId){ e.preventDefault(); copyObj(); return; }
    if(k==="v"&&_objClipboard){ e.preventDefault(); pasteObj(); return; }
  }

  // Arrow keys — nudge selected object by 1px (0.5px with shift)
  if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)&&!inInput&&S.selId){
    e.preventDefault();
    const sels=selObjs();if(!sels.length)return;
    const step=S.snapGrid?S.gridSize:(e.shiftKey?0.5:1)/SC;
    const dx=e.key==="ArrowLeft"?-step:e.key==="ArrowRight"?step:0;
    const dy=e.key==="ArrowUp"?-step:e.key==="ArrowDown"?step:0;
    sels.forEach(o=>uobj(o.id,{x:Math.max(-BLEED_IN,o.x+dx),y:Math.max(-BLEED_IN,o.y+dy)}));
    R();
    return;
  }

  // Escape — step back out of a table first (cell edit → cell selection → table
  // selection), then deselect (but not when a modal is open; that Escape just
  // closes the modal).
  if(e.key==="Escape"&&!inInput&&!S.modal){
    if(S._tblEdit){ S._tblEdit=null; R(); return; }
    if(S._tblSel){ S._tblSel=null; R(); return; }
    deselect();
  }
});

// ── Template management ───────────────────────────────────────────────────────

function showModal(name){S.modal=name;renderModal();}
function closeModal(){S.modal=null;
  // A confirm dismissed without proceeding must not leave its force flag set, or the
  // NEXT job would silently skip that warning. (The "Print anyway" buttons re-enter via
  // S.modal=null, not closeModal(), so the acknowledged multi-guard flow is unaffected.)
  S._printForce=false; S._supplyForce=false; S._largeJobForce=false;
  renderModal();
  // Save As cancelled during a print-edit: restore the original loaded id so a
  // later "Save & Return" overwrites in place instead of duplicating the template.
  if(window._printEdit&&window._printReturnAfterSave){ S._loadedId=window._preEditLoadedId||null; window._printReturnAfterSave=false; }
  // Apply any catalog update that arrived while the modal was open (deferred).
  if(window._vlCatalogPending){const c=window._vlCatalogPending;window._vlCatalogPending=null;if(typeof applyCatalog==="function")applyCatalog(c);}
}

function templateData(){
  const name=S.tplName||defaultDocName();
  const d={
    version:1,
    name,
    specN:S.spec.n,
    objs:JSON.parse(JSON.stringify(S.objs))
  };
  // Save the supply's stable catalog id + a geometry snapshot (BASE geometry, not
  // the live continuous length) so the design re-resolves its supply on load and
  // keeps its canvas size even if the supply is later removed from the catalog.
  const base=blBy(S.spec.n)||S.spec;
  d.supplyID=(S.spec&&S.spec.id)||base.id||"";
  d.supplyGeometry={widthInches:base.tw,heightInches:base.th,printableWidthInches:base.pw,printableHeightInches:base.ph,isContinuous:base.ty==="continuous"};
  // Continuous supplies persist the chosen label length (inches); die-cut omit it.
  if(dContinuous()){ const len=dEffLen(); if(len) d.labelLengthInches=len; }
  // canvasRot 90 marks the rotated orientation — for CONTINUOUS the portrait override
  // (landscape is the engine default), for DIE-CUT a 90° design rotation. Persisted for
  // either; absent = the default (landscape continuous / unrotated die-cut).
  if(S.canvasRot===90) d.canvasRot=90;
  // Target printer for the printable-area overlay (null = none chosen). In custom
  // mode this just round-trips the value carried by the loaded document.
  d.targetPrinterModel=S.targetModel||null;
  return d;
}

// ── Custom Designer print header (Phase 2) ──────────────────────────────────────
// Shown ONLY in custom mode (window._designerMode==='custom'). Mirrors the Print
// window header: printer picker, cassette match/mismatch indicator, copies field,
// and a Print button (⌘Return). Single-label print of the current canvas.

// Swift injects the live printer list (updateDesignerPrinters) and detected
// cassettes (updateDesignerCassettes), the same JSON the print window consumes.
function updateDesignerPrinters(printers){
  // Spread so new capability fields (hasAutoCutter, ribbonLengthInches, …) survive the
  // rebuild instead of being dropped by a hand-picked allowlist; normalize the typed ones.
  window._dprinters=(printers||[]).map(p=>({
    ...p,
    model:p.model||"M6xx", status:p.status||"ready", serial:p.serial||"",
    supportsTelemetry:!!p.supportsTelemetry,
    hasAutoCutter:!!p.hasAutoCutter,
    ribbonLengthInches:+p.ribbonLengthInches||0,
    supportsFeedToClear:!!p.supportsFeedToClear
  }));
  // Keep the current selection if still present; else pick a ready printer.
  if(!window._dprinters.find(p=>p.id===S.activePrinter)){
    S.activePrinter=(window._dprinters.find(p=>p.status==="ready")||window._dprinters[0]||{}).id||null;
  }
  // Only rebuild when the printer list / selection actually changed — the Engine
  // republishes status on a timer and on every print-progress tick, and a full R()
  // per publish was making the whole designer feel laggy.
  const sig=JSON.stringify(window._dprinters)+"|"+(S.activePrinter||"");
  if(isCustomMode() && sig!==window._dprintersSig){ window._dprintersSig=sig; R(); }
}
function updateDesignerCassettes(map){
  window._dcassettes=map||{};
  // Signature from only the match-relevant fields (not the volatile supply % /
  // pixel counts) so normal cassette-read jitter doesn't force a full rebuild —
  // EXCEPT for telemetry-capable printers (M611), where the battery/labels/ribbon %s
  // ARE the readout, so they must be in the signature or the live numbers go stale.
  const tele=new Set(dPrinters().filter(p=>p.supportsTelemetry).map(p=>p.id));
  const sig=JSON.stringify(Object.keys(window._dcassettes).sort().map(k=>{
    const c=window._dcassettes[k]||{};
    const base=[k,c.partNumber,c.labelWidthMils,c.labelHeightMils,c.isDieCut];
    if(tele.has(k)) base.push(c.batteryPct,c.supplyRemainingPct,c.ribbonRemainingPct);
    return base;
  }));
  if(isCustomMode() && sig!==window._dcassettesSig){ window._dcassettesSig=sig; R(); }
}
function dPrinters(){ return window._dprinters||[]; }
function dPrinter(){ return dPrinters().find(p=>p.id===S.activePrinter)||{id:null,name:"",status:"offline"}; }
function dLoadedCassette(){ return (window._dcassettes||{})[S.activePrinter]||null; }
// Live telemetry (battery / labels / ribbon %) for the active printer — only for
// drivers that report it (M611, not M610) and only the metrics with a reading.
function dTelemetryHTML(){
  const pr=dPrinter(); if(!pr||!pr.supportsTelemetry) return "";
  const c=dLoadedCassette(); if(!c) return "";
  const f=dSupplyForecast();   // {labels,ribbon} | null — caution when the job may exhaust a supply
  const warn=(t)=>` <span title="${t}" style="color:var(--warn)">⚠</span>`;
  const parts=[];
  if(typeof c.batteryPct==='number')         parts.push(`Battery ${c.batteryPct}%${c.acConnected?" ⚡":""}`);
  if(typeof c.supplyRemainingPct==='number') parts.push(`Labels ${c.supplyRemainingPct}%${(f&&f.labels)?warn("This job may need more labels than remain"):""}`);
  if(typeof c.ribbonRemainingPct==='number') parts.push(`Ribbon ${c.ribbonRemainingPct}%${(f&&f.ribbon)?warn("This job may need more ribbon than remains"):""}`);
  if(!parts.length) return "";
  return `<span title="Live printer telemetry" style="font-size:11px;color:var(--text2);white-space:nowrap">${parts.join(" · ")}</span>`;
}

// Supply-exhaustion forecast for the current custom job (telemetry printers only).
// Returns {labels, ribbon} — true where the job is likely to run that supply out — or
// null when not applicable. 2% safety buffer on the remaining amounts. Mirrors the print
// window's supplyForecast (die-cut → label count; continuous → length; ribbon → feed length).
function dSupplyForecast(){
  const pr=dPrinter(); if(!pr||!pr.supportsTelemetry) return null;
  const c=dLoadedCassette(); if(!c) return null;
  const n=dJobLabelCount(); if(n<=0) return null;
  const spec=blBy(S.spec.n);
  const BUF=0.98;
  const cont=(typeof c.isContinuous==='boolean')?c.isContinuous:(spec?spec.ty==="continuous":false);
  const contLen=dContinuous()?(dEffLen()||0):(spec?spec.ph:0);
  const perFeedIn=cont?contLen:((c.labelHeightMils>0)?c.labelHeightMils/1000:(spec?spec.th:0));
  let labels=false, ribbon=false;
  if(cont){
    const rollFt=+c.rollLengthFeet||0;
    if(contLen>0 && rollFt>0 && typeof c.supplyRemainingPct==='number'){
      const remainIn=(c.supplyRemainingPct/100)*rollFt*12;
      if(n*contLen > remainIn*BUF) labels=true;
    }
  } else {
    const per=+c.labelsPerRoll||0;
    if(per>0 && typeof c.supplyRemainingPct==='number'){
      const remain=(c.supplyRemainingPct/100)*per;
      if(n > remain*BUF) labels=true;
    }
  }
  const ribLenIn=+pr.ribbonLengthInches||0;
  if(ribLenIn>0 && perFeedIn>0 && typeof c.ribbonRemainingPct==='number'){
    const remainIn=(c.ribbonRemainingPct/100)*ribLenIn;
    if(n*perFeedIn > remainIn*BUF) ribbon=true;
  }
  return {labels, ribbon};
}

// Pre-flight: printer-reported errors that should block a print until fixed
// (printhead open / invalid supply / invalid ribbon). Returns a description or null.
function dCassettePreflightError(){
  const c=dLoadedCassette(); if(!c) return null;
  const e=[];
  if(c.printheadOpen)    e.push("printhead open");
  if(c.substrateInvalid) e.push("invalid supply");
  if(c.ribbonInvalid)    e.push("invalid ribbon");
  return e.length ? e.join(" · ") : null;
}
function dPreflightHTML(){
  const e=dCassettePreflightError();
  if(!e) return "";
  return `<span title="Fix this on the printer, then re-detect the supply" style="font-size:11px;color:var(--red);font-weight:600;white-space:nowrap">⚠ ${e}</span>`
       + `<button class="btn" onclick="dDetectCassette()" title="Re-read the loaded supply from the printer" style="padding:2px 8px;font-size:10px">Re-detect</button>`;
}
// Ask the Engine to force an on-demand cassette re-read (clears a stale pre-flight error).
function dDetectCassette(){
  const id=dPrinter().id; if(!id) return;
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"detectCassette",payload:{printerID:id}});
}

// Strip the model prefix so "BM-32-427" (catalog) matches "M6-32-427" (SmartCell).
// BM-109-427 is the bulk box for M6-33-427 — same supply. (Same logic as the
// print window's supplyCore.)
function dSupplyCore(pn){ let c=(pn||"").replace(/^[A-Za-z0-9]+-/,"").toUpperCase(); if(c==="109-427")c="33-427"; return c; }
function dCassetteSizeKnown(c){ return !!(c && typeof c.labelWidthMils==='number' && typeof c.labelHeightMils==='number'); }
// Whether the loaded cassette's real dimensions equal the template's label size,
// in either orientation (within ~0.1"). Mirrors the print window's sameLabelSize.
function dSameLabelSize(c,specN){
  if(!dCassetteSizeKnown(c))return false;
  const spec=blBy(specN)||BL.find(l=>dSupplyCore(l.n)===dSupplyCore(specN));
  if(!spec)return false;
  const tol=100, close=(a,b)=>Math.abs(a-b)<=tol;
  const cw=c.labelWidthMils, ch=c.labelHeightMils;
  // Continuous tape has no fixed label height (the user sets the length), so a
  // loaded continuous cassette matches on WIDTH alone — any material of the same
  // tape width counts as matched (#15). A die-cut cassette never matches a
  // continuous selection.
  if(spec.ty==="continuous"){
    if(c.isDieCut===true)return false;
    const tw=spec.tw*1000;
    return close(cw,tw)||close(ch,tw);
  }
  const tw=spec.tw*1000, th=spec.th*1000;
  return (close(cw,tw)&&close(ch,th))||(close(cw,th)&&close(ch,tw));
}
// Matching is now by PART NUMBER membership: a loaded cassette matches the selected
// supply when its part number is one of that supply's part numbers (exact, or by the
// bulk-box↔cartridge core). Falls back to the old size match only when the cassette
// reports no part number (older SmartCell reads).
function dPartEq(a,b){ if(!a||!b)return false; return a.toUpperCase()===b.toUpperCase()||dSupplyCore(a)===dSupplyCore(b); }
function dCassetteMatchesSupply(c,specN){
  const spec=blBy(specN); if(!spec||!c)return false;
  const cpn=c.partNumber||"";
  if(cpn){
    const parts=(spec.parts&&spec.parts.length)?spec.parts:[{pn:spec.n}];
    return parts.some(p=>dPartEq(p.pn,cpn));
  }
  return dCassetteSizeKnown(c)&&dSameLabelSize(c,specN);   // fallback: no part # reported
}
function dCassetteMatched(){ const c=dLoadedCassette(); return !!(c&&dCassetteMatchesSupply(c,S.spec.n)); }
function dCassetteMismatch(){ const c=dLoadedCassette(); if(!c)return false; const known=!!c.partNumber||dCassetteSizeKnown(c); return known&&!dCassetteMatchesSupply(c,S.spec.n); }
// Continuous supplies are identified by WIDTH only — any material of that width
// matches — so the picker + supply indicator show e.g. '0.5" continuous', never a
// part number or material. Die-cut wire labels keep their descriptor (#16).
// A supply's display name (injected from Swift; falls back to its size).
function supplyName(l){
  if(!l)return "";
  if(l.name)return l.name;
  if(l.ty==="continuous")return dFmtIn(l.tw)+' continuous';
  return dFmtIn(l.tw)+' × '+dFmtIn(l.th);
}
// Distinct material names across a supply's parts (continuous → Vinyl, Polyester…).
function supplyMaterials(l){
  const mats=[]; ((l&&l.parts)||[]).forEach(p=>{const m=(p.mat||"").trim();if(m&&mats.indexOf(m)<0)mats.push(m);});
  return mats;
}
function supplyOptionLabel(l){
  if(!l)return "";
  if(l.ty==="continuous")return dFmtIn(l.tw)+' continuous';
  // Cable-wrap (die-cut) labels show the PRINTABLE dimension (W × H), not the full
  // label height, so the dropdown reflects the usable print area.
  return (l.name?l.name:l.n)+' — '+dFmtIn(l.pw)+' × '+dFmtIn(l.ph);
}
// Contents of the toolbar Supply button: the label size and the print area, each
// under its own header — but only when they differ; if they're identical (or the
// supply is continuous) just show the single value.
function supplyButtonDims(l){
  if(!l)return "";
  const hd='color:var(--text3);font-size:8px;text-transform:uppercase;letter-spacing:.4px;line-height:1';
  const vl='font-size:12px;line-height:1.15';
  const col=(h,v)=>`<div style="display:flex;flex-direction:column;gap:1px;align-items:flex-start"><span style="${hd}">${h}</span><span style="${vl}">${v}</span></div>`;
  if(l.ty==="continuous")return col('Size', dFmtIn(l.tw)+' × definable');
  const labelSz=dFmtIn(l.tw)+' × '+dFmtIn(l.th);
  const printSz=dFmtIn(l.pw)+' × '+dFmtIn(l.ph);
  if(l.tw===l.pw && l.th===l.ph)return col('Size', labelSz);
  return `<div style="display:flex;gap:12px;align-items:center">${col('Label size',labelSz)}${col('Print area',printSz)}</div>`;
}
function dSupplyTypeDesc(l){
  if(!l)return "";
  if(l.ty==="continuous"){ if(l.lm)return "Continuous Self Laminating"; const m=supplyMaterials(l); return m.length?("available as "+m.join(", ")):""; }
  if(l.lm)return "Self-laminating wire wrap";
  return "Die-cut label";
}
// Fuller type descriptor for the supply picker table. Continuous lists the materials
// it's available in (any material of the listed width matches the loaded cassette).
function supplyTypeFull(l){
  if(!l)return "";
  if(l.ty==="continuous"){ if(l.lm)return "Continuous Self Laminating"; const m=supplyMaterials(l); return m.length?("Continuous tape available as: "+m.join(", ")):"Continuous tape"; }
  if(l.lm)return "Self-laminating wire wrap";
  return "Die-cut label";
}
function dRequiredSupply(specN){
  const l=blBy(specN);
  if(l&&l.ty==="continuous")return dFmtIn(l.tw)+' continuous';
  const core=dSupplyCore(specN); return core?"BM/M6-"+core:(specN||"");
}
function dFmtIn(v){ return (v==null?"—":(+v).toString())+'"'; }
function dCanPrint(){
  if(!(S.objs.length>0&&dPrinter().status==="ready"))return false;
  if(dCassettePreflightError())return false;   // pre-flight: printhead open / invalid supply or ribbon
  // Only require a selected row when a field is actually bound (otherwise it's a
  // single label and the row selection is irrelevant).
  if(hasBoundData()&&labelUsesData()&&dbPrintIndices().length===0)return false;
  return true;
}

// ── "Buy more" — open the supplier page for the selected supply ─────────────────
// Posts an openURL action; Swift opens the (http/https) URL in the system browser.
// Open a reliable purchase link for a part number. Brady restructures its product
// URLs over time (the old per-product pages 404), so we search by part number,
// which always resolves to the current product/buy page. Routed via Swift openURL.
function buyTerm(term){ buyPart(term,""); }
// Escape a string for a single-quoted JS literal inside a double-quoted HTML
// attribute (onclick="…buyPart('…','…')").
function jesc(s){ return String(s==null?"":s).replace(/\\/g,"\\\\").replace(/&/g,"&amp;").replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
// Open a part number's purchase page: its override URL when set, else a Brady
// part-number search (Brady's per-product URLs change; a search always resolves to
// the current product/buy page). Routed via Swift openURL.
function buyPart(pn,url){
  const dest=(url&&(""+url).trim())?(""+url).trim():('https://www.bradyid.com/searchresults?Ntt='+encodeURIComponent(pn));
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"openURL",payload:{url:dest}});
}
// The label on a part's buy button: die-cut → "PN/250" (part number + qty/roll);
// continuous → "Vinyl PN/50'" (material + part number + roll length).
function partBuyLabel(l,p){
  if(l.ty==="continuous"){
    const mat=(p.mat||"").trim();
    const len=(p.lenFt!=null&&+p.lenFt>0)?("/"+(+p.lenFt)+"'"):"";
    return (mat?mat+" ":"")+p.pn+len;
  }
  const qty=(p.qty!=null&&+p.qty>0)?("/"+p.qty):"";
  return p.pn+qty;
}
// One buy button per part number of a supply, each combining the part number with
// its quantity / roll length (so roll + bulk box of a size sit side by side).
function buyButtons(l){
  if(!l)return "";
  const parts=(l.parts&&l.parts.length)?l.parts:[{pn:l.n}];
  const bs='class="btn" style="padding:3px 9px;font-size:11px;white-space:nowrap"';
  return parts.map(p=>`<button ${bs} onclick="event.stopPropagation();buyPart('${jesc(p.pn)}','${jesc(p.url||"")}')" title="Buy ${escAttr(p.pn)} on Brady">${esc(partBuyLabel(l,p))} ↗</button>`).join("");
}
// Open the supply picker window — a spacious table of every supply with its type,

// "Buy" control for the selected supply, shown in the Custom Designer print header.

// In-flight job status + Cancel, shown in the print header after the supply (#12b).

          <span style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1px">Supply</span>
          <span style="color:var(--text2);font-size:11px;font-family:monospace" title="Required supply for ${S.spec.n}">${dRequiredSupply(S.spec.n)}</span>
          <span style="color:var(--text3);font-size:10px;max-width:160px;line-height:1.25" title="Label type">${dSupplyTypeDesc(blBy(S.spec.n))}</span>
          ${dCassetteMatched()?`<span title="Loaded cassette matches the required supply" style="color:var(--green);font-size:18px;line-height:1;font-weight:800">✓</span>`
            :dCassetteMismatch()?`<span title="Loaded ${escAttr(dLoadedCassette().partNumber)} doesn't match — the label may print misaligned or cropped" style="color:var(--red);font-size:12px;line-height:1;white-space:nowrap">⚠ mismatch</span>`:""}
          ${buyMoreControl()}
        </div>
      </div>
    </div>

    <div style="flex:1;min-width:8px"></div>

    <!-- RIGHT column. Multi-label (a bound field → >1 label): Cut + Copies + Feed share the
         top row, and the All/Selected/Range control sits alone on the bottom row nearest the
         Print button. Single-label: Cut on top; Copies + Feed on the bottom (range hidden). -->
    <div style="display:flex;flex-direction:column;gap:6px;justify-content:center;align-items:flex-end">
      <div style="display:flex;align-items:center;gap:12px;justify-content:flex-end">
        ${cutCtl}
        ${multi?copiesCtl:""}
        ${multi?feedCtl:""}
      </div>
      <div style="display:flex;align-items:center;gap:12px;justify-content:flex-end">
        ${multi?"":copiesCtl}
        ${multi?"":feedCtl}
        ${buildPrintRangeControl()}
      </div>
    </div>

    <!-- Print button — anchored far right, spans both rows -->
    <button class="btn primary" onclick="doCustomPrint()" style="padding:6px 20px;font-size:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1;gap:1px;align-self:stretch"${canPrint?"":" disabled"}>
      <span>Print ${jobLabelCount} label${jobLabelCount!==1?"s":""}</span>
      <span style="font-size:9px;opacity:0.7;font-weight:400">⌘ Return</span>
    </button>
  </div>`;
}

// The record to render the PRINTED label against. When a data source is bound,
// Swift prints one label per bound row, so we only need to forward a record for
// the no-data-source case — and there the printed label should be BLANK for
// field/formula text (only static text shows), NOT the leftover sample/CSV
// preview record. So return null when unbound; Swift renders against an empty
// record. (The on-canvas preview still uses the previewed record, unchanged.)
function customPrintRecord(){
  if(!hasBoundData()) return null;
  const recs=window._editorRecords||RX;
  const rec=recs[S.recIdx];
  return rec?Object.assign({},rec):null;
}

// Save the current canvas + embedded bound data as a ".vlcus" document. Swift
// shows a Save panel and writes the file (the bound rows/columns/path come from
// the in-memory data source on the Swift side, so only the canvas is sent here).
function saveCustomDocument(){
  if(!isCustomMode())return;
  const data=templateData();
  const payload={
    name:S.tplName||"Custom Label",
    specN:data.specN,
    objs:data.objs,
    copies:Math.max(1,S.copies||1),
    cutMode:dEffCutMode(),   // persist the effective cut mode so it round-trips in .vlcus
    supplyID:data.supplyID,
    supplyGeometry:data.supplyGeometry
  };
  if(data.labelLengthInches) payload.labelLengthInches=data.labelLengthInches;
  if(typeof data.canvasRot==='number') payload.canvasRot=data.canvasRot;   // persist orientation in the .vlcus
  if(data.targetPrinterModel) payload.targetPrinterModel=data.targetPrinterModel;   // printable-area overlay target
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"saveCustomDocument",payload});
  }
}

// Render the current canvas as a single label and submit it to the print queue
// via Swift. Single-label this phase; "copies" repeats it.
function doCustomPrint(){
  if(!isCustomMode()||!dCanPrint())return;
  if(dCassetteMismatch()&&!S._printForce){ S.modal="confirmMismatch"; renderModal(); return; }
  // Warn if the job may exhaust the loaded labels/ribbon (telemetry printers only).
  const _f=dSupplyForecast();
  if(_f&&(_f.labels||_f.ribbon)&&!S._supplyForce){ S._forecast=_f; S.modal="confirmSupply"; renderModal(); return; }
  // Guard against firing off a big batch by surprise (e.g. a 200-row dataset):
  // confirm when the true job size exceeds 10 labels.
  if(dJobLabelCount()>10&&!S._largeJobForce){ S.modal="confirmLargeJob"; renderModal(); return; }
  // All guards passed — only NOW clear the force flags. Clearing them earlier would
  // re-show an already-acknowledged dialog for a job that trips more than one guard
  // (the next guard's re-entry would find the flag already reset).
  S._printForce=false;
  S._supplyForce=false;
  S._largeJobForce=false;
  const data=templateData();
  const payload={
    name:S.tplName||"Custom Label",
    specN:data.specN,
    objs:data.objs,
    copies:Math.max(1,S.copies||1),
    printerID:S.activePrinter||"",
    cutMode:dEffCutMode(),   // Phase 6 cut setting → PrintJobFile.cutMode
    feedToClear:dFeedToClearOn(),   // per-printer; false unless this printer supports it
    record:customPrintRecord()
  };
  // When a data source is bound, send the chosen subset of bound-row indices so
  // Swift prints exactly All / Selected / Range (× copies). Omitted when unbound
  // (single-label path).
  if(hasBoundData()){
    // One label per selected row only when an object pulls from the data; otherwise
    // every row is identical, so print a single label.
    payload.recordIndices=labelUsesData()?dbPrintIndices():[Math.min(Math.max(0,S.recIdx||0),dBoundRowCount()-1)];
    payload.printRange=S.printRange;
    payload.rangeFrom=S.rangeFrom;
    payload.rangeTo=S.rangeTo;
  }
  if(data.labelLengthInches) payload.labelLengthInches=data.labelLengthInches;
  if(typeof data.canvasRot==='number') payload.canvasRot=data.canvasRot;   // portrait override (90) → renderer skips its default landscape rotation
  payload.supplyID=data.supplyID;            // capture the supply so a Reprint reopens the exact design
  payload.supplyGeometry=data.supplyGeometry;
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"printCustom",payload});
  }
}
// Swift calls this once the job has been submitted to the queue, passing the job
// id so the header can track live progress + offer Cancel (#12b).
function customPrintSubmitted(copies,jobId){
  showToast("Printing "+copies+" label"+(copies!==1?"s":""));
  if(isCustomMode()&&jobId){
    S._activeJobId=jobId; S._jobSeen=false;
    S._jobStatus={id:jobId,labelCount:copies,completed:0,state:"queued",title:S.tplName||"Custom Label"};
    R();
  }
}

// Swift pushes the Engine's in-flight jobs here (custom mode) on every status
// change. Track OUR submitted job by id: update progress while present, clear the
// header once it disappears (finished or cancelled).
function updateDesignerJobStatus(jobs){
  if(!isCustomMode())return;
  const list=Array.isArray(jobs)?jobs:[];
  if(!S._activeJobId){ if(S._jobStatus){ S._jobStatus=null; R(); } return; }
  const job=list.find(j=>j&&j.id===S._activeJobId)||null;
  if(job){
    const had=!!S._jobStatus;
    S._jobSeen=true; S._jobStatus=job;
    // Patch the progress bar/label in place once the block exists, so a long job
    // doesn't rebuild the whole designer on every label. Full R() only when the
    // status block first appears.
    const bar=document.getElementById("jobProg"), lbl=document.getElementById("jobLbl");
    if(had && bar && lbl){
      const total=Math.max(1,job.labelCount||1), done=Math.max(0,Math.min(total,job.completed||0));
      bar.style.width=Math.round(done/total*100)+"%";
      lbl.textContent=(job.state==="queued")?"Queued":("Printing "+done+"/"+total);
    } else { R(); }
    return;
  }
  if(S._jobSeen){ S._activeJobId=null; S._jobStatus=null; S._jobSeen=false; R(); }
}

// Ask Swift (→ Engine over IPC) to cancel the tracked in-flight job (#12b).
function cancelCustomPrint(){
  if(!S._activeJobId)return;
  _vlPost("cancelCustomPrint",{jobId:S._activeJobId});
}

// ── Print-window edit mode ─────────────────────────────────────────────────────
// When the print window's "Edit" opens this designer, Swift calls initPrintEdit
// to load the template and show Save/Save As/Cancel & Return buttons.
function _vlPost(action,payload){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action,payload:payload===undefined?null:payload});
}
// Surface any uncaught JS error to Swift (it NSLogs "[VL-JS-ERROR] …"), so a failure
// inside the real WKWebView — which can't be reproduced in a headless DOM — can be
// diagnosed from Console.app. Best-effort; never throws itself.
if(typeof window!=='undefined'&&!window._vlErrHook){
  window._vlErrHook=true;
  window.addEventListener('error',function(e){ try{_vlPost('jsError',{msg:String(e.message||''),at:String(e.filename||'')+':'+(e.lineno||0)+':'+(e.colno||0),stack:String(e.error&&e.error.stack||'')});}catch(_){} });
  window.addEventListener('unhandledrejection',function(e){ try{var r=e.reason||{};_vlPost('jsError',{msg:'unhandledrejection: '+String(r.message||r),stack:String(r.stack||'')});}catch(_){} });
}
// Templates loaded from disk are UNTRUSTED (the user opens arbitrary .vlt.json,
// and any file dropped in the Templates folder auto-loads). Their object fields
// are interpolated into HTML attributes / inline handlers in this privileged
// WKWebView, so sanitize on every import: regenerate the id (so a crafted id can't
// break out of an attribute/onclick), whitelist the font, allow only an embedded
// data:image src (no javascript:/remote), and only a known symbol key.
function sanitizeObjs(objs){
  const ALIGN=['left','center','right','justify'], VALIGN=['top','middle','bottom'];
  return (objs||[]).map(function(o){
    const c=Object.assign({},o);
    c.id=mid();
    // Strip everything but letters/digits/space/hyphen BEFORE the font reaches the inline
    // style attribute (font-family:'…') — otherwise a crafted template font like
    //   x';" onmouseover="…
    // closes the declaration + the attribute quote and injects a live event handler into
    // this privileged WebView (attribute-breakout / stored-XSS). Mirrors the Print front-end.
    if(typeof c.font==='string') c.font=c.font.replace(/[^A-Za-z0-9 \-]/g,'');
    if(typeof c.font!=='string' || !c.font.trim()) c.font='Arial';
    if(c.src!=null && !/^data:image\//i.test(String(c.src))) c.src='';
    if(c.sym!=null && !(String(c.sym) in SYMBOLS)) c.sym='';
    // Whitelist the style enums that flow into inline style / handlers (attribute
    // breakout guard), and coerce every numeric field so a string can't carry a quote
    // into a style attribute. Id regeneration alone doesn't cover these vectors.
    if(c.al!=null && ALIGN.indexOf(c.al)<0) c.al='left';
    if(c.valign!=null && VALIGN.indexOf(c.valign)<0) c.valign='middle';
    if(c.anchor!=null && !/^[A-Za-z-]+$/.test(String(c.anchor))) delete c.anchor;
    // Barcode: only a known symbology id, and an ECC level made of safe chars.
    if(c.bcType!=null && !BARCODE_TYPES.some(t=>t.id===c.bcType)) c.bcType='qrcode';
    if(c.eclevel!=null && !/^[A-Za-z0-9]{1,3}$/.test(String(c.eclevel))) delete c.eclevel;
    ['x','y','w','h','fs','lw','rot','tracking','stretch','lh'].forEach(function(k){
      if(c[k]!=null){ const n=Number(c[k]); if(isFinite(n)) c[k]=n; else delete c[k]; }
    });
    // Table: validate the grid arrays + the nested cells. Each cell is rebuilt on
    // a whitelist (unknown keys dropped), its font/enums/numerics/booleans scrubbed
    // exactly like a top-level object, and the shape padded/trimmed to rows×cols.
    // w/h are renormalized to the sums (the tb invariant).
    if(c.t==='tb'){
      const MIN=0.05;
      const dim=a=>Array.isArray(a)?a.map(Number).filter(n=>isFinite(n)&&n>0).map(n=>Math.max(MIN,n)):[];
      let cols=dim(c.cols), rows=dim(c.rows);
      if(!cols.length)cols=[Math.max(MIN,+c.w||1)];
      if(!rows.length)rows=[Math.max(MIN,+c.h||0.25)];
      if(cols.length>60)cols=cols.slice(0,60);   // hard cap (UI allows 20; margin for hand-edited files)
      if(rows.length>60)rows=rows.slice(0,60);
      c.lockCols=c.lockCols===true; c.lockRows=c.lockRows===true; c.lockSize=c.lockSize===true;
      if(c.lockCols){ const u=cols.reduce((a,b)=>a+b,0)/cols.length; cols=cols.map(()=>u); }
      if(c.lockRows){ const u=rows.reduce((a,b)=>a+b,0)/rows.length; rows=rows.map(()=>u); }
      c.lw=Math.max(1,Math.min(10,(+c.lw||1)));
      const MODES=['static','field','formula'];
      const cells=[];
      for(let r=0;r<rows.length;r++){
        const srcRow=(Array.isArray(c.cells)&&Array.isArray(c.cells[r]))?c.cells[r]:[];
        const row=[];
        for(let ci=0;ci<cols.length;ci++){
          const s=(srcRow[ci]&&typeof srcRow[ci]==='object')?srcRow[ci]:{};
          const cl={};
          if(s.mode!=null&&MODES.indexOf(String(s.mode))>=0)cl.mode=String(s.mode);
          if(s.text!=null)cl.text=String(s.text);
          if(s.field!=null)cl.field=String(s.field);
          if(s.f!=null)cl.f=String(s.f);
          cl.font=(typeof s.font==='string')?s.font.replace(/[^A-Za-z0-9 \-]/g,''):'';
          if(!cl.font.trim())cl.font='Arial';
          cl.al=ALIGN.indexOf(s.al)>=0?s.al:'left';
          cl.valign=VALIGN.indexOf(s.valign)>=0?s.valign:'middle';
          ['fs','tracking','stretch'].forEach(function(k){ if(s[k]!=null){ const n=Number(s[k]); if(isFinite(n))cl[k]=n; } });
          ['bold','italic','underline','wrapText','autoScale','sized'].forEach(function(k){ if(s[k]!=null)cl[k]=s[k]===true; });
          // Merged-cell spans: integers ≥2 only (absent/1 = unmerged); clamped +
          // overlap-stripped below once the full grid shape is known.
          ['rs','cs'].forEach(function(k){ if(s[k]!=null){ const n=Math.floor(Number(s[k])); if(isFinite(n)&&n>1)cl[k]=n; } });
          // A cell with no source at all becomes an empty static cell (so txMode
          // doesn't infer "formula" for padded cells).
          if(cl.mode==null&&cl.text==null&&cl.field==null&&cl.f==null){ cl.mode='static'; cl.text=''; }
          // Grandfather pre-auto-size tables: a cell that already holds a value keeps
          // its font size forever (the one-time first-value sizing must never fire on
          // content that predates the feature or was sized by hand).
          if(cl.sized!==true&&tblCellHasValue(cl))cl.sized=true;
          row.push(cl);
        }
        cells.push(row);
      }
      // Span pass (needs the final grid shape): clamp rs/cs to the bounds and strip
      // spans overlapping an earlier region (row-major first-wins) — the same rules
      // tblNorm enforces on every mutation and tblRegions applies when reading.
      const reg=tblRegions({rows:rows,cols:cols,cells:cells}).reg;
      for(let r=0;r<rows.length;r++)for(let ci=0;ci<cols.length;ci++){
        const cl=cells[r][ci];
        if(reg[r][ci]!==r+','+ci){ delete cl.rs; delete cl.cs; continue; }   // covered cell
        const sp=tblRegionSpan(reg,r,ci);
        if(sp[0]>1)cl.rs=sp[0]; else delete cl.rs;
        if(sp[1]>1)cl.cs=sp[1]; else delete cl.cs;
      }
      c.cols=cols.map(v=>+v.toFixed(4)); c.rows=rows.map(v=>+v.toFixed(4));
      c.cells=cells;
      c.w=+c.cols.reduce((a,b)=>a+b,0).toFixed(4);
      c.h=+c.rows.reduce((a,b)=>a+b,0).toFixed(4);
    }
    return c;
  });
}

function initPrintEdit(template){
  window._printEdit=true;
  if(template){
    S.tplName=template.name||defaultDocName();
    S._loadedId=template.id||null;
    window._preEditLoadedId=template.id||null;   // restored if a Save As is cancelled
    applyLoadedSpec(template.specN,template.labelLengthInches,template.canvasRot,template.supplyID,template.supplyGeometry,template.targetPrinterModel);
    S.objs=sanitizeObjs(template.objs);
    S.selId=null;S._ef=undefined;S.modal=null;
  }
  R();
}
function edPrintCancel(){ _vlPost("editReturn",{save:false}); }
function edPrintSave(){
  const data=templateData();
  const payload={name:S.tplName,specN:data.specN,objs:data.objs,supplyID:data.supplyID,supplyGeometry:data.supplyGeometry};

  if(data.targetPrinterModel) payload.targetPrinterModel=data.targetPrinterModel;   // printable-area overlay target

  _vlPost("editReturn",{save:true,template:payload});

// Filename validation: only letters, numbers, spaces, hyphens, underscores.
function templateNameBadChars(name){
  const bad=(name||"").replace(/[A-Za-z0-9 _\-]/g,"");
  return Array.from(new Set(bad.split(""))).join("");
}
function validateTemplateName(){
  const inp=document.getElementById("tpl-name-inp"); if(!inp)return false;
  const bad=templateNameBadChars(inp.value);
  const empty=!inp.value.trim();
  const err=document.getElementById("tpl-name-err");
  const btn=document.getElementById("tpl-save-btn");
  inp.style.borderColor = bad.length ? "var(--red)" : "";
  if(err){
    if(bad.length){ err.style.display="block"; err.textContent='Not allowed: '+bad+'   Use only letters, numbers, spaces, hyphens (-) and underscores (_).'; }
    else if(empty){ err.style.display="block"; err.textContent="Enter a template name."; }
    else { err.style.display="none"; }
  }
  const ok = !empty && bad.length===0;
  if(btn){ btn.disabled=!ok; btn.style.opacity=ok?"":"0.4"; btn.style.cursor=ok?"":"default"; }
  return ok;
}

async function saveTemplate(){
  const nameEl=document.getElementById("tpl-name-inp");
  if(nameEl && !validateTemplateName()) return;   // block invalid filenames
  if(nameEl)S.tplName=nameEl.value.trim()||defaultDocName();
  const data=templateData();
  const json=JSON.stringify(data,null,2);
  const filename=(S.tplName.replace(/[^a-z0-9_\- ]/gi,"_")||"template")+".vltmp";

  // Native app: persist via the Swift bridge to ~/Documents/VectorLabel/Templates/.
  // (WKWebView has no File System Access API, so the browser path below can't run.)
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    const payload={name:S.tplName,specN:data.specN,objs:data.objs};
    if(data.labelLengthInches) payload.labelLengthInches=data.labelLengthInches;
    if(typeof data.canvasRot==='number') payload.canvasRot=data.canvasRot;   // persist portrait override
    if(data.targetPrinterModel) payload.targetPrinterModel=data.targetPrinterModel;   // printable-area overlay target
    if(S._loadedId)payload.id=S._loadedId;
    // Save As & Return (print edit): one ordered message — save then return.
    if(window._printEdit&&window._printReturnAfterSave){
      window._printReturnAfterSave=false;
      S.modal=null;
      _vlPost("editReturn",{save:true,template:payload});
      return;
    }
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"saveTemplate",payload});
    markClean();
    S.modal=null;
    showToast("Saved: "+S.tplName);
    R();
    return;
  }

  // Use File System Access API if available (Chrome/Edge on Mac)
  if(window.showSaveFilePicker){
    try{
      const fh=await window.showSaveFilePicker({
        suggestedName:filename,
        startIn:"documents",
        types:[{description:"VectorLabel Template",accept:{"application/json":[".vltmp",".vlt.json",".json"]}}]
      });
      const writable=await fh.createWritable();
      await writable.write(json);
      await writable.close();
      S.modal=null;
      showToast("Saved: "+S.tplName);
      R();
      return;
    }catch(e){
      if(e.name==="AbortError"){S.modal=null;renderModal();return;}
    }
  }

  // Fallback: trigger download
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  S.modal=null;
  showToast("Downloaded: "+filename+" — move to ~/Documents/VectorLabel/Templates/");
  R();
}

function newTemplate(){
  const nameEl=document.getElementById("new-tpl-name");

// Fallback CSV parser for the standalone (no-Swift-bridge) case. In the shipping
// app the native bridge supplies parsed records, so this isn't used — but it must
// not diverge from the Swift RFC-4180 parser: a newline inside a quoted field is
// data, "" is an escaped quote, short rows are padded (never dropped).
function parseCSV(text){
  const rows=[]; let rec=[], field="", inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQ=false; }
      else field+=c;
    } else if(c==='"'){ inQ=true; }
    else if(c===','){ rec.push(field); field=""; }
    else if(c==='\n'||c==='\r'){
      if(c==='\r'&&text[i+1]==='\n') i++;
      rec.push(field); field="";
      if(!(rec.length===1&&rec[0]==="")) rows.push(rec);
      rec=[];
    } else field+=c;
  }
  if(field!==""||rec.length){ rec.push(field); if(!(rec.length===1&&rec[0]==="")) rows.push(rec); }
  if(rows.length<2) return [];
  const headers=rows[0];
  return rows.slice(1).map(vals=>{ const row={}; headers.forEach((h,i)=>row[h]=vals[i]!=null?vals[i]:""); return row; });
}

// ── Custom Designer data binding (Phase 3) ──────────────────────────────────────
// Swift calls initBoundData after the user picks (or refreshes) a CSV/XLSX data
// source. The bound data becomes the designer's record set (one label per row at
// print time) AND drives the canvas preview + the field/formula column source.
//
// records  : [{col:value,…}] flattened WireRecords (one per data row)
// columns  : [String] column names in order (the field/column source)
// filename : source file's display name
// headerRow: whether the file's first row supplied headers (xlsx toggle)
// isXLSX   : true for .xlsx, false for .csv (so the panel hides the toggle for CSV)
function initBoundData(records, columns, filename, headerRow, isXLSX){
  window._boundData={
    records:records||[], columns:columns||[],
    filename:filename||"", headerRow:!!headerRow, isXLSX:!!isXLSX
  };
  // Make the bound rows the active record set so the existing preview/navigation
  // (RX / _editorRecords / S.recIdx) reflects the current row on the canvas.
  RX=records||[];
  window._editorRecords=null;        // RX is now the single source of truth
  S.recIdx=0;
  S._csvName=filename||"";

  // the Print window). Reset range + any in-progress cell edit.
  const n=(records||[]).length;
  S._dbSel=new Set((records||[]).map((_,i)=>i));
  S._dbLastClick=null;
  S._dbEditCell=null; S._dbEditVal=undefined;
  S.printRange="all"; S.rangeFrom=1; S.rangeTo=Math.max(1,n);
  R();
  showToast("Bound "+(records?records.length:0)+" row"+((records&&records.length===1)?"":"s")+" from "+(filename||"file"));
}
function hasBoundData(){ return !!(isCustomMode()&&window._boundData&&window._boundData.records&&window._boundData.records.length); }

// binding, or a formula that references a bound column). With NO such object every
// row renders an identical label, so the job is a single label no matter how many
// rows are bound (the database pane can stay open).
function labelUsesData(){
  if(!hasBoundData())return false;
  const cols=(window._boundData&&Array.isArray(window._boundData.columns))?window._boundData.columns:[];
  return S.objs.some(o=>{
    if(o.t!=="tx")return false;
    const m=txMode(o);
    if(m==="field")return !!o.field;
    if(m==="formula"){ const f=o.f||""; return cols.some(c=>c&&f.indexOf(c)>=0); }
    return false;
  });
}
// True size of the print job, matching Swift: one label per bound ROW × copies
// when a data source is bound, else just `copies`.
function dBoundRowCount(){ return hasBoundData()?window._boundData.records.length:0; }

// The bound-row indices that will print, honoring the filter/sort + the print-range
// control (#6). Indices are ABSOLUTE RX indices returned in VISIBLE (filtered+sorted)
// order, so the printed sequence matches what the user sees:
//   all      → every visible row (in display order)
//   selected → the checked rows that are visible (in display order)
//   range    → the 1-based from..to window over the visible rows
// Returns [] with no data bound (the no-data print path is a single label and
// ignores this).
function dbPrintIndices(){
  const vis=dbVisibleIndices();
  if(!vis.length)return [];
  const sel=S._dbSel||new Set();
  if(S.printRange==="selected"){ return vis.filter(gi=>sel.has(gi)); }
  if(S.printRange==="range"){
    const from=Math.max(1,Math.min(S.rangeFrom||1,vis.length));
    const to=Math.max(from,Math.min(S.rangeTo||vis.length,vis.length));
    return vis.slice(from-1,to);
  }
  return vis.slice();   // "all" → all visible, in display order
}
function dJobLabelCount(){
  const copies=Math.max(1,S.copies||1);
  if(!hasBoundData()||!labelUsesData())return copies;   // no field bound → one label
  return dbPrintIndices().length*copies;
}

// ── Filter / sort / search engine (custom-mode database pane) ───────────────────
// Ported from the Print window so the Custom Designer offers the same record
// filtering, multi-level sorting (with Source/Destination pair modes), full-text
// search, and the Filter & sort modal. Operates over RX (the bound rows) using
// ABSOLUTE record indices, so the selection (S._dbSel) and the print set stay
// correct regardless of the visible filter/sort order.

// Source/Destination pairing — null when the data isn't paired, so pair features no-op.
function pairIdx(i){
  const r=RX[i];
  if(!r)return null;
  if(r._Side==="Source"      && i+1<RX.length && RX[i+1]._Side==="Destination") return i+1;
  if(r._Side==="Destination" && i>0 && RX[i-1]._Side==="Source") return i-1;
  return null;
}

const FILTER_OPS=[
  {op:"contains",label:"Contains"},
  {op:"not_contains",label:"Does not contain"},
  {op:"is",label:"Is exactly"},
  {op:"is_not",label:"Is not"},
  {op:"eq",label:"="},
  {op:"ne",label:"≠"},
  {op:"gt",label:">"},
  {op:"gte",label:"≥"},
  {op:"lt",label:"<"},
  {op:"lte",label:"≤"},
  {op:"empty",label:"Is empty"},
  {op:"not_empty",label:"Is not empty"},
];
function opNeedsValue(op){ return op!=="empty"&&op!=="not_empty"; }
function ruleMatches(rec,rule){
  if(!rule||!rule.field)return true;
  const a=(rec[rule.field]==null?"":String(rec[rule.field]));
  const b=opNeedsValue(rule.op)
    ? (rule.valueType==="field" ? (rec[rule.value]==null?"":String(rec[rule.value])) : String(rule.value==null?"":rule.value))
    : "";
  const al=a.toLowerCase(), bl=b.toLowerCase();
  const an=parseFloat(a), bn=parseFloat(b), nums=isFinite(an)&&isFinite(bn);
  switch(rule.op){
    case "contains":     return al.includes(bl);
    case "not_contains": return !al.includes(bl);
    case "is":           return al===bl;
    case "is_not":       return al!==bl;
    case "eq":           return nums?an===bn:a===b;
    case "ne":           return nums?an!==bn:a!==b;
    case "gt":           return nums?an>bn:a>b;
    case "gte":          return nums?an>=bn:a>=b;
    case "lt":           return nums?an<bn:a<b;
    case "lte":          return nums?an<=bn:a<=b;
    case "empty":        return a==="";
    case "not_empty":    return a!=="";
  }
  return true;
}
function newFilterRule(){ const cols=recordColumns(currentRecords()); return {field:cols[0]||"",op:"contains",valueType:"text",value:""}; }
function newFilterGroup(){ return {rules:[newFilterRule()],connectors:[]}; }
function ruleReady(r){ if(!r||!r.field||!r.op)return false; if(!opNeedsValue(r.op))return true; return r.value!==undefined&&r.value!==""; }
function groupReady(g){ return !!(g&&(g.rules||[]).some(ruleReady)); }
function groupMatches(rec,g){
  const rules=(g.rules||[]).filter(ruleReady);
  if(!rules.length)return true;
  let res=ruleMatches(rec,rules[0]);
  for(let k=1;k<rules.length;k++){ const c=(g.connectors&&g.connectors[k-1])||"and"; res = c==="or" ? (res||ruleMatches(rec,rules[k])) : (res&&ruleMatches(rec,rules[k])); }
  return res;
}
function filterGroups(f){ if(!f)return []; if(Array.isArray(f.groups))return f.groups; if(Array.isArray(f.rules))return [{rules:f.rules,connectors:f.connectors||[]}]; return []; }
function recordMatchesFilter(rec,f){
  const groups=filterGroups(f).filter(groupReady);
  if(!groups.length)return true;
  let res=groupMatches(rec,groups[0]);
  for(let k=1;k<groups.length;k++){ const c=(f.groupConnectors&&f.groupConnectors[k-1])||"or"; res = c==="and" ? (res&&groupMatches(rec,groups[k])) : (res||groupMatches(rec,groups[k])); }
  return res;
}
function filterActive(){ return filterGroups(S.dbFilter).some(groupReady); }
function passesFilter(i){
  if(!filterActive())return true;
  if(recordMatchesFilter(RX[i],S.dbFilter))return true;
  if(S.dbFilter.showBothSides){ const j=pairIdx(i); if(j!=null&&recordMatchesFilter(RX[j],S.dbFilter))return true; }
  return false;
}

// Sorting
function sortActive(){ return !!(S.dbSort && (S.dbSort.rules||[]).some(r=>r.field)); }
let _effRack=null;
function buildEffRack(){
  _effRack=new Map();
  if(!(S.dbSort && S.dbSort.inheritRack))return;
  for(let i=0;i<RX.length;i++){
    const r=RX[i]; let v=(r&&r.Rack!=null)?r.Rack:"";
    if(v===""){ const j=pairIdx(i); if(j!=null){ const p=RX[j]; if(p&&p.Rack)v=p.Rack; } }
    _effRack.set(r,v);
  }
}
function sortVal(rec,field){ if(field==="Rack" && S.dbSort && S.dbSort.inheritRack && _effRack && _effRack.has(rec)) return _effRack.get(rec); return rec?rec[field]:""; }
function cmpRecs(ra,rb){
  for(const r of (S.dbSort.rules||[])){
    if(!r.field)continue;
    const a=sortVal(ra,r.field), b=sortVal(rb,r.field);
    let c=String(a==null?"":a).localeCompare(String(b==null?"":b),undefined,{numeric:true,sensitivity:"base"});
    if(r.dir==="desc")c=-c;
    if(c)return c;
  }
  return 0;
}
function applySort(idx){
  buildEffRack();
  const mode=(S.dbSort.pairMode)||"break";
  if(mode==="break") return idx.slice().sort((i,j)=>cmpRecs(RX[i],RX[j])||(i-j));
  const vis=new Set(idx), consumed=new Set(), units=[];
  for(const i of idx){
    if(consumed.has(i))continue;
    const r=RX[i];
    if(r._Side==="Source"){ const j=pairIdx(i); if(j!=null&&vis.has(j)){ units.push([i,j]); consumed.add(i);consumed.add(j); continue; } }
    units.push([i]); consumed.add(i);
  }
  function keyRow(u){ const want=mode==="source"?"Source":"Destination"; for(const k of u){ if(RX[k]._Side===want)return RX[k]; } return RX[u[0]]; }
  units.sort((ua,ub)=>cmpRecs(keyRow(ua),keyRow(ub))||(ua[0]-ub[0]));
  const out=[]; for(const u of units) for(const k of u) out.push(k);
  return out;
}

// Quick search (all fields)
function searchActive(){ return !!(S.dbSearch||"").trim(); }
function passesSearch(rec){
  const q=(S.dbSearch||"").trim().toLowerCase();
  if(!q)return true;
  const hay=Object.keys(rec).map(k=>String(rec[k]==null?"":rec[k])).join(" ").toLowerCase();
  return q.split(/\s+/).every(t=>hay.indexOf(t)>=0);
}
function onRecSearchInput(v){
  const old=document.getElementById("db-rec-search");
  const pos=old?old.selectionStart:(v||"").length;
  S.dbSearch=v; R();
  const el=document.getElementById("db-rec-search");
  if(el){ el.focus(); try{ el.setSelectionRange(pos,pos); }catch(_){} }
}
function clearRecSearch(){ S.dbSearch=""; R(); const el=document.getElementById("db-rec-search"); if(el)el.focus(); }

// Absolute RX indices currently shown, in display order (filter + search + sort).
function dbVisibleIndices(){
  const all=RX.map((_,i)=>i);
  let idx=filterActive()?all.filter(passesFilter):all;
  if(searchActive()) idx=idx.filter(i=>passesSearch(RX[i]));
  if(sortActive()) idx=applySort(idx);
  return idx;
}

// Human-readable summaries for the header chips + tooltips.
function sortSummaryOf(s){
  if(!s||!(s.rules||[]).some(r=>r.field))return "";
  const parts=s.rules.filter(r=>r.field).map(r=>colLabel(r.field)+(r.dir==="desc"?" ↓":" ↑"));
  const modeTxt=s.pairMode==="source"?" · pairs follow source":s.pairMode==="dest"?" · pairs follow destination":"";
  return parts.join(", ")+modeTxt;
}
function sortSummary(){ return sortSummaryOf(S.dbSort); }
function ruleSummary(r){
  const opl=(FILTER_OPS.find(o=>o.op===r.op)||{}).label||r.op;
  const val=opNeedsValue(r.op)?(r.valueType==="field"?("["+colLabel(r.value)+"]"):('"'+r.value+'"')):"";
  return colLabel(r.field)+" "+opl+(val?" "+val:"");
}
function filterSummaryOf(f){
  const groups=filterGroups(f).filter(groupReady);
  if(!groups.length)return "";
  const groupStrs=groups.map(g=>{
    const rules=g.rules.filter(ruleReady);
    const parts=rules.map((r,k)=>(k>0?((g.connectors[k-1]||"and").toUpperCase()+" "):"")+ruleSummary(r));
    const inner=parts.join(" ");
    return groups.length>1?("("+inner+")"):inner;
  });
  let out=groupStrs[0]||"";
  for(let k=1;k<groupStrs.length;k++){ out+=" "+((f.groupConnectors&&f.groupConnectors[k-1])||"or").toUpperCase()+" "+groupStrs[k]; }
  return out + (f.showBothSides?" · incl. pairs":"");
}
function filterSummary(){ return filterActive()?filterSummaryOf(S.dbFilter):""; }

// ── Filter/sort presets (shared with the Print window via Swift/AppSettings) ─────
// Swift injects the saved presets through applyFilterSortPresets() on load and
// whenever they change; savePresets() posts them back, so both windows stay in sync.
function applyFilterSortPresets(arr){ window._presets = Array.isArray(arr)?arr:[]; if(typeof R==='function')R(); }
function presetGenId(){ return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function savePresets(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"setFilterSortPresets",payload:window._presets||[]});
}
function presetSummary(p){
  const f=filterSummaryOf(p.filter), s=sortSummaryOf(p.sort);
  const out=[]; if(f)out.push("Filter: "+f); if(s)out.push("Sort: "+s);
  return out.length?out.join("\n"):"(no filter or sort)";
}
// Canonical JSON (recursively sorted keys) so preset comparison is key-order independent.
function _canon(x){
  if(x===null||x===undefined) return null;
  if(Array.isArray(x)) return x.map(_canon);
  if(typeof x==='object'){ const o={}; Object.keys(x).sort().forEach(k=>{ const v=_canon(x[k]); if(v!==undefined)o[k]=v; }); return o; }
  return x;
}
function presetMatchesActive(p){
  return JSON.stringify(_canon(p.filter||null))===JSON.stringify(_canon(S.dbFilter||null))
      && JSON.stringify(_canon(p.sort||null))===JSON.stringify(_canon(S.dbSort||null));
}
function applyPreset(id){
  const p=(window._presets||[]).find(x=>x.id===id); if(!p)return;
  S.dbFilter=p.filter?JSON.parse(JSON.stringify(p.filter)):null;
  S.dbSort=p.sort?JSON.parse(JSON.stringify(p.sort)):null;
  _dbKeepActiveVisible(); R();
}
function deletePreset(id){ window._presets=(window._presets||[]).filter(x=>x.id!==id); savePresets(); R(); }
function renamePreset(id){

function closePresetMenu(){ const m=document.getElementById('vl-preset-menu'); if(m)m.remove(); }
function presetMenu(e,id){

function saveCurrentAsPreset(){

}

// Text-input overlay (WKWebView blocks window.prompt without a delegate).
// cb(value, viaExtra) — viaExtra true when the optional extra button was used.
function vlPrompt(title,def,cb,extraLabel){
  const o=document.createElement('div'); o.className='modal-overlay'; o.style.zIndex='2700';
  o.onclick=e=>{ if(e.target===o){ o.remove(); cb(null,false); } };
  o.innerHTML=`<div class="modal" style="min-width:360px">
    <div class="modal-title">${esc(title)}</div>
    <input id="vlpi" class="inp" value="${(def||'').replace(/"/g,'&quot;')}">
    <div id="vlperr" style="display:none;color:var(--red);font-size:11px;margin-top:6px">You must enter a name.</div>
    <div class="modal-footer"><button class="btn" id="vlpc">Cancel</button>
      <button class="btn" id="vlpo" style="background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600">Save</button>
      ${extraLabel?`<button class="btn" id="vlpx" style="background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600">${esc(extraLabel)}</button>`:''}
    </div>
  </div>`;
  document.body.appendChild(o);
  const inp=o.querySelector('#vlpi'), err=o.querySelector('#vlperr');
  inp.focus(); inp.select();
  function attempt(extra){
    const v=inp.value.trim();
    if(!v){ err.style.display='block'; inp.focus(); return; }   // require a name; stay open
    o.remove(); cb(v,!!extra);
  }
  inp.oninput=()=>{ if(inp.value.trim())err.style.display='none'; };
  o.querySelector('#vlpo').onclick=()=>attempt(false);
  o.querySelector('#vlpc').onclick=()=>{ o.remove(); cb(null,false); };
  const xb=o.querySelector('#vlpx'); if(xb)xb.onclick=()=>attempt(true);
  inp.onkeydown=e=>{ if(e.key==='Enter')attempt(false); if(e.key==='Escape'){ o.remove(); cb(null,false); } };
}

// ── Filter & sort modal ─────────────────────────────────────────────────────────
function openFilterModal(presetId){
  S._editingPresetId = presetId || null;
  let baseFilter=S.dbFilter, baseSort=S.dbSort;
  if(presetId){ const p=(window._presets||[]).find(x=>x.id===presetId); baseFilter=p?p.filter:null; baseSort=p?p.sort:null; }
  if(baseFilter){
    const d=JSON.parse(JSON.stringify(baseFilter));
    if(!Array.isArray(d.groups)) d.groups=[{rules:d.rules||[newFilterRule()],connectors:d.connectors||[]}];
    if(!Array.isArray(d.groupConnectors)) d.groupConnectors=[];
    delete d.rules; delete d.connectors;
    S._filterDraft=d;
  }else{ S._filterDraft={groups:[newFilterGroup()],groupConnectors:[],showBothSides:false}; }
  S._filterDraft.groups.forEach(g=>{ if(!g.rules||!g.rules.length)g.rules=[newFilterRule()]; if(!Array.isArray(g.connectors))g.connectors=[]; });
  S._sortDraft = baseSort ? JSON.parse(JSON.stringify(baseSort)) : {rules:[{field:"",dir:"asc"}], pairMode:"break"};
  if(!S._sortDraft.rules.length)S._sortDraft.rules.push({field:"",dir:"asc"});
  if(!S._sortDraft.pairMode)S._sortDraft.pairMode="break";
  renderFilterModal();
}
function closeFilterModal(){ S._filterDraft=null; S._sortDraft=null; S._editingPresetId=null; const m=document.getElementById('vl-filter-modal'); if(m)m.remove(); }
function draftToFilter(){ const d=S._filterDraft; return (d.groups||[]).some(groupReady)?{groups:d.groups,groupConnectors:d.groupConnectors,showBothSides:!!d.showBothSides}:null; }
function draftToSort(){ const s=S._sortDraft; return (s.rules||[]).some(r=>r.field)?{rules:s.rules.filter(r=>r.field),pairMode:s.pairMode||"break",inheritRack:!!s.inheritRack}:null; }
// After a filter/sort change, keep the on-canvas record (S.recIdx) within the visible set.
function _dbKeepActiveVisible(){ const vis=dbVisibleIndices(); if(vis.length&&!vis.includes(S.recIdx))S.recIdx=vis[0]; }
function sdAddRule(){ S._sortDraft.rules.push({field:"",dir:"asc"}); renderFilterModal(); }
function sdRemoveRule(i){ S._sortDraft.rules.splice(i,1); if(!S._sortDraft.rules.length)S._sortDraft.rules.push({field:"",dir:"asc"}); renderFilterModal(); }
function sdSet(i,prop,val){ S._sortDraft.rules[i][prop]=val; renderFilterModal(); }
function sdSetPairMode(m){ S._sortDraft.pairMode=m; renderFilterModal(); }
function sdSetInheritRack(v){ S._sortDraft.inheritRack=v; renderFilterModal(); }
function fdAddRule(gi){ const g=S._filterDraft.groups[gi]; g.rules.push(newFilterRule()); if(g.rules.length>1)g.connectors.push('and'); renderFilterModal(); }
function fdRemoveRule(gi,ri){ const g=S._filterDraft.groups[gi]; g.rules.splice(ri,1); g.connectors.splice(Math.max(0,ri-1),1); if(!g.rules.length)g.rules.push(newFilterRule()); renderFilterModal(); }
function fdAddGroup(){ S._filterDraft.groups.push(newFilterGroup()); if(S._filterDraft.groups.length>1)S._filterDraft.groupConnectors.push('or'); renderFilterModal(); }
function fdRemoveGroup(gi){ S._filterDraft.groups.splice(gi,1); S._filterDraft.groupConnectors.splice(Math.max(0,gi-1),1); if(!S._filterDraft.groups.length)S._filterDraft.groups.push(newFilterGroup()); renderFilterModal(); }
function fdSet(gi,ri,prop,val){ const r=S._filterDraft.groups[gi].rules[ri]; r[prop]=val; if(prop==='valueType') r.value = val==='field' ? (recordColumns(currentRecords())[0]||'') : ''; if(prop==='op'||prop==='valueType') renderFilterModal(); }
function fdSetText(gi,ri,val){ S._filterDraft.groups[gi].rules[ri].value=val; }   // no re-render → keeps focus
function fdSetConn(gi,ci,val){ S._filterDraft.groups[gi].connectors[ci]=val; renderFilterModal(); }
function fdSetGroupConn(gci,val){ S._filterDraft.groupConnectors[gci]=val; renderFilterModal(); }

function connToggle(curr,onclickPrefix){ return `<div style="display:flex;gap:4px">${['and','or'].map(c=>`<button onclick="${onclickPrefix}'${c}')" class="btn${(curr||'and')===c?' on':''}" style="padding:1px 14px;font-size:11px;text-transform:uppercase">${c}</button>`).join('')}</div>`; }

    </div>

// Ripple icon: an "R" with a down arrow (used by the cell editor + the context menu).
const RIPPLE_ICON='<svg width="14" height="14" viewBox="0 0 16 16" style="display:block;flex-shrink:0;pointer-events:none"><text x="0.5" y="12.5" font-size="13" font-weight="800" fill="currentColor">R</text><path d="M11.5 2.5V10M9.5 8l2 2 2-2" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';

// --- Ripple dialog (self-contained overlay; shared with the Print window) ---
function rippleOpen(absRow,col,prefixOverride){
  const o=feRowObj(absRow)||{}; const cur=(prefixOverride!=null)?prefixOverride:String(o[col]!=null?o[col]:'');
  window._ripple={absRow:absRow,col:col,prefix:cur,start:'1',inc:1,postfix:'',count:''};
  rippleRender();
}
function rippleField(label,key,type,placeholder){ const rp=window._ripple; const v=escAttr(String(rp[key]));
  return '<label style="display:block;margin-bottom:9px"><span style="display:block;color:var(--text2);margin-bottom:3px;font-size:11px">'+esc(label)+'</span>'
    +'<input type="'+type+'" value="'+v+'"'+(placeholder?' placeholder="'+escAttr(placeholder)+'"':'')+' oninput="window._ripple.'+key+'=this.value;rippleValidate()" onkeydown="if(event.key===\'Enter\'){event.preventDefault();rippleApply();}" style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--bd3);border-radius:5px;background:var(--bg);color:var(--text);box-sizing:border-box"></label>'; }
function rippleValidate(){ const b=document.getElementById('ripple-apply'); if(!b)return; const rp=window._ripple; const ok=!!rp&&/^\d+$/.test(String(rp.count).trim())&&parseInt(rp.count,10)>=1; b.disabled=!ok; b.style.opacity=ok?'1':'0.4'; b.style.cursor=ok?'pointer':'not-allowed'; b.style.pointerEvents=ok?'':'none'; }
function rippleSetAll(){ const rp=window._ripple; if(!rp)return; const vis=feVisRows(); const pos=vis.indexOf(rp.absRow); const n=pos>=0?(vis.length-pos):0; rp.count=String(n); const inp=document.getElementById('ripple-count'); if(inp)inp.value=rp.count; rippleValidate(); }
function rippleRender(){ rippleClose(true); const rp=window._ripple; if(!rp)return;
  const wrap=document.createElement('div'); wrap.id='ripple-overlay';
  wrap.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:99999;display:flex;align-items:center;justify-content:center';
  wrap.onmousedown=function(e){ if(e.target===wrap)rippleClose(); };
  wrap.innerHTML='<div onmousedown="event.stopPropagation()" style="background:var(--surface);border:1px solid var(--bd3);border-radius:10px;padding:18px 20px;width:330px;box-shadow:0 12px 44px rgba(0,0,0,0.5);color:var(--text)">'
    +'<div style="font-weight:600;font-size:14px;margin-bottom:3px">Ripple values</div>'
    +'<div style="color:var(--text3);font-size:11px;margin-bottom:13px">Auto-enumerate down column “'+esc(colLabel(rp.col))+'”. Each value is <b>prefix + counter + postfix</b>.</div>'
    +rippleField('Prefix','prefix','text')+rippleField('Start (number or letter)','start','text')
    +rippleField('Increment (e.g. 1 → 1,2,3 · 2 → 1,3,5)','inc','number')+rippleField('Postfix','postfix','text')
    +'<label style="display:block;margin-bottom:9px"><span style="display:block;color:var(--text2);margin-bottom:3px;font-size:11px">Number of records</span>'
    +'<div style="display:flex;gap:6px"><input id="ripple-count" type="number" value="'+escAttr(String(rp.count))+'" placeholder="Enter a quantity" oninput="window._ripple.count=this.value;rippleValidate()" onkeydown="if(event.key===\'Enter\'){event.preventDefault();rippleApply();}" style="flex:1;padding:6px 8px;font-size:12px;border:1px solid var(--bd3);border-radius:5px;background:var(--bg);color:var(--text);box-sizing:border-box">'
    +'<button class="btn" onmousedown="event.preventDefault()" onclick="rippleSetAll()" title="All records from the selected one to the end of the data set" style="padding:6px 13px;font-size:12px;flex-shrink:0">All</button></div></label>'
    +'<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px">'
    +'<button class="btn" onclick="rippleClose()" style="padding:5px 12px">Cancel</button>'
    +'<button id="ripple-apply" class="btn on" onclick="rippleApply()" style="padding:5px 16px">Apply</button></div></div>';
  document.body.appendChild(wrap); const fi=wrap.querySelector('input'); if(fi){ fi.focus(); fi.select(); } rippleValidate(); }
function rippleClose(silent){ const el=document.getElementById('ripple-overlay'); if(el)el.remove(); if(!silent)window._ripple=null; }
function _lettersToNum(s){ let n=0; s=String(s).toUpperCase(); for(let i=0;i<s.length;i++){ const ch=s.charCodeAt(i); if(ch<65||ch>90)return 0; n=n*26+(ch-64); } return n; }
function _numToLetters(n){ if(n<1)n=1; let s=''; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); } return s; }
function rippleValueAt(start,inc,step){ start=String(start);
  if(/^-?\d+$/.test(start)){ const num=parseInt(start,10)+step*inc; let s=String(Math.abs(num)); const w=start.replace('-','').length; if(w>s.length)s=s.padStart(w,'0'); return (num<0?'-':'')+s; }
  if(/^[A-Za-z]+$/.test(start)){ const lower=start===start.toLowerCase(); const base=_lettersToNum(start); if(base>0){ const out=_numToLetters(base+step*inc); return lower?out.toLowerCase():out; } }
  return start; }
function rippleApply(){ const rp=window._ripple; if(!rp){ rippleClose(); return; }
  if(!/^\d+$/.test(String(rp.count).trim())||parseInt(rp.count,10)<1) return;   // require a quantity
  const vis=feVisRows(); const startPos=vis.indexOf(rp.absRow); if(startPos<0){ rippleClose(); return; }
  const n=Math.max(1,parseInt(rp.count,10)||1); const inc=parseInt(rp.inc,10)||1;
  for(let k=0;k<n;k++){ const pos=startPos+k; if(pos>=vis.length)break; const val=rp.prefix+rippleValueAt(rp.start,inc,k)+rp.postfix; feWriteCellAbs(vis[pos],rp.col,val); }
  feBulkSyncNow(); feMarkDirty(); rippleClose(); R(); }
if(!window._feMouseupBound){ window._feMouseupBound=true; document.addEventListener('mouseup',feUp); }
// How many rows are currently print-enabled (checked).
// Count of checked rows that are currently VISIBLE (the set that actually prints
// under "Selected") — so the radio label matches dbPrintIndices.
function dbSelCount(){ const s=S._dbSel||(S._dbSel=new Set()); return dbVisibleIndices().filter(gi=>s.has(gi)).length; }

// Per-row checkbox click. `gi` is the ABSOLUTE RX index. Shift+click extends from
// the last-clicked row across every row in between IN THE VISIBLE (filtered+sorted)
// ORDER, applying the anchor row's resulting on/off state — same semantics as the
// Print window's rowCheckClick.
function dbRowCheckClick(gi,e){
  const sel=S._dbSel||(S._dbSel=new Set());
  if(e.shiftKey && S._dbLastClick!=null && S._dbLastClick!==gi){
    const vis=dbVisibleIndices();
    const aPos=vis.indexOf(S._dbLastClick), bPos=vis.indexOf(gi);
    if(aPos>=0&&bPos>=0){
      const target=sel.has(S._dbLastClick);   // match the anchor's state
      const lo=Math.min(aPos,bPos), hi=Math.max(aPos,bPos);
      for(let p=lo;p<=hi;p++){ const g=vis[p]; if(target)sel.add(g); else sel.delete(g); }
      S.printRange="selected"; S._dbLastClick=gi; R(); return;
    }
  }
  if(sel.has(gi))sel.delete(gi); else sel.add(gi);
  S.printRange="selected"; S._dbLastClick=gi; R();
}
// Header checkbox: select-all / clear-all across the VISIBLE (filtered) rows.
function dbToggleAll(){
  const sel=S._dbSel||(S._dbSel=new Set());
  const vis=dbVisibleIndices();
  const allSel=vis.length>0&&vis.every(gi=>sel.has(gi));
  if(allSel){ vis.forEach(gi=>sel.delete(gi)); }
  else { vis.forEach(gi=>sel.add(gi)); S.printRange="all"; }
  R();
}

function dbStartCellEdit(i,c){

    const rows=dbRows();

// The scrollable record table with the print-enable checkbox column + # + data.

function dbRecordTable(){

  const vis=dbVisibleIndices();

      <button class="btn" onclick="chooseDataSource()" style="padding:3px 10px;font-size:11px">Choose data file…</button>
      <button class="btn" onclick="clearDataSourceCustom()" style="padding:3px 10px;font-size:11px"${bound?"":" disabled"} title="Unbind the data source — back to a single label">Clear data</button>
      ${(bound&&(window._boundData.filename||'')!=='Custom data')?`<button class="btn" onclick="refreshDataSource()" style="padding:3px 10px;font-size:11px" title="Re-read the bound file from disk">↻ Refresh from source</button>`:''}
    </div>
    ${bound
      ? `<div style="flex:1;overflow:auto;min-height:0">${dbRecordTable()}</div>`
      : `<div style="padding:10px 14px;color:var(--text3);font-size:11px">Choose a CSV or Excel file to bind print data — one label per row — or <button class="btn" onclick="dbAddRow()" style="padding:2px 9px;font-size:11px">+ start a new data set</button> to build one here.</div>`}
  </div>`;
}

R();
function setTheme(m){document.documentElement.dataset.theme=(m==="light"?"light":"");}
</script>
</body>
</html>
