function startRecResize(e){
  e.preventDefault();
  const startY=e.clientY;
  const startH=S.recH||160;
  function mv(e){
    const delta=startY-e.clientY;
    S.recH=Math.max(60,startH+delta);
    const panel=document.getElementById("rec-panel");
    if(panel)panel.style.height=S.recH+"px";
  }
  function mu(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",mu);saveDesignerPrefs();}
  window.addEventListener("mousemove",mv);
  window.addEventListener("mouseup",mu);
}

// Drag the splitter on the properties panel's LEFT edge to resize it; persist on
// release (mirrors the print window's startPreviewResize). Dragging left widens.
// Applies in both designer modes. Width is clamped to PROP_MIN..PROP_MAX.
function startPropResize(e){
  e.preventDefault(); e.stopPropagation();
  const startX=e.clientX, startW=S.propW||PROP_DEFAULT;
  const pane=document.getElementById("props-pane");
  function mv(ev){
    const maxW=Math.min(PROP_MAX, Math.max(PROP_MIN, window.innerWidth-360));
    let w=Math.max(PROP_MIN, Math.min(startW+(startX-ev.clientX), maxW));   // drag left → wider
    S.propW=w;
    if(pane)pane.style.width=w+"px";
  }
  function mu(){
    window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",mu);
    saveDesignerPrefs();
  }
  window.addEventListener("mousemove",mv); window.addEventListener("mouseup",mu);
}
// ── Undo history ─────────────────────────────────────────────────────────────
const HISTORY=[];
const MAX_HISTORY=50;

function snapshot(){
  // Deep-clone just the parts that change: objs and selId
  HISTORY.push(JSON.parse(JSON.stringify({objs:S.objs,selId:S.selId})));
  if(HISTORY.length>MAX_HISTORY)HISTORY.shift();
}

function undo(){
  if(!HISTORY.length)return;
  const prev=HISTORY.pop();
  S.objs=prev.objs;
  S.selId=prev.selId;
  S._ef=undefined;
  R();
}

// Snapshot before any destructive/positional action
const _origDelObj=delObj;
const _origAddObj=addObj;
const _origUobj=uobj;

// Wrap uobj to snapshot before each property change
function uobjWithHistory(id,p){
  snapshot();
  uobj(id,p);
}

// Wrap startDrag to snapshot on mousedown (before move)
const _origStartDrag=startDrag;
// Move just the dragged element's left/top from the model — avoids a full R()
// (which rebuilds the whole designer, re-decoding images etc.) on every frame.
function positionEl(id){
  const o=gobj(id); if(!o)return;
  const el=document.querySelector('[data-obj="'+id+'"]'); if(!el)return;
  const B=BLEED_IN*SC, x=o.x*SC+B, y=o.y*SC+B;
  el.style.left=x+"px";
  if(o.t==="ar"){ const th=Math.max(1,o.lw||2),as=Math.max(4,o.arrowSize||12),hw=as*0.6,vh=Math.max(th/2,hw)+2; el.style.top=(y-vh)+"px"; }
  else { el.style.top=y+"px"; }
}

let _txEditClickId=null,_txEditClickT=0; const DBLCLICK_MS=350;
function startDrag(e,id){
  e.stopPropagation();
  const o=gobj(id);if(!o)return;
  if(S.editingId&&S.editingId!==id)S.editingId=null;
  // Shift-click toggles this object in/out of the multi-selection (no drag).
  if(e.shiftKey){ toggleSel(id); R(); return; }
  // Double-click a lone static text box → edit inline. A single click only selects
  // and arms a move, so static text stays draggable (previously a single click
  // entered edit mode, after which the box could no longer be moved).
  if(o.t==="tx" && txMode(o)==="static" && (S.selIds||[]).length<=1){
    const now=Date.now();
    if(_txEditClickId===id && (now-_txEditClickT)<DBLCLICK_MS){
      _txEditClickId=null; _txEditClickT=0; startTextEdit(id); return;
    }
    _txEditClickId=id; _txEditClickT=now;
  }
  // Grabbing an object already part of a multi-selection drags the whole group;
  // grabbing anything else selects just it first.
  const inMulti=(S.selIds||[]).length>1 && S.selIds.includes(id);
  if(!inMulti && (S.selId!==id||(S.selIds||[]).length>1)){ setSel(id); S._ef=o.f; R(); }
  snapshot();
  S._rulerObj=id;   // highlight this object's extent on the rulers while dragging
  const ids=((S.selIds||[]).length?S.selIds:[id]).slice();
  const origs={}; ids.forEach(i=>{const oo=gobj(i); if(oo)origs[i]={x:oo.x,y:oo.y};});
  const sx=e.clientX,sy=e.clientY,ox=o.x,oy=o.y;
  let moved=false;
  function mv(e){
    if(!moved && (Math.abs(e.clientX-sx)>3||Math.abs(e.clientY-sy)>3)) moved=true;
    const rawX=ox+(e.clientX-sx)/(SC*S.zoom);
    const rawY=oy+(e.clientY-sy)/(SC*S.zoom);
    const o2=gobj(id);
    const snapped=applySnap(rawX,rawY,o2?o2.w:0.1,o2?o2.h:0.1,id);
    // Apply the grabbed object's (snapped) delta to every selected object so the
    // whole group moves rigidly together.
    const dx=snapped.x-ox, dy=snapped.y-oy;
    ids.forEach(i=>{ const og=origs[i]; if(!og)return; uobj(i,{x:og.x+dx,y:og.y+dy}); positionEl(i); });
    renderSnapGuides();   // show the alignment guides live
    drawRulers();         // highlight the object's extent on the rulers
  }
  function mu(){
    S._snapLines=[]; renderSnapGuides(); S._rulerObj=null;
    window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",mu);
    // Single click no longer enters edit mode (double-click does, handled above),
    // so a lone static text box can be selected and dragged.
    R();
  }
  window.addEventListener("mousemove",mv);window.addEventListener("mouseup",mu);
}

// Wrap startResize to snapshot on mousedown
// Drag a line's end handle to stretch it. 'r' = move right end (width),
// 'l' = move left end (x + width, keeping the right end fixed).
function startLineResize(e,id,end){
  e.stopPropagation();
  const o=gobj(id);if(!o)return;
  if(S.selId!==id){S.selId=id;S._ef=o.f;}
  snapshot();
  const sx=e.clientX, ox=o.x, ow=o.w;
  function mv(ev){
    const dx=(ev.clientX-sx)/(SC*S.zoom);
    if(end==='r'){
      uobj(id,{w:snapToGrid(Math.max(.02,ow+dx))});
    }else{
      let nx=snapToGrid(ox+dx);
      nx=Math.max(-BLEED_IN,Math.min(nx,ox+ow-.02));
      uobj(id,{x:nx,w:(ox+ow)-nx});
    }
    scheduleCanvas();
  }
  function mu(){window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',mu);}
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',mu);
}

// Drag the rotate handle: angle = direction from the object's on-screen
// center to the cursor. Handle points "up" at 0°. Hold Shift to snap to 15°.
function startRotate(e,id){
  e.stopPropagation();e.preventDefault();
  const o=gobj(id);if(!o)return;
  if(S.selId!==id){S.selId=id;S._ef=o.f;}
  snapshot();
  const el=e.currentTarget.closest('[data-obj]');
  if(!el)return;
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  function mv(ev){
    let deg=Math.atan2(ev.clientY-cy,ev.clientX-cx)*180/Math.PI+90;
    deg=((deg%360)+360)%360;
    if(ev.shiftKey) deg=Math.round(deg/15)*15;
    uobj(id,{rot:Math.round(deg)%360});scheduleCanvas();
  }
  function mu(){window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',mu);}
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',mu);
}

// Resize from any corner; the opposite corner stays anchored. `corner` is
// one of tl/tr/bl/br (defaults to br for back-compat).
function startResize(e,id,corner){
  e.stopPropagation();
  const o=gobj(id);if(!o)return;
  snapshot();
  corner=corner||'br';
  const isLeft=(corner==='tl'||corner==='bl'), isTop=(corner==='tl'||corner==='tr');
  const sx=e.clientX,sy=e.clientY,ox=o.x,oy=o.y,ow=o.w,oh=o.h;
  const right=ox+ow, bottom=oy+oh;
  const ratio=(ow>0&&oh>0)?oh/ow:1;
  const square=(o.t==="ci"||o.t==="sy");
  const lockAR=(o.t==="im"&&o.lockAspect!==false);
  function mv(e){
    const dx=(e.clientX-sx)/(SC*S.zoom);
    const dy=(e.clientY-sy)/(SC*S.zoom);
    let nx=ox, ny=oy, nw=ow, nh=oh;
    if(isLeft){ nx=snapToGrid(Math.min(ox+dx,right-0.05)); nw=right-nx; } else { nw=snapToGrid(Math.max(0.05,ow+dx)); }
    if(isTop){  ny=snapToGrid(Math.min(oy+dy,bottom-0.02)); nh=bottom-ny; } else { nh=snapToGrid(Math.max(0.02,oh+dy)); }
    nw=Math.max(0.05,nw); nh=Math.max(0.02,nh);
    if(square){ const s=Math.max(nw,nh); nw=s; nh=s; if(isLeft)nx=right-s; if(isTop)ny=bottom-s; }
    else if(lockAR){ nh=+(nw*ratio).toFixed(4); if(isTop)ny=bottom-nh; }
    uobj(id,{x:Math.max(-BLEED_IN,nx),y:Math.max(-BLEED_IN,ny),w:nw,h:nh});
    scheduleCanvas();
  }
  function mu(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",mu);}
  window.addEventListener("mousemove",mv);window.addEventListener("mouseup",mu);
}

function delObj(){
  const ids=(S.selIds||[]).length?S.selIds.slice():(S.selId?[S.selId]:[]);
  if(!ids.length)return;
  snapshot();
  S.objs=S.objs.filter(o=>!ids.includes(o.id));
  S.selId=null; S.selIds=[];
  R();
}

// ── Duplicate / copy / paste ────────────────────────────────────────────────
let _objClipboard=null;
const PASTE_OFFSET=0.1;   // inches

function _selectNew(c){ S.objs.push(c); setSel(c.id); S._ef=(c.t==='tx'?c.f:undefined); S.editingId=null; R(); }
// Select a freshly created batch of objects (used by multi duplicate/paste).
function _selectNewBatch(ids){ S.selIds=ids.slice(); S.selId=ids[ids.length-1]||null; S.editingId=null; const p=S.selId&&gobj(S.selId); S._ef=(p&&p.t==='tx')?p.f:undefined; R(); }

// Cmd+D — duplicate in place (same position, new ids); duplicates all selected.
function duplicateObj(){
  const sels=selObjs(); if(!sels.length)return;
  snapshot();
  const ids=sels.map(o=>{ const c=JSON.parse(JSON.stringify(o)); c.id=mid(); S.objs.push(c); return c.id; });
  _selectNewBatch(ids);
}
function copyObj(){
  const sels=selObjs(); if(!sels.length)return;
  _objClipboard=JSON.parse(JSON.stringify(sels));
  if(typeof showToast==='function')showToast(sels.length>1?('Copied '+sels.length+' objects'):'Copied');
}
// Cmd+V — paste offset from the originals; repeated pastes cascade.
function pasteObj(){
  if(!_objClipboard)return;
  const arr=Array.isArray(_objClipboard)?_objClipboard:[_objClipboard];
  if(!arr.length)return;
  snapshot();
  const ids=arr.map(src=>{
    const c=JSON.parse(JSON.stringify(src)); c.id=mid();
    c.x=Math.max(-BLEED_IN,(c.x||0)+PASTE_OFFSET);
    c.y=Math.max(-BLEED_IN,(c.y||0)+PASTE_OFFSET);
    src.x=c.x; src.y=c.y;   // cascade next paste
    S.objs.push(c); return c.id;
  });
  _selectNewBatch(ids);
}

// Short label for an object in the object list.
function objListLabel(o){
  if(o.t==='tx'){
    const m=txMode(o);
    if(m==='static') return (o.text||'').trim() || 'Text';
    if(m==='field')  return o.field ? ('['+o.field+']') : 'Field';
    const f=(o.f||'').replace(/^=/,'').trim();
    return f && f!=='""' ? f : 'Text';
  }
  return o.t==='ln'?'Line':o.t==='ar'?'Arrow':o.t==='ci'?'Circle':o.t==='ov'?'Oval':o.t==='im'?'Image':o.t==='sy'?((SYMBOLS[o.sym]||{}).label||'Symbol'):'Rectangle';
}

// Select an object from the object list (mirrors clicking it on the canvas).
function selectObj(id,e){
  const o=gobj(id); if(!o)return;
  if(e&&e.shiftKey){ toggleSel(id); R(); return; }
  setSel(id);
  S.editingId=null;
  S._ef=o.t==='tx'?o.f:undefined;
  R();
}

function addObj(type){
  snapshot();
  const id=mid();
  const base={id,x:.05,y:.05};
  if(type==="tx")S.objs.push({...base,t:"tx",w:.5,h:.2,mode:"static",text:"Text",al:"left",valign:"middle",fs:15,bold:false,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100});
  if(type==="ln")S.objs.push({...base,t:"ln",y:.25,w:1,h:0,lw:1});
  if(type==="rc")S.objs.push({...base,t:"rc",w:.4,h:.2,lw:1});
  if(type==="ar")S.objs.push({...base,t:"ar",y:.25,w:1,h:0,lw:2,arrowStart:false,arrowEnd:true,arrowSize:12});
  if(type==="ci")S.objs.push({...base,t:"ci",w:.4,h:.4,lw:1});
  if(type==="ov")S.objs.push({...base,t:"ov",w:.5,h:.3,lw:1});
  S.selId=id;S._ef=undefined;R();
}

// ── Image objects (pick → monochrome convert → embed) ──────────────────────────
// The processed (monochrome, alpha-preserving) PNG is stored as a data URL in
// `src`; the original + slider params are kept too so it can be re-adjusted.
let _imgState=null; // {origURL, img, b, c, t, editId}

function pickImage(){ const inp=document.getElementById('imgFilePicker'); if(inp){ inp.value=''; inp.click(); } }

function onImagePicked(ev){
  const file=ev.target.files&&ev.target.files[0]; if(!file)return;
  const fr=new FileReader();
  fr.onload=function(){ loadImageForEdit(fr.result, null); };
  fr.readAsDataURL(file);
}

function loadImageForEdit(origURL, editId){
  const img=new Image();
  img.onload=function(){
    _imgState={origURL:origURL, img:img, b:0, c:0, t:128, editId:editId};
    if(editId){ const o=gobj(editId); if(o){ _imgState.b=o.imgB||0; _imgState.c=o.imgC||0; _imgState.t=(o.imgT!=null?o.imgT:128); } }
    renderImageModal();
  };
  img.onerror=function(){ if(typeof showToast==='function')showToast('Could not load that image'); };
  img.src=origURL;
}

function reprocessImage(id){ const o=gobj(id); if(o)loadImageForEdit(o.imgOrig||o.src, id); }

// Set an image's width or height; when aspect is locked, scale the other to
// preserve the current ratio.
function imgSetDim(id,key,val){
  const o=gobj(id); if(!o||!(val>0))return;
  if(o.lockAspect!==false && o.w>0 && o.h>0){
    const ar=o.h/o.w;
    if(key==='w') uobj(id,{w:val,h:+(val*ar).toFixed(4)});
    else          uobj(id,{h:val,w:+(val/ar).toFixed(4)});
  }else{
    uobj(id,{[key]:val});
  }
  R();
}

// Render the source image into `canvas` applying brightness/contrast and a
// black/white threshold, preserving transparency. Caps the long side at 600px.
function processToCanvas(canvas){
  const st=_imgState, img=st.img, max=600;
  let w=img.naturalWidth||img.width||1, h=img.naturalHeight||img.height||1;
  const scale=Math.min(1, max/Math.max(w,h));
  w=Math.max(1,Math.round(w*scale)); h=Math.max(1,Math.round(h*scale));
  canvas.width=w; canvas.height=h;
  const cx=canvas.getContext('2d');
  cx.clearRect(0,0,w,h); cx.drawImage(img,0,0,w,h);
  const id=cx.getImageData(0,0,w,h), d=id.data;
  const c=st.c, cf=(259*(c+255))/(255*(259-c));
  for(let i=0;i<d.length;i+=4){
    if(d[i+3]<8){ d[i+3]=0; continue; }      // transparent stays transparent
    let lum=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    lum+=st.b;                                // brightness
    lum=cf*(lum-128)+128;                     // contrast
    const v=lum<st.t?0:255;                   // threshold → black / white
    d[i]=d[i+1]=d[i+2]=v;
  }
  cx.putImageData(id,0,0);
}

function drawImgPreview(){ const cv=document.getElementById('imgPreview'); if(cv&&_imgState)processToCanvas(cv); }
function imgSet(prop,val){ if(!_imgState)return; _imgState[prop]=parseFloat(val); drawImgPreview(); const el=document.getElementById('imgval_'+prop); if(el)el.textContent=Math.round(_imgState[prop]); }
function closeImageModal(){ _imgState=null; const m=document.getElementById('img-modal'); if(m)m.remove(); }

function applyImg(){
  const st=_imgState; if(!st)return;
  const cv=document.createElement('canvas'); processToCanvas(cv);
  const procURL=cv.toDataURL('image/png');
  snapshot();
  if(st.editId){
    uobj(st.editId,{src:procURL,imgOrig:st.origURL,imgB:st.b,imgC:st.c,imgT:st.t});
  }else{
    const id=mid();
    const ar=(st.img.naturalHeight||1)/(st.img.naturalWidth||1);
    const w=1.0, h=+(Math.max(.05,w*ar)).toFixed(3);
    S.objs.push({id,x:.1,y:.1,t:"im",w:w,h:h,src:procURL,imgOrig:st.origURL,imgB:st.b,imgC:st.c,imgT:st.t,lockAspect:true});
    S.selId=id; S._ef=undefined;
  }
  closeImageModal(); R();
}

function imgSlider(lbl,key,val,min,max){

    <span id="imgval_${key}" style="width:38px;text-align:right;color:var(--text2);font-size:11px;font-family:monospace">${Math.round(val)}</span>
  </div>`;
}

function renderImageModal(){
  const st=_imgState; if(!st)return;
  let m=document.getElementById('img-modal');
  if(!m){ m=document.createElement('div'); m.id='img-modal'; m.className='modal-overlay'; m.onclick=e=>{if(e.target===m)closeImageModal();}; document.body.appendChild(m); }
  m.innerHTML=`<div class="modal" style="min-width:480px;max-width:560px">

function addSymbol(key,editId){
  const img=new Image();
  img.onload=function(){
    const cv=document.createElement('canvas'); cv.width=300; cv.height=300;
    const cx=cv.getContext('2d'); cx.clearRect(0,0,300,300); cx.drawImage(img,0,0,300,300);
    const url=cv.toDataURL('image/png');
    snapshot();
    if(editId){ uobj(editId,{sym:key,src:url}); }
    else{ const id=mid(); S.objs.push({id,x:.1,y:.1,t:"sy",sym:key,src:url,w:.4,h:.4}); S.selId=id; S._ef=undefined; }
    closeSymModal(); R();
  };
  img.onerror=function(){ if(typeof showToast==='function')showToast('Could not render symbol'); };
  img.src='data:image/svg+xml;base64,'+btoa(symFullSVG(key));
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener("keydown",function(e){
  // Ignore if focus is inside an input, textarea, or select
  const tag=(document.activeElement||{}).tagName||"";
  const inInput=["INPUT","TEXTAREA","SELECT"].includes(tag);

  // ⌘Return (Custom Designer only) — print the current canvas, mirroring the
  // Print button. Works even from an input field (matching the print window).
  if(isCustomMode()&&(e.metaKey||e.ctrlKey)&&(e.key==="Enter"||e.key==="Return")){
    if(S.modal||!dCanPrint())return;
    e.preventDefault();
    doCustomPrint();
    return;
  }

  // Cmd/Ctrl+Z — undo (works even in inputs to avoid blocking browser undo,
  // but we only intercept if NOT in an input)
  if((e.metaKey||e.ctrlKey)&&e.key==="z"&&!inInput){
    e.preventDefault();
    undo();
    return;
  }

  // Delete / Backspace — delete selected object, only when NOT in an input
  if((e.key==="Delete"||e.key==="Backspace")&&!inInput&&S.selId){
    e.preventDefault();
    delObj();
    return;
  }

  // Cmd/Ctrl+D — duplicate in place; Cmd/Ctrl+C/V — copy/paste object.
  if((e.metaKey||e.ctrlKey)&&!inInput){
    const k=e.key.toLowerCase();
    if(k==="d"&&S.selId){ e.preventDefault(); duplicateObj(); return; }
    if(k==="c"&&S.selId){ e.preventDefault(); copyObj(); return; }
    if(k==="v"&&_objClipboard){ e.preventDefault(); pasteObj(); return; }
  }

  // Arrow keys — nudge selected object by 1px (0.5px with shift)
  if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)&&!inInput&&S.selId){
    e.preventDefault();
    const sels=selObjs();if(!sels.length)return;
    const step=S.snapGrid?S.gridSize:(e.shiftKey?0.5:1)/SC;
    const dx=e.key==="ArrowLeft"?-step:e.key==="ArrowRight"?step:0;
    const dy=e.key==="ArrowUp"?-step:e.key==="ArrowDown"?step:0;
    sels.forEach(o=>uobj(o.id,{x:Math.max(-BLEED_IN,o.x+dx),y:Math.max(-BLEED_IN,o.y+dy)}));
    R();
    return;
  }

  // Escape — deselect
  if(e.key==="Escape"&&!inInput){
    deselect();
  }
});

// ── Template management ───────────────────────────────────────────────────────

function showModal(name){S.modal=name;renderModal();}
function closeModal(){S.modal=null;renderModal();}

function templateData(){
  const name=S.tplName||defaultDocName();
  const d={
    version:1,
    name,
    specN:S.spec.n,
    objs:JSON.parse(JSON.stringify(S.objs))
  };
  // Continuous supplies persist the chosen label length (inches); die-cut omit it.
  if(dContinuous()){ const len=dEffLen(); if(len) d.labelLengthInches=len; if(S.canvasRot===90) d.canvasRot=90; }
  return d;
}

// ── Custom Designer print header (Phase 2) ──────────────────────────────────────
// Shown ONLY in custom mode (window._designerMode==='custom'). Mirrors the Print
// window header: printer picker, cassette match/mismatch indicator, copies field,
// and a Print button (⌘Return). Single-label print of the current canvas.

// Swift injects the live printer list (updateDesignerPrinters) and detected
// cassettes (updateDesignerCassettes), the same JSON the print window consumes.
function updateDesignerPrinters(printers){
  window._dprinters=(printers||[]).map(p=>({
    id:p.id, name:p.name, model:p.model||"M6xx", status:p.status||"ready", serial:p.serial||""
  }));
  // Keep the current selection if still present; else pick a ready printer.
  if(!window._dprinters.find(p=>p.id===S.activePrinter)){
    S.activePrinter=(window._dprinters.find(p=>p.status==="ready")||window._dprinters[0]||{}).id||null;
  }
  // Only rebuild when the printer list / selection actually changed — the Engine
  // republishes status on a timer and on every print-progress tick, and a full R()
  // per publish was making the whole designer feel laggy.
  const sig=JSON.stringify(window._dprinters)+"|"+(S.activePrinter||"");
  if(isCustomMode() && sig!==window._dprintersSig){ window._dprintersSig=sig; R(); }
}
function updateDesignerCassettes(map){
  window._dcassettes=map||{};
  const sig=JSON.stringify(window._dcassettes);
  if(isCustomMode() && sig!==window._dcassettesSig){ window._dcassettesSig=sig; R(); }
}
function dPrinters(){ return window._dprinters||[]; }
function dPrinter(){ return dPrinters().find(p=>p.id===S.activePrinter)||{id:null,name:"",status:"offline"}; }
function dLoadedCassette(){ return (window._dcassettes||{})[S.activePrinter]||null; }

// Strip the model prefix so "BM-32-427" (catalog) matches "M6-32-427" (SmartCell).
// BM-109-427 is the bulk box for M6-33-427 — same supply. (Same logic as the
// print window's supplyCore.)
function dSupplyCore(pn){ let c=(pn||"").replace(/^[A-Za-z0-9]+-/,"").toUpperCase(); if(c==="109-427")c="33-427"; return c; }
function dCassetteSizeKnown(c){ return !!(c && typeof c.labelWidthMils==='number' && typeof c.labelHeightMils==='number'); }
// Whether the loaded cassette's real dimensions equal the template's label size,
// in either orientation (within ~0.1"). Mirrors the print window's sameLabelSize.
function dSameLabelSize(c,specN){
  if(!dCassetteSizeKnown(c))return false;
  const spec=BL.find(l=>l.n===specN)||BL.find(l=>dSupplyCore(l.n)===dSupplyCore(specN));
  if(!spec)return false;
  const tol=100, close=(a,b)=>Math.abs(a-b)<=tol;
  const cw=c.labelWidthMils, ch=c.labelHeightMils;
  // Continuous tape has no fixed label height (the user sets the length), so a
  // loaded continuous cassette matches on WIDTH alone — any material of the same
  // tape width counts as matched (#15). A die-cut cassette never matches a
  // continuous selection.
  if(spec.ty==="continuous"){
    if(c.isDieCut===true)return false;
    const tw=spec.tw*1000;
    return close(cw,tw)||close(ch,tw);
  }
  const tw=spec.tw*1000, th=spec.th*1000;
  return (close(cw,tw)&&close(ch,th))||(close(cw,th)&&close(ch,tw));
}
function dCassetteMatched(){ const c=dLoadedCassette(); return !!(c&&dCassetteSizeKnown(c)&&dSameLabelSize(c,S.spec.n)); }
function dCassetteMismatch(){ const c=dLoadedCassette(); return !!(c&&dCassetteSizeKnown(c)&&!dSameLabelSize(c,S.spec.n)); }
// Continuous supplies are identified by WIDTH only — any material of that width
// matches — so the picker + supply indicator show e.g. '0.5" continuous', never a
// part number or material. Die-cut wire labels keep their descriptor (#16).
function supplyOptionLabel(l){
  if(l&&l.ty==="continuous")return dFmtIn(l.tw)+' continuous';
  return l?l.lb:"";
}
function dSupplyTypeDesc(l){
  if(!l)return "";
  if(l.ty==="continuous")return "";   // width says it all; material is irrelevant
  if(l.lm)return "Wrap-around wire label (self-laminating)";
  return "Die-cut label";
}
function dRequiredSupply(specN){
  const l=BL.find(x=>x.n===specN);
  if(l&&l.ty==="continuous")return dFmtIn(l.tw)+' continuous';
  const core=dSupplyCore(specN); return core?"BM/M6-"+core:(specN||"");
}
function dFmtIn(v){ return (v==null?"—":(+v).toString())+'"'; }
function dCanPrint(){
  if(!(S.objs.length>0&&dPrinter().status==="ready"))return false;
  // With data bound, the chosen print range must select at least one row.
  if(hasBoundData()&&dbPrintIndices().length===0)return false;
  return true;
}

// ── "Buy more" — open the supplier page for the selected supply ─────────────────
// Posts an openURL action; Swift opens the (http/https) URL in the system browser.
function buyMore(which){
  const s=BL.find(l=>l.n===S.spec.n); if(!s)return;
  const url=(which==="bulk"?(s.bb||s.br):(s.br||s.bb))||"";
  if(!url)return;
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"openURL",payload:{url}});
}
// "Buy more ↗" control for the selected supply (roll + optional bulk link).
// Shown in the Custom Designer print header; "" when no buy URL is known.
function buyMoreControl(){
  const s=BL.find(l=>l.n===S.spec.n); if(!s||!(s.br||s.bb))return "";
  const bulk=(s.bb&&s.bb!==s.br)?`<button class="btn" onclick="buyMore('bulk')" title="Buy a bulk box of ${s.n}" style="padding:4px 8px;font-size:10px">Bulk box ↗</button>`:"";
  return`<div style="display:flex;align-items:center;gap:5px">
    <span style="color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px">Buy More:</span>
    <button class="btn" onclick="buyMore('roll')" title="Buy ${s.n} on bradyid.com" style="padding:4px 10px;font-size:11px">Roll ↗</button>
    ${bulk}
  </div>`;
}

// In-flight job status + Cancel, shown in the print header after the supply (#12b).
// "" when no job submitted from this designer is active.
function buildJobStatusControl(){
  const j=S._jobStatus; if(!isCustomMode()||!j)return "";
  const total=Math.max(1,j.labelCount||1);
  const done=Math.max(0,Math.min(total,j.completed||0));
  const pct=Math.round(done/total*100);
  const lbl=(j.state==="queued")?"Queued":("Printing "+done+"/"+total);
  return`<div style="display:flex;align-items:center;gap:8px;padding:3px 10px;border:1px solid var(--accent);border-radius:5px;background:rgba(108,142,245,0.10)">
    <span id="jobLbl" style="color:var(--accent);font-size:11px;font-weight:600;white-space:nowrap">${lbl}</span>
    <div style="width:90px;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden">
      <div id="jobProg" style="width:${pct}%;height:100%;background:var(--accent);transition:width .2s"></div>
    </div>
    <button class="btn" onclick="cancelCustomPrint()" title="Cancel this print job" style="padding:3px 10px;font-size:11px;color:var(--red);border-color:var(--red)">Cancel</button>
  </div>`;
}

// Print-range control (#6) — only once a data source is bound (columns present).
// All / Selected (the checked rows) / Range (from..to), mirroring the Print
// window's print bar. Returns "" with no data bound (single-label print).
function buildPrintRangeControl(){

// The custom-mode print header markup (returns "" in template mode so the

  const jobLabelCount=dJobLabelCount();
  const dot=pr.status==="ready"?"var(--green)":pr.status==="busy"?"var(--warn)":"var(--red)";
  const statusLbl=pr.status==="ready"?"Ready":pr.status==="busy"?"Busy":"Offline";

      <div style="position:relative">

          <option value="afterJobLast"${dEffCutMode()==="afterJobLast"?" selected":""}>Cut at end of job</option>
          <option value="eachLabel"${dEffCutMode()==="eachLabel"?" selected":""}>Cut after every label</option>
          <option value="never"${dEffCutMode()==="never"?" selected":""}>No cut</option>
        </select>
        <div style="position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:9px;pointer-events:none">▼</div>
      </div>
    </div>

    <!-- Copies -->
    <div style="display:flex;align-items:center;gap:6px">
      <span style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1px">Copies</span>
      <input type="number" class="inp" min="1" max="999" value="${copies}" style="width:58px;padding:4px 6px;font-size:12px" onchange="S.copies=Math.max(1,Math.min(999,parseInt(this.value)||1));R()">
    </div>

    <!-- Print button — ⌘Return -->
    <button class="btn primary" onclick="doCustomPrint()" style="padding:6px 20px;font-size:13px;display:flex;flex-direction:column;align-items:center;line-height:1.1;gap:1px"${canPrint?"":" disabled"}>
      <span>Print ${jobLabelCount} label${jobLabelCount!==1?"s":""}</span>
      <span style="font-size:9px;opacity:0.7;font-weight:400">⌘ Return</span>
    </button>
  </div>`;
}

// The record to render the PRINTED label against. When a data source is bound,
// Swift prints one label per bound row, so we only need to forward a record for
// the no-data-source case — and there the printed label should be BLANK for
// field/formula text (only static text shows), NOT the leftover sample/CSV
// preview record. So return null when unbound; Swift renders against an empty
// record. (The on-canvas preview still uses the previewed record, unchanged.)
function customPrintRecord(){
  if(!hasBoundData()) return null;
  const recs=window._editorRecords||RX;
  const rec=recs[S.recIdx];
  return rec?Object.assign({},rec):null;
}

// Save the current canvas + embedded bound data as a ".vlcus" document. Swift
// shows a Save panel and writes the file (the bound rows/columns/path come from
// the in-memory data source on the Swift side, so only the canvas is sent here).
function saveCustomDocument(){
  if(!isCustomMode())return;
  const data=templateData();
  const payload={
    name:S.tplName||"Custom Label",
    specN:data.specN,
    objs:data.objs,
    copies:Math.max(1,S.copies||1),
    cutMode:dEffCutMode()   // persist the effective cut mode so it round-trips in .vlcus
  };
  if(data.labelLengthInches) payload.labelLengthInches=data.labelLengthInches;
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"saveCustomDocument",payload});
  }
}

// Render the current canvas as a single label and submit it to the print queue
// via Swift. Single-label this phase; "copies" repeats it.
function doCustomPrint(){
  if(!isCustomMode()||!dCanPrint())return;
  if(dCassetteMismatch()&&!S._printForce){ S.modal="confirmMismatch"; renderModal(); return; }
  // Guard against firing off a big batch by surprise (e.g. a 200-row dataset):
  // confirm when the true job size exceeds 10 labels.
  if(dJobLabelCount()>10&&!S._largeJobForce){ S.modal="confirmLargeJob"; renderModal(); return; }
  // Both guards passed — only NOW clear the force flags. Clearing _printForce
  // before the large-job guard would re-show the mismatch dialog for a job that
  // is BOTH size-mismatched AND large (the large-job re-entry would find the
  // flag already reset).
  S._printForce=false;
  S._largeJobForce=false;
  const data=templateData();
  const payload={
    name:S.tplName||"Custom Label",
    specN:data.specN,
    objs:data.objs,
    copies:Math.max(1,S.copies||1),
    printerID:S.activePrinter||"",
    cutMode:dEffCutMode(),   // Phase 6 cut setting → PrintJobFile.cutMode
    record:customPrintRecord()
  };
  // When a data source is bound, send the chosen subset of bound-row indices so
  // Swift prints exactly All / Selected / Range (× copies). Omitted when unbound
  // (single-label path).
  if(hasBoundData()){
    payload.recordIndices=dbPrintIndices();
    payload.printRange=S.printRange;
    payload.rangeFrom=S.rangeFrom;
    payload.rangeTo=S.rangeTo;
  }
  if(data.labelLengthInches) payload.labelLengthInches=data.labelLengthInches;
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"printCustom",payload});
  }
}
// Swift calls this once the job has been submitted to the queue, passing the job
// id so the header can track live progress + offer Cancel (#12b).
function customPrintSubmitted(copies,jobId){
  showToast("Printing "+copies+" label"+(copies!==1?"s":""));
  if(isCustomMode()&&jobId){
    S._activeJobId=jobId; S._jobSeen=false;
    S._jobStatus={id:jobId,labelCount:copies,completed:0,state:"queued",title:S.tplName||"Custom Label"};
    R();
  }
}

// Swift pushes the Engine's in-flight jobs here (custom mode) on every status
// change. Track OUR submitted job by id: update progress while present, clear the
// header once it disappears (finished or cancelled).
function updateDesignerJobStatus(jobs){
  if(!isCustomMode())return;
  const list=Array.isArray(jobs)?jobs:[];
  if(!S._activeJobId){ if(S._jobStatus){ S._jobStatus=null; R(); } return; }
  const job=list.find(j=>j&&j.id===S._activeJobId)||null;
  if(job){
    const had=!!S._jobStatus;
    S._jobSeen=true; S._jobStatus=job;
    // Patch the progress bar/label in place once the block exists, so a long job
    // doesn't rebuild the whole designer on every label. Full R() only when the
    // status block first appears.
    const bar=document.getElementById("jobProg"), lbl=document.getElementById("jobLbl");
    if(had && bar && lbl){
      const total=Math.max(1,job.labelCount||1), done=Math.max(0,Math.min(total,job.completed||0));
      bar.style.width=Math.round(done/total*100)+"%";
      lbl.textContent=(job.state==="queued")?"Queued":("Printing "+done+"/"+total);
    } else { R(); }
    return;
  }
  if(S._jobSeen){ S._activeJobId=null; S._jobStatus=null; S._jobSeen=false; R(); }
}

// Ask Swift (→ Engine over IPC) to cancel the tracked in-flight job (#12b).
function cancelCustomPrint(){
  if(!S._activeJobId)return;
  _vlPost("cancelCustomPrint",{jobId:S._activeJobId});
}

// ── Print-window edit mode ─────────────────────────────────────────────────────
// When the print window's "Edit" opens this designer, Swift calls initPrintEdit
// to load the template and show Save/Save As/Cancel & Return buttons.
function _vlPost(action,payload){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action,payload:payload===undefined?null:payload});
}
// Templates loaded from disk are UNTRUSTED (the user opens arbitrary .vlt.json,
// and any file dropped in the Templates folder auto-loads). Their object fields
// are interpolated into HTML attributes / inline handlers in this privileged
// WKWebView, so sanitize on every import: regenerate the id (so a crafted id can't
// break out of an attribute/onclick), whitelist the font, allow only an embedded
// data:image src (no javascript:/remote), and only a known symbol key.
function sanitizeObjs(objs){
  return (objs||[]).map(function(o){
    const c=Object.assign({},o);
    c.id=mid();
    if(typeof c.font==='string' && FONTS.indexOf(c.font)<0) c.font='Helvetica Neue';
    if(c.src!=null && !/^data:image\//i.test(String(c.src))) c.src='';
    if(c.sym!=null && !(String(c.sym) in SYMBOLS)) c.sym='';
    return c;
  });
}

// Filename validation: only letters, numbers, spaces, hyphens, underscores.
function templateNameBadChars(name){
  const bad=(name||"").replace(/[A-Za-z0-9 _\-]/g,"");
  return Array.from(new Set(bad.split(""))).join("");
}
function validateTemplateName(){
  const inp=document.getElementById("tpl-name-inp"); if(!inp)return false;
  const bad=templateNameBadChars(inp.value);
  const empty=!inp.value.trim();
  const err=document.getElementById("tpl-name-err");
  const btn=document.getElementById("tpl-save-btn");
  inp.style.borderColor = bad.length ? "var(--red)" : "";
  if(err){
    if(bad.length){ err.style.display="block"; err.textContent='Not allowed: '+bad+'   Use only letters, numbers, spaces, hyphens (-) and underscores (_).'; }
    else if(empty){ err.style.display="block"; err.textContent="Enter a template name."; }
    else { err.style.display="none"; }
  }
  const ok = !empty && bad.length===0;
  if(btn){ btn.disabled=!ok; btn.style.opacity=ok?"":"0.4"; btn.style.cursor=ok?"":"default"; }
  return ok;
}

async function saveTemplate(){
  const nameEl=document.getElementById("tpl-name-inp");
  if(nameEl && !validateTemplateName()) return;   // block invalid filenames
  if(nameEl)S.tplName=nameEl.value.trim()||defaultDocName();
  const data=templateData();
  const json=JSON.stringify(data,null,2);
  const filename=(S.tplName.replace(/[^a-z0-9_\- ]/gi,"_")||"template")+".vltmp";

  // Native app: persist via the Swift bridge to ~/Documents/VectorLabel/Templates/.
  // (WKWebView has no File System Access API, so the browser path below can't run.)
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    const payload={name:S.tplName,specN:data.specN,objs:data.objs};
    if(data.labelLengthInches) payload.labelLengthInches=data.labelLengthInches;
    if(S._loadedId)payload.id=S._loadedId;
    // Save As & Return (print edit): one ordered message — save then return.
    if(window._printEdit&&window._printReturnAfterSave){
      window._printReturnAfterSave=false;
      S.modal=null;
      _vlPost("editReturn",{save:true,template:payload});
      return;
    }
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"saveTemplate",payload});
    S.modal=null;
    showToast("Saved: "+S.tplName);
    R();
    return;
  }

  // Use File System Access API if available (Chrome/Edge on Mac)
  if(window.showSaveFilePicker){
    try{
      const fh=await window.showSaveFilePicker({
        suggestedName:filename,
        startIn:"documents",
        types:[{description:"VectorLabel Template",accept:{"application/json":[".vltmp",".vlt.json",".json"]}}]
      });
      const writable=await fh.createWritable();
      await writable.write(json);
      await writable.close();
      S.modal=null;
      showToast("Saved: "+S.tplName);
      R();
      return;
    }catch(e){
      if(e.name==="AbortError"){S.modal=null;renderModal();return;}
    }
  }

  // Fallback: trigger download
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  S.modal=null;
  showToast("Downloaded: "+filename+" — move to ~/Documents/VectorLabel/Templates/");
  R();
}

// ── CSV loading for standalone designer ───────────────────────────────────────

// Fallback CSV parser for the standalone (no-Swift-bridge) case. In the shipping
// app the native bridge supplies parsed records, so this isn't used — but it must
// not diverge from the Swift RFC-4180 parser: a newline inside a quoted field is
// data, "" is an escaped quote, short rows are padded (never dropped).
function parseCSV(text){
  const rows=[]; let rec=[], field="", inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQ=false; }
      else field+=c;
    } else if(c==='"'){ inQ=true; }
    else if(c===','){ rec.push(field); field=""; }
    else if(c==='\n'||c==='\r'){
      if(c==='\r'&&text[i+1]==='\n') i++;
      rec.push(field); field="";
      if(!(rec.length===1&&rec[0]==="")) rows.push(rec);
      rec=[];
    } else field+=c;
  }
  if(field!==""||rec.length){ rec.push(field); if(!(rec.length===1&&rec[0]==="")) rows.push(rec); }
  if(rows.length<2) return [];
  const headers=rows[0];
  return rows.slice(1).map(vals=>{ const row={}; headers.forEach((h,i)=>row[h]=vals[i]!=null?vals[i]:""); return row; });
}

// ── Custom Designer data binding (Phase 3) ──────────────────────────────────────
// Swift calls initBoundData after the user picks (or refreshes) a CSV/XLSX data
// source. The bound data becomes the designer's record set (one label per row at
// print time) AND drives the canvas preview + the field/formula column source.
//
// records  : [{col:value,…}] flattened WireRecords (one per data row)
// columns  : [String] column names in order (the field/column source)
// filename : source file's display name
// headerRow: whether the file's first row supplied headers (xlsx toggle)
// isXLSX   : true for .xlsx, false for .csv (so the panel hides the toggle for CSV)
function initBoundData(records, columns, filename, headerRow, isXLSX){
  window._boundData={
    records:records||[], columns:columns||[],
    filename:filename||"", headerRow:!!headerRow, isXLSX:!!isXLSX
  };
  // Make the bound rows the active record set so the existing preview/navigation
  // (RX / _editorRecords / S.recIdx) reflects the current row on the canvas.
  RX=records||[];
  window._editorRecords=null;        // RX is now the single source of truth
  S.recIdx=0;
  S._csvName=filename||"";
  // Seed the database-pane print selection: all rows enabled by default (mirrors
  // the Print window). Reset range + any in-progress cell edit.
  const n=(records||[]).length;
  S._dbSel=new Set((records||[]).map((_,i)=>i));
  S._dbLastClick=null;
  S._dbEditCell=null; S._dbEditVal=undefined;
  S.printRange="all"; S.rangeFrom=1; S.rangeTo=Math.max(1,n);
  R();
  showToast("Bound "+(records?records.length:0)+" row"+((records&&records.length===1)?"":"s")+" from "+(filename||"file"));
}
function hasBoundData(){ return !!(isCustomMode()&&window._boundData&&window._boundData.records&&window._boundData.records.length); }
// True size of the print job, matching Swift: one label per bound ROW × copies
// when a data source is bound, else just `copies`.
function dBoundRowCount(){ return hasBoundData()?window._boundData.records.length:0; }

// The bound-row indices that will print, honoring the print-range control (#6):
//   all      → every bound row
//   selected → exactly the checked rows (S._dbSel)
//   range    → the 1-based from..to window over the bound rows
// Returns [] with no data bound (the no-data print path is a single label and
// ignores this). Indices are clamped to the row count.
function dbPrintIndices(){
  const n=dBoundRowCount();
  if(n<=0)return [];
  const sel=S._dbSel||new Set();
  if(S.printRange==="selected"){
    const out=[]; for(let i=0;i<n;i++)if(sel.has(i))out.push(i); return out;
  }
  if(S.printRange==="range"){
    const from=Math.max(1,Math.min(S.rangeFrom||1,n));
    const to=Math.max(from,Math.min(S.rangeTo||n,n));
    const out=[]; for(let i=from-1;i<to;i++)out.push(i); return out;
  }
  const out=[]; for(let i=0;i<n;i++)out.push(i); return out;   // "all"
}
function dJobLabelCount(){
  const copies=Math.max(1,S.copies||1);
  if(!hasBoundData())return copies;
  return dbPrintIndices().length*copies;
}

// Called by Swift when a ".vlcus" is double-clicked in Finder (Custom Designer).
// Loads the saved canvas AND the embedded data snapshot in one shot, so the
// document opens exactly as it was saved even if the source file is gone.
//   doc = {name, specN, objs, copies, cutMode, records:[{col:val}], columns:[String],
//          filename, headerRow, isXLSX, hasDataSource}
function initCustomDocument(doc){
  if(!doc)return;
  window._printEdit=false;
  S.modal=null;
  // Canvas
  S.tplName=doc.name||"Custom Label";
  S._loadedId=null;
  applyLoadedSpec(doc.specN,doc.labelLengthInches,doc.canvasRot);
  S.objs=sanitizeObjs(doc.objs||[]);
  S.selId=null;S._ef=undefined;
  S.copies=Math.max(1,doc.copies||1);
  // Restore the saved cut mode (null falls back to the size's default via dEffCutMode).
  S.cutMode=doc.cutMode||null;
  // Embedded data snapshot → bind it like a freshly-loaded source.
  if(doc.records&&doc.records.length){
    initBoundData(doc.records, doc.columns||[], doc.filename||"", !!doc.headerRow, !!doc.isXLSX);
  } else {
    window._boundData=null; RX=[]; S.recIdx=0; S._csvName="";
    // No embedded data → reset the database-pane selection/edit/range state.
    S._dbSel=new Set(); S._dbLastClick=null;
    S._dbEditCell=null; S._dbEditVal=undefined;
    S.printRange="all"; S.rangeFrom=1; S.rangeTo=1;
  }
  R();
  showToast("Opened: "+S.tplName);
}

// "Choose data file…" → Swift opens an NSOpenPanel (csv,xlsx), sending the current
// "first row is headers" toggle so the xlsx read matches the user's intent.
function chooseDataSource(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"browseDataSource",payload:{headerRow:window._boundData?window._boundData.headerRow:true}});
}
// "Refresh from source" → Swift re-reads the STORED path (re-picks if it moved).
function refreshDataSource(){
  if(!hasBoundData())return;
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"refreshDataSource"});
}
// "Clear data" → unbind the data source (custom mode only): drop window._boundData,
// reset the editor record set to empty (single-label canvas, no-data state) and
// tell Swift to drop its BoundDataSource. `silent` skips the toast (used by New /
// blank). Selection + cell-edit state are reset so a later bind starts clean.
function clearDataSourceCustom(silent){
  if(!isCustomMode())return;
  window._boundData=null;
  window._editorRecords=null;
  RX=[];
  S.recIdx=0;
  S._csvName="";
  S._dbSel=new Set();
  S._dbLastClick=null;
  S._dbEditCell=null;
  S._dbEditVal=undefined;
  S.printRange="all";
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"clearDataSource"});
  R();
  if(!silent)showToast("Data source cleared");
}
// Toggle "first row is headers" (xlsx). Re-opens the picker so Swift re-reads with
// the new flag — the simplest correct path (the file must be re-parsed either way).
function toggleHeaderRow(){
  if(!window._boundData)return;
  window._boundData.headerRow=!window._boundData.headerRow;
  R();
  chooseDataSource();
}

// ── Database-pane record browser (custom mode only) ─────────────────────────────
// Mirrors the Print window's record list over window._boundData rows: per-row
// print-enable checkboxes with shift-click range selection (#7), and inline cell
// editing (#8). All operate on S._dbSel / S._dbEditCell and post edits to Swift.

// The bound rows (the editor record set) and the column list.
function dbRows(){ return RX||[]; }
function dbCols(){ const bd=window._boundData; return (bd&&bd.columns)?bd.columns:[]; }
// How many rows are currently print-enabled (checked).
function dbSelCount(){ const s=S._dbSel||(S._dbSel=new Set()); return s.size; }

// Per-row checkbox click. Shift+click extends from the last-clicked row across
// every row in between, applying the anchor row's resulting on/off state — the
// same semantics as the Print window's rowCheckClick (rows here are a flat list,
// so "visible position" == record index).
function dbRowCheckClick(i,e){
  const sel=S._dbSel||(S._dbSel=new Set());
  if(e.shiftKey && S._dbLastClick!=null && S._dbLastClick!==i){
    const target=sel.has(S._dbLastClick);   // match the anchor's state
    const lo=Math.min(S._dbLastClick,i), hi=Math.max(S._dbLastClick,i);
    for(let p=lo;p<=hi;p++){ if(target)sel.add(p); else sel.delete(p); }
    S.printRange="selected"; S._dbLastClick=i; R(); return;
  }
  if(sel.has(i))sel.delete(i); else sel.add(i);
  S.printRange="selected"; S._dbLastClick=i; R();
}
// Header checkbox: select-all / clear-all across the bound rows.
function dbToggleAll(){
  const sel=S._dbSel||(S._dbSel=new Set());
  const rows=dbRows();
  const allSel=rows.length>0&&rows.every((_,i)=>sel.has(i));
  if(allSel){ rows.forEach((_,i)=>sel.delete(i)); }
  else { rows.forEach((_,i)=>sel.add(i)); S.printRange="all"; }
  R();
}

// ── Inline cell editing (mirrors the Print window) ──────────────────────────────
function dbStartCellEdit(i,c){
  const rows=dbRows();
  S._dbEditCell={i:i,c:c};
  S._dbEditVal=String(rows[i]&&rows[i][c]!=null?rows[i][c]:'');
  R();
  const el=document.getElementById('db-cell-edit-input');
  if(el){ el.focus(); el.select(); }
}
function dbCancelCellEdit(){ S._dbEditCell=null; S._dbEditVal=undefined; R(); }
function dbSaveCellEdit(){
  if(S._dbEditCell){
    const i=S._dbEditCell.i, c=S._dbEditCell.c, val=(S._dbEditVal!=null?S._dbEditVal:'');
    const rows=dbRows();
    if(rows[i]) rows[i][c]=val;       // update the in-memory bound data
    if(window._boundData&&window._boundData.records&&window._boundData.records[i])
      window._boundData.records[i][c]=val;
    // Push the edit to Swift so the BoundDataSource (→ .vlcus snapshot + printed
    // output) reflects it. Never writes back to the original CSV/Excel file.
    if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
      window.webkit.messageHandlers.vectorlabel.postMessage({action:"editRecord",payload:{index:i,field:c,value:val}});
  }
  S._dbEditCell=null; S._dbEditVal=undefined; R();
}

// One database-pane data cell: inline editor when this cell is being edited, else
// the value with a hover ✎ edit button (mirrors the Print window's colDataCell).
function dbCell(c,r,i){
  if(S._dbEditCell&&S._dbEditCell.i===i&&S._dbEditCell.c===c){
    const ev=esc(S._dbEditVal!=null?S._dbEditVal:'').replace(/"/g,'&quot;');
    return`<div class="rec-cell" onclick="event.stopPropagation()" style="overflow:visible;position:relative;z-index:20;display:flex;align-items:center;gap:3px;background:var(--surface);box-shadow:0 0 0 2px var(--accent);border-radius:3px;padding:2px 4px">
      <input id="db-cell-edit-input" value="${ev}" oninput="S._dbEditVal=this.value" onkeydown="if(event.key==='Enter'){event.preventDefault();dbSaveCellEdit()}else if(event.key==='Escape'){event.preventDefault();dbCancelCellEdit()}" style="flex:1;min-width:80px;width:120px;padding:2px 5px;font-size:11px;border:1px solid var(--bd3);border-radius:3px;background:var(--bg);color:var(--text)">
      <button class="btn" onclick="event.stopPropagation();dbSaveCellEdit()" title="Save (Enter)" style="padding:1px 7px;font-size:12px;color:var(--green)">✓</button>
      <button class="btn" onclick="event.stopPropagation();dbCancelCellEdit()" title="Cancel (Esc)" style="padding:1px 7px;font-size:12px;color:var(--red)">✕</button>
    </div>`;
  }
  const v=r[c]; const has=v!==undefined&&v!=='';
  const val=has?String(v):'—';
  const editBtn=`<button class="cell-edit" tabindex="-1" title="Edit cell" onclick="event.stopPropagation();dbStartCellEdit(${i},'${jsAttr(c)}')">✎</button>`;
  if(c==='_Side'){const side=v==='Source'?'src':'dst';return`<div class="rec-cell" style="padding:5px 8px;font-size:11px;white-space:normal;display:flex;align-items:center;position:relative"><span class="tag ${side}">${esc(val)}</span>${editBtn}</div>`;}
  return`<div class="rec-cell" style="padding:5px 8px;font-size:11px;white-space:normal;overflow-wrap:anywhere;word-break:break-word;position:relative;color:${has?'var(--text)':'var(--text3)'};${(c==='Number'&&has)?'font-weight:600;':''}">${esc(val)}${editBtn}</div>`;
}

// The scrollable record table with the print-enable checkbox column + # + data.
function dbRecordTable(){
  const rows=dbRows(), cols=dbCols().filter(c=>!(window._hiddenColumns||[]).includes(c));
  if(!cols.length)return`<div style="padding:12px;color:var(--text3);font-size:11px">All columns hidden — use the Columns menu to show some.</div>`;
  const gt="34px 36px "+colGridTemplate(cols);
  const sel=S._dbSel||(S._dbSel=new Set());
  const allSel=rows.length>0&&rows.every((_,i)=>sel.has(i));
  const someSel=rows.some((_,i)=>sel.has(i));
  const hdr=`<div class="rec-row" style="display:grid;grid-template-columns:${gt};width:max-content;min-width:100%;position:sticky;top:0;z-index:3;background:var(--surface);border-bottom:1px solid var(--bd3)">
    <div class="rec-cell" style="display:flex;align-items:center;justify-content:center">
      <div class="cb ${allSel?"chk":someSel?"partial":""}" onclick="dbToggleAll()"><span class="check-tick">${allSel?"✓":someSel?"−":""}</span></div>
    </div>
    <div style="padding:5px 8px;font-size:10px;color:var(--text3);font-weight:600;display:flex;align-items:center">#</div>
    ${cols.map(colHeaderCell).join('')}
  </div>`;
  const body=rows.map((r,i)=>{
    const isSel=sel.has(i);
    const isActive=S.recIdx===i;
    return`<div class="rec-row" data-i="${i}" style="display:grid;grid-template-columns:${gt};width:max-content;min-width:100%;border-bottom:1px solid var(--bd1);cursor:pointer;align-items:stretch;${isActive?'background:rgba(108,142,245,0.18)':''}" onclick="S.recIdx=${i};S._dbLastClick=null;R()">
      <div class="rec-cell" style="display:flex;align-items:center;justify-content:center" onclick="event.stopPropagation();dbRowCheckClick(${i},event)" title="Print this label — Shift+click to range select">
        <div class="cb ${isSel?"chk":""}"><span class="check-tick">${isSel?"✓":""}</span></div>
      </div>
      <div class="rec-cell" style="display:flex;align-items:center;color:var(--text3);font-size:10px;padding:5px 8px">${i+1}</div>
      ${cols.map(c=>dbCell(c,r,i)).join('')}
    </div>`;
  }).join('');
  return`<div style="overflow:auto">${hdr}${body}</div>`;
}

// The bottom database panel — custom mode only. Shows the bound file, a headers
// toggle (xlsx), the row/column count, and the Choose/Clear/Refresh buttons; when
// data is bound it shows the record browser (checkboxes + inline editing).
// Returns "" in template mode so the Template Designer is untouched.
function buildDatabasePanel(){
  if(!isCustomMode())return "";
  const bd=window._boundData;
  const recs=RX||[];
  const bound=hasBoundData();
  const cols=bound?(bd.columns||[]):[];

  const fileLbl=bound
    ? `<span style="color:var(--text);font-size:11px;font-weight:600" title="${(bd.filename||'').replace(/"/g,'&quot;')}">${esc(bd.filename||'file')}</span>`
    : `<span style="color:var(--text3);font-size:11px">No data file bound</span>`;

  const headerToggle=(bound&&bd.isXLSX)
    ? `<label style="display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--text2);font-size:11px" title="When off, columns are named Column 1, 2, 3…">
         <input type="checkbox" ${bd.headerRow?'checked':''} onchange="toggleHeaderRow()"> First row is headers
       </label>` : "";

  const selInfo=bound
    ? `<span style="color:var(--text3);font-size:10px">·</span><span style="color:var(--text2);font-size:11px">${dbSelCount()} of ${recs.length} selected</span>`
    : "";

  return `<div style="background:var(--surface);border-top:1px solid var(--bd2);flex-shrink:0;display:flex;flex-direction:column;max-height:240px">
    <div style="display:flex;align-items:center;gap:10px;padding:5px 14px;border-bottom:1px solid var(--bd1);flex-shrink:0">
      <span style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1px">Database</span>
      ${fileLbl}
      ${bound?`<span style="color:var(--text3);font-size:10px">·</span><span style="color:var(--text2);font-size:11px">${recs.length} row${recs.length===1?'':'s'} · ${cols.length} column${cols.length===1?'':'s'}</span>${selInfo}`:""}
      <div style="flex:1"></div>
      ${headerToggle}
      <button class="btn" onclick="chooseDataSource()" style="padding:3px 10px;font-size:11px">Choose data file…</button>
      <button class="btn" onclick="clearDataSourceCustom()" style="padding:3px 10px;font-size:11px"${bound?"":" disabled"} title="Unbind the data source — back to a single label">Clear data</button>
      <button class="btn" onclick="refreshDataSource()" style="padding:3px 10px;font-size:11px"${bound?"":" disabled"} title="Re-read the bound file from disk">↻ Refresh from source</button>
    </div>
    ${bound
      ? `<div style="flex:1;overflow:auto;min-height:0">${dbRecordTable()}</div>`
      : `<div style="padding:10px 14px;color:var(--text3);font-size:11px">Choose a CSV or Excel file to bind print data — one label per row.</div>`}
  </div>`;
}

R();
function setTheme(m){document.documentElement.dataset.theme=(m==="light"?"light":"");}
</script>
</body>
</html>
