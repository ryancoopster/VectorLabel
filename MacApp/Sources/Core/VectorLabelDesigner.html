<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- Defense in depth: restrict images to local/data, block plugins, remote
     connections (exfil), and base-uri. (No script-src so the app's inline scripts
     keep working; untrusted template fields are sanitized on import.) -->
<meta http-equiv="Content-Security-Policy" content="img-src 'self' data:; object-src 'none'; connect-src 'none'; base-uri 'none'">
<title>VectorLabel Template Designer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg2:#13131a;--canvas:#0d0d14;--surface:#1a1a28;--surface2:#252538;--surface3:#2a2a42;--surface4:#333350;--text:#e8e8f0;--text-soft:#cfcfe0;--text2:#8888a8;--text3:#44445a;--accent:#6C8EF5;--accent2:#4a6cd4;--accent-soft:#aab4e8;--green:#5cc896;--warn:#f5c96c;--red:#f56c6c;--bd1:rgba(255,255,255,0.05);--bd2:rgba(255,255,255,0.08);--bd3:rgba(255,255,255,0.1);--bd4:rgba(255,255,255,0.14);--bd5:rgba(255,255,255,0.2)}
html[data-theme="light"]{--bg2:#e6e8ee;--canvas:#c9ccd4;--surface:#ffffff;--surface2:#eceef3;--surface3:#e1e4ec;--surface4:#d2d6e0;--text:#1b1c24;--text-soft:#2c2d36;--text2:#5d6070;--text3:#9499a8;--accent:#4a6cd4;--accent2:#3a5ec4;--accent-soft:#3550b0;--green:#1f9d63;--warn:#b5790a;--red:#d63b3b;--bd1:rgba(0,0,0,0.06);--bd2:rgba(0,0,0,0.10);--bd3:rgba(0,0,0,0.13);--bd4:rgba(0,0,0,0.17);--bd5:rgba(0,0,0,0.24)}
html,body{height:100%;overflow:hidden;background:var(--bg2);color:var(--text);font-family:system-ui,sans-serif;font-size:13px}
input,select,button,textarea{font-family:system-ui,sans-serif;font-size:12px}
.inp{background:var(--surface3);border:1px solid var(--bd4);color:var(--text);border-radius:4px;padding:4px 8px;outline:none;width:100%}
.inp:focus{border-color:var(--accent)}
/* Numeric panel inputs: the default WebKit stepper is tiny and hard to hit — make it
   a real click target (always visible, full input height). */
input[type=number].inp{padding-right:2px}
input[type=number].inp::-webkit-inner-spin-button{width:18px;height:26px;opacity:1;cursor:pointer}
.btn{background:var(--surface3);border:1px solid var(--bd4);color:var(--text2);border-radius:4px;padding:4px 9px;cursor:pointer;font-size:11px;white-space:nowrap}
.btn:hover{background:var(--surface4)}
.btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600}
.btn.primary:hover{filter:brightness(1.08)}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--surface3);border:1px solid var(--bd4);color:var(--text2);border-radius:5px;padding:6px 0;cursor:pointer;font-size:10px;width:56px}
.tbtn:hover{background:var(--surface4)}
.fbtn{background:var(--surface);border:1px solid var(--bd2);color:var(--text2);border-radius:3px;padding:2px 7px;font-size:11px;cursor:pointer}
.fbtn:hover{background:var(--surface3);color:var(--text)}
.recrow{cursor:pointer;border-bottom:1px solid var(--bd1)}
.recrow:hover td{background:rgba(108,142,245,0.06)}
.recrow.selrow td{background:rgba(108,142,245,0.14)}
label.lbl{font-size:10px;color:var(--text2);display:block;margin-bottom:3px}
.sec{color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:2px}
.fmt-btn{background:var(--surface3);border:1px solid var(--bd4);color:var(--text2);border-radius:3px;padding:3px 7px;cursor:pointer;font-size:12px;font-weight:700;min-width:26px}
.fmt-btn:hover{background:var(--surface4)}
.fmt-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.divider{border:none;border-top:1px solid var(--bd2);margin:10px 0}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--surface);border:1px solid var(--bd4);border-radius:8px;padding:24px;min-width:420px;max-width:560px;box-shadow:0 8px 40px rgba(0,0,0,0.6)}
.modal-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;letter-spacing:-.2px}
.modal-row{margin-bottom:14px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;border-top:1px solid var(--bd2);padding-top:16px}
.sup-tbl{width:100%;border-collapse:collapse;font-size:12px}
.sup-tbl th{padding:8px 10px;text-align:left;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;background:var(--surface2);z-index:1}
.sup-tbl td{padding:7px 10px;border-top:1px solid var(--bd1);color:var(--text);vertical-align:middle}
.sup-tbl tr.sup-row{cursor:pointer}
.sup-tbl tr.sup-row:hover td{background:rgba(108,142,245,0.10)}
.sup-tbl tr.sup-sel td{background:rgba(108,142,245,0.16)}
.sup-tbl tr.sup-grp td{background:var(--surface3);color:var(--text2);font-weight:600;font-size:11px}
.tpl-card{background:var(--surface2);border:1px solid var(--bd3);border-radius:6px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.tpl-card:hover{background:var(--surface3);border-color:var(--accent)}
.tpl-card.active{border-color:var(--accent);background:var(--surface3)}
.tpl-preview{width:60px;height:20px;background:#fff;border:1px solid #ccc;border-radius:2px;flex-shrink:0;position:relative;overflow:hidden}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag.src{background:rgba(108,142,245,0.2);color:var(--accent)}
.tag.dst{background:rgba(108,200,150,0.2);color:var(--green)}
/* Database-pane record browser (custom mode). Ported from the Print window so the
   per-row checkboxes + hover-to-edit ✎ behave identically. */
.rec-row:hover{background:rgba(108,142,245,0.06)}
.rec-cell{position:relative}
/* Free-edit grid */
.fe-cell{position:relative;border-right:1px solid var(--bd1);min-height:28px;box-sizing:border-box;cursor:cell;user-select:none}
.fe-cell.fe-sel{background:rgba(108,142,245,0.16)}
.fe-cell.fe-fill{background:rgba(108,142,245,0.30);outline:1px dashed var(--accent);outline-offset:-2px}
.fe-cell.fe-act{box-shadow:inset 0 0 0 2px var(--accent);z-index:6}
.fe-cell.fe-hdr{cursor:default;background:var(--surface)}
.fe-cell.fe-hdr:focus-within{box-shadow:inset 0 0 0 2px var(--accent);z-index:6}
.fe-inp{flex:1;width:100%;min-width:0;border:none;outline:none;background:var(--bg);color:var(--text);font-size:11px;padding:5px 8px;box-sizing:border-box}
.fe-handle{position:absolute;right:-3px;bottom:-3px;width:8px;height:8px;background:var(--accent);border:1px solid #fff;border-radius:1px;cursor:crosshair;z-index:8}
.btn.fe-on{background:var(--warn,#f5c96c);border-color:var(--warn,#f5c96c);color:#1a1a1a}
.fe-banner{animation:febanner 0.9s ease-in-out infinite}
@keyframes febanner{0%,100%{background:rgba(245,201,108,0.06)}50%{background:rgba(245,201,108,0.20)}}
.cell-edit{position:absolute;top:50%;right:3px;transform:translateY(-50%);opacity:0;border:1px solid var(--bd3);background:var(--surface);color:var(--text2);border-radius:3px;font-size:9px;line-height:1;padding:2px 4px;cursor:pointer;z-index:5}
.rec-row:hover .cell-edit{opacity:.85}
.cell-edit:hover{opacity:1;color:var(--accent);border-color:var(--accent)}
.cb{width:14px;height:14px;border:1.5px solid var(--bd5);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:var(--bg2)}
.cb.chk{background:var(--accent);border-color:var(--accent)}
.cb.partial{background:var(--surface3);border-color:var(--accent)}
.check-tick{color:#fff;font-size:9px;line-height:1}
/* Draggable column headers/chips must not start a text selection on mousedown, so
   the native HTML5 drag (drag-to-map / reorder) wins wherever you grab them —
   otherwise grabbing on the label text highlights it instead of starting a drag. */
[draggable="true"]{-webkit-user-select:none;user-select:none}
</style>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;height:100vh"></div>
<!-- Barcode engine (bwip-js, MIT). CommonJS module → shimmed to a window global. -->
<script>var module={exports:{}};</script>
<script src="bwip-js.js"></script>
<script>try{window.bwipjs=module.exports;}catch(e){window.bwipjs=null;}</script>
<script>
const FONTS=["Arial","Helvetica Neue","Arial Narrow","Verdana","Tahoma","Courier New","Georgia","Impact"];
// Installed system font families, injected by Swift (window.__VL_FONTS__). Offered in the
// font dropdown in addition to the curated FONTS above; the renderer resolves any of them.
const SYS_FONTS=(typeof window!=='undefined'&&Array.isArray(window.__VL_FONTS__))?window.__VL_FONTS__:[];
// ── Barcode symbologies (rendered by the vendored bwip-js engine) ───────────────
const BARCODE_TYPES=[
  {id:"qrcode",label:"QR Code",d2:true,ecc:["L","M","Q","H"]},
  {id:"datamatrix",label:"Data Matrix",d2:true,ecc:[]},
  {id:"azteccode",label:"Aztec Code",d2:true,ecc:[]},
  {id:"pdf417",label:"PDF417",d2:true,ecc:["0","1","2","3","4","5","6","7","8"]},
  {id:"microqrcode",label:"Micro QR",d2:true,ecc:["L","M","Q"]},
  {id:"code128",label:"Code 128",d2:false,ecc:[]},
  {id:"gs1-128",label:"GS1-128",d2:false,ecc:[]},
  {id:"code39",label:"Code 39",d2:false,ecc:[]},
  {id:"code93",label:"Code 93",d2:false,ecc:[]},
  {id:"ean13",label:"EAN-13",d2:false,ecc:[]},
  {id:"ean8",label:"EAN-8",d2:false,ecc:[]},
  {id:"upca",label:"UPC-A",d2:false,ecc:[]},
  {id:"upce",label:"UPC-E",d2:false,ecc:[]},
  {id:"interleaved2of5",label:"Interleaved 2 of 5",d2:false,ecc:[]},
  {id:"codabar",label:"Codabar",d2:false,ecc:[]},
];
function bcDef(id){ return BARCODE_TYPES.find(t=>t.id===id)||BARCODE_TYPES[0]; }
function bcIs2D(id){ return bcDef(id).d2; }
function bcECC(id){ return bcDef(id).ecc; }
// Matrix codes that MUST keep a square aspect to scan (uniform scaling). Everything else
// — linear (1-D) codes AND the stacked PDF417 — may stretch freely in either axis.
function bcSquare(id){ return id==="qrcode"||id==="datamatrix"||id==="azteccode"||id==="microqrcode"; }
function barcodeEngineReady(){ return !(typeof bwipjs==="undefined"||!bwipjs); }
// Render a barcode to an SVG string via bwip-js; null if it can't encode (or no engine).
// A quiet zone (paddingwidth/height in MODULES) matches the print path so the preview is
// WYSIWYG: 2-D gets 2 modules all round, 1-D gets 10 modules left/right. Non-square codes
// get preserveAspectRatio="none" so object-fit:fill actually stretches them (the SVG's
// default "meet" otherwise keeps the bars proportional → looks like overall-only scaling).
function renderBarcodeSVG(bcid,text,eclevel){
  if(!barcodeEngineReady()||!bcid||text==null||text==="") return null;
  try{
    const is2D=bcIs2D(bcid);
    const opts={bcid:String(bcid),text:String(text),scale:3,includetext:false,
                paddingwidth:is2D?2:10, paddingheight:is2D?2:0};
    const ecc=bcECC(bcid);
    if(ecc.length&&eclevel)opts.eclevel=String(eclevel);
    let svg=bwipjs.toSVG(opts);
    if(svg && !bcSquare(bcid) && !/preserveAspectRatio/.test(svg)) svg=svg.replace('<svg ','<svg preserveAspectRatio="none" ');
    return svg;
  }catch(e){ return null; }
}
// True when this barcode object encodes the given record's data (else flag the row).
// Cached per (type|ecc|value) so the per-row check doesn't re-encode every render.
const _bcEncCache=new Map();
function barcodeEncodes(o,rec){
  const r=textValue(o,rec);
  if(r.e||r.v===""||r.v==null) return false;
  const key=o.bcType+'|'+(o.eclevel||'')+'|'+r.v;
  if(_bcEncCache.has(key)) return _bcEncCache.get(key);
  const ok=renderBarcodeSVG(o.bcType,r.v,o.eclevel)!=null;
  if(_bcEncCache.size>5000)_bcEncCache.clear();
  _bcEncCache.set(key,ok);
  return ok;
}
// True if any barcode on the canvas can't encode this record (it would print blank) —
// flagged in the database pane. Fast no-op when the design has no barcodes.
function recBarcodeBad(rec){
  for(const o of (S.objs||[])){ if(o.t==="bc" && !barcodeEncodes(o,rec)) return true; }
  return false;
}
function eccLabel(bcid,e){
  if(bcid==="qrcode"||bcid==="microqrcode") return ({L:"L — 7%",M:"M — 15%",Q:"Q — 25%",H:"H — 30%"})[e]||e;
  if(bcid==="pdf417") return "Level "+e;
  return e;
}
// Switch a barcode object's symbology, clamping its ECC level to one the new type allows.
function setBarcodeType(id,type){
  const o=gobj(id); if(!o)return;
  if(!BARCODE_TYPES.some(t=>t.id===type))return;
  snapshot();
  const ecc=bcECC(type);
  o.bcType=type;
  o.eclevel = ecc.length ? (ecc.indexOf(o.eclevel)>=0?o.eclevel:ecc[Math.min(1,ecc.length-1)]) : undefined;
  markDirty(); R();
}
// ── Supply catalog ──────────────────────────────────────────────────────────
// Injected from Swift at document start as window.__VL_CATALOG__ (the supply group
// for the connected printer model — see SupplyCatalogStore.webCatalogJSON). Each BL
// entry is one selectable supply (n = its primary part number) with a `cat`
// (category name) and a `parts` array of purchasable SKUs:
//   parts:[{pn, qty?(die-cut count), lenFt?(continuous roll length), rot, mat, url}]
// A small built-in fallback keeps the designer usable when opened standalone (dev).
const _VL_CAT=(typeof window!=='undefined'&&window.__VL_CATALOG__)?window.__VL_CATALOG__:null;
const _BL_FALLBACK=[
  {n:"M6-31-427",cat:"Wire & cable wraps (self-laminating)",ty:"dieCut",tw:1,th:1.5,pw:1,ph:.5,mt:"B-427",lm:true,parts:[{pn:"M6-31-427",qty:250,rot:false,mat:"",url:""},{pn:"BM-31-427",qty:250,rot:false,mat:"",url:""}]},
  {n:"M6-32-427",cat:"Wire & cable wraps (self-laminating)",ty:"dieCut",tw:1.5,th:1.5,pw:1.5,ph:.5,mt:"B-427",lm:true,parts:[{pn:"M6-32-427",qty:250,rot:false,mat:"",url:""},{pn:"BM-32-427",qty:250,rot:false,mat:"",url:""}]},
  {n:"M6-33-427",cat:"Wire & cable wraps (self-laminating)",ty:"dieCut",tw:1.5,th:4,pw:1.5,ph:1.5,mt:"B-427",lm:true,parts:[{pn:"M6-33-427",qty:100,rot:true,mat:"",url:""},{pn:"BM-33-427",qty:100,rot:true,mat:"",url:""}]},
  {n:"M6C-500-422",cat:"Continuous tapes",ty:"continuous",tw:.5,th:1,pw:.5,ph:1,mt:"B-422",lm:false,parts:[{pn:"M6C-500-422",lenFt:50,rot:false,mat:"Polyester",url:""},{pn:"M6C-500-595",lenFt:50,rot:false,mat:"Vinyl",url:""}]},
  {n:"M6C-2000-595",cat:"Continuous tapes",ty:"continuous",tw:2,th:1,pw:2,ph:1,mt:"B-595",lm:false,parts:[{pn:"M6C-2000-595",lenFt:50,rot:false,mat:"Vinyl",url:""}]}
];
// `let` (not const) so the live-sync poll can swap in the Engine's latest catalog.
let BL=(_VL_CAT&&Array.isArray(_VL_CAT.bl)&&_VL_CAT.bl.length)?_VL_CAT.bl:_BL_FALLBACK;
// Ordered category names for the supply picker (falls back to BL's listing order).
function _catsFromBL(){const seen=[];BL.forEach(l=>{if(l.cat&&seen.indexOf(l.cat)<0)seen.push(l.cat);});return seen.length?seen:["Supplies"];}
let SUPPLY_CATS=(_VL_CAT&&Array.isArray(_VL_CAT.categories)&&_VL_CAT.categories.length)?_VL_CAT.categories:_catsFromBL();
// All supply groups (for the picker's group dropdown) + the active one.
let VL_GROUPS=(_VL_CAT&&Array.isArray(_VL_CAT.groups)&&_VL_CAT.groups.length)?_VL_CAT.groups:[{name:(_VL_CAT&&_VL_CAT.activeGroup)||"Supplies",categories:SUPPLY_CATS,bl:BL}];
let VL_ACTIVE_GROUP=(_VL_CAT&&_VL_CAT.activeGroup)||(VL_GROUPS[0]&&VL_GROUPS[0].name)||"";
// A safe stand-in so S.spec is NEVER undefined — an undefined spec makes the whole
// synchronous render throw (the reported Template Designer crash).
const VL_SAFE_SPEC={id:"",n:"",name:"(no supply)",cat:"",ty:"dieCut",tw:1,th:1,pw:1,ph:1,mt:"",lm:false,parts:[]};
// Every supply entry across ALL groups — resolution is cross-group (the picker still
// shows one group at a time via BL).
function blAllEntries(){ let out=[]; (VL_GROUPS||[]).forEach(g=>{ if(Array.isArray(g.bl))out=out.concat(g.bl); }); return out.length?out:BL; }
// Switch the picker (and BL) to another supply group.
function switchSupplyGroup(name){
  const g=(VL_GROUPS||[]).find(x=>x.name===name); if(!g)return;
  VL_ACTIVE_GROUP=name; BL=(g.bl&&g.bl.length)?g.bl:BL; SUPPLY_CATS=(g.categories&&g.categories.length)?g.categories:_catsFromBL();
  if(typeof renderModal==="function")renderModal();
}
// Resolve a supply by part number — active BL first, then EVERY group (so a supply in
// any group, or a non-primary part SKU, still resolves).
function blBy(pn){ if(pn==null||pn==="")return undefined;
  const hit=l=>l.n===pn||(l.parts||[]).some(p=>p.pn===pn);
  return BL.find(hit)||blAllEntries().find(hit); }
// Default/fallback supply — NEVER undefined.
function blDefault(){ return BL[BL.length>1?1:0]||BL[0]||blAllEntries()[0]||S.spec||VL_SAFE_SPEC; }
// Live catalog update — Swift pushes the Engine's latest catalog here (polling).
function applyCatalog(cat){
  if(!cat||(!Array.isArray(cat.groups)&&!Array.isArray(cat.bl)))return;
  // Defer while a modal is open so we never yank the picker / selection out from under
  // the user; closeModal() re-applies the pending catalog.
  if(S.modal){ window._vlCatalogPending=cat; return; }
  window.__VL_CATALOG__=cat;
  if(Array.isArray(cat.groups)&&cat.groups.length)VL_GROUPS=cat.groups;
  // Preserve the user's chosen group; only fall back if it no longer exists.
  let g=(VL_GROUPS||[]).find(x=>x.name===VL_ACTIVE_GROUP);
  if(!g){ VL_ACTIVE_GROUP=cat.activeGroup||(VL_GROUPS[0]&&VL_GROUPS[0].name)||VL_ACTIVE_GROUP; g=(VL_GROUPS||[]).find(x=>x.name===VL_ACTIVE_GROUP); }
  if(g&&Array.isArray(g.bl)&&g.bl.length){ BL=g.bl; SUPPLY_CATS=(g.categories&&g.categories.length)?g.categories:_catsFromBL(); }
  else if(Array.isArray(cat.bl)&&cat.bl.length){ BL=cat.bl; SUPPLY_CATS=(cat.categories&&cat.categories.length)?cat.categories:_catsFromBL(); }
  // Re-resolve the current supply by id/part across ALL groups; if truly gone keep the
  // current (ghost) spec so the canvas size doesn't jump.
  const cur=S.spec||{};
  const re=(cur.id&&blById(cur.id))||blBy(cur.n);
  if(re)S.spec=re;
  if(typeof R==="function")R();
}

// ── Printable-area geometry ─────────────────────────────────────────────────
// Injected from Swift at document start as window.__VL_PRINTER_GEOMETRY__ (see
// PrinterGeometry.webGeometryJSON): {models:[{model,kind,dpi?,headPins?,tapes?}]}.
// spec: catalog entry {tw,th,pw,ph,ty,...} in the supply's PHYSICAL frame (inches,
// ty "continuous"|"dieCut"). model: string or "". liveCass: cassette dict or null
// ({printableWidthMils, printableHeightMils, labelWidthMils, ...}) from the selected
// live printer, else null.
// Returns null (no overlay) or {mt, mb, ml, mr} = unprintable inches on each side of
// the CURRENT canvas rect, in the same frame the canvas is drawn in (caller applies
// orientation swaps). Kept IDENTICAL in VectorLabelDesigner.html and
// VectorLabelPrint.html (the two engines intentionally share no JS).
function vlPrintableMargins(spec,model,liveCass){
  const geo=(typeof window!=="undefined"&&window.__VL_PRINTER_GEOMETRY__)||null;
  const models=(geo&&Array.isArray(geo.models))?geo.models:[];
  const mname=String(model||"").trim().toLowerCase();
  const entry=mname?(models.find(g=>String(g.model||"").trim().toLowerCase()===mname)||null):null;
  const live=(liveCass&&Number(liveCass.printableWidthMils)>0)?liveCass:null;
  if(!entry&&!live)return null;                       // model unknown AND no live data
  if(!spec)return null;
  const tw=Number(spec.tw)||0, th=Number(spec.th)||0;
  const pw=Number(spec.pw)||0, ph=Number(spec.ph)||0;
  const dieCut=spec.ty==="dieCut";
  let mt=0,mb=0,ml=0,mr=0;
  if(live){
    // Live cassette data WINS over the static table.
    const cassW=Number(live.labelWidthMils)>0?Number(live.labelWidthMils)/1000:tw;
    const band=Number(live.printableWidthMils)/1000;
    ml=mr=Math.max(0,(cassW-band)/2);
    if(dieCut&&Number(live.printableHeightMils)>0){
      const cassH=Number(live.labelHeightMils)>0?Number(live.labelHeightMils)/1000:th;
      const bandH=Number(live.printableHeightMils)/1000;
      mt=mb=Math.max(0,(cassH-bandH)/2);
    }
  }else if(entry.kind==="ptouch"&&!dieCut){
    // Across-tape band from the shared Brother head table; along-tape margins: none
    // (feed leader excluded).
    const tapes=Array.isArray(entry.tapes)?entry.tapes:[];
    if(!tapes.length)return null;
    const mm=tw*25.4;
    let tp=tapes[0];
    for(const t of tapes)if(Math.abs(t.mm-mm)<Math.abs(tp.mm-mm))tp=t;
    const band=(entry.headPins-2*tp.marginPins)/entry.dpi;
    ml=mr=Math.max(0,(tw-band)/2);
  }else if(dieCut){
    // Die-cut: printable pw×ph centered in the physical tw×th.
    ml=mr=(tw-pw)/2;
    mt=mb=(th-ph)/2;
  }else{
    // Continuous: catalog band centered across the tape.

    if(expr[i]==='<'&&expr[i+1]==='>'){t.push({k:"ne"});i+=2;continue;}
    if(expr[i]==='='){t.push({k:"eq"});i++;continue;}

// Auto-scale: return the largest font px ≤ basePx such that the single line fits
// the box width. Measures with a canvas 2d context (no DOM). `pad` is total
// horizontal padding in px.
function autoFitPx(text,o,basePx,boxW,pad){
  if(!text) return basePx;
  const cx=autoFitPx._c||(autoFitPx._c=document.createElement('canvas').getContext('2d'));
  cx.font=(o.italic?'italic ':'')+(o.bold?700:400)+' '+basePx+'px "'+(o.font||'Arial')+'"';
  let w=cx.measureText(text).width;
  if(o.tracking) w+=o.tracking*Math.max(0,String(text).length-1);
  w*=((o.stretch||100)/100);
  const avail=boxW-(pad||0);
  if(w<=avail||w<=0) return basePx;
  // Cheap first guess only. canvas.measureText diverges from real DOM layout
  // (font-fallback, letter-spacing, sub-pixel, and scaleX not affecting layout),
  // so leave headroom and let fitAutoScaleText() correct against true layout.
  return Math.max(3,basePx*(avail/w)*0.96);

// Post-render GUARANTEE that auto-scale text fits: measure the real laid-out box
// (scrollWidth vs clientWidth — the same width the DOM uses for overflow/clip)
// and shrink font-size until the whole string is visible. Immune to
// canvas.measureText error. Reads first, then writes → one reflow. Auto-scale
// text renders with text-overflow:clip (never ellipsis), so a residual sub-pixel
// overshoot degrades to a hairline clip, never "…".
function fitAutoScaleText(root){
  if(!root) return;
  // Skip the node being inline-edited (resizing it would fight the caret/focus); a
  // style-only fontSize change is otherwise safe (no textContent/focus change).
  const els=[...root.querySelectorAll('[data-autofit]')].filter(el=>el!==document.activeElement);
  if(!els.length) return;
  // A few read→write passes. One proportional shrink can leave a hairline overshoot when
  // letter-spacing adds a constant (non-font-scaling) term to the line width; re-measuring
  // converges it. Batches reads before writes each pass, and stops as soon as all fit.
  for(let pass=0; pass<3; pass++){
    const reads=els.map(el=>{
      const sx=parseFloat(el.getAttribute('data-sx'))||1;
      const avail=el.clientWidth;                 // inner content width (box − padding)
      const actual=el.scrollWidth*sx;             // scaleX widens (>1) or narrows (<1) the drawn line
      const cur=parseFloat(el.style.fontSize)||0;
      return {el,avail,actual,cur};

      if(r.cur>3 && r.actual>r.avail+0.5 && r.actual>0){
        r.el.style.fontSize=Math.max(3,r.cur*(r.avail/r.actual)*0.99)+'px';

  }
}

// ── Shared record-column system (order, visibility, widths) ────────────────────
// All three persisted bits (order/hidden/widths) are shared with the print
// window via Swift (AppSettings) and applied with applyColumnConfig().
function currentRecords(){ return window._editorRecords||RX; }
const DEFAULT_COL_W=120;
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
// Escape for an HTML attribute VALUE (adds quote escaping on top of esc()).
function escAttr(s){ return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
// Escape a string that is interpolated as a single-quoted JS string literal sitting
// INSIDE an HTML attribute (e.g. onclick="f('${jsAttr(c)}')"). Must neutralise both
// the JS-string context (backslash, quotes) AND the HTML-attribute context (the
// &<> chars) so a crafted column name can't break out and run arbitrary JS in the
// privileged WKWebView. Order matters: backslash first.
function jsAttr(s){
  return String(s)
    .replace(/\\/g,'\\\\')
    .replace(/'/g,'\\\'')
    .replace(/"/g,'&quot;')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

// Full column list (incl. hidden): saved order first, then friendly, then rest.
// In custom mode the bound data carries an authoritative, ORDERED column list
// (window._boundData.columns) — record field keys arrive via a Swift [String:String]
// dictionary, which is unordered, so deriving order from keys scrambles it (e.g.
// "Column 9, Column 16, Column 12, …"). Seed from the bound column order first.
function recordColumns(records){
  const present=[];
  const bdCols=(typeof isCustomMode==='function'&&isCustomMode()&&window._boundData&&Array.isArray(window._boundData.columns))?window._boundData.columns:null;
  if(bdCols) bdCols.forEach(k=>{ if(!present.includes(k)) present.push(k); });
  records.forEach(r=>Object.keys(r).forEach(k=>{ if(!present.includes(k)) present.push(k); }));
  const out=(window._columnOrder||[]).filter(k=>present.includes(k));
  ['_Side','Number','Cable','Signal','Device_Name','Socket_Name'].forEach(k=>{ if(present.includes(k)&&!out.includes(k)) out.push(k); });
  present.forEach(k=>{ if(!out.includes(k)) out.push(k); });

}
function colLabel(k){ return k==='_Side'?'Side':k.replace(/_/g,' '); }
function visibleColumns(records){ const h=window._hiddenColumns||[]; return recordColumns(records).filter(c=>!h.includes(c)); }

function applyColumnConfig(cfg){

// Reorder via header drag (operates on the full column list).
let _vlDragCol=null,_vlGhost=null,_vlDragTile=null,_vlOverEl=null;
function colDragStart(e,c){

  if(e.dataTransfer){
    e.dataTransfer.effectAllowed='move';
    try{e.dataTransfer.setData('text/plain',c);}catch(_){}
    // Drag the whole tile: clone it as the drag image so the full cell follows
    // the cursor, not just the text.

      const cs=getComputedStyle(tile);

      g.style.cssText='position:fixed;top:-2000px;left:-2000px;box-sizing:border-box;width:'+tile.offsetWidth+'px;height:'+tile.offsetHeight+'px;background:var(--surface3);border:1px solid var(--accent);border-radius:4px;color:var(--text);opacity:0.97;display:flex;align-items:center;overflow:hidden;padding:'+cs.padding+';font:'+cs.font;

function colDragOver(e,el){

function dbSaveHdrEdit(){ const old=S._dbHdrEdit, nv=(S._dbHdrVal!=null?S._dbHdrVal:''); S._dbHdrEdit=null; S._dbHdrVal=undefined; if(old!=null)dbRenameColumn(old,nv); else R(); }
function _renameInFilter(f,oldN,newN){ if(!f||!Array.isArray(f.groups))return; f.groups.forEach(function(g){ (g.rules||[]).forEach(function(r){ if(r.field===oldN)r.field=newN; if(r.valueType==='field'&&r.value===oldN)r.value=newN; }); }); }
function _renameInSort(s,oldN,newN){ if(!s||!Array.isArray(s.rules))return; s.rules.forEach(function(r){ if(r.field===oldN)r.field=newN; }); }
function _renameInFormula(txt,oldN,newN){ if(!txt||!/^[A-Za-z_][A-Za-z0-9_]*$/.test(oldN)||!/^[A-Za-z_][A-Za-z0-9_]*$/.test(newN))return txt;
  return txt.replace(new RegExp('\\b'+oldN.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','g'),newN); }
function dbRenameColumn(oldName,newName){
  newName=String(newName==null?'':newName).trim();
  const bd=window._boundData; if(!bd||!bd.columns)return false;
  if(!newName||newName===oldName){ R(); return false; }
  if(bd.columns.indexOf(newName)>=0){ alert('A column named “'+newName+'” already exists.'); R(); return false; }
  const ci=bd.columns.indexOf(oldName); if(ci<0){ R(); return false; }
  bd.columns[ci]=newName;
  bd.records.forEach(function(r){ if(Object.prototype.hasOwnProperty.call(r,oldName)){ r[newName]=r[oldName]; delete r[oldName]; } });
  RX=bd.records;
  if(Array.isArray(window._columnOrder)) window._columnOrder=window._columnOrder.map(function(c){return c===oldName?newName:c;});
  if(Array.isArray(window._hiddenColumns)) window._hiddenColumns=window._hiddenColumns.map(function(c){return c===oldName?newName:c;});
  if(window._colWidths&&window._colWidths[oldName]!=null){ window._colWidths[newName]=window._colWidths[oldName]; delete window._colWidths[oldName]; }
  if(typeof postColumnConfig==='function')postColumnConfig();
  (S.objs||[]).forEach(function(o){ if(o.field===oldName)o.field=newName; if(typeof o.f==='string')o.f=_renameInFormula(o.f,oldName,newName); });
  _renameInFilter(S.dbFilter,oldName,newName); _renameInSort(S.dbSort,oldName,newName);
  if(Array.isArray(window._presets)){ window._presets.forEach(function(p){ _renameInFilter(p.filter,oldName,newName); _renameInSort(p.sort,oldName,newName); }); if(typeof savePresets==='function')savePresets(); }
  dbSyncBoundData(); markDirty(); R();
  return true;
}

// ── Snap helpers ──────────────────────────────────────────────────────────────
const SNAP_PX=4; // screen pixels threshold for smart snap
S._snapLines=[];

function snapToGrid(val){
  if(!S.snapGrid)return val;
  return Math.round(val/S.gridSize)*S.gridSize;
}

function snapX(x,w,excludeId){
  if(!S.snapObjects)return{v:x,lines:[]};
  const others=S.objs.filter(o=>o.id!==excludeId);
  const pw=S.spec.pw;
  const thr=SNAP_PX/(SC*S.zoom);
  let best=x,bestD=thr,lines=[];
  [[x,0],[x+w,1]].forEach(([ce,ci])=>{
    others.forEach(o=>{
      [o.x,o.x+o.w].forEach(oe=>{
        const d=Math.abs(ce-oe);
        if(d<bestD){bestD=d;best=ci===0?oe:oe-w;lines=[{axis:'x',pos:oe}];}
      });
    });
    [0,pw].forEach(le=>{
      const d=Math.abs(ce-le);
      if(d<bestD){bestD=d;best=ci===0?le:le-w;lines=[{axis:'x',pos:le}];}
    });
  });
  return{v:best,lines};
}

function snapY(y,h,excludeId){
  if(!S.snapObjects)return{v:y,lines:[]};
  const others=S.objs.filter(o=>o.id!==excludeId);
  const ph=S.spec.ph;
  const thr=SNAP_PX/(SC*S.zoom);
  let best=y,bestD=thr,lines=[];
  [[y,0],[y+h,1]].forEach(([ce,ci])=>{
    others.forEach(o=>{
      [o.y,o.y+(o.h||0)].forEach(oe=>{
        const d=Math.abs(ce-oe);
        if(d<bestD){bestD=d;best=ci===0?oe:oe-h;lines=[{axis:'y',pos:oe}];}
      });
    });
    [0,ph].forEach(le=>{
      const d=Math.abs(ce-le);
      if(d<bestD){bestD=d;best=ci===0?le:le-h;lines=[{axis:'y',pos:le}];}
    });
  });
  return{v:best,lines};
}

function applySnap(x,y,w,h,id){
  let nx=snapToGrid(x);
  let ny=snapToGrid(y);
  const rx=snapX(nx,w,id);
  const ry=snapY(ny,h,id);
  S._snapLines=[...rx.lines,...ry.lines];
  return{x:Math.max(-BLEED_IN,rx.v),y:Math.max(-BLEED_IN,ry.v)};
}

// Live-update the snap guide overlay during a drag (no full canvas rebuild).
function renderSnapGuides(){
  const layer=document.getElementById('snap-guide-layer'); if(!layer)return;
  const sc=SC, B=BLEED_IN*sc, pw=S.spec.pw*sc, ph=S.spec.ph*sc, bw=pw+2*B, bh=ph+2*B;
  const lines=(S._snapLines||[]).map(l=>{
    if(l.axis==='x'){ const px=(l.pos*sc+B).toFixed(1);
      return '<line x1="'+px+'" y1="0" x2="'+px+'" y2="'+bh+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+px+'" cy="'+(bh/2)+'" r="3.5" fill="#FF4D6A"/>'; }
    const py=(l.pos*sc+B).toFixed(1);
    return '<line x1="0" y1="'+py+'" x2="'+bw+'" y2="'+py+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+(bw/2)+'" cy="'+py+'" r="3.5" fill="#FF4D6A"/>';
  }).join('');
  layer.innerHTML=lines?'<svg style="position:absolute;top:0;left:0;width:'+bw+'px;height:'+bh+'px;pointer-events:none;z-index:5" width="'+bw+'" height="'+bh+'">'+lines+'</svg>':'';
}

// Resize handles on all four corners (drag any corner to resize, opposite
// corner stays put).
function resizeHandles(id){
  const H=(c,pos,cur)=>`<div onmousedown="startResize(event,'${id}','${c}')" style="position:absolute;${pos};width:9px;height:9px;background:var(--accent);border:1px solid #fff;border-radius:2px;z-index:10;cursor:${cur}"></div>`;
  return H('tl','left:-5px;top:-5px','nwse-resize')+H('tr','right:-5px;top:-5px','nesw-resize')
        +H('bl','left:-5px;bottom:-5px','nesw-resize')+H('br','right:-5px;bottom:-5px','nwse-resize');
}
// ── Rulers ─────────────────────────────────────────────────────────────────────
const RULER=26; // px thickness of the fixed edge rulers
// Fraction label for a quarter-inch position (whole inches show the integer).
function rulerLabel(v){
  const r=Math.round(v*16)/16, whole=Math.floor(r+1e-6), frac=r-whole;
  if(Math.abs(frac)<1e-6) return {t:String(whole), big:true};
  if(Math.abs(frac-0.25)<1e-6) return {t:'¼', big:false};
  if(Math.abs(frac-0.5)<1e-6)  return {t:'½', big:false};
  if(Math.abs(frac-0.75)<1e-6) return {t:'¾', big:false};
  return null;
}
// Draw the fixed top/left rulers, zeroed at the label's (printable) top-left,
// with 1/16" ticks and a label every 1/4". S._rulerObj (id) highlights the
// dragged object's extent.
function drawRulers(){
  const pa=document.getElementById('printable-area');
  const rh=document.getElementById('ruler-h'), rv=document.getElementById('ruler-v');
  if(!rh||!rv)return;
  if(!pa){ rh.innerHTML=''; rv.innerHTML=''; return; }
  const paR=pa.getBoundingClientRect(), rhR=rh.getBoundingClientRect(), rvR=rv.getBoundingClientRect();
  const ppiX=paR.width/S.spec.pw, ppiY=paR.height/S.spec.ph;   // screen px per inch (incl. zoom)
  // Highlight the extent of the dragged object, or — when nothing is being
  // dragged — of every currently selected object, so the band stays visible the
  // whole time an object is selected.
  const hls = S._rulerObj ? [gobj(S._rulerObj)].filter(Boolean)
            : (S.selIds&&S.selIds.length ? S.selIds.map(gobj).filter(Boolean)
            : (S.selId ? [gobj(S.selId)].filter(Boolean) : []));
  const HL_FILL='rgba(140,140,150,0.32)';
  const STEP=1/16;
  function axis(horiz){
    const ppi=horiz?ppiX:ppiY;
    const originScreen=horiz?paR.left:paR.top;       // label 0 in screen coords
    const rect=horiz?rhR:rvR, len=horiz?rhR.width:rvR.height, off=horiz?rhR.left:rvR.top;
    if(!(ppi>0))return '';
    let out='';
    hls.forEach(function(hl){
      const a=(horiz?(hl.x||0):(hl.y||0)), b=a+(horiz?(hl.w||0):(hl.h||0));
      const pa1=originScreen-off+Math.min(a,b)*ppi, pa2=originScreen-off+Math.max(a,b)*ppi;
      out += horiz
        ? '<rect x="'+pa1.toFixed(1)+'" y="0" width="'+Math.max(1,pa2-pa1).toFixed(1)+'" height="'+RULER+'" fill="'+HL_FILL+'"/>'
        : '<rect x="0" y="'+pa1.toFixed(1)+'" width="'+RULER+'" height="'+Math.max(1,pa2-pa1).toFixed(1)+'" fill="'+HL_FILL+'"/>';
    });
    const vMin=(off-originScreen)/ppi, vMax=(off+len-originScreen)/ppi;
    let v=Math.floor(vMin/STEP)*STEP;
    for(; v<=vMax+1e-6; v+=STEP){
      const p=originScreen-off+v*ppi;
      const sixteenth=Math.round(v/STEP);
      const major=sixteenth%16===0, quarter=sixteenth%4===0;
      const tlen=major?RULER:quarter?12:6;
      if(horiz){
        out+='<line x1="'+p.toFixed(1)+'" y1="'+(RULER-tlen)+'" x2="'+p.toFixed(1)+'" y2="'+RULER+'" style="stroke:var(--text2)" stroke-width="'+(major?1:0.6)+'"/>';
      }else{
        out+='<line x1="'+(RULER-tlen)+'" y1="'+p.toFixed(1)+'" x2="'+RULER+'" y2="'+p.toFixed(1)+'" style="stroke:var(--text2)" stroke-width="'+(major?1:0.6)+'"/>';
      }
      if(quarter){
        const lab=rulerLabel(v); if(lab){
          const fs=lab.big?11:9;
          if(horiz) out+='<text x="'+(p+2).toFixed(1)+'" y="11" font-size="'+fs+'" style="fill:var(--text)">'+lab.t+'</text>';
          else      out+='<text x="3" y="'+(p+(lab.big?10:9)).toFixed(1)+'" font-size="'+fs+'" style="fill:var(--text)">'+lab.t+'</text>';
        }
      }
    }
    return '<svg width="'+(horiz?len:RULER)+'" height="'+(horiz?RULER:len)+'" style="display:block">'+out+'</svg>';
  }
  rh.innerHTML=axis(true);
  rv.innerHTML=axis(false);
}
let _rafRuler=false;
function scheduleRulers(){ if(_rafRuler)return; _rafRuler=true; requestAnimationFrame(function(){ _rafRuler=false; drawRulers(); }); }
window.addEventListener('resize',scheduleRulers);

function buildCanvas(spec,objs,selId,rec,wrap,readOnly){
  const sc=SC;
  const pw=spec.pw*sc,ph=spec.ph*sc;
  const cw=(spec.tw-spec.pw)*sc,ch=(spec.th-spec.ph)*sc;
  const tw=pw,th=wrap?spec.th*sc:ph;
  // Bleed margin around the printable area (objects can overhang into it).
  const B=BLEED_IN*sc;
  const bw=pw+2*B, bh=ph+2*B;

  // Clear wrap zone shown directly under the printable area (not in the bleed).
  // ONLY for die-cut self-laminating labels (the clear over-laminate tail) — never
  // for continuous tape, whose printable<label gap is just the unprintable head
  // margin, not a wrap flap.
  const wrapZone=wrap&&spec.lm&&spec.ty!=="continuous"&&(cw>0||ch>0)?`
    <div style="position:absolute;left:${B}px;top:${B+ph}px;width:${pw}px;height:${ch>0?ch:ph}px;background:rgba(140,140,180,0.12);border:1px dashed var(--text3);display:flex;align-items:center;justify-content:center;pointer-events:none">
      <span style="color:var(--text2);font-size:9px;white-space:nowrap">clear wrap zone</span>
    </div>`:"";

  // Printable-area overlay: hatched strips showing the target printer's unprintable
  // margins OUTSIDE the canvas rect (the canvas stays exactly the printable area).
  // Purely visual — the strips sit inside the existing 2" bleed frame, so no
  // layout/scroll/zoom math changes. Margins are computed in the supply's PHYSICAL
  // frame and swapped onto the canvas axes exactly as normSpec swaps the supply dims
  // (continuous default-LANDSCAPE and die-cut-rot90 swap axes). Rebuilt on every
  // buildCanvas call so it survives renderCanvasOnly per-gesture rebuilds (cheap:
  // a find over ≤5 models). z-index 1 — above the grid (z0), below snap guides (z5)
  // and selection handles (z10).
  let marginsHtml="";
  if(S.showMargins!==false){
    const mMdl=isCustomMode()?((dPrinter()||{}).model||""):(S.targetModel||"");
    const mRaw=blBy(spec.n)||spec;   // the PHYSICAL (unswapped) supply frame
    const m=vlPrintableMargins(mRaw,mMdl,isCustomMode()?dLoadedCassette():null);
    if(m){
      const mSwap=(mRaw.ty==="continuous")?(S.canvasRot!==90):(S.canvasRot===90);
      const mL=(mSwap?m.mt:m.ml)*sc, mR=(mSwap?m.mb:m.mr)*sc,
            mT=(mSwap?m.ml:m.mt)*sc, mB=(mSwap?m.mr:m.mb)*sc;
      const hatch="repeating-linear-gradient(45deg,rgba(128,128,140,0.22) 0,rgba(128,128,140,0.22) 3px,rgba(128,128,140,0.06) 3px,rgba(128,128,140,0.06) 7px)";
      const tip=escAttr("Unprintable margin — "+(mMdl||"printer"));
      const strip=(l,t,w,h)=>(w>0.5&&h>0.5)?`<div title="${tip}" style="position:absolute;left:${l.toFixed(1)}px;top:${t.toFixed(1)}px;width:${w.toFixed(1)}px;height:${h.toFixed(1)}px;background:${hatch};pointer-events:none;z-index:1"></div>`:"";
      marginsHtml=
        strip(B-mL,B-mT,pw+mL+mR,mT)+   // top (spans the full physical width)
        strip(B-mL,B+ph,pw+mL+mR,mB)+   // bottom
        strip(B-mL,B,mL,ph)+            // left (canvas height only — no overlap)
        strip(B+pw,B,mR,ph)+            // right
        // Dashed outline = the PHYSICAL label edge; subtle solid line = the canvas
        // (printable) boundary.
        `<div title="${tip}" style="position:absolute;left:${(B-mL).toFixed(1)}px;top:${(B-mT).toFixed(1)}px;width:${(pw+mL+mR).toFixed(1)}px;height:${(ph+mT+mB).toFixed(1)}px;border:1px dashed rgba(128,128,140,0.7);box-sizing:border-box;pointer-events:none;z-index:1"></div>`+
        `<div style="position:absolute;left:${B}px;top:${B}px;width:${pw}px;height:${ph}px;border:1px solid rgba(128,128,140,0.45);box-sizing:border-box;pointer-events:none;z-index:1"></div>`;
    }
  }

  const objsHtml=objs.map(o=>{
    const x=o.x*SC+B,y=o.y*SC+B,w=(o.w||1)*SC,h=(o.h||0)*SC;
    const sel=!readOnly&&(S.selIds||[]).includes(o.id);
    // Resize/rotate handles only when exactly one object is selected; a multi-
    // selection shows just the outlines and supports drag/nudge as a group.
    const single=sel&&(S.selIds||[]).length===1;
    const ss=sel?"outline:1.5px solid var(--accent);outline-offset:1px;":"";
    const drag=readOnly?"":`onmousedown="startDrag(event,'${o.id}')"`;
    const rotDeg=o.rot||0;
    const rotCss=rotDeg?`transform:rotate(${rotDeg}deg);transform-origin:center center;`:"";
    const rotH=single&&!readOnly?`<div style="position:absolute;left:50%;top:-22px;width:1px;height:22px;background:var(--accent);transform:translateX(-50%);z-index:10;pointer-events:none"></div><div onmousedown="startRotate(event,'${o.id}')" title="Drag to rotate" style="position:absolute;left:50%;top:-26px;transform:translateX(-50%);width:11px;height:11px;background:var(--accent);border:1px solid #fff;border-radius:50%;cursor:grab;z-index:11"></div>`:"";

    if(o.t==="tx"){
      const {v,e}=textValue(o,rec);
      const va=o.valign==="top"?"flex-start":o.valign==="bottom"?"flex-end":"center";
      let fz=Math.max(7,(o.fs||14)*(sc/100));
      if(o.autoScale&&!o.wrapText) fz=autoFitPx(v,o,fz,(o.w||1)*sc,4);
      const fontStyle=o.italic?"italic":"normal";
      const fontWeight=o.bold?700:400;
      const textDecoration=o.underline?"underline":"none";
      const wordBreak=o.wrapText?"break-word":"normal";
      const whiteSpace=o.wrapText?"normal":"nowrap";
      const letterSpacing=o.tracking?`${o.tracking}px`:"normal";
      const scaleX=(o.stretch||100)/100;
      const txtColor=e?"var(--red)":"#000";
      const textAlign=o.al||"left";
      const dispVal=e?`⚠ ${esc(e.substring(0,40))}`:esc(v);
      const rb=single&&!readOnly?resizeHandles(o.id):"";
      const dropAttr=readOnly?"":`ondragenter="onColTextEnter(event,this)" ondragover="event.preventDefault();if(event.dataTransfer)event.dataTransfer.dropEffect='copy'" ondragleave="onColTextLeave(this)" ondrop="onColTextLeave(this);onColDropToText(event,'${o.id}')"`;
      const isStatic=txMode(o)==="static";
      // Auto-scale (non-wrap) text is corrected against real layout post-render by
      // fitAutoScaleText(); tag it so that pass can find it. NEVER ellipsis when
      // auto-scaling — clip so any residual overshoot is a hairline, not "…".
      const autoFit=!!(o.autoScale&&!o.wrapText);
      const autoFitAttrs=autoFit?`data-autofit="1" data-sx="${scaleX}"`:"";
      const ovf=(o.wrapText||o.autoScale)?"clip":"ellipsis";
      const editing=!readOnly&&isStatic&&S.editingId===o.id;
      const editAttrs=editing?`contenteditable="true" onmousedown="event.stopPropagation()" oninput="setStaticText('${o.id}',this.innerText)" onblur="endTextEdit()" onkeydown="if(event.key==='Escape')this.blur()"`:"";
      const pe=editing?"pointer-events:auto;outline:none;cursor:text;":"pointer-events:none;";
      const curs=readOnly?"default":(editing?"text":"move");   // caret while editing; otherwise grab-to-move
      return `<div data-obj="${o.id}" ${drag} ${dropAttr} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${Math.max(h,12)}px;${rotCss}${ss}border-radius:2px;cursor:${curs};display:flex;align-items:${va};padding:0 2px;box-sizing:border-box">
        <div data-txt="${o.id}" ${autoFitAttrs} ${editAttrs} style="width:100%;font-family:'${o.font||"Arial"}',Arial,sans-serif;font-size:${fz}px;font-weight:${fontWeight};font-style:${fontStyle};text-decoration:${textDecoration};color:${txtColor};white-space:${whiteSpace};word-break:${wordBreak};overflow:hidden;text-overflow:${ovf};line-height:1.15;letter-spacing:${letterSpacing};text-align:${textAlign};transform:scaleX(${scaleX});transform-origin:left center;${pe}">${dispVal}</div>
        ${rotH}${rb}</div>`;
    }
    if(o.t==="ln"){
      const lh=single&&!readOnly?`<div onmousedown="startLineResize(event,'${o.id}','l')" title="Drag to stretch" style="position:absolute;left:-5px;top:50%;transform:translateY(-50%);width:9px;height:9px;background:var(--accent);border:1px solid #fff;border-radius:50%;cursor:ew-resize;z-index:10"></div>`:"";
      const rh=single&&!readOnly?`<div onmousedown="startLineResize(event,'${o.id}','r')" title="Drag to stretch" style="position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:9px;height:9px;background:var(--accent);border:1px solid #fff;border-radius:50%;cursor:ew-resize;z-index:10"></div>`:"";
      return `<div data-obj="${o.id}" ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${(o.w||1)*sc}px;height:${Math.max(1,o.lw||1)}px;background:#000;cursor:${readOnly?"default":"move"};${rotCss}${ss}">${lh}${rh}${rotH}</div>`;
    }
    if(o.t==="rc"){
      const rb=single&&!readOnly?resizeHandles(o.id):"";
      return `<div data-obj="${o.id}" ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;border:${o.lw||1}px solid #000;background:transparent;cursor:${readOnly?"default":"move"};${rotCss}${ss}">${rotH}${rb}</div>`;
    }
    if(o.t==="ci"||o.t==="ov"){
      const rb=single&&!readOnly?resizeHandles(o.id):"";
      return `<div data-obj="${o.id}" ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;border:${o.lw||1}px solid #000;background:transparent;border-radius:50%;cursor:${readOnly?"default":"move"};${rotCss}${ss}">${rotH}${rb}</div>`;
    }
    if(o.t==="ar"){
      const aw=(o.w||1)*sc;
      const th=Math.max(1,o.lw||2);
      const as=Math.max(4,o.arrowSize||12);   // arrowhead length along shaft
      const hw=as*0.6;                          // arrowhead half-width
      const vh=Math.max(th/2,hw)+2;             // half visual height
      const x1=o.arrowStart?as:0, x2=aw-(o.arrowEnd?as:0);
      let svg=`<svg width="${aw}" height="${2*vh}" style="position:absolute;left:0;top:0;overflow:visible;pointer-events:none">`;
      svg+=`<line x1="${x1}" y1="${vh}" x2="${Math.max(x1,x2)}" y2="${vh}" stroke="#000" stroke-width="${th}"/>`;
      if(o.arrowStart) svg+=`<polygon points="0,${vh} ${as},${vh-hw} ${as},${vh+hw}" fill="#000"/>`;
      if(o.arrowEnd)   svg+=`<polygon points="${aw},${vh} ${aw-as},${vh-hw} ${aw-as},${vh+hw}" fill="#000"/>`;
      svg+=`</svg>`;
      const lh=single&&!readOnly?`<div onmousedown="startLineResize(event,'${o.id}','l')" title="Drag to stretch" style="position:absolute;left:-5px;top:50%;transform:translateY(-50%);width:9px;height:9px;background:var(--accent);border:1px solid #fff;border-radius:50%;cursor:ew-resize;z-index:10"></div>`:"";
      const rh=single&&!readOnly?`<div onmousedown="startLineResize(event,'${o.id}','r')" title="Drag to stretch" style="position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:9px;height:9px;background:var(--accent);border:1px solid #fff;border-radius:50%;cursor:ew-resize;z-index:10"></div>`:"";
      return `<div data-obj="${o.id}" ${drag} style="position:absolute;left:${x}px;top:${y-vh}px;width:${aw}px;height:${2*vh}px;cursor:${readOnly?"default":"move"};${rotCss}${ss}">${svg}${lh}${rh}${rotH}</div>`;
    }
    if(o.t==="im"||o.t==="sy"){
      const fit=o.t==="sy"?"contain":"fill";
      const rb=single&&!readOnly?resizeHandles(o.id):"";
      return `<div data-obj="${o.id}" ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;cursor:${readOnly?"default":"move"};${rotCss}${ss}"><img src="${o.src||''}" style="width:100%;height:100%;object-fit:${fit};pointer-events:none;display:block">${rotH}${rb}</div>`;
    }
    if(o.t==="bc"){
      const r=textValue(o,rec);
      const rb=single&&!readOnly?resizeHandles(o.id):"";
      // Drop a column header onto the barcode → bind it to that field (reuses the text
      // object's drop handler, which just sets mode:"field").
      const dropAttr=readOnly?"":`ondragenter="onColTextEnter(event,this)" ondragover="event.preventDefault();if(event.dataTransfer)event.dataTransfer.dropEffect='copy'" ondragleave="onColTextLeave(this)" ondrop="onColTextLeave(this);onColDropToText(event,'${o.id}')"`;
      const svg=(!r.e&&r.v!==""&&r.v!=null)?renderBarcodeSVG(o.bcType,r.v,o.eclevel):null;
      let inner;
      if(svg){
        inner=`<img src="data:image/svg+xml,${encodeURIComponent(svg)}" style="width:100%;height:100%;object-fit:${bcSquare(o.bcType)?'contain':'fill'};pointer-events:none;display:block">`;
      }else{
        const msg=!barcodeEngineReady()?'⚠ barcode engine unavailable':r.e?('⚠ '+r.e.substring(0,28)):((r.v===""||r.v==null)?'⚠ no data':'⚠ can’t encode');
        inner=`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;border:1px dashed var(--red);color:var(--red);font-size:10px;text-align:center;box-sizing:border-box;padding:2px;pointer-events:none">${esc(msg)}</div>`;
      }
      return `<div data-obj="${o.id}" ${drag} ${dropAttr} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;cursor:${readOnly?"default":"move"};${rotCss}${ss}">${inner}${rotH}${rb}</div>`;
    }
    if(o.t==="tb"){
      const cols=o.cols||[o.w||1], rows=o.rows||[o.h||0.25];
      const lw=Math.max(1,o.lw||1);
      // Cumulative px offsets: cumX[i] = right edge of column i (cumY = bottom of row i).
      const cumX=[]; let axx=0; for(const cv of cols){ axx+=cv*sc; cumX.push(axx); }
      const cumY=[]; let ayy=0; for(const rv of rows){ ayy+=rv*sc; cumY.push(ayy); }
      const selCells=(S._tblSel&&S._tblSel.id===o.id)?(S._tblSel.cells||[]):[];
      // Merged regions (derived each pass from rs/cs): covered cells render nothing;
      // an anchor renders over the UNION rect of its span.
      const rg=tblRegions(o), reg=rg.reg;
      const unionRect=function(ri,ci){
        const sp=tblRegionSpan(reg,ri,ci);
        const ux=ci?cumX[ci-1]:0, uy=ri?cumY[ri-1]:0;
        return [ux,uy,cumX[ci+sp[1]-1]-ux,cumY[ri+sp[0]-1]-uy];
      };
      // Grid: outer border + inner lines as thin divs (lw raw px — the rc convention).
      // Inner lines are PER-CELL boundary segments, drawn only where the regions on
      // either side differ — merged regions get no internal lines.
      let inner=`<div style="position:absolute;left:0;top:0;width:${w}px;height:${h}px;border:${lw}px solid #000;box-sizing:border-box;pointer-events:none"></div>`;
      for(let ri=0;ri<rows.length;ri++)for(let ci=0;ci<cols.length-1;ci++){
        if(reg[ri][ci]===reg[ri][ci+1])continue;
        inner+=`<div style="position:absolute;left:${(cumX[ci]-lw/2).toFixed(1)}px;top:${(ri?cumY[ri-1]:0).toFixed(1)}px;width:${lw}px;height:${(rows[ri]*sc).toFixed(1)}px;background:#000;pointer-events:none"></div>`;
      }
      for(let ri=0;ri<rows.length-1;ri++)for(let ci=0;ci<cols.length;ci++){
        if(reg[ri][ci]===reg[ri+1][ci])continue;
        inner+=`<div style="position:absolute;left:${(ci?cumX[ci-1]:0).toFixed(1)}px;top:${(cumY[ri]-lw/2).toFixed(1)}px;width:${(cols[ci]*sc).toFixed(1)}px;height:${lw}px;background:#000;pointer-events:none"></div>`;
      }
      // Cells — the EXACT tx text recipe (textValue/autoFitPx/data-autofit/clip) in each
      // cell rect (a merged anchor's union rect; covered cells render no content).
      for(let ri=0;ri<rows.length;ri++)for(let ci=0;ci<cols.length;ci++){
        if(rg.covered(ri,ci))continue;
        const cl=(o.cells&&o.cells[ri]&&o.cells[ri][ci])||{};
        const ur=unionRect(ri,ci), cx0=ur[0], cy0=ur[1], cw=ur[2], chh=ur[3];
        const {v,e}=textValue(cl,rec);
        const va=cl.valign==="top"?"flex-start":cl.valign==="bottom"?"flex-end":"center";
        let fz=Math.max(7,(cl.fs||14)*(sc/100));
        if(cl.autoScale&&!cl.wrapText) fz=autoFitPx(v,cl,fz,cw,4);
        const scaleX=(cl.stretch||100)/100;
        const dispVal=e?`⚠ ${esc(e.substring(0,40))}`:esc(v);
        const autoFit=!!(cl.autoScale&&!cl.wrapText);
        const autoFitAttrs=autoFit?`data-autofit="1" data-sx="${scaleX}"`:"";
        const ovf=(cl.wrapText||cl.autoScale)?"clip":"ellipsis";
        const editing=!readOnly&&S._tblEdit&&S._tblEdit.id===o.id&&S._tblEdit.r===ri&&S._tblEdit.c===ci&&txMode(cl)==="static";
        const editAttrs=editing?`contenteditable="true" onmousedown="event.stopPropagation()" oninput="setTblCellText('${o.id}',${ri},${ci},this.innerText)" onblur="endTblCellEdit()" onkeydown="if(event.key==='Escape'){event.stopPropagation();this.blur()}"`:"";
        const pe=editing?"pointer-events:auto;outline:none;cursor:text;":"pointer-events:none;";
        inner+=`<div style="position:absolute;left:${cx0}px;top:${cy0}px;width:${cw}px;height:${chh}px;display:flex;align-items:${va};padding:0 2px;box-sizing:border-box;overflow:hidden">
          <div data-tbltxt="${o.id}:${ri},${ci}" ${autoFitAttrs} ${editAttrs} style="width:100%;font-family:'${cl.font||"Arial"}',Arial,sans-serif;font-size:${fz}px;font-weight:${cl.bold?700:400};font-style:${cl.italic?"italic":"normal"};text-decoration:${cl.underline?"underline":"none"};color:${e?"var(--red)":"#000"};white-space:${cl.wrapText?"normal":"nowrap"};word-break:${cl.wrapText?"break-word":"normal"};overflow:hidden;text-overflow:${ovf};line-height:1.15;letter-spacing:${cl.tracking?`${cl.tracking}px`:"normal"};text-align:${cl.al||"left"};transform:scaleX(${scaleX});transform-origin:left center;${pe}">${dispVal}</div>
        </div>`;
      }
      // Selected table: per-cell hit targets (cell select / context menu / column-header
      // drop), selected-cell highlight outlines, and 6px line-drag strips over each
      // INNER row/col boundary (col-resize / row-resize cursors).
      if(single&&!readOnly){
        for(let ri=0;ri<rows.length;ri++)for(let ci=0;ci<cols.length;ci++){
          if(rg.covered(ri,ci))continue;   // ONE hit div per merged region — it selects the anchor
          if(S._tblEdit&&S._tblEdit.id===o.id&&S._tblEdit.r===ri&&S._tblEdit.c===ci)continue;   // keep the caret clickable
          const ur=unionRect(ri,ci);
          const on=selCells.includes(ri+','+ci);
          const dropAttr=`ondragenter="onColTextEnter(event,this)" ondragover="event.preventDefault();if(event.dataTransfer)event.dataTransfer.dropEffect='copy'" ondragleave="onColTextLeave(this)" ondrop="onColTextLeave(this);onColDropToCell(event,'${o.id}',${ri},${ci})"`;
          inner+=`<div onmousedown="tblCellDown(event,'${o.id}',${ri},${ci})" oncontextmenu="tblCtxMenu(event,'${o.id}',${ri},${ci})" ${dropAttr} style="position:absolute;left:${ur[0]}px;top:${ur[1]}px;width:${ur[2]}px;height:${ur[3]}px;z-index:3;${on?"outline:2px solid var(--accent);outline-offset:-2px;background:rgba(108,142,245,0.14);":""}"></div>`;
        }
        for(let i=1;i<cols.length;i++) inner+=`<div onmousedown="startTblLineDrag(event,'${o.id}','col',${i})" oncontextmenu="tblStripCtx(event,'${o.id}')" title="Drag to resize columns" style="position:absolute;left:${(cumX[i-1]-3).toFixed(1)}px;top:0;width:6px;height:${h}px;cursor:col-resize;z-index:4"></div>`;
        for(let i=1;i<rows.length;i++) inner+=`<div onmousedown="startTblLineDrag(event,'${o.id}','row',${i})" oncontextmenu="tblStripCtx(event,'${o.id}')" title="Drag to resize rows" style="position:absolute;left:0;top:${(cumY[i-1]-3).toFixed(1)}px;width:${w}px;height:6px;cursor:row-resize;z-index:4"></div>`;
      }
      // lockSize hides the corner handles (the panel W/H inputs are read-only too).
      const rb=single&&!readOnly&&!o.lockSize?resizeHandles(o.id):"";
      return `<div data-obj="${o.id}" ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;cursor:${readOnly?"default":"move"};${rotCss}${ss}">${inner}${rotH}${rb}</div>`;
    }
    return"";
  }).join("");

  // Grid overlay — spans the whole canvas (printable + bleed), aligned so a
  // grid line falls on the printable origin.
  const gridLines=[];
  if(S.snapGrid){
    const gs=S.gridSize*sc;
    for(let gx=B%gs;gx<bw;gx+=gs) gridLines.push(`<line x1="${gx.toFixed(1)}" y1="0" x2="${gx.toFixed(1)}" y2="${bh}" stroke="rgba(108,142,245,0.18)" stroke-width="0.5"/>`);
    for(let gy=B%gs;gy<bh;gy+=gs) gridLines.push(`<line x1="0" y1="${gy.toFixed(1)}" x2="${bw}" y2="${gy.toFixed(1)}" stroke="rgba(108,142,245,0.18)" stroke-width="0.5"/>`);
  }
  const gridSvg=gridLines.length?`<svg style="position:absolute;top:0;left:0;width:${bw}px;height:${bh}px;pointer-events:none;z-index:0" width="${bw}" height="${bh}">${gridLines.join("")}</svg>`:"";

  // Snap indicator lines — drawn during drag only (offset into the bleed canvas).
  const snapSvgLines=(S._snapLines||[]).map(l=>{
    if(l.axis==='x'){
      const px=(l.pos*sc+B).toFixed(1);
      return '<line x1="'+px+'" y1="0" x2="'+px+'" y2="'+bh+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+px+'" cy="'+(bh/2)+'" r="3.5" fill="#FF4D6A"/>';
    }else{
      const py=(l.pos*sc+B).toFixed(1);
      return '<line x1="0" y1="'+py+'" x2="'+bw+'" y2="'+py+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+(bw/2)+'" cy="'+py+'" r="3.5" fill="#FF4D6A"/>';
    }
  }).join("");
  const snapSvg=snapSvgLines?'<svg style="position:absolute;top:0;left:0;width:'+bw+'px;height:'+bh+'px;pointer-events:none;z-index:5" width="'+bw+'" height="'+bh+'">'+snapSvgLines+'</svg>':"";


  // Canvas holds the printable area plus an invisible 2" positioning margin on
  // every side. Objects can overhang the printable edges into that margin; only
  // the printable area prints. The margin is not visually called out.
  const canvasDrop=readOnly?"":`ondragover="onCanvasDragOver(event)" ondragleave="onCanvasDragLeave(event)" ondrop="onColDropToCanvas(event)"`;
  return `<div style="display:flex;flex-direction:column;align-items:flex-start;flex-shrink:0">
    <div onmousedown="${readOnly?'':`if(event.target===this)startMarquee(event)`}" ${canvasDrop} style="width:${bw}px;height:${bh}px;background:transparent;position:relative;overflow:hidden;flex-shrink:0">
      <!-- Printable area (only this prints) -->
      <div id="printable-area" style="position:absolute;left:${B}px;top:${B}px;width:${pw}px;height:${ph}px;background:#fff;box-shadow:0 0 0 1.5px var(--accent);pointer-events:none"></div>
      ${marginsHtml}
      ${wrapZone}
      ${gridSvg}<div id="snap-guide-layer">${snapSvg}</div>${objsHtml}
    </div>
  </div>`;
}

// ── Object positioning (snap the whole object to a label edge/center) ──────────
// Distinct from text justification: this moves the selected object's box within
// the label's printable area.
function posObj(id,axis,where){
  const o=gobj(id); if(!o)return;
  snapshot();
  const W=S.spec.pw, H=S.spec.ph, w=o.w||0, h=o.h||0;
  const r=v=>Math.max(-BLEED_IN,Math.round(v*1000)/1000);
  if(axis==='h'){
    uobj(id,{x:r(where==='left'?0:where==='center'?(W-w)/2:W-w)});
  }else{
    uobj(id,{y:r(where==='top'?0:where==='middle'?(H-h)/2:H-h)});
  }
  R();
}

function posButtons(o){
  return `<div class="sec">Position object</div>
    <div style="margin-bottom:6px">
      <label class="lbl">Horizontal</label>
      <div style="display:flex;gap:3px">
        <button class="fmt-btn" title="Align to left edge" onclick="posObj('${o.id}','h','left')">⇤</button>
        <button class="fmt-btn" title="Center horizontally" onclick="posObj('${o.id}','h','center')">⇔</button>
        <button class="fmt-btn" title="Align to right edge" onclick="posObj('${o.id}','h','right')">⇥</button>
      </div>
    </div>
    <div style="margin-bottom:8px">
      <label class="lbl">Vertical</label>
      <div style="display:flex;gap:3px">
        <button class="fmt-btn" title="Align to top edge" onclick="posObj('${o.id}','v','top')">⤒</button>
        <button class="fmt-btn" title="Center vertically" onclick="posObj('${o.id}','v','middle')">⇕</button>
        <button class="fmt-btn" title="Align to bottom edge" onclick="posObj('${o.id}','v','bottom')">⤓</button>
      </div>
    </div>
    <div style="margin-bottom:8px">
      <label class="lbl">Rotation</label>
      <div style="display:flex;gap:4px;align-items:center">
        <button class="fmt-btn" title="Rotate 90° left" onclick="rotateObj('${o.id}',-90)">⟲</button>
        <button class="fmt-btn" title="Rotate 90° right" onclick="rotateObj('${o.id}',90)">⟳</button>
        <input type="number" class="inp" style="width:60px" step="1" value="${Math.round(o.rot||0)}" onchange="uobj('${o.id}',{rot:(((parseFloat(this.value)||0)%360)+360)%360});R()">
        <span style="color:var(--text2);font-size:11px">°</span>
      </div>
    </div>
    <hr class="divider">`;
}

function rotateObj(id,delta){
  const o=gobj(id);if(!o)return;
  snapshot();
  uobj(id,{rot:((((o.rot||0)+delta)%360)+360)%360});
  R();
}

// ── Anchor point (which corner/edge/center the X/Y refer to and that stays
// fixed when resizing) ─────────────────────────────────────────────────────────
function objAnchor(o){ return o.anchor||'tl'; }
function anchorFrac(a){
  const fx = a[1]==='l'?0 : a[1]==='c'?0.5 : 1;   // horizontal: l/c/r
  const fy = a[0]==='t'?0 : a[0]==='m'?0.5 : 1;   // vertical:   t/m/b
  return [fx,fy];
}
function setAnchor(id,a){ const o=gobj(id); if(!o)return; uobj(id,{anchor:a}); R(); }
// Set the anchor point's X or Y → reposition the top-left accordingly.
function setAnchorPos(id,axis,val){
  const o=gobj(id); if(!o||isNaN(val))return;
  const [fx,fy]=anchorFrac(objAnchor(o)); snapshot();
  if(axis==='x') uobj(id,{x:val-fx*(o.w||0)}); else uobj(id,{y:val-fy*(o.h||0)});
  R();
}
// Resize keeping the anchor point fixed (square types resize both; aspect-locked
// images keep ratio).
function setSizeAnchored(id,dim,val){
  const o=gobj(id); if(!o||isNaN(val)||val<=0)return;
  const [fx,fy]=anchorFrac(objAnchor(o)); snapshot();
  let nw=o.w, nh=o.h;
  if(dim==='w'){ nw=val; if(o.t==='ci'||o.t==='sy')nh=val; else if(o.t==='im'&&o.lockAspect!==false)nh=+(nw*((o.h/o.w)||1)).toFixed(4); }
  else { nh=val; if(o.t==='ci'||o.t==='sy')nw=val; else if(o.t==='im'&&o.lockAspect!==false)nw=+(nh/(((o.h/o.w))||1)).toFixed(4); }
  uobj(id,{x:o.x+fx*((o.w||0)-nw), y:o.y+fy*((o.h||0)-nh), w:nw, h:nh});
  R();
}
function anchorGrid(o){
  const cur=objAnchor(o);
  const codes=['tl','tc','tr','ml','mc','mr','bl','bc','br'];
  const dots=codes.map(c=>`<div onclick="setAnchor('${o.id}','${c}')" title="Anchor: ${c}" style="width:11px;height:11px;border-radius:50%;border:1.5px solid ${cur===c?'var(--accent)':'var(--text2)'};background:${cur===c?'var(--accent)':'transparent'};cursor:pointer"></div>`).join('');
  return `<div title="Anchor point — X/Y refer to this point, and it stays fixed when you resize" style="display:grid;grid-template-columns:repeat(3,11px);gap:6px;flex-shrink:0">${dots}</div>`;
}
// Position & size block with the anchor selector. Pass showWH:false for objects
// without an editable height (handled separately).
function posSizeBlock(o,showWH){
  const [fx,fy]=anchorFrac(objAnchor(o));
  const ax=((o.x||0)+fx*(o.w||0)).toFixed(3), ay=((o.y||0)+fy*(o.h||0)).toFixed(3);
  const xy=`<div style="flex:1;display:flex;flex-direction:column;gap:6px">
      <div><label class="lbl">X</label><input type="number" class="inp" step="0.01" value="${ax}" onchange="setAnchorPos('${o.id}','x',parseFloat(this.value))"></div>
      <div><label class="lbl">Y</label><input type="number" class="inp" step="0.005" value="${ay}" onchange="setAnchorPos('${o.id}','y',parseFloat(this.value))"></div>
    </div>`;
  const wh=showWH?`<div style="display:flex;gap:8px">
      <div style="flex:1"><label class="lbl">Width</label><input type="number" class="inp" step="0.01" value="${(+o.w||0).toFixed(3)}" onchange="setSizeAnchored('${o.id}','w',parseFloat(this.value))"></div>
      <div style="flex:1"><label class="lbl">Height</label><input type="number" class="inp" step="0.01" value="${(+o.h||0).toFixed(3)}" onchange="setSizeAnchored('${o.id}','h',parseFloat(this.value))"></div>
    </div>`:'';
  return `<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:8px">${anchorGrid(o)}${xy}</div>${wh}`;
}

// ── Properties panel ──────────────────────────────────────────────────────────
// Properties panel when 2+ objects are selected. Same-type selections expose the
// shared formatting controls; a field whose values differ across the selection
// shows "Multiple" and, once edited, applies the new value to every object.
function buildMultiProps(sels){
  const n=sels.length;
  const types=Array.from(new Set(sels.map(o=>o.t)));
  const head=`<div style="display:flex;flex-direction:column;gap:0">
    <div class="sec">${n} objects selected</div>
    <div style="color:var(--text3);font-size:10px;line-height:1.5;margin-bottom:8px">Drag or use the arrow keys to move them together.</div>`;
  const delBtn=`<hr class="divider"><button class="btn" onclick="delObj()" style="background:rgba(245,108,108,0.15);border-color:rgba(245,108,108,0.3);color:var(--red);padding:6px 0;font-size:11px">Delete ${n} objects</button></div>`;
  if(types.length>1){
    return head+`<div style="color:var(--text2);font-size:11px;line-height:1.5;margin-bottom:8px">Mixed object types — select objects of the same type to edit their formatting together.</div>`+delBtn;
  }
  const t=types[0];
  // Shared value across the selection: {multi:true} if values differ, else {v}.
  function sh(key,def){ let v=(sels[0][key]!=null?sels[0][key]:def); for(const o of sels){ const ov=(o[key]!=null?o[key]:def); if(ov!==v) return {multi:true}; } return {multi:false,v:v}; }
  function num(lbl,key,step,def,parse){ const s=sh(key,def); const pf=parse==='int'?'parseInt':'parseFloat'; return `<div style="margin-bottom:8px"><label class="lbl">${lbl}</label><input type="number" class="inp" step="${step}" ${s.multi?'value="" placeholder="Multiple"':'value="'+s.v+'"'} onchange="uobjAll({${key}:${pf}(this.value)})"></div>`; }
  function tog(key,lbl,inner){ const s=sh(key,false); const on=!s.multi&&s.v===true; return `<button class="fmt-btn${on?' on':''}" title="${lbl}${s.multi?' (mixed)':''}"${s.multi?' style="opacity:.6"':''} onclick="uobjAll({${key}:${on?'false':'true'}})">${inner}</button>`; }
  function btnset(key,def,opts){ const s=sh(key,def); return opts.map(([v,l,ti])=>`<button class="fmt-btn${!s.multi&&s.v===v?' on':''}" title="${ti||l}" onclick="uobjAll({${key}:'${v}'})">${l}</button>`).join(''); }
  function check(key,lbl,def){ const s=sh(key,def); return `<div style="margin-bottom:8px"><label class="lbl" style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${(!s.multi&&s.v===true)?'checked':''} onchange="uobjAll({${key}:this.checked})"> ${lbl}${s.multi?' <span style=\"color:var(--text3)\">(mixed)</span>':''}</label></div>`; }
  // (font picker is global now — see fontFieldHTML / openFontPicker near uobjAll)

  let body='';
  if(t==='tx'){
    const alOpts=[["left","⬅"],["center","☰"],["right","➡"],["justify","⬌"]];
    const vaOpts=[["top","⬆"],["middle","↕"],["bottom","⬇"]];
    body=`<div class="sec">Text formatting</div>
      ${fontFieldHTML()}
      ${num('Size (pt)','fs',1,16,'int')}
      <div style="margin-bottom:8px"><label class="lbl">Style</label><div style="display:flex;gap:3px">${tog('bold','Bold','<b>B</b>')}${tog('italic','Italic','<i>I</i>')}${tog('underline','Underline','<u>U</u>')}</div></div>
      <div style="margin-bottom:8px"><label class="lbl">Horizontal align</label><div style="display:flex;gap:3px">${btnset('al','left',alOpts)}</div></div>
      <div style="margin-bottom:8px"><label class="lbl">Vertical align</label><div style="display:flex;gap:3px">${btnset('valign','middle',vaOpts)}</div></div>
      ${check('wrapText','Wrap text',false)}
      ${check('autoScale','Auto-scale to fit (max size)',false)}
      ${num('Tracking (px)','tracking',0.5,0,'float')}
      ${num('Width stretch (%)','stretch',1,100,'float')}`;
  } else if(t==='ln'){
    body=`<div class="sec">Line</div>${num('Weight (px)','lw',1,1,'int')}`;
  } else if(t==='rc'){
    body=`<div class="sec">Rectangle</div>${num('Border (px)','lw',1,1,'int')}`;
  } else if(t==='ov'){
    body=`<div class="sec">Oval</div>${num('Border (px)','lw',1,1,'int')}`;
  } else if(t==='ci'){
    body=`<div class="sec">Circle</div>${num('Border (px)','lw',1,1,'int')}`;
  } else if(t==='ar'){
    body=`<div class="sec">Arrow</div>${num('Thickness (px)','lw',1,2,'int')}${num('Arrowhead size (px)','arrowSize',1,12,'float')}
      <div style="margin-bottom:8px"><label class="lbl">Heads</label><div style="display:flex;gap:3px">${tog('arrowStart','Arrowhead at start','◄ Start')}${tog('arrowEnd','Arrowhead at end','End ►')}</div></div>`;
  } else if(t==='im'){
    body=`<div class="sec">Image</div>${check('lockAspect','Lock aspect ratio',true)}`;
  } else if(t==='sy'){
    body=`<div class="sec">Symbol</div><div style="color:var(--text2);font-size:11px;margin-bottom:8px">Position the symbols together; size each individually.</div>`;
  }
  return head+body+delBtn;
}

// ── Render ────────────────────────────────────────────────────────────────────
// Coalesce rapid re-renders (e.g. drag/resize mousemove on a high-refresh
// trackpad fires faster than the display) into at most one R() per frame.
let _rafPending=false;
function scheduleR(){
  if(_rafPending)return;
  _rafPending=true;
  requestAnimationFrame(function(){ _rafPending=false; R(); });
}

// Rebuild ONLY the label canvas (objects + snap guides), not the whole window
// (record table / properties / toolbar). Used during resize/rotate gestures so
// they stay light; falls back to a full R() if the canvas host isn't present.
function renderCanvasOnly(){
  const host=document.getElementById("canvas-host");
  if(!host){ R(); return; }
  const rec=(window._editorRecords||RX)[S.recIdx];
  host.innerHTML=buildCanvas(S.spec,S.objs,S.selId,rec,S.wrap,false);
  fitAutoScaleText(host);   // shrink auto-scale text to real layout so nothing clips
  scheduleRulers();
}
let _rafCanvas=false;
function scheduleCanvas(){
  if(_rafCanvas)return;
  _rafCanvas=true;
  requestAnimationFrame(function(){ _rafCanvas=false; renderCanvasOnly(); });
}
// Center the label in the canvas viewport: scroll the canvas-scroll container to
// the middle of its overflow. When the canvas fits the viewport it's already
// flex-centered, so this is a no-op.
function centerCanvas(){
  const el=document.getElementById('canvas-scroll'); if(!el)return;
  el.scrollLeft=Math.max(0,(el.scrollWidth-el.clientWidth)/2);
  el.scrollTop=Math.max(0,(el.scrollHeight-el.clientHeight)/2);
}
// Center once the canvas container has actually been laid out AND its width has settled.
// With the multi-tab layout the webview is an AutoLayout subview whose width is 0 — or a
// transient intermediate value — for the first frame(s) on open/tab-activation. Checking
// only "clientWidth !== 0" would accept a wrong intermediate width and center against a
// stale scrollWidth, then never correct. So wait until the width is non-zero AND unchanged
// across two consecutive frames (AutoLayout settled) before centering. The frame cap bounds
// the wait to ~1/3 s worst case.
let _ccrLastW=-1;
function centerCanvasWhenReady(tries){
  const el=document.getElementById('canvas-scroll'); if(!el)return;
  const t=(tries||0);
  if(t===0)_ccrLastW=-1;                 // reset the stability tracker at the start of a request
  const w=el.clientWidth;
  if((w===0 || w!==_ccrLastW) && t<20){
    _ccrLastW=w;
    requestAnimationFrame(function(){ centerCanvasWhenReady(t+1); });
    return;
  }
  centerCanvas();
}

// Scroll preservation across full R() rebuilds: innerHTML wipes scrollTop/Left of
// every pane, so capture them before the rebuild and restore them after — otherwise
// every click jumps the canvas and resets the properties panel to the top. Callers
// that WANT to recenter the canvas instead (e.g. choosing a new supply) set
// _centerCanvasNext, which overrides the canvas restore with centerCanvas().
const _SCROLLERS=['canvas-scroll','props-pane','rec-panel','db-panel','vl-cols-menu-scroll'];
let _centerCanvasNext=false;
function _captureScroll(){
  const m={};
  for(const id of _SCROLLERS){ const el=document.getElementById(id); if(el) m[id]=[el.scrollLeft,el.scrollTop]; }
  return m;
}
function _restoreScroll(m){
  for(const id of _SCROLLERS){ const el=document.getElementById(id),s=m[id]; if(el&&s){ el.scrollLeft=s[0]; el.scrollTop=s[1]; } }
}

        <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;margin:2px -2px 0">
          ${S.objs.length===0?`<div style="color:var(--text3);font-size:10px;padding:6px 4px">No objects yet</div>`
            :S.objs.map(o=>{

        <!-- Left ruler + scrollable canvas -->

                 centers it when it fits — flex justify-center clips overflow, this
                 doesn't. The inner div scales the unscaled canvas from top-left. -->
            <div style="min-width:100%;min-height:100%;display:flex;padding:28px;box-sizing:border-box">

        <!-- Center "Records" navigator: Template Designer only. In custom mode the

        ${isCustomMode()?"":`

        <div id="rec-resizer" style="height:5px;cursor:row-resize;background:rgba(108,142,245,0.0);border-top:1px solid var(--bd3);flex-shrink:0" onmouseenter="this.style.background='rgba(108,142,245,0.25)'" onmouseleave="this.style.background='rgba(108,142,245,0)'" onmousedown="startRecResize(event)"></div>
        <!-- Record selector -->
        <div id="rec-panel" style="height:${S.recH||160}px;overflow:auto;background:var(--bg2);flex-shrink:0">
          <div style="position:relative;padding:5px 10px 4px;display:flex;align-items:center;gap:6px;border-top:1px solid var(--bd2);flex-shrink:0">
            <span style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1px">Records</span>
            <button class="btn" onclick="loadDesignerCSV()" style="padding:2px 8px;font-size:11px" title="${S._csvName||'No CSV loaded'}">${S._csvName?'📄 '+S._csvName.replace(/_export_\d{8}_\d{6}\.csv$/i,'').replace(/_/g,' ').slice(-24):'Load CSV…'}</button>
            <div style="flex:1"></div>

        <div onmousedown="startPropResize(event)" onmouseenter="this.style.background='rgba(108,142,245,0.35)'" onmouseleave="this.style.background='transparent'" title="Drag to resize the properties panel" style="position:absolute;left:-3px;top:0;bottom:0;width:8px;cursor:ew-resize;z-index:6;background:transparent;transition:background .12s"></div>
        ${buildProps()}
      </div>

    <!-- Bottom database panel (Custom Designer only) -->
    ${buildDatabasePanel()}

  const fx=document.getElementById("fxbar");
  if(fx&&S._ef!==undefined)fx.value=S._ef;

  // Focus the inline-editing text box (and place the caret at the end).
  if(S.editingId){
    const te=document.querySelector('[data-txt="'+S.editingId+'"]');
    if(te){
      te.focus();
      const r=document.createRange(); r.selectNodeContents(te); r.collapse(false);
      const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
    }
  }
  // Same for an inline-editing table CELL (caret at the end).
  if(S._tblEdit){
    const te=document.querySelector('[data-tbltxt="'+S._tblEdit.id+':'+S._tblEdit.r+','+S._tblEdit.c+'"]');
    if(te){
      te.focus();
      const r=document.createRange(); r.selectNodeContents(te); r.collapse(false);
      const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
    }
  }
  // Database-pane inline cell editor: re-focus across re-renders (custom mode).
  // Caret goes to the end so typing continues seamlessly.
  if(isCustomMode()&&S._dbEditCell){
    const ce=document.getElementById('db-cell-edit-input');
    if(ce){ ce.focus(); const n=ce.value.length; try{ce.setSelectionRange(n,n);}catch(_){} }
  }
  if(isCustomMode()&&S._dbHdrEdit){
    const he=document.getElementById('db-hdr-edit-input');
    if(he&&document.activeElement!==he){ he.focus(); const n=he.value.length; try{he.setSelectionRange(n,n);}catch(_){} }
  }
  // Free-edit mode: re-focus the floating cell editor across re-renders.
  if(window._fe&&window._fe.on&&window._fe.active){
    const fe=document.getElementById('fe-editor');
    if(fe&&document.activeElement!==fe){ fe.focus(); const n=fe.value.length; try{fe.setSelectionRange(n,n);}catch(_){} }
  }
  scheduleRulers();   // redraw the edge rulers to match the (re)laid-out canvas

  // Toolbar: standalone shows New/Open/Save; when editing a template for the
  // print window, show Cancel/Save As/Save & Return buttons instead.
  const tb=document.getElementById("ed-toolbar-btns");
  if(tb){
    if(window._printEdit){
      tb.innerHTML=`
        <button class="btn" onclick="edPrintCancel()" style="padding:4px 10px;color:var(--red);border-color:rgba(245,108,108,0.3)">✕ Cancel & Return</button>
        <button class="btn" onclick="edPrintSaveAs()" style="padding:4px 10px">Save As & Return</button>
        <button class="btn" onclick="edPrintSave()" style="background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600;padding:5px 14px">Save & Return</button>
      `;
    }else if(isCustomMode()){
      // Custom Designer: save the canvas + embedded data as a ".vlcus" document.
      // (New tab = the + in the tab bar, so no "New" button here.)
      tb.innerHTML=`
        <button class="btn" onclick="openCustomFile()" title="Open a VectorLabel label (.vlcus), or a Brady (.BWT) / Brother P-touch (.lbx) template — auto-converted" style="padding:4px 10px">Open…</button>
        <button class="btn" onclick="saveCustomDocument()" style="background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600;padding:5px 14px">Save Label…</button>
      `;
    }else{
      // Template Designer. (New tab = the + in the tab bar, so no "New" button here.)
      tb.innerHTML=`
        <button class="btn" onclick="openTemplate()" style="padding:4px 10px">Open…</button>
        <button class="btn" onclick="saveAsTemplate()" style="padding:4px 10px">Save as…</button>
        <button class="btn" onclick="saveTemplate()" style="background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600;padding:5px 14px">Save</button>
      `;
    }
  }

  // Apply column CSS variables for the editor record table
  applyEdColVars();

  // Restore the pane scroll positions wiped by the innerHTML rebuild — or recenter the
  // canvas if a caller asked for it (e.g. a new supply was selected). The canvas needs
  // a frame for the new size to lay out before centering.
  if(_centerCanvasNext){
    _centerCanvasNext=false;
    delete _savedScroll['canvas-scroll'];
    _restoreScroll(_savedScroll);
    requestAnimationFrame(function(){ centerCanvasWhenReady(0); });
  }else{
    _restoreScroll(_savedScroll);
  }

  // Shrink any auto-scale text to fit its real laid-out box (post-innerHTML).
  fitAutoScaleText(document.getElementById("canvas-host"));

  // Render modal if active
  renderModal();
}

  if(existing)existing.remove();
  if(!S.modal)return;

  const overlay=document.createElement("div");
  overlay.id="vl-modal";

  if(S.modal==="save"){
    overlay.innerHTML=`

        <div class="modal-title">Save Template</div>

          <label class="lbl">Template name</label>
          <input id="tpl-name-inp" class="inp" value="${S.tplName.replace(/"/g,'&quot;')}" style="font-size:14px;padding:6px 10px" oninput="validateTemplateName()">

          <label class="lbl">Label size</label>
          <select id="new-tpl-spec" class="inp">

        </div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn" onclick="newTemplate()" style="background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600">Create</button>
        </div>
      </div>`;
