// ── Custom Designer print header (Phase 2) ──────────────────────────────────────
// Shown ONLY in custom mode (window._designerMode==='custom'). Mirrors the Print
// window header: printer picker, cassette match/mismatch indicator, copies field,
// and a Print button (⌘Return). Single-label print of the current canvas.

// Swift injects the live printer list (updateDesignerPrinters) and detected
// cassettes (updateDesignerCassettes), the same JSON the print window consumes.
function updateDesignerPrinters(printers){
  window._dprinters=(printers||[]).map(p=>({
    id:p.id, name:p.name, model:p.model||"M6xx", status:p.status||"ready", serial:p.serial||""
  }));
  // Keep the current selection if still present; else pick a ready printer.
  if(!window._dprinters.find(p=>p.id===S.activePrinter)){
    S.activePrinter=(window._dprinters.find(p=>p.status==="ready")||window._dprinters[0]||{}).id||null;
  }
  if(isCustomMode())R();
}
function updateDesignerCassettes(map){
  window._dcassettes=map||{};
  if(isCustomMode())R();
}
function dPrinters(){ return window._dprinters||[]; }
function dPrinter(){ return dPrinters().find(p=>p.id===S.activePrinter)||{id:null,name:"",status:"offline"}; }
function dLoadedCassette(){ return (window._dcassettes||{})[S.activePrinter]||null; }

// Strip the model prefix so "BM-32-427" (catalog) matches "M6-32-427" (SmartCell).
// BM-109-427 is the bulk box for M6-33-427 — same supply. (Same logic as the
// print window's supplyCore.)
function dSupplyCore(pn){ let c=(pn||"").replace(/^[A-Za-z0-9]+-/,"").toUpperCase(); if(c==="109-427")c="33-427"; return c; }
function dCassetteSizeKnown(c){ return !!(c && typeof c.labelWidthMils==='number' && typeof c.labelHeightMils==='number'); }
// Whether the loaded cassette's real dimensions equal the template's label size,
// in either orientation (within ~0.1"). Mirrors the print window's sameLabelSize.
function dSameLabelSize(c,specN){
  if(!dCassetteSizeKnown(c))return false;
  const spec=BL.find(l=>l.n===specN)||BL.find(l=>dSupplyCore(l.n)===dSupplyCore(specN));
  if(!spec)return false;
  const tw=spec.tw*1000, th=spec.th*1000, cw=c.labelWidthMils, ch=c.labelHeightMils;
  const tol=100, close=(a,b)=>Math.abs(a-b)<=tol;
  return (close(cw,tw)&&close(ch,th))||(close(cw,th)&&close(ch,tw));
}
function dCassetteMatched(){ const c=dLoadedCassette(); return !!(c&&dCassetteSizeKnown(c)&&dSameLabelSize(c,S.spec.n)); }
function dCassetteMismatch(){ const c=dLoadedCassette(); return !!(c&&dCassetteSizeKnown(c)&&!dSameLabelSize(c,S.spec.n)); }
function dRequiredSupply(specN){ const core=dSupplyCore(specN); return core?"BM/M6-"+core:(specN||""); }
function dFmtIn(v){ return (v==null?"—":(+v).toString())+'"'; }
function dCanPrint(){ return !!(S.objs.length>0&&dPrinter().status==="ready"); }

// The custom-mode print header markup (returns "" in template mode so the
// Template Designer is untouched).
function buildCustomPrintHeader(){
  if(!isCustomMode())return "";
  const pr=dPrinter();
  const printers=dPrinters();
  const canPrint=dCanPrint();
  const copies=Math.max(1,S.copies||1);
  const dot=pr.status==="ready"?"var(--green)":pr.status==="busy"?"var(--warn)":"var(--red)";
  const statusLbl=pr.status==="ready"?"Ready":pr.status==="busy"?"Busy":"Offline";
  return`<div style="background:var(--surface);border-bottom:1px solid var(--bd2);padding:0 14px;display:flex;align-items:center;gap:12px;height:42px;flex-shrink:0">
    <span style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1px">Print</span>

    <!-- Printer picker -->
    <div style="position:relative">
      <select class="inp" style="width:210px;padding:5px 26px 5px 30px;appearance:none;-webkit-appearance:none;cursor:pointer" onchange="S.activePrinter=this.value;R()">
        ${printers.length===0
          ? `<option value="">No printers connected</option>`
          : printers.map(p=>`<option value="${p.id}"${S.activePrinter===p.id?" selected":""}>${(p.name||"")}${p.serial?" — "+p.serial:""}</option>`).join("")}
      </select>
      <div style="position:absolute;left:9px;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;background:${dot};pointer-events:none"></div>
      <div style="position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:9px;pointer-events:none">▼</div>
    </div>
    <span style="font-size:11px;color:${dot}">${statusLbl}</span>

    <!-- Cassette match / mismatch indicator -->
    <div style="display:flex;align-items:center;gap:7px">
      <span style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1px">Supply</span>
      <span style="color:var(--text2);font-size:11px;font-family:monospace" title="Required supply for ${S.spec.n}">${dRequiredSupply(S.spec.n)}</span>
      ${dCassetteMatched()?`<span title="Loaded cassette matches the required supply" style="color:var(--green);font-size:18px;line-height:1;font-weight:800">✓</span>`
        :dCassetteMismatch()?`<span title="Loaded ${dLoadedCassette().partNumber} doesn't match — the label may print misaligned or cropped" style="color:var(--red);font-size:12px;line-height:1;white-space:nowrap">⚠ mismatch</span>`:""}
    </div>

    <div style="flex:1"></div>

    <!-- Copies -->
    <div style="display:flex;align-items:center;gap:6px">
      <span style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:1px">Copies</span>
      <input type="number" class="inp" min="1" max="999" value="${copies}" style="width:58px;padding:4px 6px;font-size:12px" onchange="S.copies=Math.max(1,Math.min(999,parseInt(this.value)||1));R()">
    </div>

    <!-- Print button — ⌘Return -->
    <button class="btn primary" onclick="doCustomPrint()" style="padding:6px 20px;font-size:13px;display:flex;flex-direction:column;align-items:center;line-height:1.1;gap:1px"${canPrint?"":" disabled"}>
      <span>Print ${copies} label${copies!==1?"s":""}</span>
      <span style="font-size:9px;opacity:0.7;font-weight:400">⌘ Return</span>
    </button>
  </div>`;
}

// The record bound to the canvas right now — the previewed editor record, so
// field/formula text on the printed label matches what the user sees. Sent to
// Swift as a flat {col:value} object; Swift renders against it (or an empty
// record if absent → static text only).
function customPrintRecord(){
  const recs=window._editorRecords||RX;
  const rec=recs[S.recIdx];
  return rec?Object.assign({},rec):null;
}

// Render the current canvas as a single label and submit it to the print queue
// via Swift. Single-label this phase; "copies" repeats it.
function doCustomPrint(){
  if(!isCustomMode()||!dCanPrint())return;
  if(dCassetteMismatch()&&!S._printForce){ S.modal="confirmMismatch"; renderModal(); return; }
  S._printForce=false;
  const data=templateData();
  const payload={
    name:S.tplName||"Custom Label",
    specN:data.specN,
    objs:data.objs,
    copies:Math.max(1,S.copies||1),
    printerID:S.activePrinter||"",
    record:customPrintRecord()
  };
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"printCustom",payload});
  }
}
// Swift calls this once the job has been submitted to the queue.
function customPrintSubmitted(copies){
  showToast("Printing "+copies+" label"+(copies!==1?"s":""));
}

// ── Print-window edit mode ─────────────────────────────────────────────────────
// When the print window's "Edit" opens this designer, Swift calls initPrintEdit
// to load the template and show Save/Save As/Cancel & Return buttons.
function _vlPost(action,payload){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action,payload:payload===undefined?null:payload});
}
// Templates loaded from disk are UNTRUSTED (the user opens arbitrary .vlt.json,
// and any file dropped in the Templates folder auto-loads). Their object fields
// are interpolated into HTML attributes / inline handlers in this privileged
// WKWebView, so sanitize on every import: regenerate the id (so a crafted id can't
// break out of an attribute/onclick), whitelist the font, allow only an embedded
// data:image src (no javascript:/remote), and only a known symbol key.
function sanitizeObjs(objs){
  return (objs||[]).map(function(o){
    const c=Object.assign({},o);
    c.id=mid();
    if(typeof c.font==='string' && FONTS.indexOf(c.font)<0) c.font='Helvetica Neue';
    if(c.src!=null && !/^data:image\//i.test(String(c.src))) c.src='';
    if(c.sym!=null && !(String(c.sym) in SYMBOLS)) c.sym='';
    return c;
  });
}

function initPrintEdit(template){
  window._printEdit=true;
  if(template){
    S.tplName=template.name||"Untitled Template";
    S._loadedId=template.id||null;
    S.spec=BL.find(l=>l.n===template.specN)||BL[1];
    S.objs=sanitizeObjs(template.objs);
    S.selId=null;S._ef=undefined;S.modal=null;
  }
  R();
}
function edPrintCancel(){ _vlPost("editReturn",{save:false}); }
function edPrintSave(){
  const data=templateData();
  const payload={name:S.tplName,specN:data.specN,objs:data.objs};
  if(S._loadedId)payload.id=S._loadedId;
  // Single message: Swift saves THEN refreshes the print window (ordered).
  _vlPost("editReturn",{save:true,template:payload});
}
function edPrintSaveAs(){
  S._loadedId=null;               // save as a new template (fresh id/file)
  window._printReturnAfterSave=true;
  showModal('save');
}

// Save As (standalone): open the dialog to enter a new name → saves as a new template.
function saveAsTemplate(){ S._loadedId=null; showModal('save'); }

// Delete a template from the Open dialog (Swift confirms, deletes, refreshes list).
function deleteTemplateCard(i){
  const t=(S._loadedTemplates||[])[i];
  if(!t)return;
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"deleteTemplate",payload:{id:t.id,name:t.name}});
  }
}

// Filename validation: only letters, numbers, spaces, hyphens, underscores.
function templateNameBadChars(name){
  const bad=(name||"").replace(/[A-Za-z0-9 _\-]/g,"");
  return Array.from(new Set(bad.split(""))).join("");
}
function validateTemplateName(){
  const inp=document.getElementById("tpl-name-inp"); if(!inp)return false;
  const bad=templateNameBadChars(inp.value);
  const empty=!inp.value.trim();
  const err=document.getElementById("tpl-name-err");
  const btn=document.getElementById("tpl-save-btn");
  inp.style.borderColor = bad.length ? "var(--red)" : "";
  if(err){
    if(bad.length){ err.style.display="block"; err.textContent='Not allowed: '+bad+'   Use only letters, numbers, spaces, hyphens (-) and underscores (_).'; }
    else if(empty){ err.style.display="block"; err.textContent="Enter a template name."; }
    else { err.style.display="none"; }
  }
  const ok = !empty && bad.length===0;
  if(btn){ btn.disabled=!ok; btn.style.opacity=ok?"":"0.4"; btn.style.cursor=ok?"":"default"; }
  return ok;
}

async function saveTemplate(){
  const nameEl=document.getElementById("tpl-name-inp");
  if(nameEl && !validateTemplateName()) return;   // block invalid filenames
  if(nameEl)S.tplName=nameEl.value.trim()||"Untitled Template";
  const data=templateData();
  const json=JSON.stringify(data,null,2);
  const filename=(S.tplName.replace(/[^a-z0-9_\- ]/gi,"_")||"template")+".vlt.json";

  // Native app: persist via the Swift bridge to ~/Documents/VectorLabel/Templates/.
  // (WKWebView has no File System Access API, so the browser path below can't run.)
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    const payload={name:S.tplName,specN:data.specN,objs:data.objs};
    if(S._loadedId)payload.id=S._loadedId;
    // Save As & Return (print edit): one ordered message — save then return.
    if(window._printEdit&&window._printReturnAfterSave){
      window._printReturnAfterSave=false;
      S.modal=null;
      _vlPost("editReturn",{save:true,template:payload});
      return;
    }
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"saveTemplate",payload});
    S.modal=null;
    showToast("Saved: "+S.tplName);
    R();
    return;
  }

  // Use File System Access API if available (Chrome/Edge on Mac)
  if(window.showSaveFilePicker){
    try{
      const fh=await window.showSaveFilePicker({
        suggestedName:filename,
        startIn:"documents",
        types:[{description:"VectorLabel Template",accept:{"application/json":[".json",".vlt.json"]}}]
      });
      const writable=await fh.createWritable();
      await writable.write(json);
      await writable.close();
      S.modal=null;
      showToast("Saved: "+S.tplName);
      R();
      return;
    }catch(e){
      if(e.name==="AbortError"){S.modal=null;renderModal();return;}
    }
  }

  // Fallback: trigger download
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  S.modal=null;
  showToast("Downloaded: "+filename+" — move to ~/Documents/VectorLabel/Templates/");
  R();
}

function newTemplate(){
  const nameEl=document.getElementById("new-tpl-name");
  const specEl=document.getElementById("new-tpl-spec");
  const name=nameEl?nameEl.value.trim()||"Untitled Template":"Untitled Template";
  const specN=specEl?specEl.value:BL[1].n;
  snapshot();
  S.tplName=name;
  S._loadedId=null;   // new template → new file on save
  S.spec=BL.find(l=>l.n===specN)||BL[1];
  S.objs=[];
  S.selId=null;
  S._ef=undefined;
  S.modal=null;
  R();
  showToast("New template created");
}

async function openTemplate(){
  S._openSel=undefined;
  // Seed the picker with the templates folder (injected by Swift) and request a
  // fresh list so newly-saved templates appear.
  S._loadedTemplates=(window._folderTemplates||[]).slice();
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"listTemplates"});
  }
  S.modal="open";
  renderModal();
}

// Called by Swift with the contents of ~/Documents/VectorLabel/Templates/.
function initDesignerTemplates(templates){
  window._folderTemplates=(templates||[]).map(t=>({
    id:t.id, name:t.name||"Unnamed", specN:t.specN||"BM-32-427", objs:sanitizeObjs(t.objs)
  }));
  if(S.modal==="open"){
    S._loadedTemplates=window._folderTemplates.slice();
    renderModal();
  }
}

// Called by Swift after the user picks a file via the Finder browse panel.
function addBrowsedTemplate(t){
  if(!t||!t.objs)return;
  S._loadedTemplates=S._loadedTemplates||[];
  const existing=S._loadedTemplates.findIndex(x=>x.name===t.name);
  if(existing>=0)S._loadedTemplates[existing]=t; else S._loadedTemplates.push(t);
  S._openSel=S._loadedTemplates.length-1;
  if(S.modal!=="open")S.modal="open";
  renderModal();
}

async function pickTemplateFile(){
  // Native app: open Finder via Swift to discover templates in other folders.
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"browseTemplate"});
    return;
  }
  if(window.showOpenFilePicker){
    try{
      const [fh]=await window.showOpenFilePicker({
        startIn:"documents",
        types:[{description:"VectorLabel Template",accept:{"application/json":[".json",".vlt.json"]}}],
        multiple:false
      });
      const file=await fh.getFile();
      const text=await file.text();
      const data=JSON.parse(text);
      if(!data.objs)throw new Error("Not a VectorLabel template");
      S._loadedTemplates=S._loadedTemplates||[];
      // Avoid duplicates by name
      const existing=S._loadedTemplates.findIndex(t=>t.name===data.name);
      if(existing>=0)S._loadedTemplates[existing]=data;
      else S._loadedTemplates.push(data);
      S._openSel=S._loadedTemplates.length-1;
      renderModal();
    }catch(e){
      if(e.name!=="AbortError")showToast("Error: "+e.message);
    }
  }else{
    // Fallback file input
    const inp=document.createElement("input");
    inp.type="file";inp.accept=".json,.vlt.json";
    inp.onchange=async()=>{
      const file=inp.files[0];if(!file)return;
      const text=await file.text();
      try{
        const data=JSON.parse(text);
        if(!data.objs)throw new Error("Not a VectorLabel template");
        S._loadedTemplates=S._loadedTemplates||[];
        S._loadedTemplates.push(data);
        S._openSel=S._loadedTemplates.length-1;
        renderModal();
      }catch(e){showToast("Error: "+e.message);}
    };
    inp.click();
  }
}

function loadSelectedTemplate(){
  const templates=S._loadedTemplates||[];
  const t=templates[S._openSel];
  if(!t)return;
  snapshot();
  S.tplName=t.name||"Untitled Template";
  S._loadedId=t.id||null;   // preserve id so a later Save overwrites in place
  S.spec=BL.find(l=>l.n===t.specN)||BL[1];
  S.objs=JSON.parse(JSON.stringify(t.objs));
  S.selId=null;S._ef=undefined;
  S.modal=null;
  R();
  showToast("Opened: "+S.tplName);
}

// ── Toast notifications ───────────────────────────────────────────────────────
function showToast(msg){
  let t=document.getElementById("vl-toast");
  if(!t){t=document.createElement("div");t.id="vl-toast";
    Object.assign(t.style,{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",
      background:"var(--surface3)",border:"1px solid rgba(108,142,245,0.4)",color:"var(--text)",
      borderRadius:"6px",padding:"8px 18px",fontSize:"12px",zIndex:"2000",
      boxShadow:"0 4px 20px rgba(0,0,0,0.5)",transition:"opacity 0.3s",pointerEvents:"none"});
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity="0";},2800);
}

// Close modal on Escape
document.addEventListener("keydown",function(e2){
  if(e2.key==="Escape"&&S.modal){closeModal();}
},true);

// ── CSV loading for standalone designer ───────────────────────────────────────

// Fallback CSV parser for the standalone (no-Swift-bridge) case. In the shipping
// app the native bridge supplies parsed records, so this isn't used — but it must
// not diverge from the Swift RFC-4180 parser: a newline inside a quoted field is
// data, "" is an escaped quote, short rows are padded (never dropped).
function parseCSV(text){
  const rows=[]; let rec=[], field="", inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQ=false; }
      else field+=c;
    } else if(c==='"'){ inQ=true; }
    else if(c===','){ rec.push(field); field=""; }
    else if(c==='\n'||c==='\r'){
      if(c==='\r'&&text[i+1]==='\n') i++;
      rec.push(field); field="";
      if(!(rec.length===1&&rec[0]==="")) rows.push(rec);
      rec=[];
    } else field+=c;
  }
  if(field!==""||rec.length){ rec.push(field); if(!(rec.length===1&&rec[0]==="")) rows.push(rec); }
  if(rows.length<2) return [];
  const headers=rows[0];
  return rows.slice(1).map(vals=>{ const row={}; headers.forEach((h,i)=>row[h]=vals[i]!=null?vals[i]:""); return row; });
}

async function loadDesignerCSV(){
  // Native app: open a Finder panel pointed at the Exports folder via Swift.
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"browseDataSource"});
    return;
  }
  if(window.showOpenFilePicker){
    try{
      const [fh]=await window.showOpenFilePicker({
        startIn:"documents",
        types:[{description:"VectorLabel CSV Export",accept:{"text/csv":[".csv"]}}]
      });
      const file=await fh.getFile();
      const rows=parseCSV(await file.text());
      if(rows.length>0){
        RX=rows;
        S.recIdx=0;
        S._csvName=file.name;
        R();
        showToast("Loaded: "+file.name+" ("+rows.length+" records)");
      }
    }catch(e){if(e.name!=="AbortError")showToast("Error: "+e.message);}
  }else{
    const inp=document.createElement("input");inp.type="file";inp.accept=".csv";
    inp.onchange=async()=>{
      const file=inp.files[0];if(!file)return;
      const rows=parseCSV(await file.text());
      if(rows.length>0){RX=rows;S.recIdx=0;S._csvName=file.name;R();showToast("Loaded: "+file.name);}
    };
    inp.click();
  }
}

// Auto-load most recent CSV from ~/Documents/VectorLabel/Exports/ with 10+ records.
// In the browser this isn't possible without a file picker; in the Swift WKWebView
// the app calls initDesignerRecords(records, filename) before the page renders.
// We expose this function so Swift can call it.
function initDesignerRecords(records, filename){
  if(!records||!records.length)return;
  RX=records;
  S.recIdx=0;
  S._csvName=filename||"";
  R();
}
