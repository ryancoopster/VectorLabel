<style>
*{box-sizing:border-box;margin:0;padding:0}

.btn.danger{background:rgba(245,108,108,0.15);border-color:rgba(245,108,108,0.3);color:#f56c6c}

.tag.dst{background:rgba(108,200,150,0.2);color:#5cc896}
label.lbl{font-size:10px;color:#8888a8;display:block;margin-bottom:3px}
.divider{border:none;border-top:1px solid rgba(255,255,255,0.07);margin:12px 0}

.modal-title{font-size:15px;font-weight:600;margin-bottom:16px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.07)}
.rec-row{display:grid;grid-template-columns:var(--col-cb) var(--col-pair) var(--col-num) var(--col-side) var(--col-number) var(--col-cable) var(--col-signal) var(--col-device) var(--col-socket);align-items:center;gap:0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;min-height:36px}
.rec-row:hover{background:rgba(108,142,245,0.06)}

.col-resizer{position:absolute;right:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:5;display:flex;align-items:center;justify-content:center}
.col-resizer:hover::after,.col-resizer.dragging::after{content:'';position:absolute;width:2px;top:4px;bottom:4px;background:#6C8EF5;border-radius:1px}
.rec-hdr-cell{position:relative;padding:6px 8px;font-size:10px;color:#44445a;font-weight:600;text-transform:uppercase;letter-spacing:.5px;overflow:hidden;white-space:nowrap;user-select:none}

<body>
<div id="app" style="display:flex;flex-direction:column;height:100vh"></div>
<script>
// ── Field definitions ─────────────────────────────────────────────────────────
const FD=[
  {f:"Number",c:"Number"},{f:"Cable Name",c:"Cable"},{f:"Signal",c:"Signal"},
  {f:"Connector",c:"Connector"},{f:"Device Name",c:"Device_Name"},
  {f:"Socket Name",c:"Socket_Name"},{f:"Other Device",c:"Other_Device"},
  {f:"Other Socket",c:"Other_Socket"},{f:"Rack",c:"Rack"},{f:"Room",c:"Room"}
];

// ── Formula engine (same as designer) ────────────────────────────────────────
function tokenize(expr){
  const t=[];let i=0;
  while(i<expr.length){
    if(/\s/.test(expr[i])){i++;continue;}
    if(expr[i]==='"'){let j=i+1,s="";while(j<expr.length&&expr[j]!=='"')s+=expr[j++];t.push({k:"s",v:s});i=j+1;continue;}
    if(/\d/.test(expr[i])){let j=i;while(j<expr.length&&/[\d.]/.test(expr[j]))j++;t.push({k:"n",v:parseFloat(expr.slice(i,j))});i=j;continue;}
    if(expr[i]==='&'){t.push({k:"a"});i++;continue;}
    if(expr[i]==='<'&&expr[i+1]==='>'){t.push({k:"ne"});i+=2;continue;}
    if(expr[i]==='='){t.push({k:"eq"});i++;continue;}
    if(expr[i]===','){t.push({k:"cm"});i++;continue;}
    if(expr[i]==='('){t.push({k:"lp"});i++;continue;}
    if(expr[i]===')'){t.push({k:"rp"});i++;continue;}
    if(/[A-Za-z_]/.test(expr[i])){let j=i;while(j<expr.length&&/[A-Za-z0-9_ ]/.test(expr[j]))j++;t.push({k:"id",v:expr.slice(i,j).trimEnd()});i=j;continue;}
    i++;
  }
  return t;
}
function evalToks(toks,vars){
  let p=0;const pk=()=>toks[p],cs=()=>toks[p++];
  function rv(n){if(n in vars)return vars[n];const f=FD.find(x=>x.f.toLowerCase()===n.toLowerCase()||x.c.toLowerCase()===n.toLowerCase());return f?(vars[f.c]??""):n;}
  function pp(){
    const t=pk();if(!t)return"";
    if(t.k==="s"){cs();return t.v;}if(t.k==="n"){cs();return t.v;}
    if(t.k==="id"){
      const name=t.v;cs();
      if(pk()?.k==="lp"){cs();const args=[];while(pk()&&pk().k!=="rp"){args.push(pe());if(pk()?.k==="cm")cs();}cs();
        const fn=name.toUpperCase();
        if(fn==="IF")return args[0]?(args[1]??""):(args[2]??"");
        if(fn==="LEFT")return String(args[0]??"").slice(0,args[1]??1);
        if(fn==="RIGHT"){const s=String(args[0]??"");return s.slice(s.length-(args[1]??1));}
        if(fn==="LEN")return String(args[0]??"").length;
        if(fn==="UPPER")return String(args[0]??"").toUpperCase();
        if(fn==="LOWER")return String(args[0]??"").toLowerCase();
        if(fn==="TRIM")return String(args[0]??"").trim();
        if(fn==="MID")return String(args[0]??"").slice((args[1]??1)-1,((args[1]??1)-1)+(args[2]??1));
        return"";}
      if(pk()?.k==="ne"||pk()?.k==="eq"){const op=cs().k;const r=pp();const l=rv(name);return op==="ne"?l!==String(r):l===String(r);}
      return rv(name);}
    if(t.k==="lp"){cs();const v=pe();if(pk()?.k==="rp")cs();return v;}
    cs();return"";
  }
  function pe(){let l=pp();while(pk()?.k==="a"){cs();l=String(l??"")+String(pp()??"");}return l;}
  return pe();
}
function evalF(formula,rec){
  if(!formula?.trim())return{v:"",e:null};
  if(!formula.startsWith("="))return{v:formula,e:null};
  const m={};FD.forEach(f=>{m[f.f]=rec[f.c]??"";m[f.c]=rec[f.c]??""});
  try{return{v:String(evalToks(tokenize(formula.slice(1)),m)??""),e:null};}
  catch(err){return{v:"",e:err.message};}
}

// ── Label preview renderer ────────────────────────────────────────────────────
const BL=[
  {n:"BM-31-427",tw:1,th:1.5,pw:1,ph:.5,lb:'BM-31-427 — 1"×1.5"'},
  {n:"BM-32-427",tw:1.5,th:1.5,pw:1.5,ph:.5,lb:'BM-32-427 — 1.5"×1.5"'},
  {n:"BM-33-427",tw:4,th:1.5,pw:1.5,ph:1.5,lb:'BM-33-427 — 4"×1.5" (1.5" printable)'}
];
const SC=185;
// Objects may be positioned up to this many inches beyond the printable area on
// any side; only the printable area prints. (Mirrors the standalone designer.)
const BLEED_IN=2;

function renderLabel(tpl,rec,scale=1){
  const spec=BL.find(l=>l.n===tpl.specN)||BL[1];
  const pw=spec.pw*SC*scale,ph=spec.ph*SC*scale;
  const sc=SC*scale;
  const objs=(tpl.objs||[]).map(o=>{
    const x=o.x*sc,y=o.y*sc,w=(o.w||1)*sc,h=(o.h||0)*sc;
    const rc=o.rot?`transform:rotate(${o.rot}deg);transform-origin:center center;`:"";
    if(o.t==="tx"){
      const {v,e}=rec?evalF(o.f,rec):{v:"",e:null};
      const fz=Math.max(5,(o.fs||14)*(sc/100));
      const jc=o.al==="center"?"center":o.al==="right"?"flex-end":"flex-start";
      const va=o.valign==="top"?"flex-start":o.valign==="bottom"?"flex-end":"center";
      const fw=o.bold?700:400;
      const fs=o.italic?"italic":"normal";
      const td=o.underline?"underline":"none";
      const ws=o.wrapText?"normal":"nowrap";
      const sx=(o.stretch||100)/100;
      const col=e?"#f56c6c":"#000";
      const txt=(e?`⚠`:v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      return `<div style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${Math.max(h,8)}px;${rc}overflow:hidden;display:flex;align-items:${va};padding:0 1px;box-sizing:border-box">
        <div style="width:100%;font-family:'${o.font||"Helvetica Neue"}',Arial,sans-serif;font-size:${fz}px;font-weight:${fw};font-style:${fs};text-decoration:${td};color:${col};white-space:${ws};overflow:hidden;text-overflow:ellipsis;line-height:1.15;text-align:${o.al||"left"};transform:scaleX(${sx});transform-origin:left center">${txt}</div>
      </div>`;
    }
    if(o.t==="ln")return`<div style="position:absolute;left:${x}px;top:${y}px;width:${(o.w||1)*sc}px;height:${Math.max(1,o.lw||1)}px;background:#000;${rc}"></div>`;
    if(o.t==="rc")return`<div style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;border:${o.lw||1}px solid #000;background:transparent;${rc}"></div>`;
    return"";
  }).join("");
  return`<div style="width:${pw}px;height:${ph}px;background:#fff;border:1.5px solid rgba(255,255,255,0.15);border-radius:2px;position:relative;overflow:hidden;flex-shrink:0">${objs}</div>`;
}

// ── Sample data ───────────────────────────────────────────────────────────────
const SAMPLE_CSV=[
  {_Side:"Source",Number:"N044",Cable:"RIO 1 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"SWITCH 6.01",Socket_Name:"LAN 1",Other_Device:"IO 1.01",Other_Socket:"DANTE PRI",Other_Connector:"EC-6A",Rack:"",Room:""},
  {_Side:"Destination",Number:"N044",Cable:"RIO 1 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"IO 1.01",Socket_Name:"DANTE PRI",Other_Device:"SWITCH 6.01",Other_Socket:"LAN 1",Other_Connector:"EC-6A",Rack:"RIO RACK",Room:"PORTABLE"},
  {_Side:"Source",Number:"N045",Cable:"RIO 2 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"SWITCH 6.01",Socket_Name:"LAN 2",Other_Device:"IO 1.02",Other_Socket:"DANTE PRI",Other_Connector:"EC-6A",Rack:"",Room:""},
  {_Side:"Destination",Number:"N045",Cable:"RIO 2 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"IO 1.02",Socket_Name:"DANTE PRI",Other_Device:"SWITCH 6.01",Other_Socket:"LAN 2",Other_Connector:"EC-6A",Rack:"RIO RACK",Room:"PORTABLE"},
  {_Side:"Source",Number:"N046",Cable:"RIO 3 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"SWITCH 6.01",Socket_Name:"LAN 3",Other_Device:"IO 1.03",Other_Socket:"DANTE PRI",Other_Connector:"EC-6A",Rack:"",Room:""},
  {_Side:"Destination",Number:"N046",Cable:"RIO 3 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"IO 1.03",Socket_Name:"DANTE PRI",Other_Device:"SWITCH 6.01",Other_Socket:"LAN 3",Other_Connector:"EC-6A",Rack:"RIO RACK",Room:"PORTABLE"},
  {_Side:"Source",Number:"N030",Cable:"",Signal:"LAN",Connector:"EC-6A",Device_Name:"AMP ROOM B",Socket_Name:"C6-8",Other_Device:"SL",Other_Socket:"6A-8",Other_Connector:"EC-6A",Rack:"",Room:""},
  {_Side:"Destination",Number:"N030",Cable:"",Signal:"LAN",Connector:"EC-6A",Device_Name:"SL",Socket_Name:"6A-8",Other_Device:"AMP ROOM B",Other_Socket:"C6-8",Other_Connector:"EC-6A",Rack:"",Room:"AMP ROOM"},
];

// Sample template (matches designer format)
const SAMPLE_TPL={
  name:"Standard Wire Label",
  specN:"BM-32-427",
  objs:[
    {id:"st1",t:"tx",x:.02,y:.03,w:.44,h:.28,f:'=IF(Connector<>"",Connector,"")',al:"left",valign:"middle",fs:15,bold:false,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100},
    {id:"st2",t:"tx",x:.62,y:.03,w:.36,h:.28,f:'=IF(Rack<>"",Rack,"")',al:"right",valign:"middle",fs:15,bold:false,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100},
    {id:"st3",t:"tx",x:.02,y:.08,w:.96,h:.34,f:'=IF(Number<>"",Number&IF(Cable<>""," - "&Cable,""),IF(Cable<>"",Cable,""))',al:"center",valign:"middle",fs:19,bold:true,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100},
    {id:"st4",t:"ln",x:0,y:.44,w:1,h:0,lw:1},
    {id:"st5",t:"tx",x:.02,y:.47,w:.96,h:.24,f:'=IF(Other_Device<>"","@ "&Other_Device&IF(Other_Socket<>""," : "&Other_Socket,""),"")',al:"center",valign:"middle",fs:12,bold:false,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100}
  ]
};

// ── Column widths — Print screen ──────────────────────────────────────────────
const COL_DEFAULTS={side:90,number:72,cable:140,signal:72,device:160,socket:140};
let COLS=(()=>{
  try{const s=localStorage.getItem('vl-col-widths');if(s)return Object.assign({},COL_DEFAULTS,JSON.parse(s));}catch(e){}
  return Object.assign({},COL_DEFAULTS);
})();
function saveCols(){try{localStorage.setItem('vl-col-widths',JSON.stringify(COLS));}catch(e){}}
function applyColVars(){
  const r=document.documentElement;
  r.style.setProperty('--col-cb','28px');
  r.style.setProperty('--col-pair','28px');
  r.style.setProperty('--col-num','36px');
  r.style.setProperty('--col-side',COLS.side+'px');
  r.style.setProperty('--col-number',COLS.number+'px');
  r.style.setProperty('--col-cable',COLS.cable+'px');
  r.style.setProperty('--col-signal',COLS.signal+'px');
  r.style.setProperty('--col-device',COLS.device+'px');
  r.style.setProperty('--col-socket',COLS.socket+'px');
}
function startColResize(e,col){
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget;el.classList.add('dragging');
  const startX=e.clientX,startW=COLS[col];
  function mv(e){COLS[col]=Math.max(40,startW+(e.clientX-startX));applyColVars();}
  function mu(){el.classList.remove('dragging');saveCols();window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',mu);}
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',mu);
}

// ── Shared record-column system (order, visibility, widths) ────────────────────
// order/hidden/widths are shared with the designer via Swift and applied with
// applyColumnConfig().
function currentRecords(){ return window._editorRecords||(typeof P!=='undefined'&&P.records&&P.records.length?P.records:RX); }
const DEFAULT_COL_W=120;
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function recordColumns(records){
  const present=[];
  records.forEach(r=>Object.keys(r).forEach(k=>{ if(!present.includes(k)) present.push(k); }));
  const out=(window._columnOrder||[]).filter(k=>present.includes(k));
  ['_Side','Number','Cable','Signal','Device_Name','Socket_Name'].forEach(k=>{ if(present.includes(k)&&!out.includes(k)) out.push(k); });
  present.forEach(k=>{ if(!out.includes(k)) out.push(k); });
  return out;
}
function colLabel(k){ return k==='_Side'?'Side':k.replace(/_/g,' '); }
function visibleColumns(records){ const h=window._hiddenColumns||[]; return recordColumns(records).filter(c=>!h.includes(c)); }
function colWidth(c){ const w=window._colWidths&&window._colWidths[c]; return (typeof w==='number'&&w>0)?w:DEFAULT_COL_W; }
function colGridTemplate(cols){ return cols.map(c=>colWidth(c)+'px').join(' '); }

function applyColumnConfig(cfg){
  if(!cfg)return;
  if(Array.isArray(cfg.order)) window._columnOrder=cfg.order;
  if(Array.isArray(cfg.hidden)) window._hiddenColumns=cfg.hidden;
  if(cfg.widths&&typeof cfg.widths==='object') window._colWidths=cfg.widths;
  R();
}
function postColumnConfig(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel)
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"setColumnConfig",payload:{
      order:window._columnOrder||[], hidden:window._hiddenColumns||[], widths:window._colWidths||{} }});
}

// ── Filtering ───────────────────────────────────────────────────────────────
// Operators offered in the filter builder.
const FILTER_OPS=[
  {op:"contains",label:"Contains"},
  {op:"not_contains",label:"Does not contain"},
  {op:"is",label:"Is exactly"},
  {op:"is_not",label:"Is not"},
  {op:"eq",label:"="},
  {op:"ne",label:"≠"},
  {op:"gt",label:">"},
  {op:"gte",label:"≥"},
  {op:"lt",label:"<"},
  {op:"lte",label:"≤"},
  {op:"empty",label:"Is empty"},
  {op:"not_empty",label:"Is not empty"},
];
function opNeedsValue(op){ return op!=="empty"&&op!=="not_empty"; }

// Evaluate one rule against a record.
function ruleMatches(rec,rule){
  if(!rule||!rule.field)return true;
  const a=(rec[rule.field]==null?"":String(rec[rule.field]));
  const b=opNeedsValue(rule.op)
    ? (rule.valueType==="field" ? (rec[rule.value]==null?"":String(rec[rule.value])) : String(rule.value==null?"":rule.value))
    : "";
  const al=a.toLowerCase(), bl=b.toLowerCase();
  const an=parseFloat(a), bn=parseFloat(b), nums=isFinite(an)&&isFinite(bn);
  switch(rule.op){
    case "contains":     return al.includes(bl);
    case "not_contains": return !al.includes(bl);
    case "is":           return al===bl;
    case "is_not":       return al!==bl;
    case "eq":           return nums?an===bn:a===b;
    case "ne":           return nums?an!==bn:a!==b;
    case "gt":           return nums?an>bn:a>b;
    case "gte":          return nums?an>=bn:a>=b;
    case "lt":           return nums?an<bn:a<b;
    case "lte":          return nums?an<=bn:a<=b;
    case "empty":        return a==="";
    case "not_empty":    return a!=="";
  }
  return true;
}

// A rule is "ready" when it has a field, an op, and (if needed) a value.
function ruleReady(r){
  if(!r||!r.field||!r.op)return false;
  if(!opNeedsValue(r.op))return true;
  return r.value!==undefined&&r.value!=="";
}

function groupReady(g){ return !!(g&&(g.rules||[]).some(ruleReady)); }

// Evaluate one group: its ready rules combined left-to-right via the group's
// connectors (default AND).
function groupMatches(rec,g){
  const rules=(g.rules||[]).filter(ruleReady);
  if(!rules.length)return true;
  let res=ruleMatches(rec,rules[0]);
  for(let k=1;k<rules.length;k++){
    const c=(g.connectors&&g.connectors[k-1])||"and";
    res = c==="or" ? (res||ruleMatches(rec,rules[k])) : (res&&ruleMatches(rec,rules[k]));
  }
  return res;
}

// Normalise the old flat {rules,connectors} shape into {groups,groupConnectors}.
function filterGroups(f){
  if(!f)return [];
  if(Array.isArray(f.groups))return f.groups;
  if(Array.isArray(f.rules))return [{rules:f.rules,connectors:f.connectors||[]}];
  return [];
}

// Combine group results left-to-right via the group connectors (default OR).
function recordMatchesFilter(rec,f){
  const groups=filterGroups(f).filter(groupReady);
  if(!groups.length)return true;
  let res=groupMatches(rec,groups[0]);
  for(let k=1;k<groups.length;k++){
    const c=(f.groupConnectors&&f.groupConnectors[k-1])||"or";
    res = c==="and" ? (res&&groupMatches(rec,groups[k])) : (res||groupMatches(rec,groups[k]));
  }
  return res;
}

function filterActive(){ return filterGroups(P.filter).some(groupReady); }

// Does record i pass the active filter? With showBothSides, a row also passes
// when its Source/Destination partner matches.
function passesFilter(i){
  if(!filterActive())return true;
  if(recordMatchesFilter(P.records[i],P.filter))return true;
  if(P.filter.showBothSides){ const j=pairIdx(i); if(j!=null&&recordMatchesFilter(P.records[j],P.filter))return true; }
  return false;
}

// Absolute indices of records currently shown (filter applied).
function visibleIndices(){
  const all=P.records.map((_,i)=>i);
  return filterActive()?all.filter(passesFilter):all;
}

// Human-readable summary of the active filter for the table header.
function ruleSummary(r){
  const opl=(FILTER_OPS.find(o=>o.op===r.op)||{}).label||r.op;
  const val=opNeedsValue(r.op)?(r.valueType==="field"?("["+colLabel(r.value)+"]"):('"'+r.value+'"')):"";
  return colLabel(r.field)+" "+opl+(val?" "+val:"");
}
function filterSummary(){
  if(!filterActive())return "";
  const groups=filterGroups(P.filter).filter(groupReady);
  const groupStrs=groups.map(g=>{
    const rules=g.rules.filter(ruleReady);
    const parts=rules.map((r,k)=>(k>0?((g.connectors[k-1]||"and").toUpperCase()+" "):"")+ruleSummary(r));
    const inner=parts.join(" ");
    return groups.length>1?("("+inner+")"):inner;
  });
  let out=groupStrs[0]||"";
  for(let k=1;k<groupStrs.length;k++){
    out+=" "+((P.filter.groupConnectors&&P.filter.groupConnectors[k-1])||"or").toUpperCase()+" "+groupStrs[k];
  }
  return out;
}

// ── Filter dialog ─────────────────────────────────────────────────────────────
// Rendered as a standalone overlay on <body> (not inside #app) so the live R()

// is {groups:[{rules,connectors}], groupConnectors:[], showBothSides}. Rules
// within a group combine with AND/OR; groups combine with AND/OR.
function newFilterRule(){
  const cols=recordColumns(currentRecords());
  return {field:cols[0]||"",op:"contains",valueType:"text",value:""};
}
function newFilterGroup(){ return {rules:[newFilterRule()],connectors:[]}; }
function openFilterModal(){
  if(P.filter){
    const d=JSON.parse(JSON.stringify(P.filter));
    // Migrate legacy flat shape → groups.
    if(!Array.isArray(d.groups)) d.groups=[{rules:d.rules||[newFilterRule()],connectors:d.connectors||[]}];
    if(!Array.isArray(d.groupConnectors)) d.groupConnectors=[];
    delete d.rules; delete d.connectors;
    P._filterDraft=d;
  }else{
    P._filterDraft={groups:[newFilterGroup()],groupConnectors:[],showBothSides:false};
  }
  P._filterDraft.groups.forEach(g=>{ if(!g.rules||!g.rules.length)g.rules=[newFilterRule()]; if(!Array.isArray(g.connectors))g.connectors=[]; });

}

}

// Persist (or clear) the currently selected template as the print window's
// default. The checkbox is a momentary action — it always renders unchecked on
// reopen, but the chosen default itself persists (stored in AppSettings).
function toggleDefaultTemplate(checked){
  P._makeDefaultChecked=checked;
  const t=tpl();
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({
      action:"setDefaultTemplate",
      payload: (checked&&t) ? {id:t.id,name:t.name} : null
    });
  }
}

// ── Loaded cassette (SmartCell) detection ──────────────────────────────────────
// window._cassettes maps printerID -> {partNumber, supplyRemainingPct, ...}.
function loadedCassette(){ return (window._cassettes||{})[P.activePrinter]||null; }

// Strip the model prefix so "BM-32-427" (catalog) matches "M6-32-427" (SmartCell).
function supplyCore(pn){ return (pn||"").replace(/^[A-Za-z0-9]+-/,"").toUpperCase(); }

function cassetteMismatch(){
  const c=loadedCassette(), t=tpl();
  if(!c||!t||!c.partNumber)return false;
  return supplyCore(c.partNumber)!==supplyCore(t.specN);
}

function cassetteMatched(){
  const c=loadedCassette(), t=tpl();
  if(!c||!t||!c.partNumber)return false;
  return supplyCore(c.partNumber)===supplyCore(t.specN);
}

// Estimated labels remaining on the loaded roll = labelsPerRoll × supply%/100.
// Returns null when we don't know the roll capacity or supply level.
function supplyEstimate(){
  const c=loadedCassette();
  if(!c||typeof c.supplyRemainingPct!=='number'||typeof c.labelsPerRoll!=='number')return null;
  return {remaining:Math.floor(c.labelsPerRoll*c.supplyRemainingPct/100),
          perRoll:c.labelsPerRoll, pct:c.supplyRemainingPct};
}

// BM (bulk box) and M6 (small roll) are the same label in different packaging,
// so show the required supply as "BM/M6-<core>" and treat either as a match.
function requiredSupplyDisplay(specN){
  const core=supplyCore(specN);
  return core ? "BM/M6-"+core : (specN||"");
}

// Format an inch value, e.g. 1.5 -> 1.5", 1 -> 1".
function fmtIn(v){ return (v==null?"—":(+v).toString())+'"'; }

// Called by Swift when detected cassette info changes (auto-detect or manual).
function updateCassettes(map){
  window._cassettes=map||{};
  if(P.view!=="editor")R();
}

function detectCassette(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"detectCassette",payload:{printerID:P.activePrinter}});
    showToast("Detecting cassette…");
  }
}

function printCount(){ return printIndices().length; }

// Build the record indices to print, honoring the current print range AND the
// active filter (range is over the visible position, not absolute index).
function printIndices(){
  const vis=visibleIndices();
  if(P.printRange==="all") return vis;
  if(P.printRange==="selected") return vis.filter(i=>P.selected.has(i));
  if(P.printRange==="range"){
    const out=[];
    for(let p=P.rangeFrom-1;p<P.rangeTo&&p<vis.length;p++) out.push(vis[p]);
    return out;
  }
  return [];
}

// The payload body describing the configured job, shared by Print and Cancel.
function buildPrintPayloadBody(indices){
  const t=tpl();
  const pr=printer();
  return {
    printerID: pr.id,
    title: buildJobTitle(indices),
    templateName: t?t.name:"",
    templateID: t?t.id:"",
    recordIndices: indices,
    printRange: P.printRange,
    rangeFrom: P.rangeFrom,
    rangeTo: P.rangeTo,
  };
}

function doPrint(){
  const n=printCount();
  if(n===0)return;

  const indices=printIndices();
  const payload={ action:"print", payload:buildPrintPayloadBody(indices) };

  // If running inside the Swift app, post to native bridge
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage(payload);
    P.modal="printing";
    P._printProgress={done:0,total:n};
    R();
    // Swift will call updatePrintProgress() / completePrint() as labels send
  } else {
    // Browser demo: simulate progress
    P.modal="printing";R();
    let done=0;
    const iv=setInterval(()=>{
      done+=Math.ceil(Math.random()*3);
      if(done>=n){done=n;clearInterval(iv);P.modal="done";R();}
      else{P._printProgress={done,total:n};renderProgress();}
    },120);
  }
}

function buildJobTitle(indices){
  if(!indices.length)return"Print job";
  const nums=[...new Set(indices.map(i=>P.records[i]&&P.records[i].Number).filter(Boolean))];
  const file=P.sourceFile.replace(/_export_\d{8}_\d{6}\.csv$/i,"").replace(/_/g," ");
  if(nums.length===0)return file+" — "+indices.length+" labels";
  if(nums.length===1)return file+" — "+nums[0];
  return file+" — "+nums[0]+"–"+nums[nums.length-1];
}

// Called by Swift to update print progress
function updatePrintProgress(done,total){
  P._printProgress={done,total};
  renderProgress();
}

// Called by Swift when all labels are done
function completePrint(){
  P.modal="done";R();
}

// Called by Swift to cancel the job
function cancelPrint(){
  P.modal=null;P._printProgress=null;R();
}

function renderProgress(){
  const el=document.getElementById("print-progress");
  if(!el)return;
  const {done,total}=P._printProgress||{done:0,total:1};
  const pct=Math.round(done/total*100);
  el.querySelector(".prog-bar").style.width=pct+"%";
  el.querySelector(".prog-txt").textContent=`Printing label ${done} of ${total}…`;
}

function buildPrintingModal(){
  const n=printCount();
  if(P.modal==="done"){
    return`<div class="modal-overlay">
      <div class="modal" style="width:380px;text-align:center">
        <div style="font-size:40px;margin-bottom:12px">✓</div>
        <div class="modal-title" style="justify-content:center">Print complete</div>
        <div style="color:#8888a8;font-size:13px;margin-bottom:20px">${printCount()} label${printCount()!==1?"s":""} sent to ${printer().name}</div>
        <button class="btn primary" onclick="P.modal=null;P._printProgress=null;R()" style="width:100%;padding:9px">Done</button>
      </div>
    </div>`;
  }
  const prog=P._printProgress||{done:0,total:n};
  const pct=Math.round(prog.done/prog.total*100);
  return`<div class="modal-overlay" id="print-progress">
    <div class="modal" style="width:380px">
      <div class="modal-title">Printing…</div>
      <div style="color:#8888a8;font-size:13px;margin-bottom:16px" class="prog-txt">Preparing ${n} labels…</div>
      <div style="background:#252538;border-radius:4px;overflow:hidden;height:6px;margin-bottom:8px">
        <div class="prog-bar" style="height:100%;background:#6C8EF5;border-radius:4px;transition:width .1s;width:${pct}%"></div>
      </div>
      <div style="color:#44445a;font-size:11px;text-align:right">${pct}%</div>
    </div>
  </div>`;
}

// ── Load template file ────────────────────────────────────────────────────────
async function loadTemplateFile(){
  if(window.showOpenFilePicker){
    try{
      const [fh]=await window.showOpenFilePicker({
        startIn:"documents",
        types:[{description:"VectorLabel Template",accept:{"application/json":[".json",".vlt.json"]}}],
        multiple:false
      });
      const file=await fh.getFile();
      const text=await file.text();
      const data=JSON.parse(text);
      if(!data.objs)throw new Error("Not a VectorLabel template");
      const dup=P.templates.findIndex(t=>t.name===data.name);
      if(dup>=0)P.templates[dup]=data;
      else P.templates.push(data);
      P.activeTpl=P.templates.length-1;
      R();
    }catch(e){if(e.name!=="AbortError")alert("Error: "+e.message);}
  }else{
    const inp=document.createElement("input");inp.type="file";inp.accept=".json,.vlt.json";
    inp.onchange=async()=>{
      const file=inp.files[0];if(!file)return;
      try{
        const data=JSON.parse(await file.text());
        if(!data.objs)throw new Error("Not a VectorLabel template");
        P.templates.push(data);P.activeTpl=P.templates.length-1;R();
      }catch(e){alert("Error: "+e.message);}
    };
    inp.click();
  }
}

// ── Load CSV file ─────────────────────────────────────────────────────────────
async function loadCSV(){
  if(window.showOpenFilePicker){
    try{
      const [fh]=await window.showOpenFilePicker({
        startIn:"documents",
        types:[{description:"VectorLabel CSV Export",accept:{"text/csv":[".csv"]}}]
      });
      const file=await fh.getFile();
      const text=await file.text();
      P.records=parseCSV(text);
      P.selected=new Set(P.records.map((_,i)=>i));
      P.previewIdx=0;
      P.sourceFile=file.name;
      R();
    }catch(e){if(e.name!=="AbortError")alert("Error: "+e.message);}
  }else{
    const inp=document.createElement("input");inp.type="file";inp.accept=".csv";
    inp.onchange=async()=>{
      const file=inp.files[0];if(!file)return;
      P.records=parseCSV(await file.text());
      P.selected=new Set(P.records.map((_,i)=>i));
      P.previewIdx=0;P.sourceFile=file.name;R();
    };
    inp.click();
  }
}

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  const headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(const c of line){
      if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){vals.push(cur);cur="";}else cur+=c;
    }
    vals.push(cur);
    const row={};
    headers.forEach((h,i)=>row[h]=(vals[i]||"").replace(/^"|"$/g,""));
    return row;
  }).filter(r=>Object.values(r).some(v=>v));
}

// ── Main render ───────────────────────────────────────────────────────────────
// Wheel acceleration for the record list. Native scrolling handles a single
// flick; when the user keeps scrolling the same direction on a large list we
// ramp a multiplier so 1500-record files don't take forever to traverse.
let _wheelMult=1, _wheelDir=0, _wheelLast=0;
function onRecWheel(e){
  const el=document.getElementById("recScroll");
  if(!el||!el.contains(e.target))return;
  if(Math.abs(e.deltaX)>Math.abs(e.deltaY))return;          // leave horizontal alone
  if(el.scrollHeight-el.clientHeight<600)return;            // small lists: native only
  const now=Date.now(), dir=Math.sign(e.deltaY);
  if(dir===_wheelDir && now-_wheelLast<150) _wheelMult=Math.min(_wheelMult+0.5,6);
  else _wheelMult=1;                                        // new gesture / direction change → reset
  _wheelDir=dir; _wheelLast=now;
  if(_wheelMult>1){                                         // only take over once accelerating
    let delta=e.deltaY;
    if(e.deltaMode===1) delta*=16;                          // lines → px
    else if(e.deltaMode===2) delta*=el.clientHeight;        // pages → px
    e.preventDefault();
    el.scrollTop+=delta*_wheelMult;
  }
}

          ${filterActive()
            ? `<span style="color:#8888a8;font-size:11px">${visibleIndices().length} of ${P.records.length} shown</span>`

          ${filterActive()?`<button class="btn" onclick="event.stopPropagation();clearFilter()" style="padding:2px 8px;font-size:11px;color:#f5c96c;border-color:rgba(245,201,108,0.4)">Clear filter</button>`:""}
          <button class="btn${window._colMenuOpen?' on':''}" onclick="event.stopPropagation();toggleColumnsMenu()" style="padding:2px 8px;font-size:11px">Columns ▾</button>

          ${P.filter.showBothSides?`<span style="color:#6a6a82;flex-shrink:0">· incl. matching pairs</span>`:""}
        </div>`:""}
        <!-- Grid headers -->
        ${(()=>{

            <div class="rec-cell" style="display:flex;align-items:center;justify-content:center">

          if(vis.length===0){

                <div style="width:18px;height:14px;border:1.5px solid ${ps2?'rgba(108,142,245,0.6)':'rgba(255,255,255,0.1)'};border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:${ps2==='chk'?'rgba(108,142,245,0.2)':ps2==='partial'?'rgba(108,142,245,0.08)':'transparent'}">
                  <span style="color:${ps2?'#6C8EF5':'rgba(255,255,255,0.15)'};font-size:8px;line-height:1">⇅</span>

      </div>

      <!-- Right: preview panel -->
      <div style="width:280px;background:#1a1a28;border-left:1px solid rgba(255,255,255,0.07);overflow-y:auto;flex-shrink:0">

  // Restore scroll position and wire wheel acceleration (bound once on #app,
  // which survives innerHTML swaps).
  const _recEl=document.getElementById("recScroll");
  if(_recEl) _recEl.scrollTop=_prevScroll;

// ── Editor open/close ────────────────────────────────────────────────────────
// Editing is handled by the single Template Designer window (opened by Swift).
// We keep the print window open so the print task is preserved; the designer
// returns here via refreshTemplates() after Save/Cancel.
function openEditor(){
  const t=P.templates[P.activeTpl];
  if(!t)return;
  // Pass the list index (not id) — ids can be duplicated across templates, the
  // index uniquely identifies which one the user is editing.
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"editTemplate",payload:{index:P.activeTpl,name:t.name}});
  }
}

// Called by Swift after the user saves/cancels in the designer: refresh the
// template list without disturbing the current selection or print task.
function refreshTemplates(templates){
  if(!Array.isArray(templates))return;
  const prevName=P.templates[P.activeTpl]&&P.templates[P.activeTpl].name;
  P.templates=templates.map(t=>({
    id:t.id||t.name, name:t.name||"Unnamed", specN:t.specN||"BM-32-427",
    objs:(t.objs||[]).map(o=>({...o, id:(o.id&&o.id!=='undefined')?String(o.id):('t'+Math.random().toString(36).slice(2,8))}))
  }));
  const idx=P.templates.findIndex(t=>t.name===prevName);
  P.activeTpl=idx>=0?idx:Math.max(0,Math.min(P.activeTpl,P.templates.length-1));
  R();
}

// ── Toast notifications ───────────────────────────────────────────────────────
function showToast(msg){
  let t=document.getElementById("vl-toast");
  if(!t){t=document.createElement("div");t.id="vl-toast";
    Object.assign(t.style,{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",
      background:"#2a2a42",border:"1px solid rgba(108,142,245,0.4)",color:"#e8e8f0",
      borderRadius:"6px",padding:"8px 18px",fontSize:"12px",zIndex:"2000",
      boxShadow:"0 4px 20px rgba(0,0,0,0.5)",transition:"opacity 0.3s",pointerEvents:"none"});
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity="0";},2800);
}


// ── Swift bridge ──────────────────────────────────────────────────────────────

/// Called by Swift (via WKWebView evaluateJavaScript) after the page loads,
/// to inject real records, templates, printers, and optional reprint settings.
function initPrintWindow(opts){
  if(!opts)return;

  // Records from the CSV
  if(opts.records&&opts.records.length>0){
    P.records=opts.records;
    P.selected=new Set(opts.records.map((_,i)=>i));
    P.rangeFrom=1;
    P.rangeTo=opts.records.length;
  }

  // Templates from ~/Documents/VectorLabel/Templates/
  if(opts.templates&&opts.templates.length>0){
    // Convert VLTemplate format (specN, objs) to the format P.templates expects
    P.templates=opts.templates.map(t=>({
      id: t.id||t.name,
      name: t.name||"Unnamed",
      specN: t.specN||"BM-32-427",
      objs: (t.objs||[]).map(o=>({...o, id:(o.id&&o.id!=='undefined')?String(o.id):('t'+Math.random().toString(36).slice(2,8))}))
    }));
    P.activeTpl=0;
  }

  // Loaded cassette info (printerID -> SmartCell), for the supply display.
  if(opts.cassettes) window._cassettes=opts.cassettes;

  // Shared record-column config (order/hidden/widths) — shared with the designer.
  if(opts.columnConfig){
    const cc=opts.columnConfig;
    if(Array.isArray(cc.order)) window._columnOrder=cc.order;
    if(Array.isArray(cc.hidden)) window._hiddenColumns=cc.hidden;
    if(cc.widths&&typeof cc.widths==='object') window._colWidths=cc.widths;
  }

  // Pre-select the persisted default template, if set and present. The
  // "Make default" checkbox always starts unchecked on open (the default
  // itself persists in AppSettings, not the checkbox state).
  P._makeDefaultChecked=false;
  if(opts.defaultTemplateID){
    const di=P.templates.findIndex(t=>t.id===opts.defaultTemplateID);
    if(di>=0) P.activeTpl=di;
  }

  // Printers from USB scan
  if(opts.printers&&opts.printers.length>0){
    // Replace the simulated PRINTERS array
    window._swiftPrinters=opts.printers.map(p=>({
      id: p.id,
      name: p.name,
      model: p.model||"M6xx",
      status: p.status||"ready",
      serial: p.serial||""
    }));
    P.activePrinter=window._swiftPrinters.find(p=>p.status==="ready")?.id
                   ||window._swiftPrinters[0]?.id
                   ||P.activePrinter;
  }

  // Source file name for display
  if(opts.sourceFile) P.sourceFile=opts.sourceFile;

  // Reprint: restore previous selection settings
  if(opts.reprint){
    const rp=opts.reprint;
    if(rp.printRange) P.printRange=rp.printRange;
    if(rp.rangeFrom)  P.rangeFrom=rp.rangeFrom;
    if(rp.rangeTo)    P.rangeTo=rp.rangeTo;
    if(rp.selectedIndices&&rp.selectedIndices.length>0){
      P.selected=new Set(rp.selectedIndices);
      if(P.printRange==="all") P.printRange="selected";
    }
    // Try to match template by name
    if(rp.templateName){
      const idx=P.templates.findIndex(t=>t.name===rp.templateName);
      if(idx>=0) P.activeTpl=idx;
    }
  }

  R();
}

// printer() already uses window._swiftPrinters — see definition above

// Called by Swift whenever the USB printer list changes, so the dropdown stays
// in sync with the live scan without resetting the user's record selection.
function updatePrinters(printers){
  window._swiftPrinters=(printers||[]).map(p=>({
    id: p.id,
    name: p.name,
    model: p.model||"M6xx",
    status: p.status||"ready",
    serial: p.serial||""
  }));
  // Keep the current selection if that printer is still present; otherwise pick
  // a ready printer (or the first available one).
  if(!window._swiftPrinters.find(p=>p.id===P.activePrinter)){
    P.activePrinter=window._swiftPrinters.find(p=>p.status==="ready")?.id
                   ||window._swiftPrinters[0]?.id
                   ||P.activePrinter;
  }
  R();
}

// Tell Swift the page is ready to receive data
function notifyReady(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"ready",payload:null});
  }
}

R();
// Notify Swift that the page has rendered and is ready for initPrintWindow()
window.addEventListener("load",notifyReady);
</script>
