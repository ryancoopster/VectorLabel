<body>
<div id="app" style="display:flex;flex-direction:column;height:100vh"></div>
<script>
// ── Field definitions ─────────────────────────────────────────────────────────
const FD=[
  {f:"Number",c:"Number"},{f:"Cable Name",c:"Cable"},{f:"Signal",c:"Signal"},
  {f:"Connector",c:"Connector"},{f:"Device Name",c:"Device_Name"},
  {f:"Socket Name",c:"Socket_Name"},{f:"Other Device",c:"Other_Device"},
  {f:"Other Socket",c:"Other_Socket"},{f:"Rack",c:"Rack"},{f:"Room",c:"Room"}
];

// ── Formula engine (same as designer) ────────────────────────────────────────
function tokenize(expr){
  const t=[];let i=0;
  while(i<expr.length){
    if(/\s/.test(expr[i])){i++;continue;}
    if(expr[i]==='"'){let j=i+1,s="";while(j<expr.length&&expr[j]!=='"')s+=expr[j++];t.push({k:"s",v:s});i=j+1;continue;}
    if(/\d/.test(expr[i])){let j=i;while(j<expr.length&&/[\d.]/.test(expr[j]))j++;t.push({k:"n",v:parseFloat(expr.slice(i,j))});i=j;continue;}
    if(expr[i]==='&'){t.push({k:"a"});i++;continue;}
    if(expr[i]==='<'&&expr[i+1]==='>'){t.push({k:"ne"});i+=2;continue;}
    if(expr[i]==='='){t.push({k:"eq"});i++;continue;}
    if(expr[i]===','){t.push({k:"cm"});i++;continue;}
    if(expr[i]==='('){t.push({k:"lp"});i++;continue;}
    if(expr[i]===')'){t.push({k:"rp"});i++;continue;}
    if(/[A-Za-z_]/.test(expr[i])){let j=i;while(j<expr.length&&/[A-Za-z0-9_ ]/.test(expr[j]))j++;t.push({k:"id",v:expr.slice(i,j).trimEnd()});i=j;continue;}
    i++;
  }
  return t;
}
function evalToks(toks,vars){
  let p=0;const pk=()=>toks[p],cs=()=>toks[p++];
  function rv(n){if(n in vars)return vars[n];const f=FD.find(x=>x.f.toLowerCase()===n.toLowerCase()||x.c.toLowerCase()===n.toLowerCase());return f?(vars[f.c]??""):n;}
  function pp(){
    const t=pk();if(!t)return"";
    if(t.k==="s"){cs();return t.v;}if(t.k==="n"){cs();return t.v;}
    if(t.k==="id"){
      const name=t.v;cs();
      if(pk()?.k==="lp"){cs();const args=[];while(pk()&&pk().k!=="rp"){args.push(pe());if(pk()?.k==="cm")cs();}cs();
        const fn=name.toUpperCase();
        if(fn==="IF")return args[0]?(args[1]??""):(args[2]??"");
        if(fn==="LEFT")return String(args[0]??"").slice(0,args[1]??1);
        if(fn==="RIGHT"){const s=String(args[0]??"");return s.slice(s.length-(args[1]??1));}
        if(fn==="LEN")return String(args[0]??"").length;
        if(fn==="UPPER")return String(args[0]??"").toUpperCase();
        if(fn==="LOWER")return String(args[0]??"").toLowerCase();
        if(fn==="TRIM")return String(args[0]??"").trim();
        if(fn==="MID")return String(args[0]??"").slice((args[1]??1)-1,((args[1]??1)-1)+(args[2]??1));
        return"";}
      if(pk()?.k==="ne"||pk()?.k==="eq"){const op=cs().k;const r=pp();const l=rv(name);return op==="ne"?l!==String(r):l===String(r);}
      return rv(name);}
    if(t.k==="lp"){cs();const v=pe();if(pk()?.k==="rp")cs();return v;}
    cs();return"";
  }
  function pe(){let l=pp();while(pk()?.k==="a"){cs();l=String(l??"")+String(pp()??"");}return l;}
  return pe();
}
function evalF(formula,rec){
  if(!formula?.trim())return{v:"",e:null};
  if(!formula.startsWith("="))return{v:formula,e:null};
  const m={};FD.forEach(f=>{m[f.f]=rec[f.c]??"";m[f.c]=rec[f.c]??""});
  try{return{v:String(evalToks(tokenize(formula.slice(1)),m)??""),e:null};}
  catch(err){return{v:"",e:err.message};}
}

// ── Label preview renderer ────────────────────────────────────────────────────
const BL=[
  {n:"BM-31-427",tw:1,th:1.5,pw:1,ph:.5,lb:'BM-31-427 — 1"×1.5"'},
  {n:"BM-32-427",tw:1.5,th:1.5,pw:1.5,ph:.5,lb:'BM-32-427 — 1.5"×1.5"'},
  {n:"BM-33-427",tw:4,th:1.5,pw:1.5,ph:1.5,lb:'BM-33-427 — 4"×1.5" (1.5" printable)'}
];
const SC=185;

function renderLabel(tpl,rec,scale=1){
  const spec=BL.find(l=>l.n===tpl.specN)||BL[1];
  const pw=spec.pw*SC*scale,ph=spec.ph*SC*scale;
  const sc=SC*scale;
  const objs=(tpl.objs||[]).map(o=>{
    const x=o.x*sc,y=o.y*sc,w=(o.w||1)*sc,h=(o.h||0)*sc;
    if(o.t==="tx"){
      const {v,e}=rec?evalF(o.f,rec):{v:"",e:null};
      const fz=Math.max(5,(o.fs||14)*(sc/100));
      const jc=o.al==="center"?"center":o.al==="right"?"flex-end":"flex-start";
      const va=o.valign==="top"?"flex-start":o.valign==="bottom"?"flex-end":"center";
      const fw=o.bold?700:400;
      const fs=o.italic?"italic":"normal";
      const td=o.underline?"underline":"none";
      const ws=o.wrapText?"normal":"nowrap";
      const sx=(o.stretch||100)/100;
      const col=e?"#f56c6c":"#000";
      const txt=(e?`⚠`:v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      return `<div style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${Math.max(h,8)}px;overflow:hidden;display:flex;align-items:${va};padding:0 1px;box-sizing:border-box">
        <div style="width:100%;font-family:'${o.font||"Helvetica Neue"}',Arial,sans-serif;font-size:${fz}px;font-weight:${fw};font-style:${fs};text-decoration:${td};color:${col};white-space:${ws};overflow:hidden;text-overflow:ellipsis;line-height:1.15;text-align:${o.al||"left"};transform:scaleX(${sx});transform-origin:left center">${txt}</div>
      </div>`;
    }
    if(o.t==="ln")return`<div style="position:absolute;left:${x}px;top:${y}px;width:${(o.w||1)*sc}px;height:${Math.max(1,o.lw||1)}px;background:#000"></div>`;
    if(o.t==="rc")return`<div style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;border:${o.lw||1}px solid #000;background:transparent"></div>`;
    return"";
  }).join("");
  return`<div style="width:${pw}px;height:${ph}px;background:#fff;border:1.5px solid rgba(255,255,255,0.15);border-radius:2px;position:relative;overflow:hidden;flex-shrink:0">${objs}</div>`;
}

// ── Sample data ───────────────────────────────────────────────────────────────
const SAMPLE_CSV=[
  {_Side:"Source",Number:"N044",Cable:"RIO 1 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"SWITCH 6.01",Socket_Name:"LAN 1",Other_Device:"IO 1.01",Other_Socket:"DANTE PRI",Other_Connector:"EC-6A",Rack:"",Room:""},
  {_Side:"Destination",Number:"N044",Cable:"RIO 1 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"IO 1.01",Socket_Name:"DANTE PRI",Other_Device:"SWITCH 6.01",Other_Socket:"LAN 1",Other_Connector:"EC-6A",Rack:"RIO RACK",Room:"PORTABLE"},
  {_Side:"Source",Number:"N045",Cable:"RIO 2 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"SWITCH 6.01",Socket_Name:"LAN 2",Other_Device:"IO 1.02",Other_Socket:"DANTE PRI",Other_Connector:"EC-6A",Rack:"",Room:""},
  {_Side:"Destination",Number:"N045",Cable:"RIO 2 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"IO 1.02",Socket_Name:"DANTE PRI",Other_Device:"SWITCH 6.01",Other_Socket:"LAN 2",Other_Connector:"EC-6A",Rack:"RIO RACK",Room:"PORTABLE"},
  {_Side:"Source",Number:"N046",Cable:"RIO 3 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"SWITCH 6.01",Socket_Name:"LAN 3",Other_Device:"IO 1.03",Other_Socket:"DANTE PRI",Other_Connector:"EC-6A",Rack:"",Room:""},
  {_Side:"Destination",Number:"N046",Cable:"RIO 3 PRI",Signal:"LAN",Connector:"EC-6A",Device_Name:"IO 1.03",Socket_Name:"DANTE PRI",Other_Device:"SWITCH 6.01",Other_Socket:"LAN 3",Other_Connector:"EC-6A",Rack:"RIO RACK",Room:"PORTABLE"},
  {_Side:"Source",Number:"N030",Cable:"",Signal:"LAN",Connector:"EC-6A",Device_Name:"AMP ROOM B",Socket_Name:"C6-8",Other_Device:"SL",Other_Socket:"6A-8",Other_Connector:"EC-6A",Rack:"",Room:""},
  {_Side:"Destination",Number:"N030",Cable:"",Signal:"LAN",Connector:"EC-6A",Device_Name:"SL",Socket_Name:"6A-8",Other_Device:"AMP ROOM B",Other_Socket:"C6-8",Other_Connector:"EC-6A",Rack:"",Room:"AMP ROOM"},
];

// Sample template (matches designer format)
const SAMPLE_TPL={
  name:"Standard Wire Label",
  specN:"BM-32-427",
  objs:[
    {id:"st1",t:"tx",x:.02,y:.03,w:.44,h:.28,f:'=IF(Connector<>"",Connector,"")',al:"left",valign:"middle",fs:15,bold:false,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100},
    {id:"st2",t:"tx",x:.62,y:.03,w:.36,h:.28,f:'=IF(Rack<>"",Rack,"")',al:"right",valign:"middle",fs:15,bold:false,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100},
    {id:"st3",t:"tx",x:.02,y:.08,w:.96,h:.34,f:'=IF(Number<>"",Number&IF(Cable<>""," - "&Cable,""),IF(Cable<>"",Cable,""))',al:"center",valign:"middle",fs:19,bold:true,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100},
    {id:"st4",t:"ln",x:0,y:.44,w:1,h:0,lw:1},
    {id:"st5",t:"tx",x:.02,y:.47,w:.96,h:.24,f:'=IF(Other_Device<>"","@ "&Other_Device&IF(Other_Socket<>""," : "&Other_Socket,""),"")',al:"center",valign:"middle",fs:12,bold:false,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100}
  ]
};

// ── Column widths — Print screen ──────────────────────────────────────────────
const COL_DEFAULTS={side:90,number:72,cable:140,signal:72,device:160,socket:140};
let COLS=(()=>{
  try{const s=localStorage.getItem('vl-col-widths');if(s)return Object.assign({},COL_DEFAULTS,JSON.parse(s));}catch(e){}
  return Object.assign({},COL_DEFAULTS);
})();
function saveCols(){try{localStorage.setItem('vl-col-widths',JSON.stringify(COLS));}catch(e){}}
function applyColVars(){
  const r=document.documentElement;
  r.style.setProperty('--col-cb','28px');
  r.style.setProperty('--col-pair','28px');
  r.style.setProperty('--col-num','36px');
  r.style.setProperty('--col-side',COLS.side+'px');
  r.style.setProperty('--col-number',COLS.number+'px');
  r.style.setProperty('--col-cable',COLS.cable+'px');
  r.style.setProperty('--col-signal',COLS.signal+'px');
  r.style.setProperty('--col-device',COLS.device+'px');
  r.style.setProperty('--col-socket',COLS.socket+'px');
}
function startColResize(e,col){
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget;el.classList.add('dragging');
  const startX=e.clientX,startW=COLS[col];
  function mv(e){COLS[col]=Math.max(40,startW+(e.clientX-startX));applyColVars();}
  function mu(){el.classList.remove('dragging');saveCols();window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',mu);}
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',mu);
}

// ── Column widths — Live editor record table ───────────────────────────────────
// Matches print screen columns but saved separately so widths are independent.
const ED_COL_DEFAULTS={side:90,number:72,cable:150,signal:72,device:160,socket:150};
let ED_COLS=(()=>{
  try{const s=localStorage.getItem('vl-ed-col-widths');if(s)return Object.assign({},ED_COL_DEFAULTS,JSON.parse(s));}catch(e){}
  return Object.assign({},ED_COL_DEFAULTS);
})();
function saveEdCols(){try{localStorage.setItem('vl-ed-col-widths',JSON.stringify(ED_COLS));}catch(e){}}
function applyEdColVars(){
  const r=document.documentElement;
  r.style.setProperty('--edr-side',   ED_COLS.side+'px');
  r.style.setProperty('--edr-number', ED_COLS.number+'px');
  r.style.setProperty('--edr-cable',  ED_COLS.cable+'px');
  r.style.setProperty('--edr-signal', ED_COLS.signal+'px');
  r.style.setProperty('--edr-device', ED_COLS.device+'px');
  r.style.setProperty('--edr-socket', ED_COLS.socket+'px');
}
function startEdColResize(e,col){
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget;el.classList.add('dragging');
  const startX=e.clientX,startW=ED_COLS[col];
  function mv(e){ED_COLS[col]=Math.max(40,startW+(e.clientX-startX));applyEdColVars();}
  function mu(){el.classList.remove('dragging');saveEdCols();window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',mu);}
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',mu);
}

// Builds the record table shown in the live editor (uses S.recIdx + RX/_editorRecords)
function buildEditorRecordTable(){
  const records=window._editorRecords||RX;
  const hdrCols=[
    {label:'Side',   col:'side'},
    {label:'Number', col:'number'},
    {label:'Cable',  col:'cable'},
    {label:'Signal', col:'signal'},
    {label:'Device', col:'device'},
    {label:'Socket', col:'socket'},
  ];

// Printers are populated by initPrintWindow() from the Swift USB scan.
// This array is empty by default; the demo fallback shows a placeholder.
const PRINTERS=[];

let P={
  records: SAMPLE_CSV,
  templates: [SAMPLE_TPL],
  activeTpl: 0,
  selected: new Set(SAMPLE_CSV.map((_,i)=>i)),
  previewIdx: 0,
  lastClickIdx: null, // for shift-click range selection
  modal: null,
  printRange: "all",
  rangeFrom: 1,
  rangeTo: SAMPLE_CSV.length,
  sourceFile: "ESM_Kodak_Hall_Master_export_20260614_172508.csv",
  activePrinter: "m610-001",
  view: "print", // "print" | "editor"
};
function printer(){
  const pool=window._swiftPrinters||PRINTERS;
  return pool.find(p=>p.id===P.activePrinter)||pool[0]||{id:"",name:"No printer connected",model:"",status:"offline",serial:""};
}

function tpl(){return P.templates[P.activeTpl]||null;}

function cancelAndClose(){
  // Record as cancelled in recent prints if a print was in progress
  // (nothing to record if we never printed)
  // Post close to Swift
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"close",payload:{cancelled:true}});
  }else{
    // Browser demo: just show a toast
    showToast("Window closed — return to Vectorworks");
  }
}
function selCount(){return P.selected.size;}

// Records come in Source/Destination pairs. pairIdx(i) returns the partner index.
function pairIdx(i){
  const r=P.records[i];
  if(!r)return null;
  if(r._Side==="Source"   && i+1<P.records.length && P.records[i+1]._Side==="Destination") return i+1;
  if(r._Side==="Destination" && i>0 && P.records[i-1]._Side==="Source") return i-1;
  return null;
}

// Toggle a single row
function toggleSel(i){
  if(P.selected.has(i))P.selected.delete(i);
  else P.selected.add(i);
  P.printRange="selected"; // count should always reflect what's checked
  R();
}

// Toggle a pair — if either is selected, deselect both; if both deselected, select both
function togglePair(i){
  const j=pairIdx(i);
  const hasI=P.selected.has(i);
  const hasJ=j!==null&&P.selected.has(j);
  if(hasI||hasJ){
    P.selected.delete(i);
    if(j!==null)P.selected.delete(j);
  }else{
    P.selected.add(i);
    if(j!==null)P.selected.add(j);
  }
  P.printRange="selected";
  R();
}

// Pair checkbox state: 'chk' both selected, 'partial' one selected, '' neither
function pairChkState(i){
  const j=pairIdx(i);
  const hasI=P.selected.has(i);
  const hasJ=j!==null?P.selected.has(j):hasI;
  if(hasI&&hasJ)return'chk';
  if(hasI||hasJ)return'partial';
  return'';
}

function toggleAll(){
  if(P.selected.size===P.records.length){
    P.selected.clear();
  }else{
    P.records.forEach((_,i)=>P.selected.add(i));
    P.printRange="all"; // selecting all switches back to "all" mode
  }
  R();
}

// Row click: preview this record. Shift-click: select range between last clicked and this.
// handleRowClick kept for compatibility but range-select is now in checkbox/pair cells
function handleRowClick(e,i){
  P.previewIdx=i;
  R();
}
function selectSide(side){
  // If all of this side are already selected, deselect them; otherwise select all of this side
  const sideIndices=P.records.map((r,i)=>r._Side===side?i:-1).filter(i=>i>=0);
  const allSelected=sideIndices.every(i=>P.selected.has(i));
  sideIndices.forEach(i=>allSelected?P.selected.delete(i):P.selected.add(i));
  P.printRange="selected";
  R();
}
function selectRange(from,to){
  P.selected.clear();
  for(let i=from-1;i<to&&i<P.records.length;i++)P.selected.add(i);
  R();
}

function printCount(){
  if(P.printRange==="all")return P.records.length;
  if(P.printRange==="selected")return selCount();
  if(P.printRange==="range")return Math.max(0,P.rangeTo-P.rangeFrom+1);
  return 0;
}

function doPrint(){
  const n=printCount();
  if(n===0)return;

  // Build list of record indices to print
  let indices=[];
  if(P.printRange==="all"){
    indices=P.records.map((_,i)=>i);
  } else if(P.printRange==="selected"){
    indices=[...P.selected].sort((a,b)=>a-b);
  } else if(P.printRange==="range"){
    for(let i=P.rangeFrom-1;i<P.rangeTo&&i<P.records.length;i++) indices.push(i);
  }

  const t=tpl();
  const pr=printer();
  const payload={
    action:"print",
    payload:{
      printerID: pr.id,
      title: buildJobTitle(indices),
      templateName: t?t.name:"",
      templateID: t?t.id:"",
      recordIndices: indices,
      printRange: P.printRange,
      rangeFrom: P.rangeFrom,
      rangeTo: P.rangeTo,
    }
  };

  // If running inside the Swift app, post to native bridge
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage(payload);
    P.modal="printing";
    P._printProgress={done:0,total:n};
    R();
    // Swift will call updatePrintProgress() / completePrint() as labels send
  } else {
    // Browser demo: simulate progress
    P.modal="printing";R();
    let done=0;
    const iv=setInterval(()=>{
      done+=Math.ceil(Math.random()*3);
      if(done>=n){done=n;clearInterval(iv);P.modal="done";R();}
      else{P._printProgress={done,total:n};renderProgress();}
    },120);
  }
}

function buildJobTitle(indices){
  if(!indices.length)return"Print job";
  const nums=[...new Set(indices.map(i=>P.records[i]&&P.records[i].Number).filter(Boolean))];
  const file=P.sourceFile.replace(/_export_\d{8}_\d{6}\.csv$/i,"").replace(/_/g," ");
  if(nums.length===0)return file+" — "+indices.length+" labels";
  if(nums.length===1)return file+" — "+nums[0];
  return file+" — "+nums[0]+"–"+nums[nums.length-1];
}

// Called by Swift to update print progress
function updatePrintProgress(done,total){
  P._printProgress={done,total};
  renderProgress();
}

// Called by Swift when all labels are done
function completePrint(){
  P.modal="done";R();
}

// Called by Swift to cancel the job
function cancelPrint(){
  P.modal=null;P._printProgress=null;R();
}

function renderProgress(){
  const el=document.getElementById("print-progress");
  if(!el)return;
  const {done,total}=P._printProgress||{done:0,total:1};
  const pct=Math.round(done/total*100);
  el.querySelector(".prog-bar").style.width=pct+"%";
  el.querySelector(".prog-txt").textContent=`Printing label ${done} of ${total}…`;
}

function buildPrintingModal(){
  const n=printCount();
  if(P.modal==="done"){
    return`<div class="modal-overlay">
      <div class="modal" style="width:380px;text-align:center">
        <div style="font-size:40px;margin-bottom:12px">✓</div>
        <div class="modal-title" style="justify-content:center">Print complete</div>
        <div style="color:#8888a8;font-size:13px;margin-bottom:20px">${printCount()} label${printCount()!==1?"s":""} sent to ${printer().name}</div>
        <button class="btn primary" onclick="P.modal=null;P._printProgress=null;R()" style="width:100%;padding:9px">Done</button>
      </div>
    </div>`;
  }
  const prog=P._printProgress||{done:0,total:n};
  const pct=Math.round(prog.done/prog.total*100);
  return`<div class="modal-overlay" id="print-progress">
    <div class="modal" style="width:380px">
      <div class="modal-title">Printing…</div>
      <div style="color:#8888a8;font-size:13px;margin-bottom:16px" class="prog-txt">Preparing ${n} labels…</div>
      <div style="background:#252538;border-radius:4px;overflow:hidden;height:6px;margin-bottom:8px">
        <div class="prog-bar" style="height:100%;background:#6C8EF5;border-radius:4px;transition:width .1s;width:${pct}%"></div>
      </div>
      <div style="color:#44445a;font-size:11px;text-align:right">${pct}%</div>
    </div>
  </div>`;
}

// ── Load template file ────────────────────────────────────────────────────────
async function loadTemplateFile(){
  if(window.showOpenFilePicker){
    try{
      const [fh]=await window.showOpenFilePicker({
        startIn:"documents",
        types:[{description:"VectorLabel Template",accept:{"application/json":[".json",".vlt.json"]}}],
        multiple:false
      });
      const file=await fh.getFile();
      const text=await file.text();
      const data=JSON.parse(text);
      if(!data.objs)throw new Error("Not a VectorLabel template");
      const dup=P.templates.findIndex(t=>t.name===data.name);
      if(dup>=0)P.templates[dup]=data;
      else P.templates.push(data);
      P.activeTpl=P.templates.length-1;
      R();
    }catch(e){if(e.name!=="AbortError")alert("Error: "+e.message);}
  }else{
    const inp=document.createElement("input");inp.type="file";inp.accept=".json,.vlt.json";
    inp.onchange=async()=>{

async function loadCSV(){
  if(window.showOpenFilePicker){
    try{
      const [fh]=await window.showOpenFilePicker({
        startIn:"documents",
        types:[{description:"VectorLabel CSV Export",accept:{"text/csv":[".csv"]}}]
      });
      const file=await fh.getFile();
      const text=await file.text();
      P.records=parseCSV(text);
      P.selected=new Set(P.records.map((_,i)=>i));
      P.previewIdx=0;
      P.sourceFile=file.name;
      R();
    }catch(e){if(e.name!=="AbortError")alert("Error: "+e.message);}
  }else{
    const inp=document.createElement("input");inp.type="file";inp.accept=".csv";
    inp.onchange=async()=>{
      const file=inp.files[0];if(!file)return;
      P.records=parseCSV(await file.text());
      P.selected=new Set(P.records.map((_,i)=>i));
      P.previewIdx=0;P.sourceFile=file.name;R();
    };
    inp.click();
  }
}

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  const headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(const c of line){
      if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){vals.push(cur);cur="";}else cur+=c;
    }
    vals.push(cur);
    const row={};
    headers.forEach((h,i)=>row[h]=(vals[i]||"").replace(/^"|"$/g,""));
    return row;
  }).filter(r=>Object.values(r).some(v=>v));
}

function initDesigner(opts){
  // opts: { template, records, onSaveReturn(tpl), onDiscard }
  // Reinitialize designer state from opts
  const _initTpl = opts.template || {name:"Untitled",specN:"BM-32-427",objs:[]};
  const _initRecs = opts.records || RX;

  // Patch S initial values
  S.tplName = _initTpl.name || "Untitled";
  S.spec = BL.find(l=>l.n===_initTpl.specN) || BL[1];
  // Deep clone and ensure every object has a valid string ID
  S.objs = JSON.parse(JSON.stringify(_initTpl.objs || [])).map(o=>({
    ...o,
    id: (o.id && o.id !== 'undefined') ? String(o.id) : mid()
  }));
  S.selId = null;

  S.modal = null;

  // Override RX for this session with the print window's records
  // We do this by monkey-patching the designer's record array
  // The designer uses RX directly in buildRecordTable and sample preview
  // Simplest: just call renderDesigner() which reads S and the module-level RX
  // For preview records in editor, we'll use opts.records via a global bridge

  window._editorRecords = _initRecs;
  window._editorOnSave = opts.onSaveReturn;
  window._editorOnDiscard = opts.onDiscard;

  // Save the print screen's R() so we can restore it on return
  window._printR = window._printR || R;

  // Expose renderDesigner as R for onclick handlers in the designer
  window.R = renderDesigner;

  renderDesigner();
}

// ── Formula engine ────────────────────────────────────────────────────────────
function _dup_tokenize(expr){
  const t=[];let i=0;
  while(i<expr.length){
    if(/\s/.test(expr[i])){i++;continue;}
    if(expr[i]==='"'){let j=i+1,s="";while(j<expr.length&&expr[j]!=='"')s+=expr[j++];t.push({k:"s",v:s});i=j+1;continue;}
    if(/\d/.test(expr[i])){let j=i;while(j<expr.length&&/[\d.]/.test(expr[j]))j++;t.push({k:"n",v:parseFloat(expr.slice(i,j))});i=j;continue;}
    if(expr[i]==='&'){t.push({k:"a"});i++;continue;}
    if(expr[i]==='<'&&expr[i+1]==='>'){t.push({k:"ne"});i+=2;continue;}
    if(expr[i]==='='){t.push({k:"eq"});i++;continue;}
    if(expr[i]===','){t.push({k:"cm"});i++;continue;}
    if(expr[i]==='('){t.push({k:"lp"});i++;continue;}
    if(expr[i]===')'){ t.push({k:"rp"});i++;continue;}
    if(/[A-Za-z_]/.test(expr[i])){let j=i;while(j<expr.length&&/[A-Za-z0-9_ ]/.test(expr[j]))j++;t.push({k:"id",v:expr.slice(i,j).trimEnd()});i=j;continue;}
    i++;
  }
  return t;
}
function _dup_evalToks(toks,vars){
  let p=0;const pk=()=>toks[p],cs=()=>toks[p++];
  function rv(n){if(n in vars)return vars[n];const f=FD.find(x=>x.f.toLowerCase()===n.toLowerCase()||x.c.toLowerCase()===n.toLowerCase());return f?(vars[f.c]??""):n;}
  function pp(){
    const t=pk();if(!t)return"";
    if(t.k==="s"){cs();return t.v;}
    if(t.k==="n"){cs();return t.v;}
    if(t.k==="id"){
      const name=t.v;cs();
      if(pk()?.k==="lp"){
        cs();const args=[];
        while(pk()&&pk().k!=="rp"){args.push(pe());if(pk()?.k==="cm")cs();}cs();
        const fn=name.toUpperCase();
        if(fn==="IF")return args[0]?(args[1]??""):(args[2]??"");
        if(fn==="LEFT")return String(args[0]??"").slice(0,args[1]??1);
        if(fn==="RIGHT"){const s=String(args[0]??"");return s.slice(s.length-(args[1]??1));}
        if(fn==="LEN")return String(args[0]??"").length;
        if(fn==="UPPER")return String(args[0]??"").toUpperCase();
        if(fn==="LOWER")return String(args[0]??"").toLowerCase();
        if(fn==="TRIM")return String(args[0]??"").trim();
        if(fn==="MID")return String(args[0]??"").slice((args[1]??1)-1,((args[1]??1)-1)+(args[2]??1));
        return"";}
      if(pk()?.k==="ne"||pk()?.k==="eq"){const op=cs().k;const r=pp();const l=rv(name);return op==="ne"?l!==String(r):l===String(r);}
      return rv(name);}
    if(t.k==="lp"){cs();const v=pe();if(pk()?.k==="rp")cs();return v;}
    cs();return"";
  }
  function pe(){let l=pp();while(pk()?.k==="a"){cs();l=String(l??"")+String(pp()??"");}return l;}
  return pe();
}
function _dup_evalF(formula,rec){
  if(!formula||!formula.trim())return{v:"",e:null};
  if(!formula.startsWith("="))return{v:formula,e:null};
  const m={};FD.forEach(f=>{m[f.f]=rec[f.c]??"";m[f.c]=rec[f.c]??""});
  try{return{v:String(evalToks(tokenize(formula.slice(1)),m)??""),e:null};}
  catch(err){return{v:"",e:err.message};}
}

const SNAP_PX=4; // screen pixels threshold for smart snap
S._snapLines=[];

function snapToGrid(val){
  if(!S.snapGrid)return val;
  return Math.round(val/S.gridSize)*S.gridSize;
}

function snapX(x,w,excludeId){
  if(!S.snapObjects)return{v:x,lines:[]};
  const others=S.objs.filter(o=>o.id!==excludeId);
  const pw=S.spec.pw;
  const thr=SNAP_PX/(SC*S.zoom);
  let best=x,bestD=thr,lines=[];
  [[x,0],[x+w,1]].forEach(([ce,ci])=>{
    others.forEach(o=>{
      [o.x,o.x+o.w].forEach(oe=>{
        const d=Math.abs(ce-oe);
        if(d<bestD){bestD=d;best=ci===0?oe:oe-w;lines=[{axis:'x',pos:oe}];}
      });
    });
    [0,pw].forEach(le=>{
      const d=Math.abs(ce-le);
      if(d<bestD){bestD=d;best=ci===0?le:le-w;lines=[{axis:'x',pos:le}];}
    });
  });
  return{v:best,lines};
}

function snapY(y,h,excludeId){
  if(!S.snapObjects)return{v:y,lines:[]};
  const others=S.objs.filter(o=>o.id!==excludeId);
  const ph=S.spec.ph;
  const thr=SNAP_PX/(SC*S.zoom);
  let best=y,bestD=thr,lines=[];
  [[y,0],[y+h,1]].forEach(([ce,ci])=>{
    others.forEach(o=>{
      [o.y,o.y+(o.h||0)].forEach(oe=>{
        const d=Math.abs(ce-oe);
        if(d<bestD){bestD=d;best=ci===0?oe:oe-h;lines=[{axis:'y',pos:oe}];}
      });
    });
    [0,ph].forEach(le=>{
      const d=Math.abs(ce-le);
      if(d<bestD){bestD=d;best=ci===0?le:le-h;lines=[{axis:'y',pos:le}];}
    });
  });
  return{v:best,lines};
}

function applySnap(x,y,w,h,id){
  let nx=snapToGrid(x);

}

      const rb=sel&&!readOnly?`<div onmousedown="startResize(event,'${o.id}')" style="position:absolute;right:-4px;bottom:-4px;width:8px;height:8px;background:#6C8EF5;border-radius:1px;cursor:nwse-resize;z-index:10"></div>`:"";
      return `<div ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${Math.max(h,12)}px;${ss}border-radius:2px;cursor:${readOnly?"default":"move"};overflow:hidden;display:flex;align-items:${va};padding:0 2px;box-sizing:border-box">
        <div style="width:100%;font-family:'${o.font||"Helvetica Neue"}',Arial,sans-serif;font-size:${fz}px;font-weight:${fontWeight};font-style:${fontStyle};text-decoration:${textDecoration};color:${txtColor};white-space:${whiteSpace};word-break:${wordBreak};overflow:hidden;text-overflow:${o.wrapText?"clip":"ellipsis"};line-height:1.15;letter-spacing:${letterSpacing};text-align:${textAlign};transform:scaleX(${scaleX});transform-origin:left center;pointer-events:none">${dispVal}</div>
        ${rb}</div>`;
    }
    if(o.t==="ln") return `<div ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${(o.w||1)*sc}px;height:${Math.max(1,o.lw||1)}px;background:#000;cursor:${readOnly?"default":"move"};${ss}"></div>`;
    if(o.t==="rc"){
      const rb=sel&&!readOnly?`<div onmousedown="startResize(event,'${o.id}')" style="position:absolute;right:-4px;bottom:-4px;width:8px;height:8px;background:#6C8EF5;border-radius:1px;cursor:nwse-resize;z-index:10"></div>`:"";
      return `<div ${drag} style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;border:${o.lw||1}px solid #000;background:transparent;cursor:${readOnly?"default":"move"};${ss}">${rb}</div>`;
    }
    return"";
  }).join("");

  // Grid overlay
  const gridLines=[];
  if(S.snapGrid){
    const gs=S.gridSize*sc;
    for(let gx=0;gx<pw;gx+=gs) gridLines.push(`<line x1="${gx.toFixed(1)}" y1="0" x2="${gx.toFixed(1)}" y2="${ph}" stroke="rgba(108,142,245,0.18)" stroke-width="0.5"/>`);
    for(let gy=0;gy<ph;gy+=gs) gridLines.push(`<line x1="0" y1="${gy.toFixed(1)}" x2="${pw}" y2="${gy.toFixed(1)}" stroke="rgba(108,142,245,0.18)" stroke-width="0.5"/>`);
  }
  const gridSvg=gridLines.length?`<svg style="position:absolute;top:0;left:0;width:${pw}px;height:${ph}px;pointer-events:none;z-index:0" width="${pw}" height="${ph}">${gridLines.join("")}</svg>`:"";

  // Snap indicator lines — drawn during drag only
  const snapSvgLines=(S._snapLines||[]).map(l=>{
    if(l.axis==='x'){
      const px=(l.pos*sc).toFixed(1);
      return '<line x1="'+px+'" y1="0" x2="'+px+'" y2="'+ph+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+px+'" cy="'+(ph/2)+'" r="3.5" fill="#FF4D6A"/>';
    }else{
      const py=(l.pos*sc).toFixed(1);
      return '<line x1="0" y1="'+py+'" x2="'+pw+'" y2="'+py+'" stroke="#FF4D6A" stroke-width="1.5" stroke-dasharray="4,3"/><circle cx="'+(pw/2)+'" cy="'+py+'" r="3.5" fill="#FF4D6A"/>';
    }
  }).join("");
  const snapSvg=snapSvgLines?'<svg style="position:absolute;top:0;left:0;width:'+pw+'px;height:'+ph+'px;pointer-events:none;z-index:5" width="'+pw+'" height="'+ph+'">'+snapSvgLines+'</svg>':"";


  return `<div style="display:flex;flex-direction:column;align-items:flex-start;flex-shrink:0">
    <div onmousedown="${readOnly?'':`if(event.target===this||'svg,line,circle'.split(',').includes(event.target.tagName.toLowerCase()))deselect()`}" style="width:${pw}px;height:${ph}px;background:#fff;border:2px solid rgba(255,255,255,0.13);overflow:hidden;position:relative;flex-shrink:0">
      ${gridSvg}${snapSvg}${objsHtml}
    </div>
    ${wrapZone}
  </div>`;
}

// ── Properties panel ──────────────────────────────────────────────────────────
function buildProps(){
  const o=S.selId?gobj(S.selId):null;
  if(!o)return`<div style="color:#44445a;font-size:11px;text-align:center;margin-top:40px;line-height:1.8">Click an object on<br>the canvas to edit it</div>`;

  function ni(lbl,key,step,val,extra){
    return `<div style="margin-bottom:6px"><label class="lbl">${lbl}</label><input type="number" class="inp" step="${step}" value="${(+val||0).toFixed(3)}" onchange="uobj('${o.id}',{${key}:parseFloat(this.value)});R()" ${extra||""}></div>`;
  }

  if(o.t==="tx"){
    const alBtns=["left","center","right","justify"].map(a=>`<button class="fmt-btn${o.al===a?" on":""}" onclick="uobj('${o.id}',{al:'${a}'});R()" title="${a}">${a==="left"?"⬅":a==="center"?"☰":a==="right"?"➡":"⬌"}</button>`).join("");
    const vaBtns=["top","middle","bottom"].map(a=>`<button class="fmt-btn${(o.valign||"middle")===a?" on":""}" onclick="uobj('${o.id}',{valign:'${a}'});R()" title="${a}">${a==="top"?"⬆":a==="middle"?"↕":"⬇"}</button>`).join("");
    const fontOpts=FONTS.map(f=>`<option value="${f}"${o.font===f?" selected":""}>${f}</option>`).join("");
    return `<div style="display:flex;flex-direction:column;gap:0">
      <div class="sec">Text formatting</div>
      <div style="margin-bottom:8px">
        <label class="lbl">Font</label>
        <select class="inp" onchange="uobj('${o.id}',{font:this.value});R()">${fontOpts}</select>
      </div>
      <div style="margin-bottom:8px">
        <label class="lbl">Size (pt)</label>
        <input type="number" class="inp" value="${o.fs||16}" min="6" max="144" onchange="uobj('${o.id}',{fs:parseInt(this.value)});R()">
      </div>
      <div style="margin-bottom:8px">
        <label class="lbl">Style</label>
        <div style="display:flex;gap:3px">
          <button class="fmt-btn${o.bold?" on":""}" onclick="uobj('${o.id}',{bold:!${!!o.bold}});R()"><b>B</b></button>
          <button class="fmt-btn${o.italic?" on":""}" onclick="uobj('${o.id}',{italic:!${!!o.italic}});R()"><i>I</i></button>
          <button class="fmt-btn${o.underline?" on":""}" onclick="uobj('${o.id}',{underline:!${!!o.underline}});R()"><u>U</u></button>
        </div>
      </div>
      <div style="margin-bottom:8px">
        <label class="lbl">Horizontal align</label>
        <div style="display:flex;gap:3px">${alBtns}</div>
      </div>
      <div style="margin-bottom:8px">
        <label class="lbl">Vertical align</label>
        <div style="display:flex;gap:3px">${vaBtns}</div>
      </div>
      <div style="margin-bottom:8px">
        <label class="lbl" style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" ${o.wrapText?"checked":""} onchange="uobj('${o.id}',{wrapText:this.checked});R()"> Wrap text
        </label>
      </div>
      <div style="margin-bottom:8px">
        <label class="lbl">Tracking (px)</label>
        <input type="number" class="inp" step="0.5" value="${o.tracking||0}" onchange="uobj('${o.id}',{tracking:parseFloat(this.value)});R()">
      </div>
      <div style="margin-bottom:8px">
        <label class="lbl">Width stretch (%)</label>
        <input type="number" class="inp" step="1" min="10" max="300" value="${o.stretch||100}" onchange="uobj('${o.id}',{stretch:parseFloat(this.value)});R()">
      </div>
      <hr class="divider">
      <div class="sec">Position & size</div>
      ${ni("X","x",.01,o.x)}
      ${ni("Y","y",.005,o.y)}
      ${ni("Width","w",.01,o.w)}
      ${ni("Height","h",.01,o.h)}
    </div>`;
  }
  if(o.t==="ln"){
    return `<div style="display:flex;flex-direction:column;gap:0">
      <div class="sec">Line</div>
      <div style="margin-bottom:6px"><label class="lbl">Weight (px)</label><input type="number" class="inp" value="${o.lw||1}" min="1" max="10" onchange="uobj('${o.id}',{lw:parseInt(this.value)});R()"></div>
      ${ni("Y position","y",.005,o.y)}
      ${ni("Width","w",.01,o.w)}
    </div>`;
  }
  if(o.t==="rc"){
    return `<div style="display:flex;flex-direction:column;gap:0">
      <div class="sec">Rectangle</div>
      <div style="margin-bottom:6px"><label class="lbl">Border (px)</label><input type="number" class="inp" value="${o.lw||1}" min="1" max="10" onchange="uobj('${o.id}',{lw:parseInt(this.value)});R()"></div>
      ${ni("X","x",.01,o.x)}
      ${ni("Y","y",.005,o.y)}
      ${ni("Width","w",.01,o.w)}
      ${ni("Height","h",.01,o.h)}
    </div>`;
  }
  return"";
}

  // Apply column CSS variables for the editor record table
  applyEdColVars();

  // Render modal if active
  renderModal();
}

// ── Editor action helpers ─────────────────────────────────────────────────────
function edSaveAndReturn(){
  if(!window._editorOnSave)return;
  window._editorOnSave({name:S.tplName,specN:S.spec.n,objs:JSON.parse(JSON.stringify(S.objs))});
}

function edSaveAsAndReturn(){
  // Save to file first, then call onSave with the current state
  S._afterSave=edSaveAndReturn;
  showModal('save');
}

function edDiscardAndReturn(){
  if(window._editorOnDiscard)window._editorOnDiscard();
}

function edCancelAndReturn(){
  // Cancel: discard changes AND notify Swift/print to close
  if(window._editorOnDiscard)window._editorOnDiscard();
  // Post cancel to Swift if in native app
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"close",payload:null});
  }
}

function renderModal(){
  let existing=document.getElementById("vl-modal");
  if(existing)existing.remove();
  if(!S.modal)return;

  const overlay=document.createElement("div");
  overlay.id="vl-modal";

  overlay.onclick=e=>{if(e.target===overlay)closeModal();};

  if(S.modal==="save"){
    overlay.innerHTML=`
      <div class="modal">
        <div class="modal-title">Save Template</div>
        <div class="modal-row">
          <label class="lbl">Template name</label>

        </div>
        <div class="modal-footer">

          <button class="btn" onclick="newTemplate()" style="background:#4a6cd4;border-color:#4a6cd4;color:#fff;font-weight:600">Create</button>
        </div>
      </div>`;
  }

  if(S.modal==="open"){
    const cards=S._loadedTemplates||[];
    overlay.innerHTML=`
      <div class="modal" style="min-width:500px">
        <div class="modal-title">Open Template</div>
        ${cards.length===0?`<div style="color:#44445a;text-align:center;padding:24px 0;font-size:13px">No templates loaded yet.<br>Use the file picker below to open a saved template.</div>`
          :cards.map((t,i)=>`
            <div class="tpl-card${S._openSel===i?" active":""}" onclick="S._openSel=${i};renderModal()">
              <div class="tpl-preview"></div>

                <div style="color:#8888a8;font-size:11px;margin-top:2px">${t.specN} · ${t.objs.length} object${t.objs.length!==1?"s":""}</div>

            </div>`).join("")}
        <div class="modal-footer" style="justify-content:space-between">
          <button class="btn" onclick="pickTemplateFile()">Browse file…</button>
          <div style="display:flex;gap:8px">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn" onclick="loadSelectedTemplate()" style="background:#4a6cd4;border-color:#4a6cd4;color:#fff;font-weight:600" ${!(cards.length&&S._openSel!==undefined)?"disabled":""}>Open</button>
          </div>
        </div>
      </div>`;
  }

  document.body.appendChild(overlay);
  // Auto-focus name input if present
  const ni=document.getElementById("tpl-name-inp")||document.getElementById("new-tpl-name");
  if(ni){ni.focus();ni.select();}
}

// ── Actions ───────────────────────────────────────────────────────────────────
function deselect(){S.selId=null;S.showFields=false;S._ef=undefined;renderDesigner();}

function commitF(){if(S.selId&&S._ef!==undefined){uobj(S.selId,{f:S._ef});S._ef=undefined;renderDesigner();}}
function insertField(name){
  const fx=document.getElementById("fxbar");
  if(fx&&S.selId){const nv=(fx.value||"")+name;fx.value=nv;S._ef=nv;}
}


function startRecResize(e){
  e.preventDefault();
  const startY=e.clientY;
  const startH=S.recH||160;
  function mv(e){
    const delta=startY-e.clientY;
    S.recH=Math.max(60,Math.min(400,startH+delta));
    const panel=document.getElementById("rec-panel");
    if(panel)panel.style.height=S.recH+"px";
  }
  function mu(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",mu);}
  window.addEventListener("mousemove",mv);
  window.addEventListener("mouseup",mu);
}
// ── Undo history ─────────────────────────────────────────────────────────────
const HISTORY=[];
const MAX_HISTORY=50;

function snapshot(){
  // Deep-clone just the parts that change: objs and selId
  HISTORY.push(JSON.parse(JSON.stringify({objs:S.objs,selId:S.selId})));
  if(HISTORY.length>MAX_HISTORY)HISTORY.shift();
}

function undo(){
  if(!HISTORY.length)return;
  const prev=HISTORY.pop();
  S.objs=prev.objs;
  S.selId=prev.selId;
  S._ef=undefined;
  R();
}

// Snapshot before any destructive/positional action
const _origDelObj=delObj;
const _origAddObj=addObj;
const _origUobj=uobj;

// Wrap uobj to snapshot before each property change
function uobjWithHistory(id,p){
  snapshot();
  uobj(id,p);
}

// Wrap startDrag to snapshot on mousedown (before move)
const _origStartDrag=startDrag;
function startDrag(e,id){
  e.stopPropagation();
  const o=gobj(id);if(!o)return;

  // Update state immediately but DON'T re-render yet.
  // Re-rendering destroys the DOM mid-event and breaks the drag chain.
  // Instead we update selection visuals in-place and re-render on mouseup.
  const wasSelected=(S.selId===id);
  S.selId=id;
  if(o.f!==undefined)S._ef=o.f;

  // Update the formula bar text live without full re-render
  const fxEl=document.getElementById("fxbar");
  if(fxEl&&o.f!==undefined)fxEl.value=(o.f||"").replace(/"/g,'"');

  snapshot();
  const sx=e.clientX,sy=e.clientY,ox=o.x,oy=o.y;
  let didMove=false;

  function mv(e){
    didMove=true;
    const rawX=ox+(e.clientX-sx)/(SC*S.zoom);
    const rawY=oy+(e.clientY-sy)/(SC*S.zoom);
    const o2=gobj(id);
    const snapped=applySnap(rawX,rawY,o2?o2.w:0.1,o2?o2.h:0.1,id);
    uobj(id,snapped);
    renderDesigner();
  }
  function mu(){
    S._snapLines=[];
    window.removeEventListener("mousemove",mv);
    window.removeEventListener("mouseup",mu);
    // Always re-render on mouseup to show selection state + updated props panel
    renderDesigner();
  }
  window.addEventListener("mousemove",mv);
  window.addEventListener("mouseup",mu);
}

// Wrap startResize to snapshot on mousedown
function startResize(e,id){
  e.stopPropagation();
  const o=gobj(id);if(!o)return;
  snapshot();
  const sx=e.clientX,sy=e.clientY,ow=o.w,oh=o.h;
  function mv(e){
    const dw=(e.clientX-sx)/(SC*S.zoom);
    const dh=(e.clientY-sy)/(SC*S.zoom);
    const nw=snapToGrid(Math.max(.05,ow+dw));
    const nh=snapToGrid(Math.max(.02,oh+dh));
    uobj(id,{w:nw,h:nh});renderDesigner();
  }
  function mu(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",mu);}
  window.addEventListener("mousemove",mv);window.addEventListener("mouseup",mu);
}

function delObj(){
  if(!S.selId)return;
  snapshot();
  S.objs=S.objs.filter(o=>o.id!==S.selId);
  S.selId=null;
  R();
}

function addObj(type){
  snapshot();
  const id=mid();
  const base={id,x:.05,y:.05};
  if(type==="tx")S.objs.push({...base,t:"tx",w:.5,h:.2,f:'=""',al:"left",valign:"middle",fs:15,bold:false,italic:false,underline:false,font:"Helvetica Neue",wrapText:false,tracking:0,stretch:100});
  if(type==="ln")S.objs.push({...base,t:"ln",y:.25,w:1,h:0,lw:1});
  if(type==="rc")S.objs.push({...base,t:"rc",w:.4,h:.2,lw:1});
  S.selId=id;S._ef=undefined;renderDesigner();
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener("keydown",function(e){
  // Ignore if focus is inside an input, textarea, or select
  const tag=(document.activeElement||{}).tagName||"";
  const inInput=["INPUT","TEXTAREA","SELECT"].includes(tag);

  // Cmd/Ctrl+Z — undo (works even in inputs to avoid blocking browser undo,
  // but we only intercept if NOT in an input)
  if((e.metaKey||e.ctrlKey)&&e.key==="z"&&!inInput){
    e.preventDefault();
    undo();
    return;
  }

  // Delete / Backspace — delete selected object, only when NOT in an input
  if((e.key==="Delete"||e.key==="Backspace")&&!inInput&&S.selId){
    e.preventDefault();
    delObj();
    return;
  }

  // Arrow keys — nudge selected object by 1px (0.5px with shift)
  if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)&&!inInput&&S.selId){
    e.preventDefault();
    const o=gobj(S.selId);if(!o)return;
    const step=S.snapGrid?S.gridSize:(e.shiftKey?0.5:1)/SC;
    if(e.key==="ArrowLeft")uobj(S.selId,{x:Math.max(0,o.x-step)});
    if(e.key==="ArrowRight")uobj(S.selId,{x:o.x+step});
    if(e.key==="ArrowUp")uobj(S.selId,{y:Math.max(0,o.y-step)});
    if(e.key==="ArrowDown")uobj(S.selId,{y:o.y+step});
    R();
    return;
  }

  // Escape — deselect
  if(e.key==="Escape"&&!inInput){
    deselect();
  }
});

// ── Template management ───────────────────────────────────────────────────────

function showModal(name){S.modal=name;renderModal();}
function closeModal(){S.modal=null;renderModal();}

function templateData(){
  const name=S.tplName||"Untitled Template";
  return{
    version:1,
    name,
    specN:S.spec.n,
    objs:JSON.parse(JSON.stringify(S.objs))
  };
}

async function saveTemplate(){
  const nameEl=document.getElementById("tpl-name-inp");
  if(nameEl)S.tplName=nameEl.value.trim()||"Untitled Template";
  const data=templateData();
  const json=JSON.stringify(data,null,2);
  const filename=(S.tplName.replace(/[^a-z0-9_\- ]/gi,"_")||"template")+".vlt.json";

  // Use File System Access API if available (Chrome/Edge on Mac)
  if(window.showSaveFilePicker){
    try{
      const fh=await window.showSaveFilePicker({
        suggestedName:filename,
        startIn:"documents",
        types:[{description:"VectorLabel Template",accept:{"application/json":[".json",".vlt.json"]}}]
      });
      const writable=await fh.createWritable();
      await writable.write(json);
      await writable.close();
      S.modal=null;
      showToast("Saved: "+S.tplName);
      const cb=S._afterSave;S._afterSave=null;
      if(cb)cb();else R();
      return;
    }catch(e){
      if(e.name==="AbortError"){S.modal=null;renderModal();return;}
    }
  }

  // Fallback: trigger download
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  S.modal=null;
  showToast("Downloaded: "+filename+" — move to ~/Documents/VectorLabel/Templates/");
  const cb2=S._afterSave;S._afterSave=null;
  if(cb2)cb2();else R();
}

function newTemplate(){
  const nameEl=document.getElementById("new-tpl-name");
  const specEl=document.getElementById("new-tpl-spec");
  const name=nameEl?nameEl.value.trim()||"Untitled Template":"Untitled Template";
  const specN=specEl?specEl.value:BL[1].n;
  snapshot();
  S.tplName=name;
  S.spec=BL.find(l=>l.n===specN)||BL[1];
  S.objs=[];
  S.selId=null;
  S._ef=undefined;
  S.modal=null;
  R();
  showToast("New template created");
}

async function openTemplate(){
  S._loadedTemplates=S._loadedTemplates||[];
  S._openSel=undefined;
  S.modal="open";
  renderModal();
}

async function pickTemplateFile(){
  if(window.showOpenFilePicker){
    try{
      const [fh]=await window.showOpenFilePicker({
        startIn:"documents",
        types:[{description:"VectorLabel Template",accept:{"application/json":[".json",".vlt.json"]}}],
        multiple:false
      });
      const file=await fh.getFile();
      const text=await file.text();
      const data=JSON.parse(text);
      if(!data.objs)throw new Error("Not a VectorLabel template");
      S._loadedTemplates=S._loadedTemplates||[];
      // Avoid duplicates by name
      const existing=S._loadedTemplates.findIndex(t=>t.name===data.name);
      if(existing>=0)S._loadedTemplates[existing]=data;
      else S._loadedTemplates.push(data);
      S._openSel=S._loadedTemplates.length-1;
      renderModal();
    }catch(e){
      if(e.name!=="AbortError")showToast("Error: "+e.message);
    }
  }else{
    // Fallback file input
    const inp=document.createElement("input");
    inp.type="file";inp.accept=".json,.vlt.json";
    inp.onchange=async()=>{
      const file=inp.files[0];if(!file)return;
      const text=await file.text();
      try{
        const data=JSON.parse(text);
        if(!data.objs)throw new Error("Not a VectorLabel template");
        S._loadedTemplates=S._loadedTemplates||[];
        S._loadedTemplates.push(data);
        S._openSel=S._loadedTemplates.length-1;
        renderModal();
      }catch(e){showToast("Error: "+e.message);}
    };
    inp.click();
  }
}

function loadSelectedTemplate(){
  const templates=S._loadedTemplates||[];
  const t=templates[S._openSel];
  if(!t)return;
  snapshot();
  S.tplName=t.name||"Untitled Template";
  S.spec=BL.find(l=>l.n===t.specN)||BL[1];
  S.objs=JSON.parse(JSON.stringify(t.objs));
  S.selId=null;S._ef=undefined;
  S.modal=null;
  R();
  showToast("Opened: "+S.tplName);
}

// ── Toast notifications ───────────────────────────────────────────────────────
function showToast(msg){
  let t=document.getElementById("vl-toast");
  if(!t){t=document.createElement("div");t.id="vl-toast";
    Object.assign(t.style,{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",
      background:"#2a2a42",border:"1px solid rgba(108,142,245,0.4)",color:"#e8e8f0",
      borderRadius:"6px",padding:"8px 18px",fontSize:"12px",zIndex:"2000",
      boxShadow:"0 4px 20px rgba(0,0,0,0.5)",transition:"opacity 0.3s",pointerEvents:"none"});
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity="0";},2800);
}

// Close modal on Escape
document.addEventListener("keydown",function(e2){
  if(e2.key==="Escape"&&S.modal){closeModal();}
},true);

// ── Swift bridge ──────────────────────────────────────────────────────────────

/// Called by Swift (via WKWebView evaluateJavaScript) after the page loads,
/// to inject real records, templates, printers, and optional reprint settings.
function initPrintWindow(opts){
  if(!opts)return;

  // Records from the CSV
  if(opts.records&&opts.records.length>0){
    P.records=opts.records;
    P.selected=new Set(opts.records.map((_,i)=>i));
    P.rangeFrom=1;
    P.rangeTo=opts.records.length;
  }

  // Templates from ~/Documents/VectorLabel/Templates/
  if(opts.templates&&opts.templates.length>0){
    // Convert VLTemplate format (specN, objs) to the format P.templates expects
    P.templates=opts.templates.map(t=>({
      id: t.id||t.name,
      name: t.name||"Unnamed",
      specN: t.specN||"BM-32-427",
      objs: (t.objs||[]).map(o=>({...o, id:(o.id&&o.id!=='undefined')?String(o.id):('t'+Math.random().toString(36).slice(2,8))}))
    }));
    P.activeTpl=0;
  }

  // Printers from USB scan
  if(opts.printers&&opts.printers.length>0){
    // Replace the simulated PRINTERS array
    window._swiftPrinters=opts.printers.map(p=>({
      id: p.id,
      name: p.name,
      model: p.model||"M6xx",
      status: p.status||"ready",
      serial: p.serial||""
    }));
    P.activePrinter=window._swiftPrinters.find(p=>p.status==="ready")?.id
                   ||window._swiftPrinters[0]?.id
                   ||P.activePrinter;
  }

  // Source file name for display
  if(opts.sourceFile) P.sourceFile=opts.sourceFile;

  // Reprint: restore previous selection settings
  if(opts.reprint){
    const rp=opts.reprint;
    if(rp.printRange) P.printRange=rp.printRange;
    if(rp.rangeFrom)  P.rangeFrom=rp.rangeFrom;
    if(rp.rangeTo)    P.rangeTo=rp.rangeTo;
    if(rp.selectedIndices&&rp.selectedIndices.length>0){
      P.selected=new Set(rp.selectedIndices);
      if(P.printRange==="all") P.printRange="selected";
    }
    // Try to match template by name
    if(rp.templateName){
      const idx=P.templates.findIndex(t=>t.name===rp.templateName);
      if(idx>=0) P.activeTpl=idx;
    }
  }

  R();
}

// printer() already uses window._swiftPrinters — see definition above

// Tell Swift the page is ready to receive data
function notifyReady(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.vectorlabel){
    window.webkit.messageHandlers.vectorlabel.postMessage({action:"ready",payload:null});
  }
}

R();
// Notify Swift that the page has rendered and is ready for initPrintWindow()
window.addEventListener("load",notifyReady);
</script>
