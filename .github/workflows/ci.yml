name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the build-number stamp (commit count) is correct

      - name: Show toolchain
        run: swift --version

      - name: Install libusb
        run: brew install libusb

      - name: Stamp build version
        run: ./scripts/stamp-version.sh

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      # On pushes to main only, build the unsigned .app and publish it as a
      # downloadable artifact so a test build can be grabbed straight from the
      # Actions run (no local toolchain needed). PRs skip this to stay fast.
      # NB: this is ad-hoc signed — Gatekeeper will require right-click → Open on
      # another Mac. Distributable signed builds come from release.yml on v* tags.
      - name: Package unsigned .app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./scripts/package-app.sh   # no SIGN_IDENTITY → ad-hoc signed

      - name: Compute artifact name
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        run: |
          set -euo pipefail
          VERSION=$(tr -d '[:space:]' < VERSION)
          BUILD=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          echo "name=VectorLabel-v${VERSION}-build${BUILD}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Zip .app (ditto preserves symlinks + executable bit)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ditto -c -k --keepParent dist/VectorLabel.app "dist/${{ steps.meta.outputs.name }}.zip"

      - name: Upload .app artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}
          path: dist/${{ steps.meta.outputs.name }}.zip
          retention-days: 30
          if-no-files-found: error
