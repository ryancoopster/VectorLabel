name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the build-number stamp (commit count) is correct

      - name: Show toolchain
        run: swift --version

      - name: Install libusb
        run: brew install libusb

      - name: Stamp build version
        run: ./scripts/stamp-version.sh

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test
