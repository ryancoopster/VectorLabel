name: Release (signed & notarized)

# Builds a Developer ID-signed, notarized, stapled VectorLabel.app and attaches a
# zip + DMG to a GitHub Release. Triggered by pushing a version tag, e.g. `v1.1.0`.
#
# Requires repo Secrets (Settings → Secrets and variables → Actions). See docs/SIGNING.md:
#   DEVELOPER_ID_CERT_P12_BASE64   base64 of a .p12 holding BOTH your "Developer ID
#                                  Application" AND "Developer ID Installer" certs
#   DEVELOPER_ID_CERT_PASSWORD     password used when exporting that .p12
#   DEVELOPER_ID_IDENTITY          e.g. "Developer ID Application: Your Name (TEAMID)"
#   DEVELOPER_ID_INSTALLER_IDENTITY e.g. "Developer ID Installer: Your Name (TEAMID)"
#   KEYCHAIN_PASSWORD              any random string (for the ephemeral CI keychain)
#   NOTARY_API_KEY_P8_BASE64       base64 of your App Store Connect API key (AuthKey_XXX.p8)
#   NOTARY_API_KEY_ID              the key ID (e.g. ABC123DE45)
#   NOTARY_API_ISSUER_ID           the issuer UUID from App Store Connect

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    name: Build, sign, notarize
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history → correct build-number stamp

      - name: Install libusb
        run: brew install libusb

      - name: Import Developer ID certificate
        env:
          CERT_B64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PWD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KC_PWD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db
          echo "$CERT_B64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KC_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PWD" "$KEYCHAIN"
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN" -P "$CERT_PWD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f $RUNNER_TEMP/cert.p12

      - name: Build, package & sign suite
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: ./scripts/package-suite.sh   # → dist/VectorLabel/ (4 signed apps)

      - name: Notarize & staple
        env:
          KEY_B64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          ISSUER: ${{ secrets.NOTARY_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$KEY_B64" | base64 --decode > $RUNNER_TEMP/AuthKey.p8
          # notarytool notarizes every app inside the zip; staple must run per .app.
          ditto -c -k --keepParent "dist/VectorLabel" dist/VectorLabel-notarize.zip
          xcrun notarytool submit dist/VectorLabel-notarize.zip \
            --key $RUNNER_TEMP/AuthKey.p8 --key-id "$KEY_ID" --issuer "$ISSUER" --wait
          for app in dist/VectorLabel/*.app; do
            xcrun stapler staple "$app"
            spctl --assess --type execute --verbose=4 "$app"
          done
          rm -f $RUNNER_TEMP/AuthKey.p8

      # Build the guided installer FROM the just-stapled apps, so each app inside
      # the .pkg carries its own notarization ticket. Signed with the Developer ID
      # Installer cert (distinct from the Application cert) imported above.
      - name: Build guided installer (.pkg)
        env:
          DEVELOPER_ID_INSTALLER_IDENTITY: ${{ secrets.DEVELOPER_ID_INSTALLER_IDENTITY }}
        run: ./scripts/build-installer.sh   # → dist/VectorLabel-Installer-<version>.pkg

      - name: Notarize & staple installer
        env:
          KEY_B64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          ISSUER: ${{ secrets.NOTARY_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          PKG=$(ls dist/VectorLabel-Installer-*.pkg | head -n1)
          echo "$KEY_B64" | base64 --decode > $RUNNER_TEMP/AuthKey.p8
          xcrun notarytool submit "$PKG" \
            --key $RUNNER_TEMP/AuthKey.p8 --key-id "$KEY_ID" --issuer "$ISSUER" --wait
          xcrun stapler staple "$PKG"
          spctl --assess --type install --verbose=4 "$PKG"
          rm -f $RUNNER_TEMP/AuthKey.p8

      - name: Package zip + DMG
        run: |
          set -euo pipefail
          ditto -c -k --keepParent "dist/VectorLabel" dist/VectorLabel-${{ github.ref_name }}.zip
          hdiutil create -volname VectorLabel -srcfolder "dist/VectorLabel" \
            -ov -format UDZO dist/VectorLabel-${{ github.ref_name }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          name: VectorLabel ${{ github.ref_name }} (open alpha)
          generate_release_notes: true
          body: |
            **VectorLabel** — a macOS suite for designing and printing wire / cable / asset
            labels on Brady and Brother thermal printers, with a Vectorworks ConnectCAD
            integration.

            ### Install
            1. Download **`VectorLabel-Installer-<version>.pkg`** below and open it.
            2. Follow the installer — it installs the four apps into `/Applications/VectorLabel/`.
            3. Launch **VectorLabel Engine** to get the menu-bar icon.

            The apps and installer are Developer ID-signed and notarized by Apple.

            ### Highlights
            - Design labels by hand (Custom Designer) or build reusable, data-bound templates
              (Template Designer) — with **tabs** to work on several labels at once.
            - Pull data straight from **Vectorworks ConnectCAD**, or bind your own CSV / Excel.
            - Text, barcodes, QR, DataMatrix, images and shapes; auto-scale text that never truncates.

            ### Open alpha — please note
            This is an early build. The **Brady M611** is hardware-validated; the **Brady M610
            cut** behavior and the **Brother P-touch** drivers are not yet hardware-confirmed.
            See the [User Guide](https://ryancoopster.github.io/VectorLabel/guide.html) and
            [FAQ](https://ryancoopster.github.io/VectorLabel/faq.html).
          files: |
            dist/VectorLabel-Installer-*.pkg
            dist/VectorLabel-${{ github.ref_name }}.zip
            dist/VectorLabel-${{ github.ref_name }}.dmg
