name: Release (signed & notarized)

# Builds a Developer ID-signed, notarized, stapled VectorLabel.app and attaches a
# zip + DMG to a GitHub Release. Triggered by pushing a version tag, e.g. `v1.1.0`.
#
# Requires repo Secrets (Settings → Secrets and variables → Actions). See docs/SIGNING.md:
#   DEVELOPER_ID_CERT_P12_BASE64   base64 of your "Developer ID Application" .p12
#   DEVELOPER_ID_CERT_PASSWORD     password used when exporting that .p12
#   DEVELOPER_ID_IDENTITY          e.g. "Developer ID Application: Your Name (TEAMID)"
#   KEYCHAIN_PASSWORD              any random string (for the ephemeral CI keychain)
#   NOTARY_API_KEY_P8_BASE64       base64 of your App Store Connect API key (AuthKey_XXX.p8)
#   NOTARY_API_KEY_ID              the key ID (e.g. ABC123DE45)
#   NOTARY_API_ISSUER_ID           the issuer UUID from App Store Connect

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    name: Build, sign, notarize
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history → correct build-number stamp

      - name: Install libusb
        run: brew install libusb

      - name: Import Developer ID certificate
        env:
          CERT_B64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PWD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KC_PWD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db
          echo "$CERT_B64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KC_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PWD" "$KEYCHAIN"
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN" -P "$CERT_PWD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f $RUNNER_TEMP/cert.p12

      - name: Build, package & sign
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: ./scripts/package-app.sh

      - name: Notarize & staple
        env:
          KEY_B64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          ISSUER: ${{ secrets.NOTARY_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$KEY_B64" | base64 --decode > $RUNNER_TEMP/AuthKey.p8
          ditto -c -k --keepParent dist/VectorLabel.app dist/VectorLabel-notarize.zip
          xcrun notarytool submit dist/VectorLabel-notarize.zip \
            --key $RUNNER_TEMP/AuthKey.p8 --key-id "$KEY_ID" --issuer "$ISSUER" --wait
          xcrun stapler staple dist/VectorLabel.app
          spctl --assess --type execute --verbose=4 dist/VectorLabel.app
          rm -f $RUNNER_TEMP/AuthKey.p8

      - name: Package zip + DMG
        run: |
          set -euo pipefail
          ditto -c -k --keepParent dist/VectorLabel.app dist/VectorLabel-${{ github.ref_name }}.zip
          hdiutil create -volname VectorLabel -srcfolder dist/VectorLabel.app \
            -ov -format UDZO dist/VectorLabel-${{ github.ref_name }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/VectorLabel-${{ github.ref_name }}.zip
            dist/VectorLabel-${{ github.ref_name }}.dmg
          generate_release_notes: true
